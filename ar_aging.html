<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Заборгованість покупців</title>
<script>
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e){}
</script>
<script src="auth.js?v=bin20260418"></script>
<script src="header.js?v=bin20260418"></script>
<style>
:root{
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a;
  --surface:#141414; --surface2:#1c1c1c;
  --border:#262626; --border2:#333;
  --text:#f5f5f5; --text2:#a3a3a3; --text3:#737373;
  --accent:#ff8319; --accent-bg:rgba(255,131,25,.12);
  --red:#e74c3c; --red-bg:rgba(231,76,60,.12);
  --green:#22c55e;
  --blue:#3b82f6;
  --yellow:#eab308;
}
:root[data-theme="light"]{
  --bg:#f5f5f7; --bg2:#ffffff; --bg3:#ececef;
  --surface:#ffffff; --surface2:#ffffff;
  --border:#e5e5ea; --border2:#d1d1d6;
  --text:#1c1c1e; --text2:#48484a; --text3:#8e8e93;
  --accent:#e07017; --accent-bg:rgba(224,112,23,.12);
  --red:#d93025; --red-bg:rgba(217,48,37,.10);
  --green:#15803d;
  --blue:#1d4ed8;
  --yellow:#b45309;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{max-width:1200px;margin:0 auto;padding:20px}

.page-tabs{display:inline-flex;gap:4px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px}
.ptab{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap;cursor:pointer}
.ptab:hover{background:var(--bg3);color:var(--text)}
.ptab.active{background:var(--accent-bg);color:var(--accent)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar input[type=date]{padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;outline:none;color-scheme:dark;font-family:inherit}
:root[data-theme="light"] .toolbar input[type=date]{color-scheme:light}
.toolbar input[type=date]:focus{border-color:var(--accent)}
.toolbar input[type=text]{padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;outline:none;font-family:inherit;min-width:180px}
.toolbar input[type=text]:focus{border-color:var(--accent)}
.toolbar .chip{padding:6px 12px;background:transparent;border:0;border-radius:6px;color:var(--text2);font-size:11.5px;font-weight:600;cursor:pointer;transition:all .12s;user-select:none}
.toolbar .chip:hover{color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);color:var(--accent)}
.toolbar .group{display:inline-flex;align-items:center;gap:2px;padding:2px;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.toolbar .sep{width:1px;height:20px;background:var(--border);margin:0 2px}
.toolbar .spacer{flex:1}

/* KPI line — minimal, three numbers */
.kpi-line{display:flex;flex-wrap:wrap;gap:32px;margin-bottom:18px;padding:14px 4px}
.kpi-line .kp{display:flex;flex-direction:column;gap:2px;min-width:0}
.kpi-line .kp .kl{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.kpi-line .kp .kv{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.4px;color:var(--text);line-height:1.15}
.kpi-line .kp .kv.red{color:var(--red)}
.kpi-line .kp .kv.yellow{color:var(--yellow)}
.kpi-line .kp .ks{font-size:11px;color:var(--text3);font-weight:500}

/* Currency section */
.cur-sec{margin-bottom:28px}
.cur-head{display:flex;align-items:baseline;gap:14px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.cur-head .cn{font-size:14px;font-weight:700;letter-spacing:.4px;color:var(--text)}
.cur-head .meta{font-size:11.5px;color:var(--text3);font-weight:500}
.cur-head .total{margin-left:auto;font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.3px;color:var(--text)}

/* Aging spectrum bar — overview per currency */
.spectrum{display:flex;width:100%;height:4px;border-radius:2px;overflow:hidden;background:var(--bg3);margin-bottom:8px}
.spectrum .seg{transition:opacity .15s}
.spectrum .seg:hover{opacity:.75}
.seg-d7{background:var(--green)}
.seg-d14{background:var(--blue)}
.seg-d30{background:var(--yellow)}
.seg-d60{background:var(--accent)}
.seg-d61p{background:var(--red)}
.legend{display:flex;flex-wrap:wrap;gap:14px;font-size:11px;color:var(--text3);margin-bottom:14px}
.legend .lg{display:inline-flex;align-items:center;gap:5px}
.legend .lg .dot{width:7px;height:7px;border-radius:2px}
.legend .lg .amt{color:var(--text2);font-weight:600;font-variant-numeric:tabular-nums}

/* Client list — flat minimalist rows */
.clients{display:flex;flex-direction:column}
.cl-row{display:grid;grid-template-columns:1fr 160px 130px 80px;gap:14px;align-items:center;padding:10px 4px;border-bottom:1px solid var(--border);transition:background .1s}
.cl-row:hover{background:var(--bg3)}
.cl-row:last-child{border-bottom:none}
.cl-row .nm{font-size:13px;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cl-row .sp{display:flex;width:100%;height:3px;border-radius:2px;overflow:hidden;background:var(--bg3)}
.cl-row .amt{text-align:right;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);letter-spacing:-.2px}
.cl-row .age{text-align:right;font-size:11.5px;font-variant-numeric:tabular-nums;color:var(--text3);font-weight:500}
.cl-row .age.warn{color:var(--yellow)}
.cl-row .age.bad{color:var(--red)}

@media(max-width:720px){
  .cl-row{grid-template-columns:1fr 100px 60px;gap:10px}
  .cl-row .sp{display:none}
}

.loading{padding:60px;text-align:center;color:var(--text3)}
.error{padding:16px;color:var(--red);background:var(--red-bg);border-radius:8px;margin:12px 0}
.empty{padding:40px;text-align:center;color:var(--text3);font-size:13px}
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-tabs">
      <a href="/sales.html" class="ptab">📈 Продажі менеджерів</a>
      <a href="/osp.html" class="ptab">📋 Оплата та відвантаження</a>
      <span class="ptab active">⏱ Заборгованість покупців</span>
    </div>

    <div class="toolbar">
      <span class="lbl">На дату</span>
      <input type="date" id="onDateIn">
      <span class="chip" onclick="setToday()">Сьогодні</span>
      <div class="sep"></div>
      <span class="group" id="orgGroup">
        <span class="chip" data-org="" onclick="setOrg(this)">Всі</span>
        <span class="chip active" data-org="Реакт" onclick="setOrg(this)">Реакт</span>
        <span class="chip" data-org="Генерація" onclick="setOrg(this)">Генерація</span>
      </span>
      <div class="sep"></div>
      <span class="group" id="sortGroup">
        <span class="chip active" data-sort="total" onclick="setSort(this)">Сума</span>
        <span class="chip" data-sort="age" onclick="setSort(this)">Вік</span>
        <span class="chip" data-sort="name" onclick="setSort(this)">Назва</span>
      </span>
      <div class="spacer"></div>
      <input type="text" id="clientIn" placeholder="🔎 Пошук..." oninput="filterChanged()">
    </div>

    <div id="kpisHost"></div>
    <div id="body"><div class="loading">Завантаження…</div></div>
  </div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev/';
const state = { onDate: '', org: 'Реакт', clientFilter: '', sort: 'total', _raw: null };

const BUCKET_ORDER = ['d7','d14','d30','d60','d61p'];
const BUCKET_LABEL = { d7:'До 7', d14:'8–14', d30:'15–30', d60:'31–60', d61p:'Від 61' };
const BUCKET_MID = { d7:3.5, d14:11, d30:22.5, d60:45.5, d61p:90 };

function fmt(n, dec = 2) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function curSign(cur){ return cur==='USD'?'$':cur==='EUR'?'€':cur==='UAH'?'₴':cur; }

function setToday() {
  const d = new Date();
  state.onDate = d.toISOString().slice(0, 10);
  document.getElementById('onDateIn').value = state.onDate;
  load();
}
function setOrg(el) {
  state.org = el.dataset.org;
  el.closest('.group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  load();
}
function setSort(el) {
  state.sort = el.dataset.sort;
  el.closest('.group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (state._raw) render(state._raw);
}
function filterChanged() {
  state.clientFilter = document.getElementById('clientIn').value.trim().toLowerCase();
  if (state._raw) render(state._raw);
}

async function load() {
  document.getElementById('body').innerHTML = '<div class="loading">Завантаження…</div>';
  document.getElementById('kpisHost').innerHTML = '';
  try {
    const q = '?action=receivables_aging&on_date=' + state.onDate + (state.org ? '&org=' + encodeURIComponent(state.org) : '');
    const data = await fetch(API_URL + q).then(r => r.json());
    if (data.error) throw new Error(data.error);
    state._raw = data;
    render(data);
  } catch (e) {
    document.getElementById('body').innerHTML = '<div class="error">' + esc(e.message) + '</div>';
  }
}

function sortClients(arr) {
  const a = arr.slice();
  if (state.sort === 'name') a.sort((x, y) => (x.name || '').localeCompare(y.name || '', 'uk'));
  else if (state.sort === 'age') a.sort((x, y) => (y.maxDaysOverdue || 0) - (x.maxDaysOverdue || 0));
  else a.sort((x, y) => y.total - x.total);
  return a;
}

function weightedAge(total, buckets) {
  if (!total) return 0;
  return BUCKET_ORDER.reduce((s, k) => s + (buckets[k] || 0) * BUCKET_MID[k], 0) / total;
}

function spectrumSegs(buckets, total) {
  if (!total) return '';
  return BUCKET_ORDER.map(k => {
    const v = buckets[k] || 0;
    if (v < 0.005) return '';
    const pct = (v / total) * 100;
    return `<div class="seg seg-${k}" style="width:${pct}%" title="${BUCKET_LABEL[k]} дн.: ${fmt(v)} (${pct.toFixed(1)}%)"></div>`;
  }).join('');
}

function render(data) {
  const f = state.clientFilter;
  const currencies = (data.currencies || []).map(c => {
    const clients = c.clients.filter(x => !f || (x.name || '').toLowerCase().includes(f));
    if (f && clients.length !== c.clients.length) {
      const t = clients.reduce((s, x) => s + x.total, 0);
      const b = clients.reduce((acc, x) => {
        BUCKET_ORDER.forEach(k => { acc[k] = (acc[k] || 0) + (x.buckets[k] || 0); });
        return acc;
      }, { d7:0, d14:0, d30:0, d60:0, d61p:0 });
      return { ...c, total: t, buckets: b, clients };
    }
    return { ...c, clients };
  }).filter(c => c.clients.length > 0);

  renderKpis(currencies);

  if (!currencies.length) {
    document.getElementById('body').innerHTML = '<div class="empty">Немає заборгованостей на цю дату</div>';
    return;
  }

  let html = '';
  currencies.forEach(c => {
    const sign = curSign(c.curName);
    const clientsSorted = sortClients(c.clients);
    const avgAge = weightedAge(c.total, c.buckets);

    const legend = BUCKET_ORDER.map(k => {
      const v = c.buckets[k] || 0;
      if (v < 0.005) return '';
      return `<span class="lg"><span class="dot seg-${k}"></span>${BUCKET_LABEL[k]} <span class="amt">${fmt(v, 0)}</span></span>`;
    }).filter(Boolean).join('');

    const rows = clientsSorted.map(cl => {
      const ageCls = cl.maxDaysOverdue > 60 ? 'bad' : cl.maxDaysOverdue > 30 ? 'warn' : '';
      const ageText = cl.maxDaysOverdue > 0 ? `${cl.maxDaysOverdue} дн.` : 'сьогодні';
      return `<div class="cl-row">
        <span class="nm" title="${esc(cl.name)}">${esc(cl.name)}</span>
        <span class="sp">${spectrumSegs(cl.buckets, cl.total)}</span>
        <span class="amt">${fmt(cl.total, 0)} ${sign}</span>
        <span class="age ${ageCls}">${ageText}</span>
      </div>`;
    }).join('');

    html += `
      <div class="cur-sec">
        <div class="cur-head">
          <span class="cn">${esc(c.curName)}</span>
          <span class="meta">${c.clients.length} клієнт${c.clients.length === 1 ? '' : 'ів'} · сер. вік ${avgAge.toFixed(0)} дн.</span>
          <span class="total">${fmt(c.total, 0)} ${sign}</span>
        </div>
        <div class="spectrum">${spectrumSegs(c.buckets, c.total)}</div>
        <div class="legend">${legend}</div>
        <div class="clients">${rows}</div>
      </div>`;
  });

  document.getElementById('body').innerHTML = html;
}

function renderKpis(currencies) {
  if (!currencies.length) {
    document.getElementById('kpisHost').innerHTML = '';
    return;
  }
  let tTotal = 0, tOverdue = 0, tOver60 = 0, tClients = 0, weightedAgeSum = 0;
  currencies.forEach(c => {
    const od = c.buckets.d30 + c.buckets.d60 + c.buckets.d61p;
    const o60 = c.buckets.d60 + c.buckets.d61p;
    tTotal += c.total;
    tOverdue += od;
    tOver60 += o60;
    tClients += c.clients.length;
    weightedAgeSum += weightedAge(c.total, c.buckets) * c.total;
  });
  const overduePct = tTotal ? (tOverdue / tTotal) * 100 : 0;
  const over60Pct  = tTotal ? (tOver60  / tTotal) * 100 : 0;
  const avgAge     = tTotal ? weightedAgeSum / tTotal : 0;

  const overdueCls = overduePct >= 40 ? 'red' : overduePct >= 20 ? 'yellow' : '';
  const over60Cls  = over60Pct  >= 25 ? 'red' : over60Pct  >= 10 ? 'yellow' : '';

  const totalsLine = currencies.map(c => fmt(c.total, 0) + ' ' + curSign(c.curName)).join('   ');

  document.getElementById('kpisHost').innerHTML = `<div class="kpi-line">
    <div class="kp">
      <span class="kl">Борг</span>
      <span class="kv">${totalsLine}</span>
      <span class="ks">${tClients} клієнт${tClients === 1 ? '' : 'ів'}</span>
    </div>
    <div class="kp">
      <span class="kl">Прострочено &gt; 30 дн.</span>
      <span class="kv ${overdueCls}">${overduePct.toFixed(0)}%</span>
    </div>
    <div class="kp">
      <span class="kl">&gt; 60 дн.</span>
      <span class="kv ${over60Cls}">${over60Pct.toFixed(0)}%</span>
    </div>
    <div class="kp">
      <span class="kl">Сер. вік боргу</span>
      <span class="kv">${avgAge.toFixed(0)} <span style="font-size:13px;color:var(--text3);font-weight:500">дн.</span></span>
    </div>
  </div>`;
}

document.getElementById('onDateIn').addEventListener('change', function(e) { state.onDate = e.target.value; load(); });

Auth.require('sales').then(user => {
  AppHeader.mount({ active: 'sales', user });
  setToday();
});
</script>
</body>
</html>
