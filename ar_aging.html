<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Заборгованість покупців</title>

  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e){}
</script>

<style>
:root{
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a;
  --surface:#141414; --surface2:#1c1c1c;
  --border:#262626; --border2:#333;
  --text:#f5f5f5; --text2:#a3a3a3; --text3:#737373;
  --accent:#ff8319; --accent-bg:rgba(255,131,25,.12);
  --red:#e74c3c; --red-bg:rgba(231,76,60,.12);
  --green:#22c55e; --green-bg:rgba(34,197,94,.12);
  --blue:#3b82f6; --blue-bg:rgba(59,130,246,.12);
  --yellow:#eab308; --yellow-bg:rgba(234,179,8,.12);
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
}
:root[data-theme="light"]{
  --bg:#f5f5f7; --bg2:#ffffff; --bg3:#ececef;
  --surface:#ffffff; --surface2:#ffffff;
  --border:#e5e5ea; --border2:#d1d1d6;
  --text:#1c1c1e; --text2:#48484a; --text3:#8e8e93;
  --accent:#e07017; --accent-bg:rgba(224,112,23,.12);
  --red:#d93025; --red-bg:rgba(217,48,37,.10);
  --green:#15803d; --green-bg:rgba(21,128,61,.10);
  --blue:#1d4ed8; --blue-bg:rgba(29,78,216,.10);
  --yellow:#a16207; --yellow-bg:rgba(161,98,7,.10);
  --shadow-md:0 4px 20px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{max-width:1400px;margin:0 auto;padding:20px}

/* Page tabs */
.page-tabs{display:inline-flex;gap:4px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.ptab{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap;cursor:pointer}
.ptab:hover{background:var(--bg3);color:var(--text)}
.ptab.active{background:var(--accent-bg);color:var(--accent)}

/* Toolbar */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar input[type=date]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;color-scheme:dark;font-family:inherit}
:root[data-theme="light"] .toolbar input[type=date]{color-scheme:light}
.toolbar input[type=date]:focus{border-color:var(--accent)}
.toolbar input[type=text]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;font-family:inherit;min-width:180px}
.toolbar input[type=text]:focus{border-color:var(--accent)}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.toolbar .group{display:inline-flex;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{border:none;background:transparent;padding:5px 10px;border-radius:6px}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.toolbar .spacer{flex:1}

/* Summary cards — identical to P&L summary */
.ar-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.ar-card{padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;gap:3px}
/* Bucket-tinted cards — numbers colored by age band */
.ar-card.c-b-d14  .cv{color:var(--blue)}
.ar-card.c-b-d30  .cv{color:var(--yellow)}
.ar-card.c-b-d60  .cv{color:var(--accent)}
.ar-card.c-b-d61p .cv{color:var(--red)}

/* Clickable bucket cards — show filter state */
.ar-card.clickable{cursor:pointer;transition:border-color .12s,background .12s}
.ar-card.clickable:hover{border-color:var(--border2)}
.ar-card.clickable.active{border-color:var(--accent);background:var(--accent-bg)}
.ar-card.clickable.dim{opacity:.55}
.ar-card .cl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.ar-card .cv{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1.2;color:var(--text)}
.ar-card .cv .unit{font-size:13px;font-weight:600;color:var(--text3);margin-left:3px}
.ar-card .cv .ccy{font-size:14px;font-weight:700;color:var(--text3);margin-left:4px}
.ar-card .cv-sub{font-size:14px;font-weight:700;color:var(--text2);font-variant-numeric:tabular-nums;margin-top:1px}
.ar-card .cv-sub .ccy{font-size:11px;font-weight:600;color:var(--text3);margin-left:3px}
.ar-card .cs{font-size:11px;color:var(--text3);font-weight:500}
.ar-card .cs .term{display:inline-block;padding:2px 7px;background:var(--bg3);border-radius:4px;font-size:10.5px;font-weight:700;color:var(--text2);letter-spacing:.3px;margin-right:6px;font-variant-numeric:tabular-nums}

/* Акцент тільки на цифрах через .bad → red (правило вище). Інші — нейтральні. */

/* AR table — matches P&L look */
.ar-wrap{overflow:auto;margin-bottom:20px;border:1px solid var(--border);border-radius:12px;background:var(--bg)}
.ar-table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums;min-width:720px}
.ar-table th,.ar-table td{padding:11px 14px;text-align:right;white-space:nowrap;vertical-align:middle;line-height:1.25}
.ar-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;background:var(--surface2);position:sticky;top:0;z-index:2;border-bottom:1px solid var(--border)}
.ar-table th:first-child,.ar-table td:first-child{text-align:left;position:sticky;left:0;z-index:1;min-width:320px;background:inherit}
.ar-table th:first-child{z-index:3;background:var(--surface2)}
.ar-table tbody tr{background:var(--bg)}

/* Row hierarchy: currency header + client row */
.ar-table tr.ar-cur td{font-weight:800;font-size:14px;color:var(--text);border-top:1px solid var(--border);background:transparent}
.ar-table tr.ar-cur td:first-child{padding-left:14px;cursor:pointer;user-select:none}
.ar-table tr.ar-cur td:first-child:hover{background:var(--surface2)}
.ar-table tr.ar-cur .cur-badge{display:inline-block;min-width:44px;padding:1px 8px;background:var(--surface);border:1px solid var(--border);border-radius:5px;font-size:11px;font-weight:700;text-align:center;margin-right:10px;color:var(--text2)}
.ar-table tr.ar-cur .meta{font-weight:500;color:var(--text3);font-size:11.5px;margin-left:8px;letter-spacing:0;text-transform:none}

.ar-table tr.ar-cl td{color:var(--text2);font-weight:400;font-size:13px}
.ar-table tr.ar-cl td:first-child{padding-left:44px}
.ar-table tr.ar-cl:hover td{background:var(--bg3)}
.ar-table tr.ar-cl + .ar-cl td{border-top:1px solid var(--border2)}

.ar-table tr.collapsed-hidden{display:none}

/* Triangle */
.ar-table .tri{display:inline-block;width:10px;margin-right:8px;font-size:9px;color:var(--text3);transition:transform .18s ease-out;text-align:center;line-height:1;vertical-align:1px}
.ar-table tr[data-collapsed="true"] .tri{transform:rotate(-90deg)}

/* Numeric highlighting */
.ar-table td.total{font-weight:700;color:var(--text)}
.ar-table tr.ar-cl td.total{font-weight:600}
.ar-table td.age{font-weight:500;color:var(--text2)}

/* Header: column-type swatches on top of bucket columns */
.ar-table th .sw{display:inline-block;width:10px;height:3px;border-radius:2px;margin-right:5px;vertical-align:2px}
.ar-table th.b-d7  .sw{background:var(--green)}
.ar-table th.b-d14 .sw{background:var(--blue)}
.ar-table th.b-d30 .sw{background:var(--yellow)}
.ar-table th.b-d60 .sw{background:var(--accent)}
.ar-table th.b-d61p .sw{background:var(--red)}

/* Numeric bucket cells — subtle color tint on the number itself */
.ar-table td.num{color:var(--text)}
.ar-table td.num.zr{color:var(--text3);font-weight:400}
.ar-table td.b-val.has.b-d7  {color:var(--green)}
.ar-table td.b-val.has.b-d14 {color:var(--blue)}
.ar-table td.b-val.has.b-d30 {color:var(--yellow)}
.ar-table td.b-val.has.b-d60 {color:var(--accent)}
.ar-table td.b-val.has.b-d61p{color:var(--red)}

/* Loading + empty */
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.loading::after{content:'';display:block;width:28px;height:28px;margin:16px auto 0;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:40px;color:var(--red);background:var(--red-bg);border-radius:12px;margin:20px 0}
.empty{padding:40px;text-align:center;color:var(--text3);font-size:13px;background:var(--surface2);border:1px dashed var(--border);border-radius:12px}

@media(max-width:720px){
  .ar-summary{grid-template-columns:1fr 1fr}
  .ar-table{font-size:11px}
  .ar-table th,.ar-table td{padding:6px 8px}
  .ar-table td:first-child,.ar-table th:first-child{min-width:180px}
  .ar-table tr.ar-cl td:first-child{padding-left:24px}
}
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-tabs">
      <a href="/sales.html" class="ptab">📈 Продажі менеджерів</a>
      <a href="/osp.html" class="ptab">📋 Оплата та відвантаження</a>
      <span class="ptab active">⏱ Заборгованість покупців</span>
    </div>

    <div class="toolbar">
      <span class="lbl">На дату</span>
      <input type="date" id="onDateIn">
      <span class="chip" onclick="setToday()">Сьогодні</span>
      <div class="sep"></div>
      <span class="group" id="orgGroup">
        <span class="chip" data-org="" onclick="setOrg(this)">Всі</span>
        <span class="chip active" data-org="Реакт" onclick="setOrg(this)">Реакт</span>
        <span class="chip" data-org="Генерація" onclick="setOrg(this)">Генерація</span>
      </span>
      <div class="sep"></div>
      <span class="lbl">Сортування</span>
      <span class="group" id="sortGroup">
        <span class="chip active" data-sort="total" onclick="setSort(this)">За сумою</span>
        <span class="chip" data-sort="age" onclick="setSort(this)">За віком</span>
        <span class="chip" data-sort="name" onclick="setSort(this)">За назвою</span>
      </span>
      <div class="spacer"></div>
      <input type="text" id="clientIn" placeholder="🔎 Пошук клієнта..." oninput="filterChanged()">
    </div>

    <div id="summary"></div>
    <div id="body"><div class="loading">Завантаження…</div></div>
  </div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev/';
const state = { onDate: '', org: 'Реакт', clientFilter: '', sort: 'total', bucketFilter: null, _raw: null, collapsed: {} };

const BUCKET_ORDER = ['d7','d14','d30','d60','d61p'];
const BUCKET_LABEL = { d7:'До 7', d14:'8–14', d30:'15–30', d60:'31–60', d61p:'Від 61' };
const BUCKET_MID = { d7:3.5, d14:11, d30:22.5, d60:45.5, d61p:90 };

function fmt(n, dec = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (Math.abs(n) < 0.005) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function curSign(cur){ return cur==='USD'?'$':cur==='EUR'?'€':cur==='UAH'?'₴':cur; }

function setToday() {
  const d = new Date();
  state.onDate = d.toISOString().slice(0, 10);
  document.getElementById('onDateIn').value = state.onDate;
  load();
}
function setOrg(el) {
  state.org = el.dataset.org;
  el.closest('.group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  load();
}
function setSort(el) {
  state.sort = el.dataset.sort;
  el.closest('.group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (state._raw) render(state._raw);
}
function filterChanged() {
  state.clientFilter = document.getElementById('clientIn').value.trim().toLowerCase();
  if (state._raw) render(state._raw);
}

async function load() {
  document.getElementById('body').innerHTML = '<div class="loading">Завантаження…</div>';
  document.getElementById('summary').innerHTML = '';
  try {
    const q = '?action=receivables_aging&on_date=' + state.onDate + (state.org ? '&org=' + encodeURIComponent(state.org) : '');
    const data = await fetch(API_URL + q).then(r => r.json());
    if (data.error) throw new Error(data.error);
    state._raw = data;
    render(data);
  } catch (e) {
    document.getElementById('body').innerHTML = '<div class="error">' + esc(e.message) + '</div>';
  }
}

function sortClients(arr) {
  const a = arr.slice();
  if (state.sort === 'name') a.sort((x, y) => (x.name || '').localeCompare(y.name || '', 'uk'));
  else if (state.sort === 'age') a.sort((x, y) => (y.maxDaysOverdue || 0) - (x.maxDaysOverdue || 0));
  else a.sort((x, y) => y.total - x.total);
  return a;
}

function weightedAge(total, buckets) {
  if (!total) return 0;
  return BUCKET_ORDER.reduce((s, k) => s + (buckets[k] || 0) * BUCKET_MID[k], 0) / total;
}

function toneClass(pct, thresholds) {
  const [warn, bad] = thresholds;
  if (pct >= bad) return 'bad';
  if (pct >= warn) return 'warn';
  return 'good';
}

function render(data) {
  const f = state.clientFilter;
  // Always compute the summary from the UNFILTERED data (by name search & bucket filter).
  const summaryCurrencies = (data.currencies || []).map(c => {
    const clients = c.clients.filter(x => !f || (x.name || '').toLowerCase().includes(f));
    if (f && clients.length !== c.clients.length) {
      const t = clients.reduce((s, x) => s + x.total, 0);
      const b = clients.reduce((acc, x) => {
        BUCKET_ORDER.forEach(k => { acc[k] = (acc[k] || 0) + (x.buckets[k] || 0); });
        return acc;
      }, { d7:0, d14:0, d30:0, d60:0, d61p:0 });
      return { ...c, total: t, buckets: b, clients };
    }
    return { ...c, clients };
  }).filter(c => c.clients.length > 0);

  renderSummary(summaryCurrencies);

  // Table: additionally narrow by bucketFilter (if any).
  const bf = state.bucketFilter;
  const tableCurrencies = summaryCurrencies.map(c => {
    if (!bf) return c;
    const clients = c.clients.filter(x => (x.buckets[bf] || 0) >= 0.005);
    if (!clients.length) return null;
    const t = clients.reduce((s, x) => s + (x.buckets[bf] || 0), 0);
    return { ...c, total: t, clients };
  }).filter(Boolean);

  if (!tableCurrencies.length) {
    document.getElementById('body').innerHTML = '<div class="empty">Немає записів у вибраному бакеті</div>';
    return;
  }

  renderTable(tableCurrencies);
}

function renderSummary(currencies) {
  if (!currencies.length) { document.getElementById('summary').innerHTML = ''; return; }

  const raw = state._raw || {};
  const fx = raw.fxRates || {};
  const USD_UAH = fx.USD_UAH || 0;
  const EUR_UAH = fx.EUR_UAH || 0;
  const toUsd = (amount, curName) => {
    if (!amount) return 0;
    if (curName === 'USD') return amount;
    if (curName === 'UAH' && USD_UAH) return amount / USD_UAH;
    if (curName === 'EUR' && USD_UAH && EUR_UAH) return amount * (EUR_UAH / USD_UAH);
    return 0;
  };

  let tTotalUSD = 0, tClients = 0;
  const bucketUSD = { d7:0, d14:0, d30:0, d60:0, d61p:0 };
  currencies.forEach(c => {
    tTotalUSD += toUsd(c.total, c.curName);
    tClients  += c.clients.length;
    BUCKET_ORDER.forEach(k => { bucketUSD[k] += toUsd(c.buckets[k] || 0, c.curName); });
  });
  const pctOf = v => tTotalUSD ? (v / tTotalUSD) * 100 : 0;

  const anyActive = !!state.bucketFilter;
  const totalCls = `ar-card c-debt clickable${anyActive ? ' dim' : ''}`;
  document.getElementById('summary').innerHTML = `<div class="ar-summary">
    <div class="${totalCls}" onclick="clearBucketFilter()">
      <span class="cl">Загальна заборгованість</span>
      <div class="cv">${fmt(tTotalUSD)} <span class="ccy">$</span></div>
      <span class="cs">${tClients} клієнт${tClients === 1 ? '' : 'ів'}${USD_UAH ? ' · курс ' + USD_UAH.toFixed(2) + ' ₴/$' : ''}</span>
    </div>
    ${bucketCard('d14','8–14 днів', bucketUSD.d14, pctOf(bucketUSD.d14))}
    ${bucketCard('d30','15–30 днів', bucketUSD.d30, pctOf(bucketUSD.d30))}
    ${bucketCard('d60','31–60 днів', bucketUSD.d60, pctOf(bucketUSD.d60))}
    ${bucketCard('d61p','Від 61 дня', bucketUSD.d61p, pctOf(bucketUSD.d61p))}
  </div>`;
}

function bucketCard(key, label, amount, pct) {
  const active = state.bucketFilter === key;
  const anyActive = !!state.bucketFilter;
  const cls = `ar-card c-b-${key} clickable${active ? ' active' : anyActive ? ' dim' : ''}`;
  return `<div class="${cls}" onclick="toggleBucketFilter('${key}')">
    <span class="cl">${label}</span>
    <div class="cv">${fmt(amount)} <span class="ccy">$</span></div>
    <span class="cs">${pct.toFixed(0)}% від загального</span>
  </div>`;
}

function toggleBucketFilter(key) {
  state.bucketFilter = (state.bucketFilter === key) ? null : key;
  if (state._raw) render(state._raw);
}

function clearBucketFilter() {
  if (!state.bucketFilter) return;
  state.bucketFilter = null;
  if (state._raw) render(state._raw);
}

function renderTable(currencies) {
  // Sort currencies: USD → EUR → UAH → others
  const CUR_ORDER = { USD:1, EUR:2, UAH:3 };
  const sortedCurrencies = currencies.slice().sort((a, b) => (CUR_ORDER[a.curName] || 99) - (CUR_ORDER[b.curName] || 99));

  let rows = '';
  sortedCurrencies.forEach(c => {
    const sign = curSign(c.curName);
    const curKey = c.curKey || c.curName;
    const collapsed = state.collapsed[curKey] === true;
    const avgAge = weightedAge(c.total, c.buckets);
    const clients = sortClients(c.clients);

    rows += `<tr class="ar-cur" data-cur="${esc(curKey)}"${collapsed ? ' data-collapsed="true"' : ''}>
      <td onclick="toggleCur('${esc(curKey)}')">
        <span class="tri">▾</span>
        <span class="cur-badge">${esc(c.curName)}</span>
        ${fmt(c.total)} ${sign}
        <span class="meta">${clients.length} клієнт${clients.length === 1 ? '' : 'ів'} · сер. вік ${avgAge.toFixed(0)} дн.</span>
      </td>
      <td class="total">${fmt(c.total)}</td>
      <td class="age">${avgAge.toFixed(0)} дн.</td>
      ${BUCKET_ORDER.map(k => {
        const v = c.buckets[k] || 0;
        const has = v >= 0.005;
        return `<td class="num b-val b-${k}${has ? ' has' : ' zr'}">${fmt(v)}</td>`;
      }).join('')}
    </tr>`;

    clients.forEach(cl => {
      rows += `<tr class="ar-cl${collapsed ? ' collapsed-hidden' : ''}" data-cur="${esc(curKey)}">
        <td title="${esc(cl.name)}">${esc(cl.name)}</td>
        <td class="total">${fmt(cl.total)}</td>
        <td class="age">${cl.maxDaysOverdue > 0 ? cl.maxDaysOverdue + ' дн.' : '—'}</td>
        ${BUCKET_ORDER.map(k => {
          const v = cl.buckets[k] || 0;
          const has = v >= 0.005;
          return `<td class="num b-val b-${k}${has ? ' has' : ' zr'}">${fmt(v)}</td>`;
        }).join('')}
      </tr>`;
    });
  });

  document.getElementById('body').innerHTML = `
    <div class="ar-wrap">
      <table class="ar-table">
        <thead>
          <tr>
            <th>Валюта / Контрагент</th>
            <th>Заборгованість</th>
            <th>Вік боргу</th>
            <th class="b-d7"><span class="sw"></span>До 7</th>
            <th class="b-d14"><span class="sw"></span>8–14</th>
            <th class="b-d30"><span class="sw"></span>15–30</th>
            <th class="b-d60"><span class="sw"></span>31–60</th>
            <th class="b-d61p"><span class="sw"></span>Від 61</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function toggleCur(curKey) {
  state.collapsed[curKey] = !state.collapsed[curKey];
  if (state._raw) renderTable(state._raw.currencies.map(c => {
    const f = state.clientFilter;
    if (!f) return c;
    const clients = c.clients.filter(x => (x.name || '').toLowerCase().includes(f));
    if (clients.length === c.clients.length) return c;
    const t = clients.reduce((s, x) => s + x.total, 0);
    const b = clients.reduce((acc, x) => { BUCKET_ORDER.forEach(k => acc[k] = (acc[k] || 0) + (x.buckets[k] || 0)); return acc; }, { d7:0,d14:0,d30:0,d60:0,d61p:0 });
    return { ...c, total: t, buckets: b, clients };
  }).filter(c => c.clients.length));
}

document.getElementById('onDateIn').addEventListener('change', function(e) { state.onDate = e.target.value; load(); });

// Mount header eagerly so theme toggle works regardless of auth state.
AppHeader.mount({ active: 'sales' });
Auth.require('sales').then(user => {
  AppHeader.mount({ active: 'sales', user });
  setToday();
}).catch(() => {});
</script>
