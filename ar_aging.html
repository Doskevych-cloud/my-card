<!DOCTYPE html>
<html lang="uk">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{margin:0 auto;padding:14px 16px}

/* Page tabs */
.page-tabs{display:inline-flex;gap:4px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
.ptab{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap;cursor:pointer}
.ptab:hover{background:var(--bg3);color:var(--text)}
.ptab.active{background:var(--accent-bg);color:var(--accent)}

/* Toolbar */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar input[type=text]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;font-family:inherit;min-width:180px}
.toolbar input[type=text]:focus{border-color:var(--accent)}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.toolbar .group{display:inline-flex;flex-wrap:wrap;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{border:none;background:transparent;padding:5px 10px;border-radius:6px}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.toolbar .spacer{flex:1}

/* Summary cards — identical to P&L summary */
.ar-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.ar-card{padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;gap:3px}
/* Bucket-tinted cards — numbers colored by age band */
.ar-card.c-b-d14  .cv{color:var(--blue)}
.ar-card.c-b-d30  .cv{color:var(--yellow)}
.ar-card.c-b-d60  .cv{color:var(--accent)}
.ar-card.c-b-d61p .cv{color:var(--red)}

/* Clickable bucket cards — show filter state */
.ar-card.clickable{cursor:pointer;transition:border-color .12s,background .12s}
.ar-card.clickable:hover{border-color:var(--border2)}
.ar-card.clickable.active{border-color:var(--accent);background:var(--accent-bg)}
.ar-card.clickable.dim{opacity:.55}
.ar-card .cl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.ar-card .cv{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1.2;color:var(--text)}
.ar-card .cv .unit{font-size:13px;font-weight:600;color:var(--text3);margin-left:3px}
.ar-card .cv .ccy{font-size:14px;font-weight:700;color:var(--text3);margin-left:4px}
.ar-card .cv-sub{font-size:14px;font-weight:700;color:var(--text2);font-variant-numeric:tabular-nums;margin-top:1px}
.ar-card .cv-sub .ccy{font-size:11px;font-weight:600;color:var(--text3);margin-left:3px}
.ar-card .cs{font-size:11px;color:var(--text3);font-weight:500}
.ar-card .cs .term{display:inline-block;padding:2px 7px;background:var(--bg3);border-radius:4px;font-size:10.5px;font-weight:700;color:var(--text2);letter-spacing:.3px;margin-right:6px;font-variant-numeric:tabular-nums}

/* Акцент тільки на цифрах через .bad → red (правило вище). Інші — нейтральні. */

/* AR table — matches P&L look */
.ar-wrap{overflow:auto;margin-bottom:20px;border:1px solid var(--border);border-radius:12px;background:var(--bg)}
.ar-table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums;min-width:720px}
.ar-table th,.ar-table td{padding:11px 14px;text-align:right;white-space:nowrap;vertical-align:middle;line-height:1.25}
.ar-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;background:var(--surface2);position:sticky;top:0;z-index:2;border-bottom:1px solid var(--border)}
.ar-table th:first-child,.ar-table td:first-child{text-align:left;position:sticky;left:0;z-index:1;min-width:320px;background:inherit}
.ar-table th:first-child{z-index:3;background:var(--surface2)}
.ar-table tbody tr{background:var(--bg)}

/* Row hierarchy: currency header + client row */
.ar-table tr.ar-cur td{font-weight:800;font-size:14px;color:var(--text);border-top:1px solid var(--border);background:transparent}
.ar-table tr.ar-cur td:first-child{padding-left:14px;cursor:pointer;user-select:none}
.ar-table tr.ar-cur td:first-child:hover{background:var(--surface2)}
.ar-table tr.ar-cur .cur-badge{display:inline-block;min-width:44px;padding:1px 8px;background:var(--surface);border:1px solid var(--border);border-radius:5px;font-size:11px;font-weight:700;text-align:center;margin-right:10px;color:var(--text2)}
.ar-table tr.ar-cur .meta{font-weight:500;color:var(--text3);font-size:11.5px;margin-left:8px;letter-spacing:0;text-transform:none}

.ar-table tr.ar-cl td{color:var(--text2);font-weight:400;font-size:13px}
.ar-table tr.ar-cl td:first-child{padding-left:44px}
.ar-table tr.ar-cl:hover td{background:var(--bg3)}
.ar-table tr.ar-cl + .ar-cl td{border-top:1px solid var(--border2)}

.ar-table tr.collapsed-hidden{display:none}

/* Triangle */
.ar-table .tri{display:inline-block;width:10px;margin-right:8px;font-size:9px;color:var(--text3);transition:transform .18s ease-out;text-align:center;line-height:1;vertical-align:1px}
.ar-table tr[data-collapsed="true"] .tri{transform:rotate(-90deg)}

/* Numeric highlighting */
.ar-table td.total{font-weight:700;color:var(--text)}
.ar-table tr.ar-cl td.total{font-weight:600}
.ar-table td.age{font-weight:500;color:var(--text2)}

/* Header: column-type swatches on top of bucket columns */
.ar-table th .sw{display:inline-block;width:10px;height:3px;border-radius:2px;margin-right:5px;vertical-align:2px}
.ar-table th.b-d7  .sw{background:var(--green)}
.ar-table th.b-d14 .sw{background:var(--blue)}
.ar-table th.b-d30 .sw{background:var(--yellow)}
.ar-table th.b-d60 .sw{background:var(--accent)}
.ar-table th.b-d61p .sw{background:var(--red)}

/* Numeric bucket cells — subtle color tint on the number itself */
.ar-table td.num{color:var(--text)}
.ar-table td.num.zr{color:var(--text3);font-weight:400}
.ar-table td.b-val.has.b-d7  {color:var(--green)}
.ar-table td.b-val.has.b-d14 {color:var(--blue)}
.ar-table td.b-val.has.b-d30 {color:var(--yellow)}
.ar-table td.b-val.has.b-d60 {color:var(--accent)}
.ar-table td.b-val.has.b-d61p{color:var(--red)}

/* Tag-input з autocomplete (як у counterparties) */
.ar-tags{position:relative;display:inline-flex;flex-wrap:wrap;gap:4px;align-items:center;padding:4px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;min-width:200px;max-width:380px;min-height:30px}
.ar-tags:focus-within{border-color:var(--accent)}
.ar-tags input[type=text]{flex:1;min-width:100px;padding:3px 4px;border:none;background:transparent;font-size:12px;color:var(--text);outline:none;min-width:100px !important}
.ar-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 6px 2px 8px;background:var(--accent-bg);color:var(--accent);font-size:11px;font-weight:600;border-radius:6px;white-space:nowrap;max-width:200px}
.ar-tag .name{overflow:hidden;text-overflow:ellipsis}
.ar-tag .x{cursor:pointer;font-size:14px;line-height:1;opacity:.7;padding:0 2px}
.ar-tag .x:hover{opacity:1;color:var(--red)}
.ar-suggest{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-md);max-height:280px;overflow-y:auto;z-index:50;min-width:280px}
.ar-suggest .opt{padding:7px 12px;font-size:12px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
.ar-suggest .opt:last-child{border-bottom:none}
.ar-suggest .opt:hover,.ar-suggest .opt.hl{background:var(--bg3);color:var(--accent)}
.ar-suggest .opt .meta{color:var(--text3);font-size:10.5px;font-variant-numeric:tabular-nums;white-space:nowrap}
.ar-suggest .empty{padding:10px 12px;font-size:12px;color:var(--text3)}

/* Loading + empty */
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.loading::after{content:'';display:block;width:28px;height:28px;margin:16px auto 0;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:40px;color:var(--red);background:var(--red-bg);border-radius:12px;margin:20px 0}
.empty{padding:40px;text-align:center;color:var(--text3);font-size:13px;background:var(--surface2);border:1px dashed var(--border);border-radius:12px}

/* Clickable client rows → drill into single-debtor report */
.ar-table tr.ar-cl{cursor:pointer}
.ar-table tr.ar-cl .dd-go{color:var(--text3);font-weight:700;margin-left:6px;opacity:.4;transition:opacity .12s,color .12s}
.ar-table tr.ar-cl:hover .dd-go{opacity:1;color:var(--accent)}
@media (hover:none){.ar-table tr.ar-cl .dd-go{opacity:.6;color:var(--accent)}}

/* ── Single-debtor detail report ─────────────────────────────── */
.dd-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.dd-back,.dd-pdf{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:background .15s,color .15s,border-color .15s}
.dd-back{background:var(--bg2);color:var(--text2)}
.dd-back:hover{background:var(--bg3);color:var(--text)}
.dd-pdf{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);margin-left:auto}
.dd-pdf:hover{background:var(--accent);color:#fff}
.dd-head{margin-bottom:14px}
.dd-head h2{font-size:20px;font-weight:800;letter-spacing:-.3px;line-height:1.25;color:var(--text)}
.dd-head .dd-meta{font-size:12px;color:var(--text3);margin-top:5px;display:flex;flex-wrap:wrap;gap:4px 16px}
.dd-head .dd-meta b{color:var(--text2);font-weight:600}
.dd-bar-wrap{margin:0 0 16px}
.dd-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;background:var(--bg3);border:1px solid var(--border)}
.dd-bar .seg{height:100%}
.dd-bar .seg-d7{background:var(--green)}
.dd-bar .seg-d14{background:var(--blue)}
.dd-bar .seg-d30{background:var(--yellow)}
.dd-bar .seg-d60{background:var(--accent)}
.dd-bar .seg-d61p{background:var(--red)}
.dd-legend{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:9px;font-size:11px;color:var(--text3)}
.dd-legend .lg{display:inline-flex;align-items:center;gap:6px}
.dd-legend .sw{display:inline-block;width:10px;height:10px;border-radius:3px}
.dd-legend .lg-d7 .sw{background:var(--green)}
.dd-legend .lg-d14 .sw{background:var(--blue)}
.dd-legend .lg-d30 .sw{background:var(--yellow)}
.dd-legend .lg-d60 .sw{background:var(--accent)}
.dd-legend .lg-d61p .sw{background:var(--red)}
.dd-legend b{color:var(--text2);font-weight:700;font-variant-numeric:tabular-nums}
.dd-report .ar-table th:first-child,.dd-report .ar-table td:first-child{position:static;min-width:80px}
.dd-report .ar-table tr.ar-cur td:first-child{cursor:default}

@media(max-width:720px){
  .wrap{padding:12px}
  .page-tabs{display:flex;flex-wrap:wrap;gap:3px;padding:3px;max-width:100%}
  .ptab{padding:6px 10px;font-size:11.5px;flex:0 0 auto}
  .ar-wrap{-webkit-overflow-scrolling:touch}
  .toolbar{padding:8px;gap:6px;border-radius:10px}
  .toolbar input[type=text]{flex:1 1 100%;min-width:0;font-size:12px;padding:6px 8px}
  .toolbar .date-range-input{font-size:12px;padding:6px 8px;min-width:100px}
  .toolbar .lbl{display:none}
  .toolbar .chip{padding:6px 10px;font-size:11px}
  .toolbar .group{padding:3px;gap:2px}
  .toolbar .group .chip{padding:5px 8px;font-size:11px}
  .toolbar .sep{display:none}
  .ar-summary{grid-template-columns:1fr 1fr;gap:8px}
  .ar-card{padding:11px 12px;border-radius:10px}
  .ar-card .cl{font-size:9.5px}
  .ar-card .cv{font-size:18px}
  .ar-card .cv-sub{font-size:12px}
  .ar-card .cs{font-size:10px}
  .ar-wrap{border-radius:10px}
  .ar-table{font-size:11px;min-width:520px}
  .ar-table th,.ar-table td{padding:6px 8px}
  .ar-table td:first-child,.ar-table th:first-child{min-width:180px}
  .ar-table tr.ar-cur td{font-size:12.5px}
  .ar-table tr.ar-cl td{font-size:11px}
  .ar-table tr.ar-cl td:first-child{padding-left:24px}
}
@media(max-width:480px){
  .ar-summary{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-tabs">
      <a href="/prices.html" class="ptab" data-perm="sales_prices">🏠 Порівняння цін</a>
      <a href="/sales.html" class="ptab" data-perm="sales">📈 Продажі менеджерів</a>
      <a href="/top_products.html" class="ptab" data-perm="sales_top_products">📦 Останні продажі</a>
      <a href="/osp.html" class="ptab" data-perm="sales_osp">📋 Оплата та відвантаження</a>
      <span class="ptab active" data-perm="sales_ar_aging">⏱ Заборгованість покупців</span>
      <a href="/active_clients.html" class="ptab" data-org-required="Реакт" data-perm="sales_active_clients">👥 Клієнтська база</a>
      <a href="/inventory.html" class="ptab" data-perm="sales_inventory">📊 Обіговість запасів</a>
      <a href="/sla.html" class="ptab" data-perm="sales_sla">⚡ SLA</a>
      <a href="/broadcast.html" class="ptab" data-org-required="Реакт" data-perm="sales_broadcast">📢 Розсилка</a>
    </div>

    <div class="toolbar">
      <span class="lbl">На дату</span>
      <input type="text" id="onDateIn" class="date-range-input" readonly>
      <span class="chip" onclick="setToday()">Сьогодні</span>
      <div class="sep"></div>
      <span class="group" id="orgGroup">
        <span class="chip" data-org="" onclick="setOrg(this)">Всі</span>
        <span class="chip active" data-org="Реакт" onclick="setOrg(this)">Реакт</span>
        <span class="chip" data-org="Генерація" onclick="setOrg(this)">Генерація</span>
      </span>
      <div class="sep"></div>
      <span class="lbl">Сортування</span>
      <span class="group" id="sortGroup">
        <span class="chip active" data-sort="total" onclick="setSort(this)">За сумою</span>
        <span class="chip" data-sort="age" onclick="setSort(this)">За віком</span>
        <span class="chip" data-sort="name" onclick="setSort(this)">За назвою</span>
      </span>
      <div class="sep"></div>
      <span class="lbl">Покупець</span>
      <span class="ar-tags" id="arIncludeTags">
        <input type="text" id="arIncludeIn" placeholder="Почни вводити…" autocomplete="off">
        <div id="arIncludeSuggest" class="ar-suggest" style="display:none"></div>
      </span>
      <span class="lbl">Виключити</span>
      <span class="ar-tags" id="arExcludeTags">
        <input type="text" id="arExcludeIn" placeholder="Почни вводити…" autocomplete="off">
        <div id="arExcludeSuggest" class="ar-suggest" style="display:none"></div>
      </span>
      <div class="spacer"></div>
    </div>

    <div id="summary"></div>
    <div id="body"><div class="loading">Завантаження…</div></div>
  </div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev/';
// Внутрішні холдингові орги як «покупці» — інтра-холдинг розрахунки, не реальні клієнти.
// Точні назви з counterparties.description (включно з trailing space у "Київ ").
const DEFAULT_EXCLUDES = [
  'Дистрибуція',
  'ТОВ "ГЕНЕРАЦІЯ ЕНЕРДЖІ" Киев',
  'ТОВ "ГЕНЕРАЦІЯ ЕНЕРДЖІ" Київ ',
  'ТОВ "ГЕНЕРАЦІЯ ЕНЕРДЖІ" Одеса',
];
const state = { onDate: '', org: 'Реакт', sort: 'total', bucketFilter: null, includeList: [], excludeList: [], _raw: null, collapsed: {}, detail: null, _pushedDetail: false };
try {
  const inc = localStorage.getItem('ar_include');
  const ex  = localStorage.getItem('ar_exclude');
  if (inc) { const a = JSON.parse(inc); if (Array.isArray(a)) state.includeList = a; }
  if (ex !== null) {
    const a = JSON.parse(ex);
    if (Array.isArray(a)) state.excludeList = a;
  } else {
    // Перший візит — заливаємо дефолт у localStorage.
    state.excludeList = DEFAULT_EXCLUDES.slice();
    localStorage.setItem('ar_exclude', JSON.stringify(state.excludeList));
  }
} catch (_) {}

const BUCKET_ORDER = ['d7','d14','d30','d60','d61p'];
const BUCKET_LABEL = { d7:'До 7', d14:'8–14', d30:'15–30', d60:'31–60', d61p:'Від 61' };
const BUCKET_MID = { d7:3.5, d14:11, d30:22.5, d60:45.5, d61p:90 };

function fmt(n, dec = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (Math.abs(n) < 0.005) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function curSign(cur){ return cur==='USD'?'$':cur==='EUR'?'€':cur==='UAH'?'₴':cur; }

let _picker;
function setToday() {
  const d = new Date();
  state.onDate = d.toISOString().slice(0, 10);
  if (_picker) _picker.setDate(state.onDate);
  load();
}
function setOrg(el) {
  state.org = el.dataset.org;
  el.closest('.group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  load();
}
function setSort(el) {
  state.sort = el.dataset.sort;
  el.closest('.group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (state._raw) render(state._raw);
}

/* Tag-input з autocomplete (як у counterparties) */
const AR_TAG_CFG = {
  include: { stateKey:'includeList', tagsId:'arIncludeTags', inputId:'arIncludeIn', suggestId:'arIncludeSuggest', storageKey:'ar_include' },
  exclude: { stateKey:'excludeList', tagsId:'arExcludeTags', inputId:'arExcludeIn', suggestId:'arExcludeSuggest', storageKey:'ar_exclude' },
};
const arTagInput = {
  list(field) { return state[AR_TAG_CFG[field].stateKey] || []; },
  save(field) { try { localStorage.setItem(AR_TAG_CFG[field].storageKey, JSON.stringify(this.list(field))); } catch (_) {} },
  rerender() { if (state._raw) render(state._raw); },
  renderTags(field) {
    const cfg = AR_TAG_CFG[field];
    const host = document.getElementById(cfg.tagsId);
    if (!host) return;
    Array.from(host.querySelectorAll('.ar-tag')).forEach(n => n.remove());
    const inp = document.getElementById(cfg.inputId);
    this.list(field).forEach(name => {
      const t = document.createElement('span');
      t.className = 'ar-tag';
      t.innerHTML = '<span class="name">' + esc(name) + '</span><span class="x" data-name="' + esc(name) + '" data-field="' + field + '">×</span>';
      host.insertBefore(t, inp);
    });
  },
  add(field, name) {
    if (!name) return;
    const cfg = AR_TAG_CFG[field];
    const cur = this.list(field);
    if (!cur.some(n => n.toLowerCase() === name.toLowerCase())) {
      state[cfg.stateKey] = cur.concat([name]);
      this.save(field);
    }
    document.getElementById(cfg.inputId).value = '';
    this.hide(field);
    this.renderTags(field);
    this.rerender();
  },
  remove(field, name) {
    const cfg = AR_TAG_CFG[field];
    state[cfg.stateKey] = this.list(field).filter(n => n !== name);
    this.save(field);
    this.renderTags(field);
    this.rerender();
  },
  hide(field) { const dd = document.getElementById(AR_TAG_CFG[field].suggestId); if (dd) dd.style.display = 'none'; },
  allClients() {
    if (!state._raw) return [];
    const seen = new Map();
    (state._raw.currencies || []).forEach(c => {
      (c.clients || []).forEach(cl => {
        const name = cl.name || '';
        if (!name) return;
        const key = name.toLowerCase();
        const usd = (cl.totalUSD != null) ? cl.totalUSD : (Number(cl.total) || 0) * ((c.totalUSD && c.total) ? (c.totalUSD / c.total) : 0);
        const prev = seen.get(key) || { name, usd: 0 };
        prev.usd += usd;
        seen.set(key, prev);
      });
    });
    return [...seen.values()].sort((a,b) => b.usd - a.usd);
  },
  onInput(field) {
    const cfg = AR_TAG_CFG[field];
    const inp = document.getElementById(cfg.inputId);
    const dd  = document.getElementById(cfg.suggestId);
    if (!inp || !dd) return;
    const q = inp.value.trim().toLowerCase();
    const all = this.allClients();
    if (!all.length) { dd.style.display = 'none'; return; }
    const taken = new Set(this.list(field).map(n => n.toLowerCase()));
    const matched = all
      .filter(o => !taken.has((o.name || '').toLowerCase()))
      .filter(o => !q || (o.name || '').toLowerCase().includes(q))
      .slice(0, 50);
    if (!matched.length) { dd.innerHTML = '<div class="empty">Нічого не знайдено</div>'; dd.style.display = 'block'; return; }
    dd.innerHTML = matched.map((o, i) =>
      '<div class="opt' + (i === 0 ? ' hl' : '') + '" data-name="' + esc(o.name) + '" data-field="' + field + '">' +
        '<span>' + esc(o.name) + '</span>' +
        '<span class="meta">' + (o.usd ? fmt(o.usd) + ' $' : '') + '</span>' +
      '</div>').join('');
    dd.style.display = 'block';
  },
  onKey(field, ev) {
    const dd = document.getElementById(AR_TAG_CFG[field].suggestId);
    if (!dd || dd.style.display === 'none') {
      if (ev.key === 'Backspace' && !ev.target.value && this.list(field).length) {
        this.remove(field, this.list(field)[this.list(field).length - 1]);
      }
      return;
    }
    const opts = Array.from(dd.querySelectorAll('.opt'));
    let idx = opts.findIndex(o => o.classList.contains('hl'));
    if (ev.key === 'ArrowDown') { ev.preventDefault(); idx = Math.min(idx+1, opts.length-1); opts.forEach((o,i) => o.classList.toggle('hl', i===idx)); opts[idx]?.scrollIntoView({block:'nearest'}); }
    else if (ev.key === 'ArrowUp') { ev.preventDefault(); idx = Math.max(idx-1, 0); opts.forEach((o,i) => o.classList.toggle('hl', i===idx)); opts[idx]?.scrollIntoView({block:'nearest'}); }
    else if (ev.key === 'Enter')   { ev.preventDefault(); const sel = opts[idx] || opts[0]; if (sel) this.add(field, sel.dataset.name); }
    else if (ev.key === 'Escape')  { this.hide(field); }
    else if (ev.key === 'Backspace' && !ev.target.value && this.list(field).length) {
      this.remove(field, this.list(field)[this.list(field).length - 1]);
    }
  },
};
document.addEventListener('click', function(ev) {
  const x = ev.target.closest('.ar-tag .x[data-field]');
  if (x) { arTagInput.remove(x.dataset.field, x.dataset.name); return; }
  const opt = ev.target.closest('.ar-suggest .opt[data-field]');
  if (opt) { arTagInput.add(opt.dataset.field, opt.dataset.name); return; }
  const drow = ev.target.closest('tr.ar-cl[data-client]');
  if (drow) { openDebtor(drow.dataset.client); return; }
});

async function load() {
  document.getElementById('body').innerHTML = '<div class="loading">Завантаження…</div>';
  document.getElementById('summary').innerHTML = '';
  state._raw = null;
  state.bucketFilter = null;
  try {
    // _t — cache-buster проти HTTP/disk-кешу браузера. Тіло відповіді все одно
    // кешується KV-шаром у воркері — зайвого навантаження немає.
    const q = '?action=receivables_aging_d1&on_date=' + state.onDate
            + (state.org ? '&org=' + encodeURIComponent(state.org) : '')
            + '&_t=' + Date.now();
    const data = await fetch(API_URL + q, { cache: 'no-store' }).then(r => r.json());
    if (data.error) throw new Error(data.error);
    state._raw = data;
    if (!state.detail) { const h = readHashDetail(); if (h) state.detail = h; }
    render(data);
  } catch (e) {
    document.getElementById('body').innerHTML = '<div class="error">' + esc(e.message) + '</div>';
  }
}

function sortClients(arr) {
  const a = arr.slice();
  if (state.sort === 'name') a.sort((x, y) => (x.name || '').localeCompare(y.name || '', 'uk'));
  else if (state.sort === 'age') a.sort((x, y) => (y.maxDaysOverdue || 0) - (x.maxDaysOverdue || 0));
  else a.sort((x, y) => y.total - x.total);
  return a;
}

function weightedAge(total, buckets) {
  if (!total) return 0;
  return BUCKET_ORDER.reduce((s, k) => s + (buckets[k] || 0) * BUCKET_MID[k], 0) / total;
}

function toneClass(pct, thresholds) {
  const [warn, bad] = thresholds;
  if (pct >= bad) return 'bad';
  if (pct >= warn) return 'warn';
  return 'good';
}

function render(data) {
  if (state.detail) { renderDebtorDetail(state.detail); return; }
  // Tag-фільтри: include — показуємо ТІЛЬКИ цих; exclude — приховуємо їх.
  // Точний матч по name (case-insensitive). Без tag → без фільтру.
  const incSet = new Set((state.includeList || []).map(s => (s || '').toLowerCase()));
  const exSet  = new Set((state.excludeList || []).map(s => (s || '').toLowerCase()));
  const isAllowed = name => {
    const k = (name || '').toLowerCase();
    if (incSet.size && !incSet.has(k)) return false;
    if (exSet.has(k)) return false;
    return true;
  };
  const filtered = !!(incSet.size || exSet.size);
  const summaryCurrencies = (data.currencies || []).map(c => {
    const clients = c.clients.filter(x => isAllowed(x.name));
    if (filtered && clients.length !== c.clients.length) {
      const t = clients.reduce((s, x) => s + x.total, 0);
      const b = clients.reduce((acc, x) => {
        BUCKET_ORDER.forEach(k => { acc[k] = (acc[k] || 0) + (x.buckets[k] || 0); });
        return acc;
      }, { d7:0, d14:0, d30:0, d60:0, d61p:0 });
      return { ...c, total: t, buckets: b, clients };
    }
    return { ...c, clients };
  }).filter(c => c.clients.length > 0);

  renderSummary(summaryCurrencies);

  // Table: additionally narrow by bucketFilter (if any).
  const bf = state.bucketFilter;
  const tableCurrencies = summaryCurrencies.map(c => {
    if (!bf) return c;
    const clients = c.clients.filter(x => (x.buckets[bf] || 0) >= 0.005);
    if (!clients.length) return null;
    const t = clients.reduce((s, x) => s + (x.buckets[bf] || 0), 0);
    return { ...c, total: t, clients };
  }).filter(Boolean);

  if (!tableCurrencies.length) {
    document.getElementById('body').innerHTML = '<div class="empty">Немає записів у вибраному бакеті</div>';
    return;
  }

  renderTable(tableCurrencies);
}

function renderSummary(currencies) {
  if (!currencies.length) { document.getElementById('summary').innerHTML = ''; return; }

  const raw = state._raw || {};
  const fx = raw.fxRates || {};
  const USD_UAH = fx.USD_UAH || 0;
  const EUR_UAH = fx.EUR_UAH || 0;
  const toUsd = (amount, curName) => {
    if (!amount) return 0;
    if (curName === 'USD') return amount;
    if (curName === 'UAH' && USD_UAH) return amount / USD_UAH;
    if (curName === 'EUR' && USD_UAH && EUR_UAH) return amount * (EUR_UAH / USD_UAH);
    return 0;
  };

  let tTotalUSD = 0, tClients = 0;
  const bucketUSD = { d7:0, d14:0, d30:0, d60:0, d61p:0 };
  currencies.forEach(c => {
    tTotalUSD += toUsd(c.total, c.curName);
    tClients  += c.clients.length;
    BUCKET_ORDER.forEach(k => { bucketUSD[k] += toUsd(c.buckets[k] || 0, c.curName); });
  });
  const pctOf = v => tTotalUSD ? (v / tTotalUSD) * 100 : 0;

  const anyActive = !!state.bucketFilter;
  const totalCls = `ar-card c-debt clickable${anyActive ? ' dim' : ''}`;
  document.getElementById('summary').innerHTML = `<div class="ar-summary">
    <div class="${totalCls}" onclick="clearBucketFilter()">
      <span class="cl">Загальна заборгованість</span>
      <div class="cv">${fmt(tTotalUSD)} <span class="ccy">$</span></div>
      <span class="cs">${tClients} клієнт${tClients === 1 ? '' : 'ів'}${USD_UAH ? ' · курс ' + USD_UAH.toFixed(2) + ' ₴/$' : ''}</span>
    </div>
    ${bucketCard('d14','8–14 днів', bucketUSD.d14, pctOf(bucketUSD.d14))}
    ${bucketCard('d30','15–30 днів', bucketUSD.d30, pctOf(bucketUSD.d30))}
    ${bucketCard('d60','31–60 днів', bucketUSD.d60, pctOf(bucketUSD.d60))}
    ${bucketCard('d61p','Від 61 дня', bucketUSD.d61p, pctOf(bucketUSD.d61p))}
  </div>`;
}

function bucketCard(key, label, amount, pct) {
  const active = state.bucketFilter === key;
  const anyActive = !!state.bucketFilter;
  const cls = `ar-card c-b-${key} clickable${active ? ' active' : anyActive ? ' dim' : ''}`;
  return `<div class="${cls}" onclick="toggleBucketFilter('${key}')">
    <span class="cl">${label}</span>
    <div class="cv">${fmt(amount)} <span class="ccy">$</span></div>
    <span class="cs">${pct.toFixed(0)}% від загального</span>
  </div>`;
}

function toggleBucketFilter(key) {
  state.bucketFilter = (state.bucketFilter === key) ? null : key;
  if (state._raw) render(state._raw);
}

function clearBucketFilter() {
  if (!state.bucketFilter) return;
  state.bucketFilter = null;
  if (state._raw) render(state._raw);
}

function renderTable(currencies) {
  // Sort currencies: USD → EUR → UAH → others
  const CUR_ORDER = { USD:1, EUR:2, UAH:3 };
  const sortedCurrencies = currencies.slice().sort((a, b) => (CUR_ORDER[a.curName] || 99) - (CUR_ORDER[b.curName] || 99));

  let rows = '';
  sortedCurrencies.forEach(c => {
    const sign = curSign(c.curName);
    const curKey = c.curKey || c.curName;
    const collapsed = state.collapsed[curKey] === true;
    const avgAge = weightedAge(c.total, c.buckets);
    const clients = sortClients(c.clients);

    rows += `<tr class="ar-cur" data-cur="${esc(curKey)}"${collapsed ? ' data-collapsed="true"' : ''}>
      <td onclick="toggleCur('${esc(curKey)}')">
        <span class="tri">▾</span>
        <span class="cur-badge">${esc(c.curName)}</span>
        ${fmt(c.total)} ${sign}
        <span class="meta">${clients.length} клієнт${clients.length === 1 ? '' : 'ів'} · сер. вік ${avgAge.toFixed(0)} дн.</span>
      </td>
      <td class="total">${fmt(c.total)}</td>
      <td class="age">${avgAge.toFixed(0)} дн.</td>
      ${BUCKET_ORDER.map(k => {
        const v = c.buckets[k] || 0;
        const has = v >= 0.005;
        return `<td class="num b-val b-${k}${has ? ' has' : ' zr'}">${fmt(v)}</td>`;
      }).join('')}
    </tr>`;

    clients.forEach(cl => {
      rows += `<tr class="ar-cl${collapsed ? ' collapsed-hidden' : ''}" data-cur="${esc(curKey)}" data-client="${esc(cl.name)}">
        <td title="Відкрити звіт по боржнику: ${esc(cl.name)}">${esc(cl.name)}<span class="dd-go">›</span></td>
        <td class="total">${fmt(cl.total)}</td>
        <td class="age">${cl.maxDaysOverdue > 0 ? cl.maxDaysOverdue + ' дн.' : '—'}</td>
        ${BUCKET_ORDER.map(k => {
          const v = cl.buckets[k] || 0;
          const has = v >= 0.005;
          return `<td class="num b-val b-${k}${has ? ' has' : ' zr'}">${fmt(v)}</td>`;
        }).join('')}
      </tr>`;
    });
  });

  document.getElementById('body').innerHTML = `
    <div class="ar-wrap">
      <table class="ar-table">
        <thead>
          <tr>
            <th>Валюта / Контрагент</th>
            <th>Заборгованість</th>
            <th>Вік боргу</th>
            <th class="b-d7"><span class="sw"></span>До 7</th>
            <th class="b-d14"><span class="sw"></span>8–14</th>
            <th class="b-d30"><span class="sw"></span>15–30</th>
            <th class="b-d60"><span class="sw"></span>31–60</th>
            <th class="b-d61p"><span class="sw"></span>Від 61</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function toggleCur(curKey) {
  state.collapsed[curKey] = !state.collapsed[curKey];
  if (state._raw) render(state._raw);
}

/* ── Перехід на боржника: звіт тільки по його боргу + PDF ─────────── */
function readHashDetail() {
  try {
    const h = (location.hash || '').replace(/^#/, '');
    return new URLSearchParams(h).get('debtor') || null;
  } catch (_) { return null; }
}

function openDebtor(name) {
  state.detail = name;
  const target = 'debtor=' + encodeURIComponent(name);
  try {
    if ((location.hash || '').replace(/^#/, '') !== target) {
      location.hash = target;        // PUSH history entry; hashchange нижче буде no-op
      state._pushedDetail = true;
    }
  } catch (_) {}
  if (state._raw) render(state._raw);
  try { window.scrollTo({ top: 0 }); } catch (_) {}
}

function goBackDebtor() {
  // Якщо ми самі додали запис в історію — повертаємось симетрично (працює і
  // браузерна кнопка «Назад»). hashchange зніме detail і перемалює список.
  if (state._pushedDetail) {
    state._pushedDetail = false;
    try { history.back(); return; } catch (_) {}
  }
  // Прямий deep-link (#debtor=...) без запису списку позаду — чистимо хеш на місці.
  state.detail = null;
  try { history.replaceState(null, '', location.pathname + location.search); }
  catch (_) { try { location.hash = ''; } catch (__) {} }
  if (state._raw) render(state._raw);
}

// Збираємо весь борг одного контрагента по всіх валютах із сирих даних —
// повна заборгованість, без урахування bucket-фільтра/тег-фільтрів сторінки.
function collectDebtor(name) {
  const raw = state._raw;
  if (!raw) return null;
  const key = (name || '').toLowerCase();
  const fx = raw.fxRates || {};
  const USD_UAH = fx.USD_UAH || 0, EUR_UAH = fx.EUR_UAH || 0;
  const toUsd = (amount, curName) => {
    if (!amount) return 0;
    if (curName === 'USD') return amount;
    if (curName === 'UAH' && USD_UAH) return amount / USD_UAH;
    if (curName === 'EUR' && USD_UAH && EUR_UAH) return amount * (EUR_UAH / USD_UAH);
    return 0;
  };
  const entries = [];
  let displayName = name;
  (raw.currencies || []).forEach(c => {
    (c.clients || []).forEach(cl => {
      if ((cl.name || '').toLowerCase() !== key) return;
      displayName = cl.name || displayName;
      const b = cl.buckets || {};
      entries.push({
        curName: c.curName,
        total: cl.total || 0,
        buckets: { d7: b.d7 || 0, d14: b.d14 || 0, d30: b.d30 || 0, d60: b.d60 || 0, d61p: b.d61p || 0 },
        maxDaysOverdue: cl.maxDaysOverdue || 0,
      });
    });
  });
  if (!entries.length) return null;
  let totalUSD = 0, maxDays = 0;
  const bucketUSD = { d7: 0, d14: 0, d30: 0, d60: 0, d61p: 0 };
  entries.forEach(e => {
    totalUSD += toUsd(e.total, e.curName);
    BUCKET_ORDER.forEach(k => { bucketUSD[k] += toUsd(e.buckets[k] || 0, e.curName); });
    if (e.maxDaysOverdue > maxDays) maxDays = e.maxDaysOverdue;
  });
  const CUR_ORDER = { USD: 1, EUR: 2, UAH: 3 };
  entries.sort((a, b) => (CUR_ORDER[a.curName] || 99) - (CUR_ORDER[b.curName] || 99));
  return { name: displayName, entries, totalUSD, bucketUSD, maxDays, USD_UAH };
}

function ddBucketCard(key, label, amount, pct, ccy) {
  return `<div class="ar-card c-b-${key}">
    <span class="cl">${label}</span>
    <div class="cv">${fmt(amount)} <span class="ccy">${ccy || '$'}</span></div>
    <span class="cs">${pct.toFixed(0)}% від боргу</span>
  </div>`;
}

// Внутрішня розмітка звіту — спільна для екрана й PDF.
function buildDebtorReportInner(dd) {
  const onDate = state.onDate || '';
  const org = state.org || 'Усі організації';
  const dt = new Date().toLocaleString('uk-UA', { timeZone: 'Europe/Kiev' });
  const n = dd.entries.length;
  const curWord = n === 1 ? 'валюта' : n < 5 ? 'валюти' : 'валют';

  // Якщо курс валюти недоступний, USD-сума = 0 попри реальний борг. Для
  // моновалютного боржника показуємо суми в його валюті, щоб звіт не виглядав
  // «нульовим»; для мультивалютного без курсу — позначаємо, що $-сума неповна.
  const fxMissing = dd.totalUSD < 0.005 && dd.entries.some(e => Math.abs(e.total) >= 0.005);
  const nativeMode = fxMissing && n === 1;
  const basisTotal  = nativeMode ? dd.entries[0].total   : dd.totalUSD;
  const basisBucket = nativeMode ? dd.entries[0].buckets : dd.bucketUSD;
  const ccy = nativeMode ? curSign(dd.entries[0].curName) : '$';
  const pctOf = v => basisTotal ? (v / basisTotal) * 100 : 0;
  const avgAge = weightedAge(basisTotal, basisBucket);
  const headline = (fxMissing && !nativeMode) ? '—' : fmt(basisTotal);
  const note = fxMissing
    ? `<span style="color:var(--red,#c0392b)"><b>Увага:</b> курс валюти недоступний — суми в $ неповні</span>`
    : '';

  const head = `<div class="dd-head">
    <h2>${esc(dd.name)}</h2>
    <div class="dd-meta">
      <span><b>Заборгованість на:</b> ${esc(onDate)}</span>
      <span><b>Організація:</b> ${esc(org)}</span>
      <span><b>Сер. вік боргу:</b> ${avgAge.toFixed(0)} дн.</span>
      <span><b>Макс. прострочення:</b> ${dd.maxDays > 0 ? dd.maxDays + ' дн.' : '—'}</span>
      <span><b>Сформовано:</b> ${esc(dt)}</span>
      ${note}
    </div>
  </div>`;

  const cards = `<div class="ar-summary">
    <div class="ar-card c-debt">
      <span class="cl">Загальна заборгованість</span>
      <div class="cv">${headline} <span class="ccy">${ccy}</span></div>
      <span class="cs">${n} ${curWord}${dd.USD_UAH ? ' · курс ' + dd.USD_UAH.toFixed(2) + ' ₴/$' : ''}</span>
    </div>
    ${ddBucketCard('d14', '8–14 днів', basisBucket.d14, pctOf(basisBucket.d14), ccy)}
    ${ddBucketCard('d30', '15–30 днів', basisBucket.d30, pctOf(basisBucket.d30), ccy)}
    ${ddBucketCard('d60', '31–60 днів', basisBucket.d60, pctOf(basisBucket.d60), ccy)}
    ${ddBucketCard('d61p', 'Від 61 дня', basisBucket.d61p, pctOf(basisBucket.d61p), ccy)}
  </div>`;

  // Смуга і легенда керуються одним порогом (>= 0.005), щоб не розходились;
  // мінімальна ширина сегмента — щоб дрібний бакет усе одно було видно.
  const segs = BUCKET_ORDER.map(k => {
    const v = basisBucket[k] || 0;
    if (v < 0.005) return '';
    const w = pctOf(v);
    return `<span class="seg seg-${k}" style="width:${Math.max(w, 0.6)}%" title="${BUCKET_LABEL[k]} дн.: ${fmt(v)} ${ccy}"></span>`;
  }).join('');
  const legend = BUCKET_ORDER.filter(k => (basisBucket[k] || 0) >= 0.005).map(k =>
    `<span class="lg lg-${k}"><span class="sw"></span>${BUCKET_LABEL[k]} дн. — <b>${fmt(basisBucket[k])} ${ccy}</b> (${pctOf(basisBucket[k]).toFixed(0)}%)</span>`
  ).join('');
  const bar = `<div class="dd-bar-wrap">
    <div class="dd-bar">${segs}</div>
    <div class="dd-legend">${legend}</div>
  </div>`;

  const rows = dd.entries.map(e => {
    const sign = curSign(e.curName);
    const ageTxt = e.maxDaysOverdue > 0 ? e.maxDaysOverdue + ' дн.' : '—';
    return `<tr class="ar-cur">
      <td><span class="cur-badge">${esc(e.curName)}</span></td>
      <td class="total">${fmt(e.total)} ${sign}</td>
      <td class="age">${ageTxt}</td>
      ${BUCKET_ORDER.map(k => {
        const v = e.buckets[k] || 0;
        const has = v >= 0.005;
        return `<td class="num b-val b-${k}${has ? ' has' : ' zr'}">${fmt(v)}</td>`;
      }).join('')}
    </tr>`;
  }).join('');
  const table = `<div class="ar-wrap">
    <table class="ar-table">
      <thead><tr>

// ── Сума прописом (українською) для офіційної довідки ─────────────
const _ONES_M = ['','один','два','три','чотири',"п'ять",'шість','сім','вісім',"дев'ять"];
const _ONES_F = ['','одна','дві','три','чотири',"п'ять",'шість','сім','вісім',"дев'ять"];
const _TEENS  = ['десять','одинадцять','дванадцять','тринадцять','чотирнадцять',"п'ятнадцять",'шістнадцять','сімнадцять','вісімнадцять',"дев'ятнадцять"];
const _TENS   = ['','','двадцять','тридцять','сорок',"п'ятдесят",'шістдесят','сімдесят','вісімдесят',"дев'яносто"];
const _HUNDS  = ['','сто','двісті','триста','чотириста',"п'ятсот",'шістсот','сімсот','вісімсот',"дев'ятсот"];
function _plUk(n, one, few, many) {
  const a = Math.abs(n) % 100, b = a % 10;
  if (a > 10 && a < 20) return many;
  if (b > 1 && b < 5) return few;
  if (b === 1) return one;
  return many;
}
function _triadUk(num, fem) {
  const ones = fem ? _ONES_F : _ONES_M;
  const out = [];
  const h = Math.floor(num / 100), t = Math.floor((num % 100) / 10), o = num % 10;
  if (h) out.push(_HUNDS[h]);
  if (t === 1) out.push(_TEENS[o]);
  else { if (t) out.push(_TENS[t]); if (o) out.push(ones[o]); }
  return out.join(' ');
}
function intToWordsUk(n, unitsFem) {
  n = Math.floor(Math.abs(n));
  if (n === 0) return 'нуль';
  const tr = [];
  let x = n;
  while (x > 0) { tr.unshift(x % 1000); x = Math.floor(x / 1000); }
  const cnt = tr.length;
  const SC = { 1:{fem:true,one:'тисяча',few:'тисячі',many:'тисяч'},
               2:{fem:false,one:'мільйон',few:'мільйони',many:'мільйонів'},
               3:{fem:false,one:'мільярд',few:'мільярди',many:'мільярдів'} };
  const out = [];
  for (let i = 0; i < cnt; i++) {
    const triad = tr[i];
    if (!triad) continue;
    const pos = cnt - 1 - i;
    const sc = SC[pos];
    const fem = pos === 0 ? !!unitsFem : (sc ? sc.fem : false);
    out.push(_triadUk(triad, fem));
    if (sc) out.push(_plUk(triad, sc.one, sc.few, sc.many));
  }
  return out.join(' ').replace(/\s+/g, ' ').trim();
}
const _CUR_WORDS = {
  USD: { fem:false, one:'долар США', few:'долари США', many:'доларів США', cOne:'цент', cFew:'центи', cMany:'центів' },
  EUR: { fem:false, one:'євро', few:'євро', many:'євро', cOne:'євроцент', cFew:'євроценти', cMany:'євроцентів' },
  UAH: { fem:true,  one:'гривня', few:'гривні', many:'гривень', cOne:'копійка', cFew:'копійки', cMany:'копійок' },
};
function amountInWordsUk(amount, curName) {
  const c = _CUR_WORDS[curName] || _CUR_WORDS.USD;
  let whole = Math.floor(Math.abs(amount));
  let frac = Math.round((Math.abs(amount) - whole) * 100);
  if (frac === 100) { whole += 1; frac = 0; }
  const words = intToWordsUk(whole, c.fem) + ' ' + _plUk(whole, c.one, c.few, c.many)
              + ' ' + String(frac).padStart(2, '0') + ' ' + _plUk(frac, c.cOne, c.cFew, c.cMany);
  return words.charAt(0).toUpperCase() + words.slice(1);
}
function fmtMoney(n) {
  return Number(n || 0).toLocaleString('uk-UA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
const _UK_MONTHS = ['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];
function _dmy(iso) {
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || '');
  return m ? `${m[3]}.${m[2]}.${m[1]}` : (iso || '');
}
function _dateLong(iso) {
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || '');
  return m ? `${+m[3]} ${_UK_MONTHS[+m[2] - 1] || ''} ${m[1]} р.` : (iso || '');
}

// Офіційна довідка про дебіторську заборгованість (формат як в облікових
// системах: шапка, реквізити, таблиці з рамками, сума прописом, підписи).
function buildDebtorOfficialDoc(dd) {
  const onDate = state.onDate || '';
  const org = state.org || 'Усі організації';
  const dtNow = new Date().toLocaleString('uk-UA', { timeZone: 'Europe/Kiev' });
  const docNo = onDate.replace(/-/g, '') || '—';

  const single = dd.entries.length === 1;
  const docCur = single ? dd.entries[0].curName : 'USD';
  const docTotal = single ? dd.entries[0].total : dd.totalUSD;
  const docBuckets = single ? dd.entries[0].buckets : dd.bucketUSD;
  const equiv = !single;
  const curLabel = docCur === 'USD' ? 'долар США' : docCur === 'EUR' ? 'євро' : docCur === 'UAH' ? 'гривня' : docCur;
  const TERM = { d7:'до 7 днів', d14:'від 8 до 14 днів', d30:'від 15 до 30 днів', d60:'від 31 до 60 днів', d61p:'понад 61 день' };
  const pctOf = v => docTotal ? (v / docTotal) * 100 : 0;

  const agingRows = BUCKET_ORDER.map((k, i) =>
    `<tr><td class="c">${i + 1}</td><td class="term">${TERM[k]}</td><td>${fmtMoney(docBuckets[k] || 0)}</td><td class="c">${pctOf(docBuckets[k] || 0).toFixed(0)}</td></tr>`
  ).join('');

  let curBlock = '';
  if (!single) {
    const rows = dd.entries.map(e =>
      `<tr><td class="term">${esc(e.curName)}</td><td>${fmtMoney(e.total)} ${curSign(e.curName)}</td><td class="c">${e.maxDaysOverdue > 0 ? e.maxDaysOverdue + ' дн.' : '—'}</td>` +
      BUCKET_ORDER.map(k => `<td>${(e.buckets[k] || 0) >= 0.005 ? fmtMoney(e.buckets[k]) : '—'}</td>`).join('') + `</tr>`
    ).join('');
    curBlock = `
      <div class="doc-sect">Розшифровка заборгованості за валютами обліку</div>
      <table class="doc-tbl">
        <thead><tr><th class="term">Валюта</th><th>Заборгованість</th><th>Прострочення</th><th>до 7</th><th>8–14</th><th>15–30</th><th>31–60</th><th>понад 61</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  const wordsLine = docTotal >= 0.005 ? amountInWordsUk(docTotal, docCur) : '—';

  return `
  <div class="doc">
    <div class="doc-letterhead">Організація-кредитор: <b>${esc(org)}</b></div>
    <h1 class="doc-title">ДОВІДКА</h1>
    <div class="doc-sub">про стан дебіторської заборгованості контрагента</div>
    <div class="doc-no">№ ДЗ-${esc(docNo)} від ${esc(_dmy(onDate))} · станом на ${esc(_dateLong(onDate))}</div>

    <div class="doc-parties">
      <div><span class="lbl">Кредитор (організація):</span> ${esc(org)}</div>
      <div><span class="lbl">Боржник (контрагент):</span> <b>${esc(dd.name)}</b></div>
      <div><span class="lbl">Валюта обліку:</span> ${esc(curLabel)}${equiv ? ' (в еквіваленті)' : ''}${(equiv && dd.USD_UAH) ? `, курс ${dd.USD_UAH.toFixed(2)} грн/USD` : ''}</div>
      <div><span class="lbl">Макс. термін прострочення:</span> ${dd.maxDays > 0 ? dd.maxDays + ' дн.' : '—'}</div>
    </div>

    <p class="doc-intro">Станом на ${esc(_dateLong(onDate))} загальна сума дебіторської заборгованості боржника <b>${esc(dd.name)}</b> перед організацією <b>${esc(org)}</b> становить <b>${fmtMoney(docTotal)} ${esc(docCur)}</b>${equiv ? ' (в еквіваленті долара США)' : ''}, у тому числі за термінами її виникнення:</p>

    <table class="doc-tbl">
      <thead><tr><th class="c">№</th><th class="term">Термін виникнення заборгованості</th><th>Сума, ${esc(docCur)}</th><th class="c">Частка, %</th></tr></thead>
      <tbody>${agingRows}</tbody>
      <tfoot><tr><td class="c"></td><td class="term">РАЗОМ</td><td>${fmtMoney(docTotal)}</td><td class="c">100</td></tr></tfoot>
    </table>

    <div class="doc-words"><span class="lbl">Сума заборгованості прописом:</span> ${esc(wordsLine)}.</div>

    ${curBlock}

    <table class="doc-sign">
      <tr><td class="role">Керівник</td><td class="ln"></td><td class="ln"></td></tr>
      <tr><td></td><td class="cap">(підпис)</td><td class="cap">(ініціали, прізвище)</td></tr>
      <tr class="sp"><td colspan="3"></td></tr>
      <tr><td class="role">Головний бухгалтер</td><td class="ln"></td><td class="ln"></td></tr>
      <tr><td></td><td class="cap">(підпис)</td><td class="cap">(ініціали, прізвище)</td></tr>
    </table>
    <div class="doc-stamp">М.П.</div>

    <div class="doc-foot">Документ сформовано автоматично ${esc(dtNow)} у системі обліку react.ink. Має інформаційно-довідковий характер.</div>
  </div>`;
}

// PDF: офіційна довідка про заборгованість у новому вікні → системний друк
// «Зберегти як PDF». Документ у світлій темі, незалежно від теми сторінки.
function downloadDebtorPDF() {
  const dd = collectDebtor(state.detail);
  if (!dd) { alert('Немає даних для PDF.'); return; }
  const fname = 'Довідка про заборгованість — ' + dd.name + ' — ' + (state.onDate || '');
  const doc = buildDebtorOfficialDoc(dd);
  let win;
  try { win = window.open('', '_blank', 'width=900,height=1000'); } catch (_) { win = null; }
  if (!win) { alert('Дозвольте спливаючі вікна, щоб завантажити PDF.'); return; }
  win.document.open();
  win.document.write(`<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>${esc(fname)}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Times New Roman','PT Serif',Georgia,serif;background:#fff;color:#000;font-size:11pt;line-height:1.45}
  .doc{max-width:182mm;margin:0 auto;padding:10mm 12mm 20mm}
  .doc-letterhead{font-size:10pt;border-bottom:1.5px solid #000;padding-bottom:2.5mm;margin-bottom:7mm}
  .doc-title{text-align:center;font-size:20pt;font-weight:700;letter-spacing:6px;margin-bottom:1mm}
  .doc-sub{text-align:center;font-size:11.5pt;margin-bottom:1.5mm}
  .doc-no{text-align:center;font-size:9.5pt;color:#333;margin-bottom:7mm}
  .doc-parties{margin-bottom:5mm}
  .doc-parties div{margin:1.2mm 0}
  .doc-parties .lbl{display:inline-block;min-width:62mm;color:#333}
  .doc-intro{margin-bottom:4.5mm;text-align:justify}
  .doc-tbl{width:100%;border-collapse:collapse;margin-bottom:4mm;font-size:10.5pt}
  .doc-tbl th,.doc-tbl td{border:1px solid #000;padding:1.8mm 2.5mm;text-align:right;font-variant-numeric:tabular-nums}
  .doc-tbl th{background:#ececec;font-weight:700;text-align:center}
  .doc-tbl td.term,.doc-tbl th.term{text-align:left}
  .doc-tbl td.c,.doc-tbl th.c{text-align:center}
  .doc-tbl tfoot td{font-weight:700;background:#f4f4f4}
  .doc-tbl tr{page-break-inside:avoid}
  .doc-words{margin-bottom:7mm}
  .doc-words .lbl{font-weight:700}
  .doc-sect{font-weight:700;margin:2mm 0 2mm}
  .doc-sign{width:100%;border-collapse:collapse;margin-top:12mm;page-break-inside:avoid}
  .doc-sign td{padding:0 4mm;vertical-align:bottom;font-size:10.5pt}
  .doc-sign td.role{white-space:nowrap;padding-left:0;width:48mm}
  .doc-sign td.ln{border-bottom:1px solid #000;height:7mm}
  .doc-sign td.cap{font-size:8pt;color:#555;text-align:center;padding-top:.5mm;font-style:italic}
  .doc-sign tr.sp td{height:8mm;border:0}
  .doc-stamp{margin-top:5mm;font-size:10.5pt}
  .doc-foot{margin-top:14mm;border-top:1px solid #999;padding-top:2mm;font-size:8.5pt;color:#555;text-align:center}
  .pdf-actions{position:fixed;bottom:8mm;right:8mm;display:flex;gap:8px;z-index:9999}
  .pdf-actions button{padding:9px 18px;border:0;border-radius:6px;font-size:11pt;font-weight:600;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  .pdf-actions .pr{background:#1c1c1e;color:#fff}
  .pdf-actions .cls{background:#e5e5e5;color:#222}
  @page{size:A4 portrait;margin:14mm}
  @media print{.pdf-actions{display:none!important}.doc{max-width:none;margin:0;padding:0}}
</style>
</head>
<body>
  ${doc}
  <div class="pdf-actions">
    <button class="pr" id="btnPrint">Зберегти у PDF / Друкувати</button>
    <button class="cls" id="btnClose">Закрити</button>
  </div>
  <script>
    document.getElementById('btnPrint').addEventListener('click',function(){window.print()});
    document.getElementById('btnClose').addEventListener('click',function(){window.close()});
  <\/script>
</body>
</html>`);
  win.document.close();
  try { win.focus(); } catch (_) {}
}
