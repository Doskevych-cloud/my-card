<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Заборгованість покупців</title>
<script>
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e){}
</script>
<script src="auth.js?v=bin20260418"></script>
<script src="header.js?v=bin20260418"></script>
<style>
:root{
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a;
  --surface:#141414; --surface2:#1c1c1c;
  --border:#262626; --border2:#333;
  --text:#f5f5f5; --text2:#a3a3a3; --text3:#737373;
  --accent:#ff8319; --accent-bg:rgba(255,131,25,.12);
  --red:#e74c3c; --red-bg:rgba(231,76,60,.12);
  --green:#22c55e; --green-bg:rgba(34,197,94,.12);
  --blue:#3b82f6; --blue-bg:rgba(59,130,246,.12);
  --yellow:#eab308; --yellow-bg:rgba(234,179,8,.14);
}
:root[data-theme="light"]{
  --bg:#f5f5f7; --bg2:#ffffff; --bg3:#ececef;
  --surface:#ffffff; --surface2:#ffffff;
  --border:#e5e5ea; --border2:#d1d1d6;
  --text:#1c1c1e; --text2:#48484a; --text3:#8e8e93;
  --accent:#e07017; --accent-bg:rgba(224,112,23,.12);
  --red:#d93025; --red-bg:rgba(217,48,37,.10);
  --green:#15803d; --green-bg:rgba(21,128,61,.10);
  --blue:#1d4ed8; --blue-bg:rgba(29,78,216,.10);
  --yellow:#b45309; --yellow-bg:rgba(180,83,9,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{max-width:1400px;margin:0 auto;padding:20px}

/* Page tabs */
.page-tabs{display:inline-flex;gap:4px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.ptab{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap;cursor:pointer}
.ptab:hover{background:var(--bg3);color:var(--text)}
.ptab.active{background:var(--accent-bg);color:var(--accent)}

/* Toolbar */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar input[type=date]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;color-scheme:dark;font-family:inherit}
:root[data-theme="light"] .toolbar input[type=date]{color-scheme:light}
.toolbar input[type=date]:focus{border-color:var(--accent)}
.toolbar input[type=text]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;font-family:inherit;min-width:200px}
.toolbar input[type=text]:focus{border-color:var(--accent)}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.toolbar .group{display:inline-flex;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{border:none;background:transparent;padding:5px 10px;border-radius:6px}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.toolbar .spacer{flex:1}

/* KPI grid */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-bottom:14px}
.kpi{padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.kpi.k-red::before{background:var(--red)}
.kpi.k-yellow::before{background:var(--yellow)}
.kpi.k-green::before{background:var(--green)}
.kpi.k-blue::before{background:var(--blue)}
.kpi .kl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.kpi .kv{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.4px;line-height:1.15;color:var(--text)}
.kpi .kv .unit{font-size:13px;font-weight:700;color:var(--text2);margin-left:4px}
.kpi .ks{font-size:11.5px;color:var(--text2);font-weight:500;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.kpi .tag{padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.2px}
.kpi .tag.red{background:var(--red-bg);color:var(--red)}
.kpi .tag.yel{background:var(--yellow-bg);color:var(--yellow)}
.kpi .tag.grn{background:var(--green-bg);color:var(--green)}
.kpi .tag.blu{background:var(--blue-bg);color:var(--blue)}

/* Currency section */
.cur-sec{margin-bottom:20px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px}
.cur-sec .cur-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.cur-sec .cur-title{display:flex;align-items:baseline;gap:10px}
.cur-sec .cur-title .cn{font-size:15px;font-weight:800;letter-spacing:.3px}
.cur-sec .cur-title .cc{font-size:12px;color:var(--text3);font-weight:500}
.cur-sec .cur-title .ct{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text);letter-spacing:-.3px}

/* Aging spectrum bar */
.spectrum{display:flex;width:100%;height:12px;border-radius:6px;overflow:hidden;background:var(--bg3);margin-bottom:8px}
.spectrum .seg{transition:opacity .15s}
.spectrum .seg:hover{opacity:.82}
.seg-d7{background:var(--green)}
.seg-d14{background:var(--blue)}
.seg-d30{background:var(--yellow)}
.seg-d60{background:var(--accent)}
.seg-d61p{background:var(--red)}
.spectrum-legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--text2);margin-bottom:14px}
.spectrum-legend .lg{display:inline-flex;align-items:center;gap:6px}
.spectrum-legend .lg .dot{width:9px;height:9px;border-radius:2px;display:inline-block}
.spectrum-legend .lg .amt{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums}
.spectrum-legend .lg .pct{color:var(--text3)}

/* Client grid */
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:10px}
.client-card{padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;gap:9px;cursor:pointer;transition:border-color .12s,background .12s}
.client-card:hover{border-color:var(--border2);background:var(--surface)}
.client-card .cc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.client-card .cn{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.client-card .ct{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text);letter-spacing:-.2px;white-space:nowrap}
.client-card .cc-spec{display:flex;width:100%;height:7px;border-radius:4px;overflow:hidden;background:var(--bg3)}
.client-card .cc-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:11px;color:var(--text3)}
.client-card .cc-meta .right{display:flex;align-items:center;gap:6px}
.client-card .cc-pill{padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:700;white-space:nowrap}
.client-card .cc-pill.grn{background:var(--green-bg);color:var(--green)}
.client-card .cc-pill.blu{background:var(--blue-bg);color:var(--blue)}
.client-card .cc-pill.yel{background:var(--yellow-bg);color:var(--yellow)}
.client-card .cc-pill.org{background:var(--accent-bg);color:var(--accent)}
.client-card .cc-pill.red{background:var(--red-bg);color:var(--red)}
.client-card .cc-share{font-variant-numeric:tabular-nums;color:var(--text2)}

/* Empty + loading */
.loading{padding:60px;text-align:center;color:var(--text3)}
.error{padding:20px;color:var(--red);background:var(--red-bg);border-radius:8px;margin:12px 0}
.empty{padding:40px;text-align:center;color:var(--text3);font-size:13px;background:var(--surface2);border:1px dashed var(--border);border-radius:12px}

/* Tooltip (native title attr is fine; segments have title) */
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-tabs">
      <a href="/sales.html" class="ptab">📈 Продажі менеджерів</a>
      <a href="/osp.html" class="ptab">📋 Оплата та відвантаження</a>
      <span class="ptab active">⏱ Заборгованість покупців</span>
    </div>

    <div class="toolbar" id="arToolbar">
      <span class="lbl">На дату</span>
      <input type="date" id="onDateIn">
      <span class="chip" onclick="setToday()">Сьогодні</span>
      <div class="sep"></div>
      <span class="group" id="orgGroup">
        <span class="chip" data-org="" onclick="setOrg(this)">Всі</span>
        <span class="chip active" data-org="Реакт" onclick="setOrg(this)">Реакт</span>
        <span class="chip" data-org="Генерація" onclick="setOrg(this)">Генерація</span>
      </span>
      <div class="sep"></div>
      <span class="lbl">Сортування</span>
      <span class="group" id="sortGroup">
        <span class="chip active" data-sort="total" onclick="setSort(this)">За сумою</span>
        <span class="chip" data-sort="age" onclick="setSort(this)">За віком</span>
        <span class="chip" data-sort="name" onclick="setSort(this)">За назвою</span>
      </span>
      <div class="spacer"></div>
      <input type="text" id="clientIn" placeholder="🔎 Пошук клієнта..." oninput="filterChanged()">
    </div>

    <div id="kpisHost"></div>
    <div id="body"><div class="loading">Завантаження…</div></div>
  </div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev/';
const state = { onDate: '', org: 'Реакт', clientFilter: '', sort: 'total', _raw: null };

const BUCKET_ORDER = ['d7','d14','d30','d60','d61p'];
const BUCKET_LABEL = { d7:'До 7 днів', d14:'8–14 днів', d30:'15–30 днів', d60:'31–60 днів', d61p:'Від 61 днів' };
// Midpoint (in days) for weighted average age
const BUCKET_MID = { d7:3.5, d14:11, d30:22.5, d60:45.5, d61p:90 };

function fmt(n, dec = 2) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function fmt0(n) { return fmt(n, 0); }
function fmtShort(n) {
  const a = Math.abs(n);
  if (a >= 1e6) return (n/1e6).toLocaleString('uk-UA', { maximumFractionDigits: 2 }) + 'M';
  if (a >= 1e3) return (n/1e3).toLocaleString('uk-UA', { maximumFractionDigits: 1 }) + 'K';
  return fmt(n, 0);
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function curSign(cur){ return cur==='USD'?'$':cur==='EUR'?'€':cur==='UAH'?'₴':cur; }

function setToday() {
  const d = new Date();
  state.onDate = d.toISOString().slice(0, 10);
  document.getElementById('onDateIn').value = state.onDate;
  load();
}
function setOrg(el) {
  state.org = el.dataset.org;
  el.closest('.group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  load();
}
function setSort(el) {
  state.sort = el.dataset.sort;
  el.closest('.group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (state._raw) render(state._raw);
}
function filterChanged() {
  state.clientFilter = document.getElementById('clientIn').value.trim().toLowerCase();
  if (state._raw) render(state._raw);
}

async function load() {
  document.getElementById('body').innerHTML = '<div class="loading">Завантаження…</div>';
  document.getElementById('kpisHost').innerHTML = '';
  try {
    const q = '?action=receivables_aging&on_date=' + state.onDate + (state.org ? '&org=' + encodeURIComponent(state.org) : '');
    const data = await fetch(API_URL + q).then(r => r.json());
    if (data.error) throw new Error(data.error);
    state._raw = data;
    render(data);
  } catch (e) {
    document.getElementById('body').innerHTML = '<div class="error">' + esc(e.message) + '</div>';
  }
}

function sortClients(arr) {
  const a = arr.slice();
  if (state.sort === 'name') a.sort((x, y) => (x.name || '').localeCompare(y.name || '', 'uk'));
  else if (state.sort === 'age') a.sort((x, y) => (y.maxDaysOverdue || 0) - (x.maxDaysOverdue || 0));
  else a.sort((x, y) => y.total - x.total);
  return a;
}

function healthPill(buckets) {
  // Worst bucket with any amount wins the color
  if (buckets.d61p > 0.005) return { cls:'red', txt:'>60 днів' };
  if (buckets.d60  > 0.005) return { cls:'org', txt:'31–60 днів' };
  if (buckets.d30  > 0.005) return { cls:'yel', txt:'15–30 днів' };
  if (buckets.d14  > 0.005) return { cls:'blu', txt:'8–14 днів' };
  return { cls:'grn', txt:'свіжий' };
}

function weightedAge(total, buckets) {
  if (!total) return 0;
  return BUCKET_ORDER.reduce((s, k) => s + (buckets[k] || 0) * BUCKET_MID[k], 0) / total;
}

function spectrumSegments(buckets, total) {
  if (!total) return '';
  return BUCKET_ORDER.map(k => {
    const v = buckets[k] || 0;
    if (v < 0.005) return '';
    const pct = (v / total) * 100;
    return `<div class="seg seg-${k}" style="width:${pct}%" title="${BUCKET_LABEL[k]}: ${fmt(v)} (${pct.toFixed(1)}%)"></div>`;
  }).join('');
}

function render(data) {
  const f = state.clientFilter;
  const currencies = (data.currencies || []).map(c => {
    const clients = c.clients.filter(x => !f || (x.name || '').toLowerCase().includes(f));
    if (f && clients.length !== c.clients.length) {
      const t = clients.reduce((s, x) => s + x.total, 0);
      const b = clients.reduce((acc, x) => {
        BUCKET_ORDER.forEach(k => { acc[k] = (acc[k] || 0) + (x.buckets[k] || 0); });
        return acc;
      }, { d7:0, d14:0, d30:0, d60:0, d61p:0 });
      return { ...c, total: t, buckets: b, clients };
    }
    return { ...c, clients };
  }).filter(c => c.clients.length > 0);

  // ── KPI Cards (aggregated across currencies, with per-cur breakdown) ──
  renderKpis(currencies);

  // ── Currency sections ──
  if (!currencies.length) {
    document.getElementById('body').innerHTML = '<div class="empty">Немає заборгованостей на цю дату</div>';
    return;
  }

  let html = '';
  currencies.forEach(c => {
    const sign = curSign(c.curName);
    const clientsSorted = sortClients(c.clients);
    const topClient = c.clients.reduce((a, b) => b.total > a.total ? b : a, c.clients[0]);
    const avgAge = weightedAge(c.total, c.buckets);
    const overdue30 = c.buckets.d30 + c.buckets.d60 + c.buckets.d61p;
    const overdue60 = c.buckets.d60 + c.buckets.d61p;

    // Legend entries
    const legend = BUCKET_ORDER.map(k => {
      const v = c.buckets[k] || 0;
      const pct = c.total ? (v / c.total) * 100 : 0;
      return `<span class="lg"><span class="dot seg-${k}"></span>${BUCKET_LABEL[k]} <span class="amt">${fmt(v, 0)}</span> <span class="pct">(${pct.toFixed(1)}%)</span></span>`;
    }).join('');

    // Client cards
    const cardsHtml = clientsSorted.map(cl => {
      const pill = healthPill(cl.buckets);
      const share = c.total ? (cl.total / c.total) * 100 : 0;
      const daysText = cl.maxDaysOverdue > 0 ? `${cl.maxDaysOverdue} дн. тому` : 'сьогодні';
      return `
        <div class="client-card" title="${esc(cl.name)} · ${fmt(cl.total)} ${sign}">
          <div class="cc-head">
            <div class="cn">${esc(cl.name)}</div>
            <div class="ct">${fmt(cl.total, 0)}<span style="font-size:11px;color:var(--text3);margin-left:3px">${sign}</span></div>
          </div>
          <div class="cc-spec">${spectrumSegments(cl.buckets, cl.total)}</div>
          <div class="cc-meta">
            <span>Остання активність: ${daysText}</span>
            <span class="right">
              <span class="cc-share">${share.toFixed(1)}%</span>
              <span class="cc-pill ${pill.cls}">${pill.txt}</span>
            </span>
          </div>
        </div>`;
    }).join('');

    html += `
      <div class="cur-sec">
        <div class="cur-head">
          <div class="cur-title">
            <span class="cn">${esc(c.curName)}</span>
            <span class="cc">${c.clients.length} клієнт${c.clients.length === 1 ? '' : 'ів'} · сер. вік ${avgAge.toFixed(0)} дн.</span>
            <span class="ct" style="margin-left:auto">${fmt(c.total)} ${sign}</span>
          </div>
        </div>
        <div class="spectrum">${spectrumSegments(c.buckets, c.total)}</div>
        <div class="spectrum-legend">${legend}</div>
        <div class="clients-grid">${cardsHtml}</div>
      </div>`;
  });

  document.getElementById('body').innerHTML = html;
}

function renderKpis(currencies) {
  if (!currencies.length) {
    document.getElementById('kpisHost').innerHTML = '';
    return;
  }
  // Total debt broken down by currency (string)
  const totalsLine = currencies.map(c => `${fmt(c.total, 0)} ${curSign(c.curName)}`).join(' · ');

  // Overdue (>30 days) aggregated
  let tOverdue = 0, tTotal = 0, tOver60 = 0, tClients = 0;
  let weightedAgeSum = 0;
  currencies.forEach(c => {
    const od = c.buckets.d30 + c.buckets.d60 + c.buckets.d61p;
    const o60 = c.buckets.d60 + c.buckets.d61p;
    tOverdue += od;
    tOver60  += o60;
    tTotal   += c.total;
    tClients += c.clients.length;
    weightedAgeSum += weightedAge(c.total, c.buckets) * c.total;
  });
  const overduePct = tTotal ? (tOverdue / tTotal) * 100 : 0;
  const over60Pct  = tTotal ? (tOver60  / tTotal) * 100 : 0;
  const avgAge     = tTotal ? weightedAgeSum / tTotal : 0;

  // Top debtor — pick across currencies by largest single client (by amount, not FX-normalised)
  let topClient = null;
  currencies.forEach(c => {
    c.clients.forEach(cl => {
      if (!topClient || cl.total > topClient.total) topClient = { ...cl, curName: c.curName, share: c.total ? cl.total / c.total * 100 : 0 };
    });
  });

  const overdueTone = overduePct >= 40 ? 'red' : overduePct >= 20 ? 'yel' : 'grn';
  const over60Tone  = over60Pct  >= 25 ? 'red' : over60Pct  >= 10 ? 'yel' : 'grn';
  const ageTone     = avgAge >= 45 ? 'red' : avgAge >= 20 ? 'yel' : 'grn';

  const toneCls = t => t === 'red' ? 'k-red' : t === 'yel' ? 'k-yellow' : t === 'grn' ? 'k-green' : 'k-blue';

  // Per-currency inline breakdown for the main KPI
  const perCurHtml = currencies.map(c =>
    `<span class="tag blu">${curSign(c.curName)} ${fmt(c.total, 0)}</span>`
  ).join('');

  const html = `<div class="kpis">
    <div class="kpi k-blue">
      <span class="kl">Загальна заборгованість</span>
      <span class="kv">${currencies.length === 1 ? fmt(currencies[0].total, 0) + ' <span class="unit">' + curSign(currencies[0].curName) + '</span>' : totalsLine}</span>
      <span class="ks">${perCurHtml}</span>
    </div>
    <div class="kpi ${toneCls(overdueTone)}">
      <span class="kl">Прострочено &gt; 30 днів</span>
      <span class="kv">${overduePct.toFixed(1)}<span class="unit">%</span></span>
      <span class="ks">${currencies.map(c => curSign(c.curName) + ' ' + fmt(c.buckets.d30 + c.buckets.d60 + c.buckets.d61p, 0)).join(' · ')}</span>
    </div>
    <div class="kpi ${toneCls(over60Tone)}">
      <span class="kl">Критично &gt; 60 днів</span>
      <span class="kv">${over60Pct.toFixed(1)}<span class="unit">%</span></span>
      <span class="ks">${currencies.map(c => curSign(c.curName) + ' ' + fmt(c.buckets.d60 + c.buckets.d61p, 0)).join(' · ')}</span>
    </div>
    <div class="kpi ${toneCls(ageTone)}">
      <span class="kl">Середній вік боргу</span>
      <span class="kv">${avgAge.toFixed(0)}<span class="unit">днів</span></span>
      <span class="ks">зважено по сумі боргу</span>
    </div>
    <div class="kpi k-blue">
      <span class="kl">TOP боржник</span>
      <span class="kv" style="font-size:15px;line-height:1.25;font-weight:700">${topClient ? esc(topClient.name.slice(0, 40)) : '—'}</span>
      <span class="ks">${topClient ? curSign(topClient.curName) + ' ' + fmt(topClient.total, 0) + ' · ' + topClient.share.toFixed(0) + '% портфеля ' + topClient.curName : ''}</span>
    </div>
    <div class="kpi k-blue">
      <span class="kl">Клієнтів</span>
      <span class="kv">${tClients}</span>
      <span class="ks">у ${currencies.length} валюті${currencies.length === 1 ? '' : currencies.length < 5 ? 'ах' : 'ях'}</span>
    </div>
  </div>`;
  document.getElementById('kpisHost').innerHTML = html;
}

document.getElementById('onDateIn').addEventListener('change', function(e) { state.onDate = e.target.value; load(); });

// Auth + init
Auth.require('sales').then(user => {
  AppHeader.mount({ active: 'sales', user });
  setToday();
});
</script>
</body>
</html>
