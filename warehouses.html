<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Склад · Повний перелік</title>
<style>
:root{
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a;
  --surface:#141414; --surface2:#1c1c1c;
  --border:#262626; --border2:#333;
  --text:#f5f5f5; --text2:#a3a3a3; --text3:#737373;
  --accent:#ff8319; --accent-bg:rgba(255,131,25,.12);
  --red:#e74c3c; --red-bg:rgba(231,76,60,.12);
  --green:#22c55e; --blue:#3b82f6;
  --purple:#9775fa;
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

/* Topbar */
.topbar{position:sticky;top:0;z-index:50;background:rgba(20,20,20,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:18px}
.topbar h1{font-size:16px;font-weight:700;letter-spacing:-.3px;flex:1}
.topbar .back{color:var(--text2);font-size:12px;padding:6px 12px;border-radius:8px;transition:all .15s}
.topbar .back:hover{background:var(--bg3);color:var(--text)}
.topbar .counter{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums}

/* Layout */
.wrap{max-width:1400px;margin:0 auto;padding:20px}

/* Filter bar */
.filter{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:22px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px}
.filter input{flex:1;min-width:200px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;transition:border .15s}
.filter input:focus{border-color:var(--accent)}
.filter .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none}
.filter .chip:hover{background:var(--bg3);color:var(--text)}
.filter .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

/* Summary strip */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:22px}
.stat{padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px}
.stat .l{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:6px}
.stat .v{font-size:18px;font-weight:700;letter-spacing:-.3px;font-variant-numeric:tabular-nums}

/* Warehouse grid */
.wh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px}
.wh-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border .15s,box-shadow .15s}
.wh-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md)}
.wh-card.in-transit{border-left:3px solid var(--purple)}
.wh-card.on-hand{border-left:3px solid var(--accent)}
.wh-head{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none;border-bottom:1px solid transparent;transition:background .15s,border-color .15s}
.wh-head:hover{background:var(--bg3)}
.wh-head.open{border-bottom-color:var(--border)}
.wh-ico{font-size:22px;line-height:1;flex-shrink:0}
.wh-title{flex:1}
.wh-title .n{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px}
.wh-title .m{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums}
.wh-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.4px}
.wh-badge.REACT{background:var(--accent-bg);color:var(--accent)}
.wh-badge.TRUF{background:rgba(151,117,250,.14);color:#b399ff}
.wh-chev{font-size:12px;color:var(--text3);transition:transform .2s}
.wh-head.open .wh-chev{transform:rotate(90deg)}
.wh-body{max-height:0;overflow:hidden;transition:max-height .25s ease}
.wh-head.open ~ .wh-body{max-height:1400px;overflow:auto}
.wh-body table{width:100%;border-collapse:collapse;font-size:11px}
.wh-body th{padding:9px 10px;color:var(--text3);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.4px;text-align:left;background:var(--bg2);position:sticky;top:0;z-index:1}
.wh-body th:not(:first-child){text-align:right}
.wh-body td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);cursor:pointer;transition:background .1s}
.wh-body tr:hover td{background:var(--bg3)}
.wh-body tr.reserved td:first-child::after{content:'🔒';margin-left:6px;font-size:10px}
.wh-body td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
.wh-body td.pos{color:var(--green);font-weight:600}
.wh-body td.zero{color:var(--text3)}

/* Loading / empty */
.loading{padding:60px 20px;text-align:center;color:var(--text2);font-size:13px}
.loading::after{content:'';display:block;width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:14px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:20px;text-align:center;color:var(--red);background:var(--red-bg);border-radius:10px;font-size:12px}

/* Modal (drill-down) */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100}
.modal-backdrop.open{display:block}
.modal{display:none;position:fixed;inset:50% auto auto 50%;transform:translate(-50%,-50%);width:min(92vw,720px);max-height:85vh;background:var(--surface);border:1px solid var(--border2);border-radius:18px;overflow:hidden;box-shadow:0 24px 72px rgba(0,0,0,.6);z-index:101;flex-direction:column}
.modal.open{display:flex}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.modal-ico{width:44px;height:44px;border-radius:10px;background:var(--accent-bg);display:grid;place-items:center;font-size:22px;flex-shrink:0}
.modal-title{flex:1}
.modal-title h3{font-size:15px;font-weight:700;margin-bottom:3px}
.modal-title p{font-size:11px;color:var(--text3)}
.modal-close{width:32px;height:32px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:8px;display:grid;place-items:center;transition:all .15s}
.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-close svg{width:18px;height:18px;fill:currentColor}
.modal-body{padding:20px 22px;overflow:auto;flex:1}
.modal-body .big{font-size:28px;font-weight:800;letter-spacing:-.6px;margin-bottom:4px}
.modal-body .sub{font-size:12px;color:var(--text2);margin-bottom:18px}
.modal-body table{width:100%;border-collapse:collapse;font-size:12px;background:var(--surface2);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.modal-body th{padding:10px 14px;background:var(--bg3);color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;text-align:left}
.modal-body th:not(:first-child){text-align:right}
.modal-body td{padding:10px 14px;border-top:1px solid var(--border);font-variant-numeric:tabular-nums}
.modal-body td:not(:first-child){text-align:right}
.modal-body .formula{padding:12px 14px;margin-top:16px;background:var(--accent-bg);border-left:3px solid var(--accent);border-radius:8px;font-size:11px;line-height:1.6;color:var(--text2)}

/* Password gate */
.pg{position:fixed;inset:0;display:grid;place-items:center;background:var(--bg);z-index:200}
.pg .box{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:min(380px,90vw);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.pg h2{font-size:16px;margin-bottom:6px}
.pg p{font-size:12px;color:var(--text2);margin-bottom:20px}
.pg input{width:100%;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;letter-spacing:4px;text-align:center;outline:none}
.pg input:focus{border-color:var(--accent)}
.pg button{width:100%;margin-top:12px;padding:11px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.pg .err{color:var(--red);font-size:11px;margin-top:10px;text-align:center;min-height:14px}

body.locked{overflow:hidden}
</style>
</head>
<body class="locked">

<!-- Password gate -->
<div class="pg" id="pwGate">
  <div class="box">
    <h2>🔐 Склад</h2>
    <p>Для доступу введіть пароль</p>
    <input type="password" id="pwInput" maxlength="10" autocomplete="off" placeholder="——————">
    <button onclick="checkPw()">Увійти</button>
    <div class="err" id="pwErr"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <a href="index.html" class="back">← Головна</a>
    <h1>📦 Склад · повний перелік</h1>
    <div class="counter" id="topCounter">—</div>
  </div>

  <div class="wrap">
    <div class="stats" id="stats"></div>

    <div class="filter">
      <input type="text" id="searchIn" placeholder="🔎 Пошук по назві товару або складу…">
      <span class="chip active" data-org="all" onclick="setOrg('all')">Всі</span>
      <span class="chip" data-org="REACT" onclick="setOrg('REACT')">REACT</span>
      <span class="chip" data-org="TRUF" onclick="setOrg('TRUF')">TRUF</span>
      <span class="chip" data-type="all" onclick="setType('all')">Всі склади</span>
      <span class="chip" data-type="on-hand" onclick="setType('on-hand')">На складі</span>
      <span class="chip" data-type="in-transit" onclick="setType('in-transit')">В дорозі</span>
    </div>

    <div id="body" class="wh-grid"><div class="loading">Завантаження…</div></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="mBackdrop" onclick="closeModal()"></div>
<div class="modal" id="modal" role="dialog" aria-modal="true">
  <div class="modal-head">
    <div class="modal-ico" id="mIco">🔒</div>
    <div class="modal-title"><h3 id="mTitle">—</h3><p id="mSub">—</p></div>
    <button class="modal-close" onclick="closeModal()" aria-label="Закрити"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
  </div>
  <div class="modal-body" id="mBody"></div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev';
const PW = '063744';
const AUTH_KEY = 'forecastAuth';
const AUTH_TTL = 12 * 60 * 60 * 1000;

// ─── Password gate ───
(function () {
  const t = Number(localStorage.getItem(AUTH_KEY) || 0);
  if (Date.now() - t < AUTH_TTL) openApp();
  else {
    document.getElementById('pwGate').style.display = 'grid';
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  }
  document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });
})();

function checkPw() {
  const v = document.getElementById('pwInput').value;
  if (v === PW) { localStorage.setItem(AUTH_KEY, Date.now()); openApp(); }
  else { document.getElementById('pwErr').textContent = 'Невірний пароль'; document.getElementById('pwInput').value = ''; }
}

function openApp() {
  document.getElementById('pwGate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.body.classList.remove('locked');
  load();
}

// ─── State ───
const state = { data: null, org: 'all', type: 'all', search: '' };
const IN_TRANSIT_MARKER = 'В дорозі';

function fmt(n, dec = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

async function load() {
  try {
    const res = await fetch(API_URL + '?action=warehouses_stock');
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    state.data = d;
    renderStats();
    render();
  } catch (e) {
    document.getElementById('body').innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

function renderStats() {
  const d = state.data;
  const warehouses = d.warehouses || [];
  const totalItems = (d.summary || []).length;
  const totalQty = (d.summary || []).reduce((a, x) => a + x.total, 0);
  const totalReserve = (d.summary || []).reduce((a, x) => a + x.reserve, 0);
  const freeQty = totalQty - totalReserve;
  const onHand = warehouses.filter(w => !w.name.startsWith(IN_TRANSIT_MARKER)).length;
  const inTransit = warehouses.filter(w => w.name.startsWith(IN_TRANSIT_MARKER)).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="l">Складів</div><div class="v">${warehouses.length}</div></div>
    <div class="stat"><div class="l">На складі</div><div class="v">${onHand}</div></div>
    <div class="stat"><div class="l">В дорозі</div><div class="v">${inTransit}</div></div>
    <div class="stat"><div class="l">Унікальних позицій</div><div class="v">${totalItems}</div></div>
    <div class="stat"><div class="l">Одиниць всього</div><div class="v">${fmt(totalQty)}</div></div>
    <div class="stat"><div class="l">У резерві</div><div class="v" style="color:var(--blue)">${fmt(totalReserve)}</div></div>
    <div class="stat"><div class="l">Вільно</div><div class="v" style="color:var(--green)">${fmt(freeQty)}</div></div>
  `;
  document.getElementById('topCounter').textContent = `${warehouses.length} складів · ${totalItems} позицій`;
}

function setOrg(v) { state.org = v; syncChips('org', v); render(); }
function setType(v) { state.type = v; syncChips('type', v); render(); }
function syncChips(attr, v) {
  document.querySelectorAll(`.chip[data-${attr}]`).forEach(c => {
    c.classList.toggle('active', c.dataset[attr] === v);
  });
}

document.getElementById('searchIn').addEventListener('input', e => {
  state.search = e.target.value.toLowerCase().trim();
  render();
});

function matchesFilters(wh) {
  if (state.org !== 'all' && wh.org !== state.org) return false;
  const isTransit = wh.name.startsWith(IN_TRANSIT_MARKER);
  if (state.type === 'on-hand' && isTransit) return false;
  if (state.type === 'in-transit' && !isTransit) return false;
  if (state.search) {
    const inName = wh.name.toLowerCase().includes(state.search);
    const inItem = wh.items.some(it => it.name.toLowerCase().includes(state.search));
    if (!inName && !inItem) return false;
  }
  return true;
}

function render() {
  const warehouses = (state.data.warehouses || []).filter(matchesFilters);
  if (!warehouses.length) {
    document.getElementById('body').innerHTML = `<div class="error">Нічого не знайдено</div>`;
    return;
  }
  const html = warehouses.map(wh => {
    const isTransit = wh.name.startsWith(IN_TRANSIT_MARKER);
    const total = wh.items.reduce((a, it) => a + it.total, 0);
    const reserve = wh.items.reduce((a, it) => a + it.reserve, 0);
    const items = state.search
      ? wh.items.filter(it => it.name.toLowerCase().includes(state.search) || wh.name.toLowerCase().includes(state.search))
      : wh.items;
    const rows = items.map(it => {
      const hasReserves = (wh.reservesByItem && wh.reservesByItem[it.name] && wh.reservesByItem[it.name].length > 0);
      const cls = hasReserves ? 'reserved' : '';
      const clickAttr = hasReserves ? `onclick="openItemReserves('${wh.id}', ${JSON.stringify(it.name).replace(/"/g, '&quot;')})"` : '';
      return `<tr class="${cls}" ${clickAttr}>
        <td>${esc(it.name)}</td>
        <td class="${it.total === 0 ? 'zero' : ''}">${fmt(it.total)}</td>
        <td class="${it.reserve > 0 ? 'pos' : 'zero'}" style="${it.reserve > 0 ? 'color:var(--blue)' : ''}">${fmt(it.reserve)}</td>
        <td class="${it.free < 0 ? 'pos' : ''}" style="${it.free < 0 ? 'color:var(--red)' : ''}">${fmt(it.free)}</td>
      </tr>`;
    }).join('');

    const cardCls = isTransit ? 'in-transit' : 'on-hand';
    return `
      <div class="wh-card ${cardCls}">
        <div class="wh-head" onclick="toggleWh(this)">
          <div class="wh-ico">${isTransit ? '🚛' : '🏢'}</div>
          <div class="wh-title">
            <div class="n">${esc(wh.name)}</div>
            <div class="m">${items.length} поз · ${fmt(total)} од · резерв ${fmt(reserve)}</div>
          </div>
          <div class="wh-badge ${wh.org}">${wh.org}</div>
          <div class="wh-chev">▶</div>
        </div>
        <div class="wh-body">
          <table>
            <thead><tr><th>Товар</th><th>Всього</th><th>Резерв</th><th>Вільно</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:16px">Немає позицій</td></tr>'}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');
  document.getElementById('body').innerHTML = html;
}

function toggleWh(el) {
  el.classList.toggle('open');
}

// ─── Drill-down: click an item row to see reservations ───
function openItemReserves(whId, itemName) {
  const wh = (state.data.warehouses || []).find(w => w.id === whId);
  if (!wh) return;
  const reserves = (wh.reservesByItem && wh.reservesByItem[itemName]) || [];
  const item = wh.items.find(it => it.name === itemName);
  if (!item) return;

  document.getElementById('mIco').textContent = '🔒';
  document.getElementById('mTitle').textContent = itemName;
  document.getElementById('mSub').textContent = `${wh.name} · ${wh.org}`;

  const rows = reserves.map(r => `
    <tr>
      <td>${esc(r.client)}</td>
      <td>${r.orderNumber ? esc(r.orderNumber) : '—'}</td>
      <td>${fmtDate(r.orderDate)}</td>
      <td><strong>${fmt(r.qty)}</strong></td>
    </tr>
  `).join('');

  const totalRes = reserves.reduce((a, r) => a + r.qty, 0);

  document.getElementById('mBody').innerHTML = `
    <div class="big">${fmt(item.reserve)} од</div>
    <div class="sub">У резерві · вільно ${fmt(item.free)} · всього на складі ${fmt(item.total)}</div>
    <table>
      <thead><tr><th>Клієнт / Замовлення</th><th>№ документа</th><th>Дата</th><th>К-ть</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:20px">Деталей замовлень не знайдено</td></tr>'}</tbody>
    </table>
    <div class="formula">
      Всього зарезервовано: <strong>${fmt(totalRes)}</strong> од по ${reserves.length} замовлен${reserves.length === 1 ? 'ню' : reserves.length < 5 ? 'нях' : 'нях'}.
      Дані з 1С UNF, оновлюються раз на годину.
    </div>
  `;
  document.getElementById('mBackdrop').classList.add('open');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('mBackdrop').classList.remove('open');
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
