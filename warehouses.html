<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Склад · Залишки</title>
<script>
  // Apply saved theme BEFORE styles paint — avoids flash-of-wrong-theme
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e){}
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
<script src="auth.js?v=mobhdr20260430"></script>
<script src="header.js?v=mobhdr20260430"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/uk.js"></script>
<script src="date-range.js?v=20260522"></script>
<!-- SheetJS (xlsx) for Excel export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="theme.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

/* Layout */
.wrap{margin:0 auto;padding:14px 16px}
.page-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.page-head h1{font-size:20px;font-weight:700;letter-spacing:-.4px}
.page-head .sub{font-size:12px;color:var(--text3)}

/* Toolbar (filter + controls) */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:visible;position:relative;z-index:10}
.toolbar input[type=text]{flex:1;min-width:200px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;transition:border .15s}
.toolbar input:focus{border-color:var(--accent)}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
/* buttons unified via header.js (.btn + .btn--secondary/--sm) */
.toolbar .check{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:11px;color:var(--text2);user-select:none}
.toolbar .check:hover{background:var(--bg3);color:var(--text)}
.toolbar .check input{accent-color:var(--accent);cursor:pointer}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.toolbar .group{display:inline-flex;flex-wrap:wrap;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{border:none;background:transparent;padding:5px 10px;border-radius:6px}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}
/* Tag-filter */
.wh-tags{position:relative;display:inline-flex;flex-wrap:wrap;gap:4px;align-items:center;padding:4px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;flex:1;min-width:200px;min-height:30px}
.wh-tags:focus-within{border-color:var(--accent)}
.wh-tags input[type=text]{flex:1;min-width:100px;padding:3px 4px;border:none;background:transparent;font-size:12px;color:var(--text);outline:none}
.wh-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 6px 2px 8px;background:var(--accent-bg);color:var(--accent);font-size:11px;font-weight:600;border-radius:6px;white-space:nowrap;max-width:220px}
.wh-tag .name{overflow:hidden;text-overflow:ellipsis}
.wh-tag .x{cursor:pointer;font-size:14px;line-height:1;opacity:.7;padding:0 2px}
.wh-tag .x:hover{opacity:1;color:var(--red)}
.wh-suggest{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-md);max-height:280px;overflow-y:auto;z-index:50;min-width:300px}
.wh-suggest .opt{padding:7px 12px;font-size:12px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
.wh-suggest .opt:last-child{border-bottom:none}
.wh-suggest .opt:hover,.wh-suggest .opt.hl{background:var(--bg3);color:var(--accent)}
.wh-suggest .opt .meta{color:var(--text3);font-size:10.5px;font-variant-numeric:tabular-nums;white-space:nowrap}
.wh-suggest .empty{padding:10px 12px;font-size:12px;color:var(--text3)}

/* Tree table (1C-style) */
.tree-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tree-wrap.combined{}
.tree-tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tree-tbl thead th{padding:11px 12px;background:var(--bg2);color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}
.tree-tbl thead th:not(:first-child){text-align:right}
/* Fixed numeric columns so sections align even when they have different content */
.tree-tbl thead th:nth-child(1){width:55%}
.tree-tbl thead th:nth-child(2),
.tree-tbl thead th:nth-child(3),
.tree-tbl thead th:nth-child(4){width:15%}
.tree-tbl tbody td:first-child{overflow:hidden;text-overflow:ellipsis}
.tree-tbl tbody tr{transition:background .1s}
.tree-tbl tbody td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.tree-tbl tbody td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
.tree-tbl tr.wh-row td{background:linear-gradient(90deg,var(--accent-bg),transparent 70%);font-weight:700;color:var(--text);padding:10px 12px;letter-spacing:-.1px}
.tree-tbl tr.wh-row td:first-child{display:flex;align-items:center;gap:10px}
.tree-tbl tr.wh-row .badge{font-size:10px;font-weight:700;letter-spacing:.4px;padding:2px 8px;border-radius:4px}
.tree-tbl tr.wh-row .badge.Реакт{background:var(--accent-bg);color:var(--accent)}
.tree-tbl tr.wh-row .badge.Генерація{background:rgba(151,117,250,.14);color:#b399ff}
/* Uniform item row look — items without reserves just lose cursor + chevron */
.tree-tbl tr.item-row{cursor:pointer;color:var(--text)}
.tree-tbl tr.item-row td:first-child{color:var(--text)}
.tree-tbl tr.item-row:hover td{background:var(--bg3)}
.tree-tbl tr.item-row.disabled{cursor:default}
.tree-tbl tr.item-row.disabled:hover td{background:transparent}
.tree-tbl tr.item-row .chev{display:inline-block;width:14px;color:var(--text3);transition:transform .15s;font-size:10px;transform:translateY(-1px)}
.tree-tbl tr.item-row.open .chev{transform:rotate(90deg) translateY(-1px)}
.tree-tbl tr.item-row.disabled .chev{visibility:hidden}
.tree-tbl tr.item-row .item-name{display:inline-block;vertical-align:middle}
.tree-tbl tr.reserve-row td{background:var(--bg3);padding:7px 12px 7px 38px;font-size:11.5px;color:var(--text2);border-bottom:1px solid var(--border)}
.tree-tbl tr.reserve-row td:first-child{padding-left:38px}
.tree-tbl tr.reserve-row .client{color:var(--text)}
.tree-tbl tr.reserve-row .meta{color:var(--text3);font-size:10.5px;margin-left:8px}
.tree-tbl tr.reserve-row.wh-break td{padding-left:54px;color:var(--text3);font-style:italic;font-size:11px}
/* Рівень покупця (розкривний) — між товаром і замовленням */
.tree-tbl tr.client-row{cursor:pointer}
.tree-tbl tr.client-row td{background:var(--bg3);padding:7px 12px 7px 38px;font-size:11.5px;color:var(--text2);border-bottom:1px solid var(--border)}
.tree-tbl tr.client-row td:first-child{padding-left:38px}
.tree-tbl tr.client-row:hover td{background:var(--surface2)}
.tree-tbl tr.client-row .client{color:var(--text)}
.tree-tbl tr.client-row .meta{color:var(--text3);font-size:10.5px;margin-left:8px}
.tree-tbl tr.client-row .chev{display:inline-block;width:14px;color:var(--text3);transition:transform .15s;font-size:10px;transform:translateY(-1px)}
.tree-tbl tr.client-row.open .chev{transform:rotate(90deg) translateY(-1px)}
/* Рівень замовлення (під розкритим покупцем) */
.tree-tbl tr.order-row td{background:var(--bg3);padding:6px 12px 6px 58px;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border)}
.tree-tbl tr.order-row td:first-child{padding-left:58px}
.tree-tbl tr.order-row .ord{color:var(--text)}
.tree-tbl tr.order-row .meta{color:var(--text3);font-size:10.5px;margin-left:8px}
.tree-tbl td.qty-pos{color:var(--green);font-weight:600}
.tree-tbl td.qty-res{color:var(--blue);font-weight:600}
.tree-tbl td.qty-zero{color:var(--text3)}
.tree-tbl td.qty-neg{color:var(--red);font-weight:600}
.tree-tbl .type-ico{margin-right:6px;opacity:.8}

/* Per-wh view — section dividers */
.wh-section{margin-top:18px}
.wh-section:first-child{margin-top:0}
.wh-section-title{padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:700;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:10px 10px 0 0;border-bottom:none}
.wh-section-title .ico{font-size:16px}
.wh-section-title .tot{margin-left:auto;color:var(--text3);font-weight:500;font-size:11px;font-variant-numeric:tabular-nums}
.wh-section .tree-wrap{border-radius:0 0 10px 10px;border-top:1px solid var(--border)}

/* Loading / empty */
.loading{padding:60px 20px;text-align:center;color:var(--text2);font-size:13px}
.loading::after{content:'';display:block;width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:14px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:20px;text-align:center;color:var(--red);background:var(--red-bg);border-radius:10px;font-size:12px;margin-top:16px}
.empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:12px}

@media (max-width:720px){
  .wrap{padding:12px}
  .page-head h1{font-size:17px}
  .toolbar{padding:8px;gap:6px;border-radius:10px}
  .toolbar input[type=text]{flex:1 1 100%;min-width:0;font-size:12px;padding:6px 8px}
  .toolbar .date-range-input{font-size:12px;padding:6px 8px;min-width:100px}
  .toolbar .lbl{display:none}
  .toolbar .chip{padding:6px 10px;font-size:11px}
  .toolbar .check{padding:6px 8px;font-size:10.5px}
  .toolbar .group{padding:3px;gap:2px}
  .toolbar .group .chip{padding:5px 8px;font-size:11px}
  .toolbar .sep{display:none}
  .tree-wrap{border-radius:10px;-webkit-overflow-scrolling:touch}
  .tree-tbl{font-size:11px}
  .tree-tbl thead th,.tree-tbl tbody td{padding:6px 6px;font-size:11px}
  .tree-tbl thead th:nth-child(2),
  .tree-tbl thead th:nth-child(3),
  .tree-tbl thead th:nth-child(4){width:78px}
  .tree-tbl tr.wh-row td{padding:8px 6px;font-size:11.5px}
  .tree-tbl tr.reserve-row td{padding-left:24px;font-size:10.5px}
  .tree-tbl tr.reserve-row td:first-child{padding-left:24px}
  .tree-tbl tr.reserve-row.wh-break td{padding-left:34px;font-size:10px}
  .tree-tbl tr.client-row td,.tree-tbl tr.client-row td:first-child{padding-left:24px;font-size:10.5px}
  .tree-tbl tr.order-row td,.tree-tbl tr.order-row td:first-child{padding-left:38px;font-size:10px}
  .wh-section-title{padding:8px 10px;font-size:11.5px}
}
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-head">
      <h1>📦 Склад · залишки</h1>
    </div>
    <div class="toolbar">
      <span class="lbl">На дату</span>
      <input type="text" id="asOfIn" class="date-range-input" readonly title="Залишки на кінець обраної дати">
      <span class="chip" onclick="setToday()">Сьогодні</span>

      <span class="sep"></span>

      <span class="lbl">Вигляд</span>
      <span class="group">
        <span class="chip active" data-view="combined" onclick="setView('combined')">🔗 Разом</span>
        <span class="chip" data-view="perwh" onclick="setView('perwh')">🏢 За складами</span>
      </span>

      <span class="sep"></span>

      <span class="chip" data-org="" onclick="setOrg('')">Всі</span>
      <span class="chip active" data-org="Реакт" onclick="setOrg('Реакт')">Реакт</span>
      <span class="chip" data-org="Генерація" onclick="setOrg('Генерація')">Генерація</span>

      <span class="sep"></span>

      <label class="check" title="Показувати товари з нульовим залишком (тільки в 1С, а не на складі)">
        <input type="checkbox" id="showEmpty"> Виводити відсутні
      </label>

      <span class="sep"></span>

      <button class="btn btn--secondary btn--sm" onclick="expandAll()">⊞ Розгорнути</button>
      <button class="btn btn--secondary btn--sm" onclick="collapseAll()">⊟ Згорнути</button>
      <button class="btn btn--secondary btn--sm" onclick="downloadXLSX()" title="Вигрузити відфільтроване в Excel">⬇ Excel</button>

      <span class="wh-tags" id="whIncludeTags">
        <input type="text" id="searchIn" placeholder="🔎 Пошук по товару чи клієнту…" autocomplete="off">
        <div id="whIncludeSuggest" class="wh-suggest" style="display:none"></div>
      </span>
    </div>

    <div id="body"><div class="loading">Завантаження…</div></div>
  </div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev';

// ─── Session gate (Google login + warehouses role) + unified header ───
Auth.require('warehouses').then(user => {
  window.__user = user;
  AppHeader.mount({ active: 'warehouses', user });
  // Org-level access: hide chips for orgs the user doesn't have access to
  // If no orgs assigned at all → show everything (no restriction)
  const userOrgs = user.orgs || {};
  const hasAnyOrg = Object.values(userOrgs).some(v => v);
  if (hasAnyOrg) {
    const allowedOrgs = ['Реакт', 'Генерація'].filter(o => userOrgs[o]);
    const orgChips = document.querySelectorAll('.chip[data-org]');
    orgChips.forEach(chip => {
      const org = chip.dataset.org;
      if (org === '') {
        if (allowedOrgs.length < 2) chip.style.display = 'none';
      } else {
        if (!userOrgs[org]) chip.style.display = 'none';
      }
    });
    const defaultOrg = allowedOrgs.length === 1 ? allowedOrgs[0] : '';
    state.org = defaultOrg;
    orgChips.forEach(c => c.classList.toggle('active', c.dataset.org === defaultOrg));
  }
  load();
});

// ─── State ───
function _todayISO() {
  const d = new Date();
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
const state = {
  data: null,
  view: 'combined',      // 'combined' | 'perwh'
  org: 'Реакт',          // 'Реакт' | 'Генерація'
  search: '',
  asOf: _todayISO(),     // YYYY-MM-DD — always start with today
  showEmpty: false,
  openKeys: new Set(),   // expanded item keys
  loading: false,
  includeList: [],
};
// Restore include filter
try { const s = localStorage.getItem('wh_stock_include'); if (s) { const a = JSON.parse(s); if (Array.isArray(a)) state.includeList = a; } } catch (_) {}
const IN_TRANSIT_MARKER = 'В дорозі';

function fmt(n, dec = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric' });
}
function todayISO() {
  const d = new Date();
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

// ─── Init date input ───
let _picker;
function _syncAsOfInput() {
  if (_picker) _picker.setDate(state.asOf || _todayISO());
}

// ─── Data loading ───
async function load() {
  state.loading = true;
  _syncAsOfInput();
  document.getElementById('body').innerHTML = '<div class="loading">Завантаження…</div>';
  try {
    const q = state.asOf ? `?action=warehouses_stock&date=${state.asOf}` : '?action=warehouses_stock';
    const res = await fetch(API_URL + q);
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    state.data = d;
    state.loading = false;
    render();
  } catch (e) {
    state.loading = false;
    document.getElementById('body').innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

// ─── Filter helpers ───
function matchesSearch(s, reserves) {
  if (!state.search) return true;
  const q = state.search;
  if (s.name.toLowerCase().includes(q)) return true;
  if ((reserves || []).some(r =>
    (r.client || '').toLowerCase().includes(q) ||
    (r.orderNumber || '').toLowerCase().includes(q)
  )) return true;
  return false;
}

// ─── Controls ───
function setView(v) {
  state.view = v;
  document.querySelectorAll('.chip[data-view]').forEach(c => c.classList.toggle('active', c.dataset.view === v));
  state.openKeys.clear();
  render();
}
function setOrg(v) {
  state.org = v;
  document.querySelectorAll('.chip[data-org]').forEach(c => c.classList.toggle('active', c.dataset.org === v));
  render();
}
function setToday() {
  state.asOf = _todayISO();
  _syncAsOfInput();
  load();
}
_picker = initDateSingle({
  inputId: 'asOfIn',
  date: state.asOf || _todayISO(),
  onChange: function(d) { state.asOf = d; load(); }
});
/* Tag-input з autocomplete */
const whTagInput = {
  list() { return state.includeList || []; },
  save() { try { localStorage.setItem('wh_stock_include', JSON.stringify(this.list())); } catch (_) {} },
  renderTags() {
    const host = document.getElementById('whIncludeTags');
    if (!host) return;
    Array.from(host.querySelectorAll('.wh-tag')).forEach(n => n.remove());
    const inp = document.getElementById('searchIn');
    this.list().forEach(name => {
      const t = document.createElement('span');
      t.className = 'wh-tag';
      t.innerHTML = '<span class="name">' + esc(name) + '</span><span class="x" data-name="' + esc(name) + '">×</span>';
      host.insertBefore(t, inp);
    });
  },
  add(name) {
    if (!name) return;
    const cur = this.list();
    if (!cur.some(n => n.toLowerCase() === name.toLowerCase())) {
      state.includeList = cur.concat([name]);
      this.save();
    }
    document.getElementById('searchIn').value = '';
    state.search = '';
    this.hide();
    this.renderTags();
    render();
  },
  remove(name) {
    state.includeList = this.list().filter(n => n !== name);
    this.save();
    this.renderTags();
    render();
  },
  hide() { const dd = document.getElementById('whIncludeSuggest'); if (dd) dd.style.display = 'none'; },
  allItems() {
    if (!state.data) return [];
    const seen = new Map();
    const warehouses = (state.data.warehouses || []).filter(w => !state.org || w.org === state.org);
    if (warehouses.length) {
      warehouses.forEach(w => {
        (w.items || []).forEach(it => {
          if (!it.name) return;
          const key = it.name.toLowerCase();
          const prev = seen.get(key) || { name: it.name, total: 0 };
          prev.total += it.total || 0;
          seen.set(key, prev);
        });
      });
    } else {
      const byOrg = state.data.summaryByOrg || {};
      const orgs = state.org ? [state.org] : Object.keys(byOrg);
      orgs.forEach(org => {
        (byOrg[org] || []).forEach(it => {
          if (!it.name) return;
          const key = it.name.toLowerCase();
          const prev = seen.get(key) || { name: it.name, total: 0 };
          prev.total += it.total || 0;
          seen.set(key, prev);
        });
      });
    }
    return [...seen.values()].filter(o => o.total > 0).sort((a, b) => b.total - a.total);
  },
  onInput() {
    const inp = document.getElementById('searchIn');
    const dd  = document.getElementById('whIncludeSuggest');
    if (!inp || !dd) return;
    const q = inp.value.trim().toLowerCase();
    const all = this.allItems();
    if (!all.length) { dd.style.display = 'none'; return; }
    const taken = new Set(this.list().map(n => n.toLowerCase()));
    const matched = all
      .filter(o => !taken.has(o.name.toLowerCase()))
      .filter(o => !q || o.name.toLowerCase().includes(q))
      .slice(0, 50);
    if (!matched.length) { dd.innerHTML = '<div class="empty">Нічого не знайдено</div>'; dd.style.display = 'block'; return; }
    dd.innerHTML = matched.map((o, i) =>
      '<div class="opt' + (i === 0 ? ' hl' : '') + '" data-name="' + esc(o.name) + '">' +
        '<span>' + esc(o.name) + '</span>' +
        '<span class="meta">' + fmt(o.total, 0) + ' шт</span>' +
      '</div>').join('');
    dd.style.display = 'block';
  },
  onKey(ev) {
    const dd = document.getElementById('whIncludeSuggest');
    if (!dd || dd.style.display === 'none') {
      if (ev.key === 'Backspace' && !ev.target.value && this.list().length) {
        this.remove(this.list()[this.list().length - 1]);
      }
      return;
    }
    const opts = Array.from(dd.querySelectorAll('.opt'));
    let idx = opts.findIndex(o => o.classList.contains('hl'));
    if (ev.key === 'ArrowDown') { ev.preventDefault(); idx = Math.min(idx + 1, opts.length - 1); opts.forEach((o, i) => o.classList.toggle('hl', i === idx)); opts[idx]?.scrollIntoView({ block: 'nearest' }); }
    else if (ev.key === 'ArrowUp') { ev.preventDefault(); idx = Math.max(idx - 1, 0); opts.forEach((o, i) => o.classList.toggle('hl', i === idx)); opts[idx]?.scrollIntoView({ block: 'nearest' }); }
    else if (ev.key === 'Enter') { ev.preventDefault(); const sel = opts[idx] || opts[0]; if (sel) this.add(sel.dataset.name); }
    else if (ev.key === 'Escape') { this.hide(); }
    else if (ev.key === 'Backspace' && !ev.target.value && this.list().length) {
      this.remove(this.list()[this.list().length - 1]);
    }
  },
};
document.addEventListener('click', function(ev) {
  const x = ev.target.closest('.wh-tag .x[data-name]');
  if (x) { whTagInput.remove(x.dataset.name); return; }
  const opt = ev.target.closest('.wh-suggest .opt[data-name]');
  if (opt) { whTagInput.add(opt.dataset.name); return; }
});
whTagInput.renderTags();

const searchIn = document.getElementById('searchIn');
searchIn.addEventListener('input', e => {
  state.search = e.target.value.toLowerCase().trim();
  whTagInput.onInput();
  render();
});
searchIn.addEventListener('focus', () => whTagInput.onInput());
searchIn.addEventListener('blur', () => setTimeout(() => whTagInput.hide(), 200));
searchIn.addEventListener('keydown', e => whTagInput.onKey(e));
document.getElementById('showEmpty').addEventListener('change', e => {
  state.showEmpty = e.target.checked;
  render();
});

function expandAll() {
  state.openKeys.clear();
  const keys = currentItemKeys();
  keys.forEach(k => state.openKeys.add(k));
  render();
}
function collapseAll() {
  state.openKeys.clear();
  render();
}

function currentItemKeys() {
  // Усі розкривні ключі: товари + покупці з ≥2 замовленнями (для «розгорнути все»).
  const keys = [];
  const pushItem = (itemKey, reserves) => {
    if (!(reserves || []).length) return;
    keys.push(itemKey);
    groupReservesByClient(reserves).forEach(g => {
      if (g.orders.length > 1) keys.push(itemKey + '|cl:' + g.client);
    });
  };
  if (state.view === 'combined') {
    getCombinedItems().forEach(s => pushItem('c:' + s.name, s.reserves));
  } else {
    (state.data.warehouses || []).forEach(w => {
      if (state.org && w.org !== state.org) return;
      (w.items || []).forEach(it => {
        const rs = (w.reservesByItem && w.reservesByItem[it.name]) || [];
        pushItem('w:' + w.id + '|' + it.name, rs);
      });
    });
  }
  return keys;
}

// ─── Render ───
function getCombinedItems() {
  // When state.org='' (Всі): merge summaries across orgs by item name,
  // summing totals/reserves; otherwise return that org's summary verbatim.
  const byOrg = state.data.summaryByOrg || {};
  let summary;
  if (state.org) {
    summary = (byOrg[state.org] || []).slice();
  } else {
    const merged = {};
    Object.values(byOrg).forEach(arr => {
      (arr || []).forEach(s => {
        if (!merged[s.name]) merged[s.name] = { name: s.name, total: 0, reserve: 0, free: 0, reserves: [] };
        const M = merged[s.name];
        M.total   += s.total   || 0;
        M.reserve += s.reserve || 0;
        M.free    += s.free    || 0;
        M.reserves.push(...(s.reserves || []));
      });
    });
    summary = Object.values(merged);
  }
  if (!state.showEmpty) summary = summary.filter(s => s.total > 0);
  // Вільний пошук має пріоритет над закріпленими тегами: набрав «Deye» — фільтрує
  // частковим збігом по всіх товарах; теги діють лише коли поле пошуку порожнє.
  const incSet = new Set((state.includeList || []).map(n => n.toLowerCase()));
  if (state.search) summary = summary.filter(s => matchesSearch(s, s.reserves));
  else if (incSet.size) summary = summary.filter(s => incSet.has((s.name || '').toLowerCase()));
  return summary;
}

function render() {
  if (!state.data) return;
  if (state.view === 'combined') renderCombined();
  else renderPerWh();
}

// ─── Експорт у Excel (вигрузка того, що відфільтроване на екрані) ───
function downloadXLSX() {
  if (typeof XLSX === 'undefined') {
    alert('Excel-бібліотека не завантажилась. Перевірте інтернет-з\'єднання.');
    return;
  }
  if (!state.data) { alert('Немає даних для експорту'); return; }

  const asOf      = state.asOf || _todayISO();
  const orgLabel  = state.org || 'Всі';
  const viewLabel = state.view === 'combined' ? 'Разом' : 'За складами';
  const dt        = new Date().toLocaleString('uk-UA', { timeZone: 'Europe/Kiev' });

  const stockAoa = [];
  const resAoa   = [];

  if (state.view === 'combined') {
    const items = getCombinedItems();
    if (!items.length) { alert('Немає даних для експорту'); return; }
    stockAoa.push(['Товар', 'Всього', 'Резерв', 'Вільно']);
    resAoa.push(['Товар', 'Клієнт', '№ замовлення', 'Дата', 'Кількість']);
    items.forEach(s => {
      stockAoa.push([s.name, s.total || 0, s.reserve || 0, s.free || 0]);
      (s.reserves || []).forEach(r => {
        resAoa.push([s.name, r.client || '', r.orderNumber || '', fmtDate(r.orderDate), r.qty || 0]);
      });
    });
  } else {
    const sections = getFilteredWarehouses().filter(x => x.items.length);
    if (!sections.length) { alert('Немає даних для експорту'); return; }
    stockAoa.push(['Склад', 'Організація', 'Товар', 'Всього', 'Резерв', 'Вільно']);
    resAoa.push(['Склад', 'Товар', 'Клієнт', '№ замовлення', 'Дата', 'Кількість']);
    sections.forEach(({ w, items }) => {
      items.forEach(it => {
        stockAoa.push([w.name, w.org, it.name, it.total || 0, it.reserve || 0, it.free || 0]);
        const rs = (w.reservesByItem && w.reservesByItem[it.name]) || [];
        rs.forEach(r => resAoa.push([w.name, it.name, r.client || '', r.orderNumber || '', fmtDate(r.orderDate), r.qty || 0]));
      });
    });
  }

  const wb = XLSX.utils.book_new();

  // Мета-аркуш з параметрами вигрузки
  const meta = [
    ['Склад · залишки'],
    [],
    ['На дату', asOf],
    ['Вигляд', viewLabel],
    ['Організація', orgLabel],
    ['Показувати відсутні', state.showEmpty ? 'так' : 'ні'],
  ];
  if ((state.includeList || []).length) meta.push(['Фільтр товарів', state.includeList.join(', ')]);
  else if (state.search)               meta.push(['Пошук', state.search]);
  meta.push([], ['Згенеровано', dt]);
  const metaWs = XLSX.utils.aoa_to_sheet(meta);
  metaWs['!cols'] = [{ wch: 22 }, { wch: 50 }];
  XLSX.utils.book_append_sheet(wb, metaWs, 'Звіт');

  // Аркуш «Залишки»
  const stockWs = XLSX.utils.aoa_to_sheet(stockAoa);
  stockWs['!cols'] = state.view === 'combined'
    ? [{ wch: 46 }, { wch: 12 }, { wch: 12 }, { wch: 12 }]
    : [{ wch: 28 }, { wch: 12 }, { wch: 40 }, { wch: 12 }, { wch: 12 }, { wch: 12 }];
  XLSX.utils.book_append_sheet(wb, stockWs, 'Залишки');

  // Аркуш «Резерви» — лише якщо є резерви
  if (resAoa.length > 1) {
    const resWs = XLSX.utils.aoa_to_sheet(resAoa);
    resWs['!cols'] = state.view === 'combined'
      ? [{ wch: 40 }, { wch: 28 }, { wch: 16 }, { wch: 14 }, { wch: 12 }]
      : [{ wch: 24 }, { wch: 36 }, { wch: 26 }, { wch: 16 }, { wch: 14 }, { wch: 12 }];
    XLSX.utils.book_append_sheet(wb, resWs, 'Резерви');
  }

  const filename = `Склад залишки · ${asOf} · ${viewLabel} · ${orgLabel}.xlsx`;
  XLSX.writeFile(wb, filename);
}

function renderCombined() {
  const items = getCombinedItems();
  if (!items.length) {
    document.getElementById('body').innerHTML = '<div class="empty">Нічого не знайдено</div>';
    return;
  }
  const rows = items.map(s => renderItemRow('c:' + s.name, s.name, s, s.reserves || [], null)).join('');
  document.getElementById('body').innerHTML = `
    <div class="tree-wrap combined">
      <table class="tree-tbl">
        <thead><tr>
          <th>Товар / Замовлення</th>
          <th>Всього</th>
          <th>Резерв</th>
          <th>Вільно</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  bindItemRows();
}

// Org + showEmpty + includeList/search фільтри по складах — спільний шлях для
// renderPerWh і експорту, щоб вигрузка дорівнювала тому, що на екрані.
function getFilteredWarehouses() {
  const warehouses = (state.data.warehouses || []).filter(w => !state.org || w.org === state.org);
  const incSet = new Set((state.includeList || []).map(n => n.toLowerCase()));
  return warehouses.map(w => {
    let items = w.items || [];
    if (!state.showEmpty) items = items.filter(it => it.total > 0);
    // Вільний пошук має пріоритет над тегами (див. getCombinedItems).
    if (state.search) {
      items = items.filter(it => {
        const rs = (w.reservesByItem && w.reservesByItem[it.name]) || [];
        return it.name.toLowerCase().includes(state.search) ||
               rs.some(r => (r.client||'').toLowerCase().includes(state.search) || (r.orderNumber||'').toLowerCase().includes(state.search));
      });
    } else if (incSet.size) {
      items = items.filter(it => incSet.has((it.name || '').toLowerCase()));
    }
    return { w, items };
  });
}

function renderPerWh() {
  const all = getFilteredWarehouses();
  if (!all.length) {
    document.getElementById('body').innerHTML = '<div class="empty">Складів не знайдено</div>';
    return;
  }
  const sections = all.map(({ w, items }) => {
    if (!items.length) return '';
    const isTransit = w.name.startsWith(IN_TRANSIT_MARKER);
    const totalTot = items.reduce((a, it) => a + it.total, 0);
    const totalRes = items.reduce((a, it) => a + it.reserve, 0);
    const rows = items.map(it => {
      const reserves = (w.reservesByItem && w.reservesByItem[it.name]) || [];
      const key = 'w:' + w.id + '|' + it.name;
      return renderItemRow(key, it.name, it, reserves, null);
    }).join('');
    return `
      <div class="wh-section">
        <div class="wh-section-title">
          <span class="ico">${isTransit ? '🚛' : '🏢'}</span>
          <span>${esc(w.name)}</span>
          <span class="badge ${w.org}" style="font-size:10px;font-weight:700;letter-spacing:.4px;padding:2px 8px;border-radius:4px;background:${w.org==='Генерація'?'var(--purple-bg)':'var(--accent-bg)'};color:${w.org==='Генерація'?'var(--purple-text)':'var(--accent)'}">${w.org}</span>
          <span class="tot">${items.length} поз · ${fmt(totalTot)} од · резерв ${fmt(totalRes)}</span>
        </div>
        <div class="tree-wrap">
          <table class="tree-tbl">
            <thead><tr>
              <th>Товар / Замовлення</th>
              <th>Всього</th>
              <th>Резерв</th>
              <th>Вільно</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }).filter(Boolean).join('');
  document.getElementById('body').innerHTML = sections || '<div class="empty">Нічого не знайдено</div>';
  bindItemRows();
}

function renderItemRow(key, name, stockObj, reserves, extra) {
  const hasReserves = reserves && reserves.length > 0;
  const isOpen = state.openKeys.has(key);
  const freeCls = stockObj.free < 0 ? 'qty-neg' : (stockObj.free > 0 ? 'qty-pos' : 'qty-zero');
  const resCls = stockObj.reserve > 0 ? 'qty-res' : 'qty-zero';
  const totCls = stockObj.total === 0 ? 'qty-zero' : '';
  const rowCls = 'item-row' + (hasReserves ? ' reserved' : ' disabled') + (isOpen ? ' open' : '');

  let out = `<tr class="${rowCls}" data-key="${esc(key)}">
    <td><span class="chev">▶</span><span class="item-name">${esc(name)}</span></td>
    <td class="${totCls}">${fmt(stockObj.total)}</td>
    <td class="${resCls}">${fmt(stockObj.reserve)}</td>
    <td class="${freeCls}">${fmt(stockObj.free)}</td>
  </tr>`;

  if (hasReserves && isOpen) {
    out += renderReserveTree(key, reserves);
  }
  return out;
}

// ── Дерево резерву: товар → покупець → замовлення ──
// Покупець з 1 замовленням рендериться плоско (зайвий рівень не додаємо).
// Покупець з ≥2 замовленнями = розкривний рядок, що відкриває окремі замовлення.
function groupReservesByClient(reserves) {
  const byClient = {};
  (reserves || []).forEach(r => {
    const c = r.client || 'Замовлення';
    if (!byClient[c]) byClient[c] = { client: c, qty: 0, orders: [] };
    byClient[c].qty += r.qty || 0;
    byClient[c].orders.push(r);
  });
  return Object.values(byClient)
    .map(g => { g.orders.sort((a, b) => (b.qty || 0) - (a.qty || 0)); return g; })
    .sort((a, b) => b.qty - a.qty);
}

function whBreakdownHtml(r) {
  if (!(r.warehouses && r.warehouses.length > 1)) return '';
  return r.warehouses.map(w =>
    `<div class="wh-break-inner" style="padding-left:16px;font-size:10.5px;color:var(--text3);font-style:italic">└ ${esc(w.whName)} · ${fmt(w.qty)} од</div>`
  ).join('');
}

function renderReserveTree(itemKey, reserves) {
  return groupReservesByClient(reserves).map(g => {
    // Один покупець, одне замовлення — плоский рядок.
    if (g.orders.length === 1) {
      const r = g.orders[0];
      return `<tr class="reserve-row">
        <td>
          <span class="client">${esc(g.client)}</span>
          <span class="meta">${r.orderNumber ? esc(r.orderNumber) : '—'} · ${fmtDate(r.orderDate)}</span>
          ${whBreakdownHtml(r)}
        </td>
        <td></td>
        <td class="qty-res">${fmt(r.qty)}</td>
        <td></td>
      </tr>`;
    }
    // Кілька замовлень — розкривний рівень покупця.
    const ckey = itemKey + '|cl:' + g.client;
    const copen = state.openKeys.has(ckey);
    let out = `<tr class="client-row${copen ? ' open' : ''}" data-key="${esc(ckey)}">
      <td>
        <span class="chev">▶</span>
        <span class="client">${esc(g.client)}</span>
        <span class="meta">${g.orders.length} зам.</span>
      </td>
      <td></td>
      <td class="qty-res">${fmt(g.qty)}</td>
      <td></td>
    </tr>`;
    if (copen) {
      out += g.orders.map(r => `<tr class="order-row">
        <td>
          <span class="ord">${r.orderNumber ? esc(r.orderNumber) : '—'}</span>
          <span class="meta">${fmtDate(r.orderDate)}</span>
          ${whBreakdownHtml(r)}
        </td>
        <td></td>
        <td class="qty-res">${fmt(r.qty)}</td>
        <td></td>
      </tr>`).join('');
    }
    return out;
  }).join('');
}

function bindItemRows() {
  document.querySelectorAll('tr.item-row:not(.disabled), tr.client-row').forEach(tr => {
    tr.addEventListener('click', () => {
      const k = tr.dataset.key;
      if (state.openKeys.has(k)) state.openKeys.delete(k);
      else state.openKeys.add(k);
      render();
    });
  });
}
