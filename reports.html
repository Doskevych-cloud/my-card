<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Звіти</title>
<script>
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e){}
</script>
<script src="auth.js?v=clean20260418"></script>
<script src="header.js?v=clean20260418"></script>
<style>
:root{
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a;
  --surface:#141414; --surface2:#1c1c1c;
  --border:#262626; --border2:#333;
  --text:#f5f5f5; --text2:#a3a3a3; --text3:#737373;
  --accent:#ff8319; --accent-bg:rgba(255,131,25,.12);
  --red:#e74c3c; --red-bg:rgba(231,76,60,.12);
  --green:#22c55e; --green-bg:rgba(34,197,94,.12);
  --blue:#3b82f6; --blue-bg:rgba(59,130,246,.12);
  --yellow:#eab308; --yellow-bg:rgba(234,179,8,.12);
}
:root[data-theme="light"]{
  --bg:#f5f5f7; --bg2:#ffffff; --bg3:#ececef;
  --surface:#ffffff; --surface2:#ffffff;
  --border:#e5e5ea; --border2:#d1d1d6;
  --text:#1c1c1e; --text2:#48484a; --text3:#8e8e93;
  --accent:#e07017; --accent-bg:rgba(224,112,23,.12);
  --red:#d93025; --red-bg:rgba(217,48,37,.10);
  --green:#15803d; --green-bg:rgba(21,128,61,.10);
  --blue:#1d4ed8; --blue-bg:rgba(29,78,216,.10);
  --yellow:#a16207; --yellow-bg:rgba(161,98,7,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{max-width:1400px;margin:0 auto;padding:20px}

/* Page tabs */
.page-tabs{display:inline-flex;gap:4px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.ptab{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap;cursor:pointer;border:none;background:transparent;font-family:inherit}
.ptab:hover{background:var(--bg3);color:var(--text)}
.ptab.active{background:var(--accent-bg);color:var(--accent)}

/* Sub-tabs */
.sub-tabs{display:inline-flex;gap:2px;padding:3px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;margin-bottom:14px;margin-left:8px}
.sub-tabs .stab{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;background:transparent;border:none;font-family:inherit}
.sub-tabs .stab:hover{color:var(--text)}
.sub-tabs .stab.active{background:var(--accent-bg);color:var(--accent)}

/* Toolbar — same canon as sales.html / ar_aging.html */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar input[type=date]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;color-scheme:dark;font-family:inherit}
:root[data-theme="light"] .toolbar input[type=date]{color-scheme:light}
.toolbar input[type=date]:focus{border-color:var(--accent)}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px;border-radius:8px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.toolbar .group{display:inline-flex;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{border:none;background:transparent;padding:5px 10px;border-radius:6px}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.toolbar .spacer{flex:1}
.toolbar .meta{font-size:11.5px;color:var(--text3)}
.toolbar .meta b{color:var(--text2);font-weight:600}

/* KPI */
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:14px}
.kpi-card{padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;gap:3px}
.kpi-card .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.kpi-card .val{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1.2;color:var(--text)}
.kpi-card .sub{font-size:11px;color:var(--text3);font-weight:500}
.kpi-card.c-success .val{color:var(--green)}
.kpi-card.c-fail .val{color:var(--red)}
.kpi-card.c-progress .val{color:var(--blue)}
.kpi-card.c-rate .val{color:var(--accent)}

/* Section header */
.section-h{display:flex;align-items:baseline;justify-content:space-between;margin:18px 0 10px;padding:0 2px}
.section-h h2{font-size:14px;font-weight:700;color:var(--text);margin:0}
.section-h .hint{font-size:11px;color:var(--text3)}

/* Funnel */
.funnel{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:18px}
.funnel-row{display:grid;grid-template-columns:200px 1fr 80px 70px 70px 70px;gap:10px;align-items:center;padding:6px 4px;border-bottom:1px solid var(--border);font-size:12.5px}
.funnel-row:last-child{border-bottom:none}
.funnel-row .stage{font-weight:600;color:var(--text)}
.funnel-row .bar-wrap{position:relative;height:24px;background:var(--bg3);border-radius:6px;overflow:hidden}
.funnel-row .bar{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--accent),#ff5a2e);border-radius:6px;transition:width .25s}
.funnel-row .bar-label{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:#111;text-shadow:0 1px 0 rgba(255,255,255,.2)}
.funnel-row .col-num{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
.funnel-row .col-num.success{color:var(--green)}
.funnel-row .col-num.fail{color:var(--red)}
.funnel-row .col-num.progress{color:var(--text2)}
.funnel-row .col-num.conv{color:var(--accent)}
.funnel-head{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;padding:6px 4px;border-bottom:1px solid var(--border2);background:transparent;display:grid;grid-template-columns:200px 1fr 80px 70px 70px 70px;gap:10px;align-items:center}
.funnel-head .col-num{text-align:right}

/* Managers table */
.mgr-wrap{overflow:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface2);margin-bottom:20px}
.mgr-table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums;min-width:560px}
.mgr-table th,.mgr-table td{padding:10px 14px;text-align:right;white-space:nowrap;line-height:1.25}
.mgr-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;background:var(--surface);border-bottom:1px solid var(--border)}
.mgr-table th:first-child,.mgr-table td:first-child{text-align:left;font-weight:600;color:var(--text)}
.mgr-table td{color:var(--text2);font-weight:500;border-bottom:1px solid var(--border)}
.mgr-table tr:last-child td{border-bottom:none}
.mgr-table tr:hover td{background:var(--bg3)}
.mgr-table td.success{color:var(--green);font-weight:700}
.mgr-table td.fail{color:var(--red);font-weight:700}
.mgr-table td.progress{color:var(--blue);font-weight:700}
.mgr-table td.conv{color:var(--accent);font-weight:700}
.mgr-table .conv-bar{display:inline-block;width:60px;height:4px;background:var(--bg3);border-radius:2px;vertical-align:middle;margin-left:8px;overflow:hidden}
.mgr-table .conv-bar i{display:block;height:100%;background:var(--accent);border-radius:2px}

/* Tasks list (collapsible) */
.tasks-wrap{border:1px solid var(--border);border-radius:12px;background:var(--surface2);overflow:hidden;margin-bottom:20px}
.tasks-table{width:100%;border-collapse:collapse;font-size:12.5px}
.tasks-table th,.tasks-table td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}
.tasks-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;background:var(--surface);position:sticky;top:0}
.tasks-table tr:hover td{background:var(--bg3)}
.tasks-table .num{text-align:right;font-variant-numeric:tabular-nums;color:var(--text3)}
.tasks-table a.tlink{color:var(--accent)}
.tasks-table a.tlink:hover{text-decoration:underline}
.tasks-table .badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:700;letter-spacing:.2px}
.tasks-table .b-ok{background:var(--green-bg);color:var(--green)}
.tasks-table .b-fail{background:var(--red-bg);color:var(--red)}
.tasks-table .b-prog{background:var(--blue-bg);color:var(--blue)}

/* States */
.loading,.empty,.error-box{padding:40px 20px;text-align:center;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:12px}
.error-box{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.muted{color:var(--text3);font-size:11px}

@media (max-width:700px){
  .funnel-row,.funnel-head{grid-template-columns:140px 1fr 60px 50px 50px 50px;font-size:11px;gap:6px}
}
</style>
</head>
<body>
<div id="appHeader"></div>

<div class="wrap">
  <div>
    <div class="page-tabs" role="tablist">
      <button class="ptab active" data-cat="sales">📈 Продажі</button>
    </div>
    <div class="sub-tabs" id="subTabs">
      <button class="stab active" data-rep="planfix_funnel">🎯 Воронка лідогенерації</button>
    </div>
  </div>

  <div class="toolbar">
    <span class="lbl">Період</span>
    <input type="date" id="fromIn">
    <span style="color:var(--text3)">—</span>
    <input type="date" id="toIn">
    <span class="group" id="presetGroup">
      <span class="chip" data-preset="month">Цей місяць</span>
      <span class="chip" data-preset="prevmonth">Минулий</span>
      <span class="chip" data-preset="quarter">Квартал</span>
      <span class="chip" data-preset="year">Рік</span>
      <span class="chip" data-preset="all">Весь час</span>
    </span>

    <span class="sep"></span>

    <span class="chip active" data-org="" onclick="setOrg('')">Всі</span>
    <span class="chip" data-org="Реакт" onclick="setOrg('Реакт')">Реакт</span>
    <span class="chip" data-org="Генерація" onclick="setOrg('Генерація')">Генерація</span>

    <span class="sep"></span>

    <button class="btn btn--secondary btn--sm" id="btnRefresh">↻ Оновити</button>

    <span class="spacer"></span>
    <span class="meta" id="freshness">—</span>
  </div>

  <div id="content">
    <div class="loading">Завантаження звіту…</div>
  </div>
</div>

<script>
const API = 'https://price-api.doskevich.workers.dev/';

// ─── State ───
function _localISO(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function _todayISO(){return _localISO(new Date())}
function _firstOfMonthISO(){const d=new Date();return _localISO(new Date(d.getFullYear(), d.getMonth(), 1))}
function _lastOfMonthISO(){const d=new Date();return _localISO(new Date(d.getFullYear(), d.getMonth()+1, 0))}

const state = {
  raw: null,            // { tasks, generatedAt, reportName, stages }
  from: _firstOfMonthISO(),
  to: _lastOfMonthISO(),
  preset: 'month',
  org: '',
  loading: false,
};

// Org розрізняється по об'єкту (template id) задачі в Planfix:
//   Реакт      → "Замовлення дилера" (id 99431)
//   Генерація  → "Продажі станцій"   (id 130339)
const ORG_TEMPLATES = {
  'Реакт':     new Set([99431]),
  'Генерація': new Set([130339]),
};

// ─── Boot ───
Auth.require('reports').then(user => {
  AppHeader.mount({ active: 'reports', user });
  hydrateFromHash();
  syncInputs();
  syncPresetChips();
  syncOrgChips();
  attachEvents();
  load();
});

// ─── URL state ───
function saveStateToUrl() {
  const h = new URLSearchParams();
  h.set('from', state.from);
  h.set('to', state.to);
  if (state.preset) h.set('preset', state.preset);
  if (state.org)    h.set('org', state.org);
  history.replaceState(null, '', '#' + h.toString());
}
function hydrateFromHash() {
  const h = new URLSearchParams((location.hash || '').replace(/^#/, ''));
  if (h.get('from')) state.from = h.get('from');
  if (h.get('to'))   state.to   = h.get('to');
  if (h.get('preset')) state.preset = h.get('preset');
  if (h.get('org'))    state.org    = h.get('org');
  if (!h.get('preset')) state.preset = detectPreset(state.from, state.to);
}
function detectPreset(from, to) {
  if (!from || !to) return '';
  if (from === '2020-01-01') return 'all';
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const monthStart = _localISO(new Date(y, m, 1));
  const monthEnd   = _localISO(new Date(y, m+1, 0));
  if (from === monthStart && to === monthEnd) return 'month';
  const pStart = _localISO(new Date(y, m-1, 1));
  const pEnd   = _localISO(new Date(y, m, 0));
  if (from === pStart && to === pEnd) return 'prevmonth';
  const q = Math.floor(m/3);
  const qStart = _localISO(new Date(y, q*3, 1));
  const qEnd   = _localISO(new Date(y, q*3+3, 0));
  if (from === qStart && to === qEnd) return 'quarter';
  const yStart = _localISO(new Date(y, 0, 1));
  const yEnd   = _localISO(new Date(y, 11, 31));
  if (from === yStart && to === yEnd) return 'year';
  return '';
}

// ─── Controls ───
function syncInputs() {
  document.getElementById('fromIn').value = state.from;
  document.getElementById('toIn').value = state.to;
}
function syncPresetChips() {
  document.querySelectorAll('#presetGroup .chip').forEach(c => {
    c.classList.toggle('active', c.dataset.preset === state.preset);
  });
}
function syncOrgChips() {
  document.querySelectorAll('.chip[data-org]').forEach(c => {
    c.classList.toggle('active', (c.dataset.org || '') === (state.org || ''));
  });
}
function setPreset(p) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  // Match Planfix UI presets: period = full calendar range (not bounded by today).
  let from, to;
  if (p === 'month') { from = new Date(y, m, 1); to = new Date(y, m+1, 0); }
  else if (p === 'prevmonth') { from = new Date(y, m-1, 1); to = new Date(y, m, 0); }
  else if (p === 'quarter') { const q = Math.floor(m/3); from = new Date(y, q*3, 1); to = new Date(y, q*3+3, 0); }
  else if (p === 'year') { from = new Date(y, 0, 1); to = new Date(y, 11, 31); }
  else if (p === 'all')  { state.from = '2020-01-01'; state.to = '2026-12-31'; state.preset = 'all'; syncInputs(); syncPresetChips(); saveStateToUrl(); load(); return; }
  state.from = _localISO(from);
  state.to = _localISO(to);
  state.preset = p;
  syncInputs(); syncPresetChips(); saveStateToUrl(); load();
}
function setOrg(v) {
  state.org = v || '';
  syncOrgChips(); saveStateToUrl(); render(); // org — клієнтський, без re-fetch
}
function attachEvents() {
  document.getElementById('fromIn').addEventListener('change', e => {
    state.from = e.target.value || _firstOfMonthISO();
    state.preset = detectPreset(state.from, state.to);
    syncPresetChips(); saveStateToUrl(); load();
  });
  document.getElementById('toIn').addEventListener('change', e => {
    state.to = e.target.value || _todayISO();
    state.preset = detectPreset(state.from, state.to);
    syncPresetChips(); saveStateToUrl(); load();
  });
  document.querySelectorAll('#presetGroup .chip').forEach(c => {
    c.addEventListener('click', () => setPreset(c.dataset.preset));
  });
  document.getElementById('btnRefresh').addEventListener('click', () => load(true));
}

// ─── Data ───
async function load(force = false) {
  state.loading = true;
  document.getElementById('content').innerHTML = '<div class="loading">Завантаження звіту з Planfix…</div>';
  try {
    const params = new URLSearchParams({ action: 'planfix_funnel', from: state.from, to: state.to });
    if (force) params.set('_', Date.now());
    const res = await fetch(API + '?' + params.toString());
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    state.raw = data;
    state.loading = false;
    const fresh = data.generatedAt ? data.generatedAt.replace('T',' ').slice(0,16) : '';
    let label = fresh ? `Дані Planfix: <b>${esc(fresh)}</b>` : '';
    if (data._stale) {
      const ago = data._staleSince ? Math.round((Date.now() - data._staleSince) / 60000) : '?';
      label += ` <span style="color:var(--yellow)">⚠ кеш ${ago} хв (Planfix limit 10 хв)</span>`;
    }
    document.getElementById('freshness').innerHTML = label;
    render();
  } catch (e) {
    state.loading = false;
    document.getElementById('content').innerHTML = `<div class="error-box">Помилка: ${esc(e.message || e)}</div>`;
  }
}

// ─── Filtering ───
function inRange(iso, from, to) {
  if (!iso) return false;
  const d = iso.slice(0, 10);
  return d >= from && d <= to;
}
function filteredTasks() {
  if (!state.raw) return [];
  // Date filtering is done by Planfix /generate with periodOptions;
  // client only filters by org (template id).
  const orgSet = state.org ? ORG_TEMPLATES[state.org] : null;
  return state.raw.tasks.filter(t => !orgSet || orgSet.has(t.templateId));
}

function aggregate(tasks, stages) {
  // stages = ["1. Спробу...", ..., "8. Успішно реалізовано"]
  const funnel = stages.map((s, i) => ({ stage: s, num: i + 1, total: 0, success: 0, fail: 0, inProgress: 0 }));
  const offFunnel = { stage: 'Поза воронкою', num: 0, total: 0, success: 0, fail: 0, inProgress: 0 };
  const managers = {};

  let total = 0, success = 0, fail = 0;
  for (const t of tasks) {
    total++;
    const bucket = (t.stage >= 1 && t.stage <= 8) ? funnel[t.stage - 1] : offFunnel;
    bucket.total++;
    if (t.outcome === 'success') { bucket.success++; success++; }
    else if (t.outcome === 'fail') { bucket.fail++; fail++; }
    else bucket.inProgress++;

    if (!managers[t.manager]) managers[t.manager] = { name: t.manager, total: 0, success: 0, fail: 0, inProgress: 0 };
    managers[t.manager].total++;
    if (t.outcome === 'success') managers[t.manager].success++;
    else if (t.outcome === 'fail') managers[t.manager].fail++;
    else managers[t.manager].inProgress++;
  }
  const fullFunnel = offFunnel.total > 0 ? funnel.concat([offFunnel]) : funnel;
  return {
    total, success, fail, inProgress: total - success - fail,
    conversionRate: total ? success/total : 0,
    funnel: fullFunnel,
    managers: Object.values(managers).sort((a,b)=>b.total-a.total),
  };
}

// ─── Helpers ───
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmt(n){return Number(n||0).toLocaleString('uk-UA')}
function pct(n){return (Math.round((n||0)*1000)/10).toFixed(1) + '%'}
function fmtDateUA(iso){if(!iso)return '—';const d=iso.slice(0,10).split('-');return `${d[2]}.${d[1]}.${d[0]}`}

// ─── Render ───
function render() {
  if (!state.raw) return;
  const tasks = filteredTasks();
  const a = aggregate(tasks, state.raw.stages);
  const maxStageTotal = Math.max(...a.funnel.map(f => f.total), 1);
  // Конверсія = % від 1-го етапу (як в офіційному звіті Planfix).
  const baseStageTotal = (a.funnel[0] && a.funnel[0].total) || 0;
  const stageConv = a.funnel.map((f, i) => i === 0 ? 1 : (baseStageTotal > 0 ? f.total / baseStageTotal : 0));

  let html = '';

  if (a.total === 0) {
    html = `<div class="empty">У вибраний період угод немає.</div>`;
    document.getElementById('content').innerHTML = html;
    return;
  }

  // KPI
  html += `
  <div class="kpi">
    <div class="kpi-card">
      <div class="lbl">Усього угод</div>
      <div class="val">${fmt(a.total)}</div>
      <div class="sub">у фільтрі періоду</div>
    </div>
    <div class="kpi-card c-success">
      <div class="lbl">Успішно</div>
      <div class="val">${fmt(a.success)}</div>
      <div class="sub">${pct(a.success/a.total)} від усіх</div>
    </div>
    <div class="kpi-card c-fail">
      <div class="lbl">Неуспішно</div>
      <div class="val">${fmt(a.fail)}</div>
      <div class="sub">${pct(a.fail/a.total)} від усіх</div>
    </div>
    <div class="kpi-card c-progress">
      <div class="lbl">У роботі</div>
      <div class="val">${fmt(a.inProgress)}</div>
      <div class="sub">${pct(a.inProgress/a.total)} від усіх</div>
    </div>
    <div class="kpi-card c-rate">
      <div class="lbl">Загальна конверсія</div>
      <div class="val">${pct(a.conversionRate)}</div>
      <div class="sub">успіх / всього</div>
    </div>
  </div>`;

  // Funnel
  html += `
  <div class="section-h">
    <h2>🎯 Воронка по етапах</h2>
    <span class="hint">Бар = частка від найбільшого етапу</span>
  </div>
  <div class="funnel">
    <div class="funnel-head">
      <div>Етап</div><div></div>
      <div class="col-num">Усього</div>
      <div class="col-num">✓</div>
      <div class="col-num">✗</div>
      <div class="col-num">% від №1</div>
    </div>`;
  a.funnel.forEach((f, i) => {
    const w = (f.total / maxStageTotal) * 100;
    const conv = stageConv[i];
    html += `
      <div class="funnel-row">
        <div class="stage">${esc(f.stage)}</div>
        <div class="bar-wrap"><div class="bar" style="width:${w}%"></div><div class="bar-label">${fmt(f.total)}</div></div>
        <div class="col-num">${fmt(f.total)}</div>
        <div class="col-num success">${f.success ? fmt(f.success) : '—'}</div>
        <div class="col-num fail">${f.fail ? fmt(f.fail) : '—'}</div>
        <div class="col-num conv">${pct(conv)}</div>
      </div>`;
  });
  html += `</div>`;

  // Managers
  html += `
  <div class="section-h"><h2>👥 По менеджерах</h2><span class="hint">Сортування — за кількістю угод</span></div>
  <div class="mgr-wrap">
    <table class="mgr-table">
      <thead><tr><th>Менеджер</th><th>Угод</th><th>Успіх</th><th>Провал</th><th>В роботі</th><th>Конверсія</th></tr></thead>
      <tbody>`;
  a.managers.forEach(m => {
    const cr = m.total ? m.success / m.total : 0;
    html += `
      <tr>
        <td>${esc(m.name)}</td>
        <td>${fmt(m.total)}</td>
        <td class="success">${m.success ? fmt(m.success) : '—'}</td>
        <td class="fail">${m.fail ? fmt(m.fail) : '—'}</td>
        <td class="progress">${m.inProgress ? fmt(m.inProgress) : '—'}</td>
        <td class="conv">${pct(cr)}<span class="conv-bar"><i style="width:${Math.round(cr*100)}%"></i></span></td>
      </tr>`;
  });
  html += `</tbody></table></div>`;

  // Tasks
  html += `
  <div class="section-h"><h2>📋 Задачі (${fmt(tasks.length)})</h2><span class="hint">Останні зміни вгорі</span></div>
  <div class="tasks-wrap"><table class="tasks-table">
    <thead><tr><th>#</th><th>Назва</th><th>Етап</th><th>Менеджер</th><th>Остання зміна</th></tr></thead>
    <tbody>`;
  const sorted = tasks.slice().sort((a,b) => (b.dateISO||'').localeCompare(a.dateISO||''));
  const stageLabel = (n) => (n >= 1 && n <= 8) ? state.raw.stages[n-1] : (t => '— ' + (t || ''));
  sorted.slice(0, 200).forEach(t => {
    const badge = t.outcome === 'success' ? '<span class="badge b-ok">✓ успіх</span>'
                : t.outcome === 'fail'    ? '<span class="badge b-fail">✗ провал</span>'
                : '<span class="badge b-prog">у роботі</span>';
    const stageTxt = (t.stage >= 1 && t.stage <= 8) ? state.raw.stages[t.stage-1] : (t.statusName || '—');
    html += `
      <tr>
        <td class="num">${esc(t.id)}</td>
        <td>${t.taskUrl ? `<a class="tlink" href="${esc(t.taskUrl)}" target="_blank" rel="noopener">${esc(t.title)}</a>` : esc(t.title)} ${badge}</td>
        <td>${esc(stageTxt)}</td>
        <td>${esc(t.manager)}</td>
        <td>${esc(fmtDateUA(t.dateISO))}</td>
      </tr>`;
  });
  if (sorted.length > 200) {
    html += `<tr><td colspan="5" class="muted" style="text-align:center;padding:10px">… показано перші 200 з ${fmt(sorted.length)}</td></tr>`;
  }
  html += `</tbody></table></div>
  <div class="muted" style="text-align:right;padding:4px 6px">
    Джерело: «${esc(state.raw.reportName)}» за ${state.raw.year}. Дані з Planfix (template 99431 «Замовлення дилера» + 130339 «Продажі станцій»). Кеш 30 хв.
  </div>`;

  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
