<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Розсилка · RE:ACT ERP</title>
<script>
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e){}
</script>
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<script src="auth.js?v=bc20260522"></script>
<script src="header.js?v=bc20260522"></script>
<link rel="stylesheet" href="theme.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{margin:0 auto;padding:14px 16px;max-width:900px}
.page-tabs{display:inline-flex;gap:4px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;max-width:100%;overflow-x:auto}
.ptab{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap}
.ptab:hover{background:var(--bg3);color:var(--text)}
.ptab.active{background:var(--accent-bg);color:var(--accent)}

.bc-block{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.bc-block h2{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text)}

.bc-textarea{width:100%;min-height:100px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;line-height:1.5;resize:vertical;outline:none;transition:border .15s}
.bc-textarea:focus{border-color:var(--accent)}
.bc-textarea::placeholder{color:var(--text3)}
.char-count{font-size:11px;color:var(--text3);text-align:right;margin-top:4px;font-variant-numeric:tabular-nums}

.bc-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.bc-search{flex:1;min-width:180px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;transition:border .15s}
.bc-search:focus{border-color:var(--accent)}
.bc-search::placeholder{color:var(--text3)}

.bc-chip{padding:5px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none}
.bc-chip:hover{background:var(--bg3);color:var(--text)}
.bc-chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

.chat-list{max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.chat-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .1s;user-select:none}
.chat-row:hover{background:var(--bg3)}
.chat-row input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px;flex-shrink:0;cursor:pointer}
.chat-row .cr-name{font-size:12px;font-weight:500;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-row .cr-org{font-size:10px;color:var(--text3);font-weight:600;flex-shrink:0}

.bc-footer{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.bc-count{font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums}
.bc-btn{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.bc-btn:hover{opacity:.9}
.bc-btn:disabled{opacity:.4;cursor:not-allowed}

.bc-result{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:12px;display:none}
.bc-result.ok{display:block;background:var(--green-bg);color:var(--green);border:1px solid color-mix(in srgb,var(--green) 30%,transparent)}
.bc-result.err{display:block;background:var(--red-bg);color:var(--red);border:1px solid color-mix(in srgb,var(--red) 30%,transparent)}

.loading-msg{text-align:center;padding:30px;color:var(--text3);font-size:12px}

@media(max-width:600px){
  .page-tabs{display:flex;flex-wrap:wrap;gap:3px;padding:3px}
  .ptab{padding:6px 10px;font-size:11.5px}
  .bc-footer{flex-direction:column;align-items:stretch}
  .bc-btn{text-align:center}
}
</style>
</head>
<body>
<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-tabs" id="pageTabs">
      <a href="/prices.html" class="ptab" data-perm="sales_prices">🏠 Порівняння цін</a>
      <a href="/sales.html" class="ptab" data-perm="sales">📈 Продажі менеджерів</a>
      <a href="/top_products.html" class="ptab" data-perm="sales_top_products">📦 Останні продажі</a>
      <a href="/osp.html" class="ptab" data-perm="sales_osp">📋 Оплата та відвантаження</a>
      <a href="/ar_aging.html" class="ptab" data-perm="sales_ar_aging">⏱ Заборгованість покупців</a>
      <a href="/active_clients.html" class="ptab" data-org-required="Реакт" data-perm="sales_active_clients">👥 Клієнтська база</a>
      <a href="/inventory.html" class="ptab" data-perm="sales_inventory">📊 Обіговість запасів</a>
      <a href="/sla.html" class="ptab" data-perm="sales_sla">⚡ SLA</a>
      <a href="/broadcast.html" class="ptab active" data-perm="sales_broadcast">📢 Розсилка</a>
    </div>
    <script>requestAnimationFrame(()=>{var a=document.querySelector('.ptab.active');if(a)a.scrollIntoView({inline:'center',block:'nearest'});})</script>

    <div class="bc-block">
      <h2>Повідомлення</h2>
      <textarea id="msgText" class="bc-textarea" placeholder="Текст повідомлення…"></textarea>
      <div class="char-count"><span id="charCount">0</span> символів</div>
    </div>

    <div class="bc-block">
      <h2>Обрати чати</h2>
      <div class="bc-toolbar">
        <input type="text" id="searchChats" class="bc-search" placeholder="Пошук чату…">
        <span style="flex-grow:1"></span>
        <span class="bc-chip" onclick="toggleAll(true)">Обрати все</span>
        <span class="bc-chip" onclick="toggleAll(false)">Зняти все</span>
      </div>
      <div id="chatList" class="chat-list">
        <div class="loading-msg">Завантаження чатів…</div>
      </div>
    </div>

    <div class="bc-footer">
      <span class="bc-count">Обрано: <b id="selCount">0</b> чатів</span>
      <span style="flex-grow:1"></span>
      <button id="sendBtn" class="bc-btn" disabled onclick="sendBroadcast()">Відправити</button>
    </div>

    <div id="result" class="bc-result"></div>
  </div>
</div>

<script>
const BOT_API = 'https://react-bot.doskevich.workers.dev/';
let allChats = [];
let searchQuery = '';

function getToken() {
  return localStorage.getItem('session_token') || '';
}

async function apiFetch(action, opts = {}) {
  const url = BOT_API + '?action=' + action;
  const headers = { 'Authorization': 'Bearer ' + getToken() };
  if (opts.body) headers['Content-Type'] = 'application/json';
  const r = await fetch(url, {
    method: opts.body ? 'POST' : 'GET',
    headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  return r.json();
}

async function loadChats() {
  const data = await apiFetch('broadcast_chats');
  if (data.error) { document.getElementById('chatList').innerHTML = `<div class="loading-msg" style="color:var(--red)">${data.error}</div>`; return; }
  allChats = (data.chats || []).map(c => ({ ...c, selected: false }));
  renderChats();
}

function renderChats() {
  const q = searchQuery.toLowerCase();
  const filtered = allChats.filter(c => {
    if (q && !(c.chat_title || '').toLowerCase().includes(q) && !(c.counterparty_name || '').toLowerCase().includes(q)) return false;
    return true;
  });
  const el = document.getElementById('chatList');
  if (!filtered.length) { el.innerHTML = '<div class="loading-msg">Нічого не знайдено</div>'; updateCount(); return; }
  el.innerHTML = filtered.map((c, i) => {
    const idx = allChats.indexOf(c);
    return `<label class="chat-row">
      <input type="checkbox" data-idx="${idx}" ${c.selected ? 'checked' : ''} onchange="toggleChat(${idx}, this.checked)">
      <span class="cr-name">${esc(c.chat_title || c.counterparty_name)}</span>
      <span class="cr-org">${esc(c.org || '')}</span>
    </label>`;
  }).join('');
  updateCount();
}

function toggleChat(idx, val) {
  allChats[idx].selected = val;
  updateCount();
}

function toggleAll(val) {
  const q = searchQuery.toLowerCase();
  allChats.forEach(c => {
    if (q && !(c.chat_title || '').toLowerCase().includes(q) && !(c.counterparty_name || '').toLowerCase().includes(q)) return;
    c.selected = val;
  });
  renderChats();
}

function updateCount() {
  const n = allChats.filter(c => c.selected).length;
  document.getElementById('selCount').textContent = n;
  const hasText = document.getElementById('msgText').value.trim().length > 0;
  document.getElementById('sendBtn').disabled = !n || !hasText;
}

async function sendBroadcast() {
  const text = document.getElementById('msgText').value.trim();
  const chatIds = allChats.filter(c => c.selected).map(c => c.chat_id);
  if (!chatIds.length || !text) return;

  const btn = document.getElementById('sendBtn');
  const res = document.getElementById('result');
  btn.disabled = true;
  btn.textContent = 'Відправляю…';
  res.className = 'bc-result';

  try {
    const data = await apiFetch('broadcast_send', { body: { chat_ids: chatIds, text } });
    if (data.error) throw new Error(data.error);
    res.className = 'bc-result ok';
    res.textContent = `Відправлено: ${data.sent}` + (data.failed ? `, помилок: ${data.failed}` : '');
  } catch (e) {
    res.className = 'bc-result err';
    res.textContent = 'Помилка: ' + e.message;
  }
  btn.textContent = 'Відправити';
  updateCount();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

document.getElementById('msgText').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length;
  updateCount();
});
document.getElementById('searchChats').addEventListener('input', function() {
  searchQuery = this.value;
  renderChats();
});

Auth.require('sales_broadcast').then(user => {
  Auth.filterSubNav(user);
  AppHeader.mount({ active: 'sales', user });
  const userOrgs = user.orgs || {};
  const isAdmin = !!(user.roles && user.roles.admin);
  const imp = !!(Auth.isImpersonating && Auth.isImpersonating());
  if ((!isAdmin || imp) && !userOrgs['Реакт']) {
    document.querySelector('.wrap').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--mute);font-size:15px;text-align:center;padding:40px">
        <div>
          <div style="font-size:32px;margin-bottom:12px">⛔</div>
          <div>Цей розділ доступний лише для організації <b style="color:var(--fg)">Реакт</b></div>
          <div style="margin-top:8px;font-size:13px">Зверніться до адміністратора для отримання доступу.</div>
        </div>
      </div>`;
    return;
  }
  loadChats();
});
</script>
</body>
</html>
