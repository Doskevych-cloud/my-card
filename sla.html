<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SLA: Час реакції · RE:ACT ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<script>
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e){}
</script>
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">

<style>
:root{
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a;
  --surface:#141414; --surface2:#1c1c1c;
  --border:#262626; --border2:#333;
  --text:#f5f5f5; --text2:#a3a3a3; --text3:#737373;
  --accent:#ff8319; --accent-bg:rgba(255,131,25,.12);
  --red:#e74c3c; --red-bg:rgba(231,76,60,.12);
  --green:#22c55e; --green-bg:rgba(34,197,94,.12);
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
}
:root[data-theme="light"]{
  --bg:#f5f5f7; --bg2:#ffffff; --bg3:#ececef;
  --surface:#ffffff; --surface2:#ffffff;
  --border:#e5e5ea; --border2:#d1d1d6;
  --text:#1c1c1e; --text2:#48484a; --text3:#8e8e93;
  --accent:#e07017; --accent-bg:rgba(224,112,23,.12);
  --red:#d93025; --red-bg:rgba(217,48,37,.10);
  --green:#15803d; --green-bg:rgba(21,128,61,.10);
  --shadow-md:0 4px 20px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{margin:0 auto;padding:14px 16px}
.page-tabs{display:inline-flex;gap:4px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
.ptab{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap}
.ptab:hover{background:var(--bg3);color:var(--text)}
.ptab.active{background:var(--accent-bg);color:var(--accent)}

.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px}
.toolbar input[type=date]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;color-scheme:dark;font-family:inherit}
:root[data-theme="light"] .toolbar input[type=date]{color-scheme:light}
.toolbar input[type=date]:focus{border-color:var(--accent)}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.toolbar .group{display:inline-flex;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{border:none;background:transparent;padding:5px 10px;border-radius:6px}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}

/* ── Pending pulse ── */
.pending-banner{padding:10px 14px;background:var(--red-bg);border:1px solid color-mix(in srgb,var(--red) 40%,transparent);border-radius:10px;margin-bottom:14px;display:none}
.pending-banner .pb-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pending-banner .pb-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 2s infinite}
.pending-banner .pb-title{font-size:12px;font-weight:700;color:var(--red)}
.pending-banner .pb-list{display:flex;flex-wrap:wrap;gap:6px}
.pending-banner .pb-item{font-size:11px;color:var(--text2);padding:4px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px}
.pending-banner .pb-item b{color:var(--text);font-weight:600}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Metrics row ── */
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.metric{padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px}
.metric .m-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:4px}
.metric .m-value{font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1.1;font-variant-numeric:tabular-nums}
.metric .m-sub{font-size:11px;color:var(--text3);margin-top:2px}
.metric.hero{grid-column:1;position:relative}
.metric.hero .m-value{font-size:36px}

/* ── Distribution ── */
.distrib{padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;margin-bottom:14px}
.distrib .d-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:10px}
.distrib .d-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.distrib .d-row:last-child{margin-bottom:0}
.distrib .d-lbl{width:70px;font-size:11px;color:var(--text2);text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.distrib .d-bar-bg{flex:1;height:20px;background:var(--bg2);border-radius:4px;overflow:hidden;position:relative}
.distrib .d-bar{height:100%;border-radius:4px;transition:width .4s ease}
.distrib .d-count{width:36px;font-size:11px;color:var(--text3);text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.d-bar.clr-green{background:var(--green)}
.d-bar.clr-text{background:var(--text3)}
.d-bar.clr-red{background:var(--red)}

/* ── Managers ranking ── */
.ranking{margin-bottom:14px}
.ranking .r-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:8px}
.mgr-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:background .15s}
.mgr-card:hover{background:var(--bg3)}
.mgr-card.open{border-color:var(--border2)}
.mgr-card .mc-rank{font-size:16px;font-weight:800;color:var(--text3);width:22px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
.mgr-card .mc-info{flex:1;min-width:0}
.mgr-card .mc-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mgr-card .mc-stats{font-size:11px;color:var(--text3);margin-top:1px}
.mgr-card .mc-bar-bg{width:120px;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;flex-shrink:0}
.mgr-card .mc-bar{height:100%;border-radius:3px;transition:width .4s ease}
.mgr-card .mc-val{font-size:18px;font-weight:800;width:60px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;letter-spacing:-.3px}

/* ── Expanded detail under manager card ── */
.mgr-detail{display:none;margin:-2px 0 6px;padding:0 14px 12px;background:var(--surface2);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px}
.mgr-detail.open{display:block}
.mgr-detail .md-cp{padding:8px 0;border-bottom:1px solid var(--border)}
.mgr-detail .md-cp:last-child{border-bottom:none}
.mgr-detail .md-cp-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:2px 0}
.mgr-detail .md-cp-name{font-size:12px;font-weight:600;color:var(--text2)}
.mgr-detail .md-cp-avg{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.mgr-detail .md-evts{margin-top:4px;display:none}
.mgr-detail .md-evts.open{display:block}
.mgr-detail .md-evt{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;color:var(--text3)}
.mgr-detail .md-evt-time{font-variant-numeric:tabular-nums}

/* ── Loading / empty ── */
.loading{text-align:center;padding:48px;color:var(--text3);font-size:13px}

/* ── Admin panel ── */
.admin-toggle{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;margin-top:20px;transition:all .15s}
.admin-toggle:hover{color:var(--text);border-color:var(--border2)}
.admin-section{margin-top:10px;padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:none}
.admin-section.open{display:block}
.admin-section h3{font-size:12px;font-weight:700;margin-bottom:8px;color:var(--text2)}
.admin-tbl{width:100%;border-collapse:collapse;font-size:12px}
.admin-tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-weight:700;padding:6px;border-bottom:1px solid var(--border)}
.admin-tbl td{padding:6px;border-bottom:1px solid var(--border);color:var(--text2)}
.admin-tbl td.mono{font-variant-numeric:tabular-nums;font-size:11px;color:var(--text3)}
.admin-row{margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.admin-row input,.admin-row select{padding:5px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;font-family:inherit}
.admin-row label{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.btn-sm{padding:5px 12px;background:var(--accent-bg);border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-sm:hover{background:var(--accent);color:#fff}

@media(max-width:768px){
  .page-tabs{display:flex;flex-wrap:wrap;gap:3px;padding:3px;max-width:100%}
  .ptab{padding:6px 10px;font-size:11.5px;flex:0 0 auto}
  .metrics{grid-template-columns:1fr}
  .metric.hero .m-value{font-size:28px}
  .mgr-card .mc-bar-bg{display:none}
  .mgr-card .mc-val{font-size:16px;width:50px}
  .distrib .d-lbl{width:55px;font-size:10px}
}
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-tabs">
      <a href="/sales.html" class="ptab">📈 Продажі менеджерів</a>
      <a href="/top_products.html" class="ptab">📦 Останні продажі</a>
      <a href="/osp.html" class="ptab">📋 Оплата та відвантаження</a>
      <a href="/ar_aging.html" class="ptab">⏱ Заборгованість покупців</a>
      <a href="/active_clients.html" class="ptab">👥 Клієнтська база</a>
      <a href="/inventory.html" class="ptab">📊 Обіговість запасів</a>
      <a href="/sla.html" class="ptab active">⚡ SLA</a>
    </div>

    <div class="toolbar">
      <span class="lbl">Період</span>
      <input type="date" id="fromIn">
      <span style="color:var(--text3)">—</span>
      <input type="date" id="toIn">
      <span class="group">
        <span class="chip" data-preset="month" onclick="setPreset('month')">Цей місяць</span>
        <span class="chip" data-preset="prevmonth" onclick="setPreset('prevmonth')">Минулий</span>
      </span>
    </div>

    <div id="pendingBanner" class="pending-banner">
      <div class="pb-head">
        <span class="pb-dot"></span>
        <span class="pb-title" id="pendingTitle">Очікують відповіді</span>
      </div>
      <div class="pb-list" id="pendingList"></div>
    </div>

    <div id="metricsRow" class="metrics"></div>
    <div id="distribWrap"></div>
    <div id="rankingWrap" class="ranking"></div>

    <div class="loading" id="loader">Завантаження…</div>

    <div id="adminPanel"></div>
  </div>
</div>

<script>
const API = 'https://react-bot.doskevich.workers.dev/';
const state = { from: '', to: '', org: 'Реакт', preset: 'month' };
const SLA_THRESHOLD = 10;

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('uk-UA', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function fmtFull(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('uk-UA', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function fmtR(min) {
  if (min == null) return '—';
  if (min < 1) return min.toFixed(1);
  if (min < 60) return Math.round(min) + '';
  const h = Math.floor(min / 60), m = Math.round(min % 60);
  return h + 'г ' + m + 'хв';
}
function rColor(min) {
  if (min == null) return '';
  if (min < 3) return 'var(--green)';
  if (min >= SLA_THRESHOLD) return 'var(--red)';
  return 'var(--text)';
}
function rClass(min) {
  if (min < 3) return 'clr-green';
  if (min >= SLA_THRESHOLD) return 'clr-red';
  return 'clr-text';
}

// ── Presets ──
function calcPreset(name) {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  if (name === 'month') return { from: new Date(y, m, 1), to: new Date(y, m + 1, 1) };
  if (name === 'prevmonth') return { from: new Date(y, m - 1, 1), to: new Date(y, m, 1) };
  return { from: new Date(y, m, 1), to: new Date(y, m + 1, 1) };
}
function isoDate(d) { return d.toISOString().slice(0, 10); }
function setPreset(p) {
  state.preset = p;
  const { from, to } = calcPreset(p);
  state.from = isoDate(from); state.to = isoDate(to);
  document.getElementById('fromIn').value = state.from;
  document.getElementById('toIn').value = state.to;
  document.querySelectorAll('[data-preset]').forEach(c => c.classList.toggle('active', c.dataset.preset === p));
  saveHash(); load();
}
function detectPreset(from, to) {
  for (const p of ['month', 'prevmonth']) {
    const r = calcPreset(p);
    if (isoDate(r.from) === from && isoDate(r.to) === to) return p;
  }
  return '';
}

// ── Hash state ──
function saveHash() {
  location.hash = `from=${state.from}&to=${state.to}`;
}
function loadHash() {
  const h = location.hash.slice(1), p = new URLSearchParams(h);
  if (p.get('from')) state.from = p.get('from');
  if (p.get('to')) state.to = p.get('to');
}

// ── Distribution buckets ──
function calcDistrib(managers) {
  const buckets = [
    { label: '< 1 хв', min: 0, max: 1, count: 0, cls: 'clr-green' },
    { label: '1 – 3 хв', min: 1, max: 3, count: 0, cls: 'clr-green' },
    { label: '3 – 5 хв', min: 3, max: 5, count: 0, cls: 'clr-text' },
    { label: '5 – 10 хв', min: 5, max: 10, count: 0, cls: 'clr-text' },
    { label: '> 10 хв', min: 10, max: Infinity, count: 0, cls: 'clr-red' },
  ];
  let total = 0;
  for (const mgr of managers)
    for (const cp of mgr.counterparties)
      for (const ev of cp.events) {
        const m = ev.reaction_min;
        for (const b of buckets) if (m >= b.min && m < b.max) { b.count++; break; }
        total++;
      }
  return { buckets, total };
}

// ── Render: Metrics ──
function renderMetrics(data) {
  const el = document.getElementById('metricsRow');
  const avg = data.overall_avg_min;
  const fastest = data.managers.reduce((f, m) => {
    for (const cp of m.counterparties) for (const ev of cp.events) if (f === null || ev.reaction_min < f) f = ev.reaction_min;
    return f;
  }, null);
  const slowest = data.managers.reduce((s, m) => {
    for (const cp of m.counterparties) for (const ev of cp.events) if (s === null || ev.reaction_min > s) s = ev.reaction_min;
    return s;
  }, null);

  el.innerHTML = `
    <div class="metric hero">
      <div class="m-label">Середній час реакції</div>
      <div class="m-value" style="color:${rColor(avg)}">${fmtR(avg)}</div>
      <div class="m-sub">хвилин</div>
    </div>
    <div class="metric">
      <div class="m-label">Подій за період</div>
      <div class="m-value">${data.total_events}</div>
      <div class="m-sub">${data.managers.length} менеджер${data.managers.length === 1 ? '' : 'ів'}</div>
    </div>
    <div class="metric">
      <div class="m-label">Найшвидша / найповільніша</div>
      <div class="m-value"><span style="color:var(--green)">${fmtR(fastest)}</span> <span style="color:var(--text3);font-size:16px;font-weight:400">/</span> <span style="color:var(--red)">${fmtR(slowest)}</span></div>
      <div class="m-sub">хвилин</div>
    </div>
  `;
}

// ── Render: Distribution ──
function renderDistrib(managers) {
  const wrap = document.getElementById('distribWrap');
  const { buckets, total } = calcDistrib(managers);
  if (!total) { wrap.innerHTML = ''; return; }
  const maxCount = Math.max(...buckets.map(b => b.count));

  wrap.innerHTML = `<div class="distrib">
    <div class="d-title">Розподіл часу реакції</div>
    ${buckets.map(b => `<div class="d-row">
      <div class="d-lbl">${b.label}</div>
      <div class="d-bar-bg"><div class="d-bar ${b.cls}" style="width:${maxCount ? (b.count / maxCount * 100) : 0}%"></div></div>
      <div class="d-count">${b.count}</div>
    </div>`).join('')}
  </div>`;
}

// ── Render: Manager ranking ──
function renderRanking(data) {
  const wrap = document.getElementById('rankingWrap');
  if (!data.managers.length) { wrap.innerHTML = ''; return; }

  const sorted = [...data.managers].sort((a, b) => a.avg_min - b.avg_min);
  const maxAvg = Math.max(...sorted.map(m => m.avg_min), SLA_THRESHOLD);

  let html = '<div class="r-title">Менеджери</div>';
  sorted.forEach((mgr, i) => {
    const barW = Math.min((mgr.avg_min / maxAvg) * 100, 100);
    const id = 'mgr_' + i;
    html += `<div class="mgr-card" data-id="${id}" onclick="toggleMgr('${id}')">
      <div class="mc-rank">${i + 1}</div>
      <div class="mc-info">
        <div class="mc-name">${mgr.name}</div>
        <div class="mc-stats">${mgr.count} подій · ${mgr.counterparties.length} контрагент${mgr.counterparties.length > 1 ? 'ів' : ''}</div>
      </div>
      <div class="mc-bar-bg"><div class="mc-bar ${rClass(mgr.avg_min)}" style="width:${barW}%"></div></div>
      <div class="mc-val" style="color:${rColor(mgr.avg_min)}">${fmtR(mgr.avg_min)}</div>
    </div>`;

    html += `<div class="mgr-detail" id="${id}">`;
    for (const cp of mgr.counterparties) {
      const cpId = id + '_cp_' + cp.name.replace(/\W/g, '_');
      html += `<div class="md-cp">
        <div class="md-cp-head" onclick="event.stopPropagation();toggleCp('${cpId}')">
          <span class="md-cp-name">${cp.name}</span>
          <span class="md-cp-avg" style="color:${rColor(cp.avg_min)}">${fmtR(cp.avg_min)} · ${cp.count} шт</span>
        </div>
        <div class="md-evts" id="${cpId}">`;
      for (const ev of cp.events) {
        html += `<div class="md-evt">
          <span class="md-evt-time">${fmtFull(ev.request_at)} → ${fmtTime(ev.response_at)}</span>
          <span style="color:${rColor(ev.reaction_min)};font-weight:600">${fmtR(ev.reaction_min)}</span>
        </div>`;
      }
      html += '</div></div>';
    }
    html += '</div>';
  });

  wrap.innerHTML = html;
}

function toggleMgr(id) {
  const card = document.querySelector(`.mgr-card[data-id="${id}"]`);
  const detail = document.getElementById(id);
  if (!card || !detail) return;
  const isOpen = detail.classList.toggle('open');
  card.classList.toggle('open', isOpen);
  if (isOpen) card.style.borderRadius = '10px 10px 0 0';
  else card.style.borderRadius = '';
}
function toggleCp(id) {
  document.getElementById(id)?.classList.toggle('open');
}

// ── Render: Pending ──
function renderPending(data) {
  const banner = document.getElementById('pendingBanner');
  if (!data.pending || !data.pending.length) { banner.style.display = 'none'; return; }
  banner.style.display = '';
  document.getElementById('pendingTitle').textContent = `${data.pending.length} без відповіді`;
  document.getElementById('pendingList').innerHTML = data.pending.map(p =>
    `<div class="pb-item"><b>${p.counterparty_name}</b> — ${Math.round(p.waiting_min)} хв</div>`
  ).join('');
}

// ── Load ──
async function load() {
  const loader = document.getElementById('loader');
  loader.textContent = 'Завантаження…'; loader.style.display = '';
  document.getElementById('metricsRow').innerHTML = '';
  document.getElementById('distribWrap').innerHTML = '';
  document.getElementById('rankingWrap').innerHTML = '';

  try {
    const qs = `from=${state.from}&to=${state.to}&org=${encodeURIComponent(state.org)}`;
    const [report, pending] = await Promise.all([
      fetch(API + '?action=sla_report&' + qs).then(r => r.json()),
      fetch(API + '?action=sla_pending&org=' + encodeURIComponent(state.org)).then(r => r.json())
    ]);

    loader.style.display = 'none';
    if (!report.managers || !report.managers.length) {
      loader.textContent = 'Немає даних за обраний період';
      loader.style.display = '';
      renderPending(pending);
      return;
    }
    renderMetrics(report);
    renderDistrib(report.managers);
    renderRanking(report);
    renderPending(pending);
  } catch (e) {
    loader.textContent = 'Помилка: ' + e.message;
    loader.style.display = '';
  }
}

// ── Admin panel ──
async function renderAdmin(user) {
  if (!user.roles || !user.roles.admin) return;
  const [chatsRes, mgrsRes] = await Promise.all([
    fetch(API + '?action=sla_chats_list').then(r => r.json()),
    fetch(API + '?action=sla_managers_list').then(r => r.json())
  ]);
  const panel = document.getElementById('adminPanel');
  panel.innerHTML = `
    <div class="admin-toggle" onclick="this.nextElementSibling.classList.toggle('open')">Адмін-панель</div>
    <div class="admin-section">
      <h3>Менеджери</h3>
      <table class="admin-tbl">
        <thead><tr><th>Telegram ID</th><th>ПІБ</th><th>У звіті</th></tr></thead>
        <tbody>${(mgrsRes.managers || []).map(m => `<tr>
          <td class="mono">${m.telegram_user_id}</td><td>${m.name}</td>
          <td>${m.exclude_from_report ? 'ні' : 'так'}</td>
        </tr>`).join('')}</tbody>
      </table>
      <div class="admin-row">
        <input id="newMgrId" placeholder="Telegram user ID" style="width:130px">
        <input id="newMgrName" placeholder="ПІБ" style="width:170px">
        <label><input type="checkbox" id="newMgrExclude"> Виключити</label>
        <button class="btn-sm" onclick="addManager()">Додати</button>
      </div>
      <h3 style="margin-top:16px">Чати</h3>
      <table class="admin-tbl">
        <thead><tr><th>Chat ID</th><th>Контрагент</th><th>Менеджер</th><th>Орг</th><th>Act</th></tr></thead>
        <tbody>${(chatsRes.chats || []).map(c => `<tr>
          <td class="mono">${c.chat_id}</td><td>${c.counterparty_name}</td>
          <td>${c.manager_default || '—'}</td><td>${c.org}</td>
          <td>${c.active ? '+' : '—'}</td>
        </tr>`).join('')}</tbody>
      </table>
      <div class="admin-row">
        <input id="newChatId" placeholder="Chat ID" style="width:110px">
        <input id="newChatTitle" placeholder="Назва" style="width:140px">
        <input id="newChatCp" placeholder="Контрагент" style="width:150px">
        <input id="newChatMgr" placeholder="Менеджер" style="width:120px">
        <input id="newChatOrg" type="hidden" value="Реакт">
        <button class="btn-sm" onclick="addChat()">Додати</button>
      </div>
    </div>
  `;
}
async function addManager() {
  const id = +document.getElementById('newMgrId').value;
  const name = document.getElementById('newMgrName').value.trim();
  if (!id || !name) return alert('Вкажіть Telegram ID і ПІБ');
  await fetch(API + '?action=sla_managers_upsert', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ telegram_user_id:id, name, exclude_from_report: document.getElementById('newMgrExclude').checked ? 1 : 0 })
  });
  location.reload();
}
async function addChat() {
  const chatId = +document.getElementById('newChatId').value;
  const cp = document.getElementById('newChatCp').value.trim();
  if (!chatId || !cp) return alert('Вкажіть Chat ID і Контрагента');
  await fetch(API + '?action=sla_chats_upsert', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      chat_id: chatId, chat_title: document.getElementById('newChatTitle').value.trim(),
      counterparty_name: cp, manager_default: document.getElementById('newChatMgr').value.trim(),
      org: document.getElementById('newChatOrg').value
    })
  });
  location.reload();
}

// ── Init ──
Auth.require('sales').then(user => {
  AppHeader.mount({ active: 'sales', user });

  loadHash();
  if (!state.from || !state.to) {
    const { from, to } = calcPreset('month');
    state.from = isoDate(from); state.to = isoDate(to);
  }
  state.preset = detectPreset(state.from, state.to) || 'month';
  document.getElementById('fromIn').value = state.from;
  document.getElementById('toIn').value = state.to;
  document.querySelectorAll('[data-preset]').forEach(c => c.classList.toggle('active', c.dataset.preset === state.preset));

  document.getElementById('fromIn').addEventListener('change', function() { state.from = this.value; state.preset = detectPreset(state.from, state.to); saveHash(); load(); });
  document.getElementById('toIn').addEventListener('change', function() { state.to = this.value; state.preset = detectPreset(state.from, state.to); saveHash(); load(); });

  load();
  renderAdmin(user);
});
</script>
</body>
</html>
