<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Продажі · Менеджери</title>

  // Apply saved theme BEFORE styles paint — avoids flash-of-wrong-theme
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e){}
</script>

<style>
:root{
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a;
  --surface:#141414; --surface2:#1c1c1c;
  --border:#262626; --border2:#333;
  --text:#f5f5f5; --text2:#a3a3a3; --text3:#737373;
  --accent:#ff8319; --accent-bg:rgba(255,131,25,.12);
  --red:#e74c3c; --red-bg:rgba(231,76,60,.12);
  --green:#22c55e; --blue:#3b82f6; --blue-bg:rgba(59,130,246,.12);
  --purple:#9775fa; --purple-bg:rgba(151,117,250,.14); --purple-text:#b399ff;
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
}
:root[data-theme="light"]{
  --bg:#f5f5f7; --bg2:#ffffff; --bg3:#ececef;
  --surface:#ffffff; --surface2:#ffffff;
  --border:#e5e5ea; --border2:#d1d1d6;
  --text:#1c1c1e; --text2:#48484a; --text3:#8e8e93;
  --accent:#e07017; --accent-bg:rgba(224,112,23,.12);
  --red:#d93025; --red-bg:rgba(217,48,37,.10);
  --green:#15803d; --blue:#1d4ed8; --blue-bg:rgba(29,78,216,.10);
  --purple:#6d28d9; --purple-bg:rgba(109,40,217,.12); --purple-text:#6d28d9;
  --shadow-md:0 4px 20px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{max-width:1400px;margin:0 auto;padding:20px}
.page-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.page-head h1{font-size:20px;font-weight:700;letter-spacing:-.4px}
.page-head .sub{font-size:12px;color:var(--text3)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px}
.toolbar input[type=text]{flex:1;min-width:200px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;transition:border .15s}
.toolbar input:focus{border-color:var(--accent)}
.toolbar input[type=date]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;color-scheme:dark;font-family:inherit}
:root[data-theme="light"] .toolbar input[type=date]{color-scheme:light}
.toolbar input[type=date]:focus{border-color:var(--accent)}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.toolbar .btn{padding:7px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.toolbar .btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.toolbar .group{display:inline-flex;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{border:none;background:transparent;padding:5px 10px;border-radius:6px}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}

/* Tree table */
.tree-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tree-tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tree-tbl thead th{padding:11px 12px;background:var(--bg2);color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}
.tree-tbl thead th:not(:first-child){text-align:right}
.tree-tbl thead th:nth-child(1){width:auto}
.tree-tbl thead th:nth-child(2),
.tree-tbl thead th:nth-child(3),
.tree-tbl thead th:nth-child(4){width:150px}
.tree-tbl tbody tr{transition:background .1s}
.tree-tbl tbody td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.tree-tbl tbody td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
.tree-tbl tbody td:first-child{overflow:hidden;text-overflow:ellipsis}

/* Currency section header */
.cur-section{margin-top:18px}
.cur-section:first-child{margin-top:0}
.cur-section-title{padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:700;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:10px 10px 0 0;border-bottom:none}
.cur-section-title .ico{font-size:16px}
.cur-section-title .cur-badge{font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 10px;border-radius:5px;background:var(--accent-bg);color:var(--accent)}
.cur-section-title .tot{margin-left:auto;color:var(--text2);font-weight:600;font-size:11px;font-variant-numeric:tabular-nums}
.cur-section .tree-wrap{border-radius:0 0 10px 10px;border-top:1px solid var(--border)}

/* Rows: manager / client / order / payment */
.tree-tbl tr.mgr-row td{background:linear-gradient(90deg,var(--accent-bg),transparent 70%);font-weight:700;color:var(--text);padding:10px 12px;letter-spacing:-.1px;cursor:pointer}
.tree-tbl tr.mgr-row:hover td{background:linear-gradient(90deg,rgba(255,131,25,.18),transparent 70%)}
.tree-tbl tr.mgr-row td:first-child{display:flex;align-items:center;gap:10px}
.tree-tbl tr.mgr-row .sub{color:var(--text3);font-weight:500;font-size:11px}

.tree-tbl tr.client-row{cursor:pointer;color:var(--text)}
.tree-tbl tr.client-row td{background:rgba(255,255,255,.02);font-weight:600}
:root[data-theme="light"] .tree-tbl tr.client-row td{background:rgba(0,0,0,.015)}
.tree-tbl tr.client-row:hover td{background:var(--bg3)}
.tree-tbl tr.client-row td:first-child{padding-left:38px}

.tree-tbl tr.order-row{cursor:pointer;color:var(--text2)}
.tree-tbl tr.order-row:hover td{background:var(--bg3)}
.tree-tbl tr.order-row td:first-child{padding-left:64px;font-size:11.5px}
.tree-tbl tr.order-row .meta{color:var(--text3);font-size:10.5px;margin-left:8px}

.tree-tbl tr.pay-row td{background:var(--bg3);padding:6px 12px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border)}
.tree-tbl tr.pay-row td:first-child{padding-left:90px}

.chev{display:inline-block;width:14px;color:var(--text3);transition:transform .15s;font-size:10px;transform:translateY(-1px)}
.chev.open{transform:rotate(90deg) translateY(-1px)}
.chev.hidden{visibility:hidden}

.val-pos{color:var(--green);font-weight:600}
.val-neg{color:var(--red);font-weight:600}
.val-zero{color:var(--text3)}

/* Loading / empty */
.loading{padding:60px 20px;text-align:center;color:var(--text2);font-size:13px}
.loading::after{content:'';display:block;width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:14px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:20px;text-align:center;color:var(--red);background:var(--red-bg);border-radius:10px;font-size:12px;margin-top:16px}
.empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:12px}

/* Period banner */
.period{font-size:11px;color:var(--text2);margin-bottom:12px;padding:8px 12px;background:var(--blue-bg);border-left:3px solid var(--blue);border-radius:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.period strong{color:var(--text)}
.period .refresh{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.period .refresh:hover{border-color:var(--accent);color:var(--accent)}
.period .refresh:disabled{opacity:.5;cursor:not-allowed}
.period .spin{display:inline-block;animation:spin .8s linear infinite}

@media (max-width:720px){
  .toolbar{padding:10px;gap:8px}
  .tree-tbl thead th,.tree-tbl tbody td{padding:8px 8px}
  .tree-tbl thead th:nth-child(2),
  .tree-tbl thead th:nth-child(3),
  .tree-tbl thead th:nth-child(4){width:100px}
}
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-head">
      <h1>📈 Продажі менеджерів</h1>
    </div>
    <div class="toolbar">
      <span class="lbl">Період</span>
      <input type="date" id="fromIn">
      <span style="color:var(--text3)">—</span>
      <input type="date" id="toIn">
      <span class="group">
        <span class="chip" onclick="setPreset('month')">Цей місяць</span>
        <span class="chip" onclick="setPreset('prevmonth')">Минулий</span>
        <span class="chip" onclick="setPreset('quarter')">Квартал</span>
        <span class="chip" onclick="setPreset('year')">Рік</span>
      </span>

      <span class="sep"></span>

      <span class="lbl">Вигляд</span>
      <span class="group">
        <span class="chip active" data-view="combined" onclick="setView('combined')">🔗 Разом</span>
        <span class="chip" data-view="bymanager" onclick="setView('bymanager')">👥 За менеджерами</span>
      </span>

      <span class="sep"></span>

      <span class="chip active" data-org="Реакт" onclick="setOrg('Реакт')">Реакт</span>
      <span class="chip" data-org="Генерація" onclick="setOrg('Генерація')">Генерація</span>

      <span class="sep"></span>

      <button class="btn" onclick="expandAll()">⊞ Розгорнути</button>
      <button class="btn" onclick="collapseAll()">⊟ Згорнути</button>

      <input type="text" id="searchIn" placeholder="🔎 Пошук клієнта, менеджера, № замовлення…">
    </div>

    <div id="periodBanner"></div>
    <div id="body"><div class="loading">Завантаження…</div></div>
  </div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev';

Auth.require('sales').then(user => {
  window.__user = user;
  AppHeader.mount({ active: 'sales', user });
  setPreset('month');  // default — triggers load
});

// ─── State ───
function _todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function _firstOfMonthISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
const state = {
  data: null,
  view: 'combined',        // 'combined' (clients flat) | 'bymanager' (mgr → clients)
  org: 'Реакт',
  from: _firstOfMonthISO(),
  to: _todayISO(),
  search: '',
  openKeys: new Set(),
  loading: false,
  fetchedAt: null,
};

function fmt(n, dec = 2) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric' });
}
function valCls(n) { return n > 0.001 ? 'val-pos' : (n < -0.001 ? 'val-neg' : 'val-zero'); }

function _syncInputs() {
  const f = document.getElementById('fromIn'); if (f) f.value = state.from;
  const t = document.getElementById('toIn'); if (t) t.value = state.to;
}

async function load() {
  state.loading = true;
  _syncInputs();
  document.getElementById('body').innerHTML = '<div class="loading">Завантаження…</div>';
  renderBanner();
  try {
    const q = `?action=sales_report&from=${state.from}&to=${state.to}&org=${encodeURIComponent(state.org)}`;
    const res = await fetch(API_URL + q);
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    state.data = d;
    state.fetchedAt = new Date();
    state.loading = false;
    renderBanner();
    render();
  } catch (e) {
    state.loading = false;
    document.getElementById('body').innerHTML = `<div class="error">${esc(e.message)}</div>`;
    renderBanner();
  }
}

function renderBanner() {
  const el = document.getElementById('periodBanner');
  const from = fmtDate(state.from + 'T00:00:00');
  const to = fmtDate(state.to + 'T00:00:00');
  const freshStr = state.fetchedAt
    ? `оновлено о <strong>${state.fetchedAt.toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'})}</strong>`
    : '…';
  const loadingCls = state.loading ? 'spin' : '';
  const loadingIco = state.loading ? '⟳' : '🔄';
  el.innerHTML = `<div class="period">
    <span>📅 Продажі з <strong>${from}</strong> до <strong>${to}</strong></span>
    <span style="color:var(--text3)">·</span>
    <span>${freshStr}</span>
    <button class="refresh" onclick="load()" ${state.loading?'disabled':''}>
      <span class="${loadingCls}">${loadingIco}</span> Оновити
    </button>
  </div>`;
}

// ─── Controls ───
function setView(v) {
  state.view = v;
  document.querySelectorAll('.chip[data-view]').forEach(c => c.classList.toggle('active', c.dataset.view === v));
  state.openKeys.clear();
  render();
}
function setOrg(v) {
  state.org = v;
  document.querySelectorAll('.chip[data-org]').forEach(c => c.classList.toggle('active', c.dataset.org === v));
  load();
}
function setPreset(p) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  let from, to = now;
  if (p === 'month') { from = new Date(y, m, 1); }
  else if (p === 'prevmonth') { from = new Date(y, m-1, 1); to = new Date(y, m, 0); }
  else if (p === 'quarter') { const q = Math.floor(m/3); from = new Date(y, q*3, 1); }
  else if (p === 'year') { from = new Date(y, 0, 1); }
  state.from = from.toISOString().slice(0,10);
  state.to = to.toISOString().slice(0,10);
  load();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('fromIn').addEventListener('change', e => {
    state.from = e.target.value || _firstOfMonthISO();
    load();
  });
  document.getElementById('toIn').addEventListener('change', e => {
    state.to = e.target.value || _todayISO();
    load();
  });
  document.getElementById('searchIn').addEventListener('input', e => {
    state.search = e.target.value.toLowerCase().trim();
    render();
  });
});

function expandAll() {
  state.openKeys.clear();
  collectKeys().forEach(k => state.openKeys.add(k));
  render();
}
function collapseAll() {
  state.openKeys.clear();
  render();
}

function collectKeys() {
  const keys = [];
  const d = (state.data && state.data.byOrg && state.data.byOrg[state.org]) || {};
  const currencies = d.currencies || {};
  Object.keys(currencies).forEach(cur => {
    const C = currencies[cur];
    if (state.view === 'bymanager') {
      C.managers.forEach(m => {
        const mk = `m:${cur}|${m.name}`;
        keys.push(mk);
        m.clients.forEach(c => {
          keys.push(`${mk}|c:${c.name}`);
        });
      });
    } else {
      // combined: no manager level; flat clients list
      getFlatClients(C).forEach(c => keys.push(`c:${cur}|${c.name}`));
    }
  });
  return keys;
}

// Flatten clients across all managers into one list per currency
function getFlatClients(C) {
  const bucket = {};  // name → {total, paid, remain, orders: []}
  C.managers.forEach(m => {
    m.clients.forEach(c => {
      if (!bucket[c.name]) bucket[c.name] = { name: c.name, total: 0, paid: 0, remain: 0, orders: [] };
      bucket[c.name].total += c.total;
      bucket[c.name].paid += c.paid;
      bucket[c.name].remain += c.remain;
      bucket[c.name].orders = bucket[c.name].orders.concat(c.orders);
    });
  });
  return Object.values(bucket).sort((a, b) => b.total - a.total);
}

// ─── Search ───
function clientMatches(c) {
  if (!state.search) return true;
  const q = state.search;
  if (c.name.toLowerCase().includes(q)) return true;
  if (c.orders.some(o => (o.number || '').toLowerCase().includes(q))) return true;
  return false;
}
function managerMatches(m) {
  if (!state.search) return true;
  const q = state.search;
  if (m.name.toLowerCase().includes(q)) return true;
  return m.clients.some(clientMatches);
}

// ─── Render ───
function render() {
  if (!state.data) return;
  const orgData = (state.data.byOrg || {})[state.org];
  if (!orgData || !orgData.currencies || !Object.keys(orgData.currencies).length) {
    document.getElementById('body').innerHTML = '<div class="empty">Нічого не знайдено за цей період</div>';
    return;
  }
  const currencies = orgData.currencies;
  // Sort currencies by total desc
  const curList = Object.keys(currencies).sort((a, b) => currencies[b].total - currencies[a].total);

  const html = curList.map(cur => {
    const C = currencies[cur];
    if (state.view === 'bymanager') return renderByManager(cur, C);
    return renderCombined(cur, C);
  }).filter(Boolean).join('');

  document.getElementById('body').innerHTML = html || '<div class="empty">Нічого не знайдено</div>';
  bindRows();
}

function renderByManager(cur, C) {
  let managers = C.managers.filter(managerMatches);
  if (!managers.length) return '';
  const rows = managers.map(m => {
    const mk = `m:${cur}|${m.name}`;
    const isOpen = state.openKeys.has(mk);
    let clients = m.clients.filter(clientMatches);
    const out = [renderManagerRow(mk, m, cur, isOpen, clients.length)];
    if (isOpen) {
      clients.forEach(c => {
        const ck = `${mk}|c:${c.name}`;
        const isCOpen = state.openKeys.has(ck);
        out.push(renderClientRow(ck, c, cur, isCOpen));
        if (isCOpen) {
          c.orders.forEach(o => out.push(renderOrderRow(o, cur)));
        }
      });
    }
    return out.join('');
  }).join('');
  return sectionWrap(cur, C, rows, managers.length + ' менедж.');
}

function renderCombined(cur, C) {
  const clients = getFlatClients(C).filter(clientMatches);
  if (!clients.length) return '';
  const rows = clients.map(c => {
    const ck = `c:${cur}|${c.name}`;
    const isOpen = state.openKeys.has(ck);
    const out = [renderClientRow(ck, c, cur, isOpen, true)];
    if (isOpen) {
      c.orders.forEach(o => out.push(renderOrderRow(o, cur)));
    }
    return out.join('');
  }).join('');
  return sectionWrap(cur, C, rows, clients.length + ' клієнт.');
}

function sectionWrap(cur, C, rows, countLabel) {
  return `
    <div class="cur-section">
      <div class="cur-section-title">
        <span class="ico">💱</span>
        <span>Валюта:</span>
        <span class="cur-badge">${esc(cur)}</span>
        <span class="tot">
          ${countLabel} · Сума: <strong>${fmt(C.total)}</strong> ·
          Оплачено: <strong>${fmt(C.paid)}</strong> ·
          Залишилось: <strong>${fmt(C.remain)}</strong>
        </span>
      </div>
      <div class="tree-wrap">
        <table class="tree-tbl">
          <thead><tr>
            <th>Менеджер / Клієнт / Замовлення</th>
            <th>Сума</th>
            <th>Оплачено</th>
            <th>Залишилось</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function renderManagerRow(key, m, cur, isOpen, visibleClientCount) {
  return `
    <tr class="mgr-row" data-key="${esc(key)}">
      <td><span class="chev ${isOpen?'open':''}">▶</span><span>${esc(m.name)}</span><span class="sub">· ${visibleClientCount} клієнт.</span></td>
      <td>${fmt(m.total)}</td>
      <td>${fmt(m.paid)}</td>
      <td class="${valCls(m.remain)}">${fmt(m.remain)}</td>
    </tr>`;
}

function renderClientRow(key, c, cur, isOpen, combined) {
  const ordersCount = c.orders.length;
  return `
    <tr class="client-row" data-key="${esc(key)}">
      <td><span class="chev ${isOpen?'open':''} ${ordersCount?'':'hidden'}">▶</span>${esc(c.name)} <span style="color:var(--text3);font-weight:400;font-size:11px">· ${ordersCount} зам.</span></td>
      <td>${fmt(c.total)}</td>
      <td>${fmt(c.paid)}</td>
      <td class="${valCls(c.remain)}">${fmt(c.remain)}</td>
    </tr>`;
}

function renderOrderRow(o, cur) {
  return `
    <tr class="order-row">
      <td>№${esc(o.number || '?')} <span class="meta">${fmtDate(o.date)}</span></td>
      <td>${fmt(o.amount)}</td>
      <td>${fmt(o.paid)}</td>
      <td class="${valCls(o.remain)}">${fmt(o.remain)}</td>
    </tr>`;
}

function bindRows() {
  document.querySelectorAll('tr[data-key]').forEach(tr => {
    tr.addEventListener('click', () => {
      const k = tr.dataset.key;
      if (state.openKeys.has(k)) state.openKeys.delete(k);
      else state.openKeys.add(k);
      render();
    });
  });
}
</script>
</body>
</html>
