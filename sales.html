<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Продажі менеджерів · V2 (D1)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
<script>
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e){}
</script>
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<script src="auth.js?v=mctrend20260430"></script>
<script src="header.js?v=brig20260622"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="monthly-chart.js?v=mctrend20260430"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/uk.js"></script>
<script src="date-range.js?v=20260522"></script>
<link rel="stylesheet" href="theme.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{margin:0 auto;padding:14px 16px}
.page-tabs{display:inline-flex;gap:4px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
.ptab{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap}
.ptab:hover{background:var(--bg3);color:var(--text)}
.ptab.active{background:var(--accent-bg);color:var(--accent)}

.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px}
.toolbar input[type=text]{flex:1;min-width:200px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;transition:border .15s}
.toolbar input:focus{border-color:var(--accent)}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
/* buttons unified via header.js (.btn + .btn--secondary/--sm) */
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.toolbar .group{display:inline-flex;flex-wrap:wrap;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{border:none;background:transparent;padding:5px 10px;border-radius:6px}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}

/* ─── Summary (P&L стиль — без плашок, без прогрес-барів, акцент тільки на головній цифрі) ─── */
.summary-grand{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:12px;padding:0}
.summary-grand .sg-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:700;display:block;margin-bottom:3px}
.summary-grand .sg-paid,
.summary-grand .sg-pot,
.summary-grand .sg-pct{padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;gap:2px}
.summary-grand .sg-paid .v{font-size:22px;font-weight:800;color:var(--green);letter-spacing:-.3px;line-height:1.2;font-variant-numeric:tabular-nums}
.summary-grand .sg-pot .v{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.3px;line-height:1.2;font-variant-numeric:tabular-nums}
.summary-grand .sg-pct .val{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.3px;line-height:1.2;font-variant-numeric:tabular-nums}
.summary-grand .sg-sep,
.summary-grand .sg-bonus,
.summary-grand .sg-bar{display:none}

/* Топ менеджери — leaderboard стиль з дашборду (точно такий же) */
.mgr-block{margin-bottom:14px}
.mgr-block-head{display:flex;align-items:center;gap:12px;padding:4px 2px 10px}
.mgr-block-title{font-size:15px;font-weight:700;letter-spacing:-.2px;color:var(--text)}
.mgr-block-meta{margin-left:auto;font-size:11px;color:var(--text3);font-weight:600}
.leader{border-top:1px solid var(--border);padding-top:8px}
.leader-row{display:grid;grid-template-columns:24px 1fr auto auto auto;gap:10px;align-items:center;padding:8px 4px;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer;user-select:none}
.leader-row:hover{background:var(--bg3)}
.leader-row:last-child{border-bottom:none}
.leader-row.active{background:var(--accent-bg)}
.leader-row.active .leader-name{color:var(--accent)}
.leader-rank{font-size:11px;color:var(--text3);font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.leader-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leader-sub{font-size:11px;color:var(--text3);font-weight:500;margin-left:6px}
.leader-pot{font-size:12px;color:var(--text3);font-weight:500;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
.leader-pot b{color:var(--text2);font-weight:600}
.leader-val{font-size:13px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;text-align:right;min-width:72px}
.leader-bar{grid-column:2 / -1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}
.leader-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),rgba(34,197,94,.3));border-radius:2px;transition:width .6s ease}
.mgr-section-head{font-weight:700;font-size:13px;margin:14px 0 8px;padding:0 2px;color:var(--text);letter-spacing:-.2px}

/* Tree table */
.tree-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tree-tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tree-tbl thead th{padding:11px 12px;background:var(--bg2);color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}
.tree-tbl thead th:not(:first-child){text-align:right}
.tree-tbl thead th:nth-child(1){width:55%}
.tree-tbl thead th:nth-child(n+2){width:15%}
.tree-tbl tbody tr{transition:background .1s}
.tree-tbl tbody td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.tree-tbl tbody td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
.tree-tbl tbody td:first-child{overflow:hidden;text-overflow:ellipsis}

.cur-section{margin-top:18px}
.cur-section:first-child{margin-top:0}

.tree-tbl tr.cur-row{cursor:pointer;color:var(--text)}
.tree-tbl tr.cur-row td{background:var(--blue-bg);font-weight:600}
.tree-tbl tr.cur-row:hover td{filter:brightness(1.1)}
.tree-tbl tr.cur-row td:first-child{padding-left:38px}
.cur-badge-inline{font-size:11px;font-weight:700;letter-spacing:.3px;padding:2px 8px;border-radius:5px;background:var(--bg2);color:var(--blue);border:1px solid var(--blue);margin-right:6px}

.tree-tbl tr.client-row{cursor:pointer;color:var(--text)}
.tree-tbl tr.client-row td{background:rgba(255,255,255,.02);font-weight:600}
:root[data-theme="light"] .tree-tbl tr.client-row td{background:rgba(0,0,0,.015)}
.tree-tbl tr.client-row:hover td{background:var(--bg3)}
.tree-tbl tr.client-row td:first-child{padding-left:66px}

.tree-tbl tr.order-row{cursor:pointer;color:var(--text2)}
.tree-tbl tr.order-row:hover td{background:var(--bg3)}
.tree-tbl tr.order-row td:first-child{padding-left:92px;font-size:11.5px}
.tree-tbl tr.order-row .meta{color:var(--text3);font-size:10.5px;margin-left:8px}

.chev{display:inline-block;width:14px;color:var(--text3);transition:transform .15s;font-size:10px;transform:translateY(-1px)}
.chev.open{transform:rotate(90deg) translateY(-1px)}
.chev.hidden{visibility:hidden}

.val-pos{color:var(--green);font-weight:600}
.val-neg{color:var(--red);font-weight:600}
.val-zero{color:var(--text3)}

/* ─── Exclude tag input ─── */
.s-tags{position:relative;display:inline-flex;flex-wrap:wrap;gap:4px;align-items:center;padding:4px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;min-width:200px;max-width:500px;min-height:30px;flex:1}
.s-tags:focus-within{border-color:var(--accent)}
.s-tags input[type=text]{flex:1;min-width:100px;padding:3px 4px;border:none;background:transparent;font-size:12px;color:var(--text);outline:none}
.s-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 6px 2px 8px;background:var(--accent-bg);color:var(--accent);font-size:11px;font-weight:600;border-radius:6px;white-space:nowrap;max-width:200px}
.s-tag .name{overflow:hidden;text-overflow:ellipsis}
.s-tag .x{cursor:pointer;font-size:14px;line-height:1;opacity:.7;padding:0 2px}
.s-tag .x:hover{opacity:1;color:var(--red)}
.s-suggest{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-md);max-height:280px;overflow-y:auto;z-index:50}
.s-suggest .opt{padding:7px 12px;font-size:12px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border)}
.s-suggest .opt:last-child{border-bottom:none}
.s-suggest .opt:hover,.s-suggest .opt.hl{background:var(--bg3);color:var(--accent)}
.s-suggest .empty{padding:10px 12px;font-size:12px;color:var(--text3)}

.loading{padding:60px 20px;text-align:center;color:var(--text2);font-size:13px}
.loading::after{content:'';display:block;width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:14px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:20px;text-align:center;color:var(--red);background:var(--red-bg);border-radius:10px;font-size:12px;margin-top:16px}
.empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:12px}

@media (max-width:720px){
  .wrap{padding:12px}
  .page-tabs{display:flex;flex-wrap:wrap;gap:3px;padding:3px;max-width:100%}
  .ptab{padding:6px 10px;font-size:11.5px;flex:0 0 auto}
  .tree-wrap{-webkit-overflow-scrolling:touch}
  .toolbar{padding:8px;gap:6px;border-radius:10px}
  .toolbar input[type=text]{flex:1 1 100%;min-width:0;font-size:12px;padding:6px 8px}
  .toolbar .date-range-input{font-size:12px;padding:6px 8px}
  .toolbar .lbl{display:none}
  .toolbar .chip{padding:6px 10px;font-size:11px}
  .toolbar .group{padding:3px;gap:2px}
  .toolbar .group .chip{padding:5px 8px;font-size:11px}
  .toolbar .sep{display:none}
  .s-tags{max-width:100%;min-width:0;flex:1 1 100%}
  /* Summary grand 1 col */
  .summary-grand{grid-template-columns:1fr 1fr;gap:8px}
  .summary-grand .sg-paid,.summary-grand .sg-pot,.summary-grand .sg-pct{padding:11px 12px;border-radius:10px}
  .summary-grand .sg-paid .v,.summary-grand .sg-pot .v,.summary-grand .sg-pct .val{font-size:18px}
  /* Топ менеджери */
  .mgr-block-head{padding:4px 2px 8px;gap:8px}
  .mgr-block-title{font-size:14px}
  /* Mobile leader-row: ранк / імʼя / СУМА (val) + бар. Бонус і потенціал ховаються — найголовніше число лишається */
  .leader-row{grid-template-columns:20px 1fr auto;padding:7px 4px;gap:8px}
  .leader-sub,.leader-pot{display:none}
  .leader-bar{grid-column:2 / -1}
  .leader-name{font-size:12.5px}
  .leader-val{font-size:13px;min-width:auto}
  /* Tree-tbl */
  .tree-wrap{border-radius:10px}
  .tree-tbl{font-size:11px}
  .tree-tbl thead th,.tree-tbl tbody td{padding:7px 6px;font-size:11px}
  .tree-tbl thead th:nth-child(n+2){width:80px}
  .mgr-section-head{font-size:12px;margin:10px 0 6px}
}
@media (max-width:480px){
  .summary-grand{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-tabs">
      <a href="/prices.html" class="ptab" data-perm="sales_prices">🏠 Порівняння цін</a>
      <a href="/sales.html" class="ptab active" data-perm="sales">📈 Продажі менеджерів</a>
      <a href="/top_products.html" class="ptab" data-perm="sales_top_products">📦 Останні продажі</a>
      <a href="/osp.html" class="ptab" data-perm="sales_osp">📋 Оплата та відвантаження</a>
      <a href="/ar_aging.html" class="ptab" data-perm="sales_ar_aging">⏱ Заборгованість покупців</a>
      <a href="/active_clients.html" class="ptab" data-org-required="Реакт" data-perm="sales_active_clients">👥 Клієнтська база</a>
      <a href="/inventory.html" class="ptab" data-perm="sales_inventory">📊 Обіговість запасів</a>
      <a href="/sla.html" class="ptab" data-perm="sales_sla">⚡ SLA</a>
      <a href="/broadcast.html" class="ptab" data-org-required="Реакт" data-perm="sales_broadcast">📢 Розсилка</a>
    </div>
    <div class="toolbar">
      <span class="lbl">Період</span>
      <input type="text" id="dateRange" class="date-range-input" readonly>
      <span class="group">
        <span class="chip" data-preset="month"     onclick="setPreset('month')">Цей місяць</span>
        <span class="chip" data-preset="prevmonth" onclick="setPreset('prevmonth')">Минулий</span>
        <span class="chip" data-preset="quarter"   onclick="setPreset('quarter')">Квартал</span>
        <span class="chip" data-preset="year"      onclick="setPreset('year')">Рік</span>
      </span>

      <span class="sep"></span>

      <span class="chip" data-org="" onclick="setOrg('')">Всі</span>
      <span class="chip active" data-org="Реакт" onclick="setOrg('Реакт')">Реакт</span>
      <span class="chip" data-org="Генерація" onclick="setOrg('Генерація')">Генерація</span>

      <span class="sep"></span>

      <button class="btn btn--secondary btn--sm" onclick="expandAll()">⊞ Розгорнути</button>
      <button class="btn btn--secondary btn--sm" onclick="collapseAll()">⊟ Згорнути</button>

      <input type="text" id="searchIn" placeholder="🔎 Пошук клієнта, менеджера, № замовлення…">

      <span class="sep"></span>
      <span class="lbl">виключити</span>
      <span class="s-tags" id="sExcludeTags">
        <input type="text" id="sExcludeIn" placeholder="Почни вводити…" autocomplete="off">
        <div id="sExcludeSuggest" class="s-suggest" style="display:none"></div>
      </span>
    </div>

    <div class="mc-block">
      <div class="mc-head">
        <span class="mc-title">Виторг (оплачено) — 12 місяців</span>
        <span class="mc-sub" id="mcSub">завантаження…</span>
      </div>
      <div class="mc-canvas-wrap"><canvas id="mcCanvas"></canvas></div>
    </div>

    <div id="curSummary"></div>
    <div id="body"><div class="loading">Завантаження…</div></div>
  </div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev';

Auth.require('sales').then(user => {
  window.__user = user;
  AppHeader.mount({ active: 'sales', user });
  Auth.filterSubNav(user);
  if (!user.roles.admin && !user.roles.sales) {
    var ft = [...document.querySelectorAll('.page-tabs .ptab[href]')].find(function(t) { return t.style.display !== 'none'; });
    if (ft) { location.href = ft.href; return; }
  }
  _initMonthlyChart();
  // Org-level access: hide chips for orgs the user doesn't have access to
  // If no orgs assigned at all → show everything (no restriction)
  const userOrgs = user.orgs || {};
  const hasAnyOrg = Object.values(userOrgs).some(v => v);
  if (hasAnyOrg) {
    const allowedOrgs = ['Реакт', 'Генерація'].filter(o => userOrgs[o]);
    const orgChips = document.querySelectorAll('.chip[data-org]');
    orgChips.forEach(chip => {
      const org = chip.dataset.org;
      if (org === '') {
        if (allowedOrgs.length < 2) chip.style.display = 'none';
      } else {
        if (!userOrgs[org]) chip.style.display = 'none';
      }
    });
    const defaultOrg = allowedOrgs.length === 1 ? allowedOrgs[0] : '';
    state.org = defaultOrg;
    orgChips.forEach(c => c.classList.toggle('active', c.dataset.org === defaultOrg));
  }
  // Якщо в URL hash є from/to/org (наприклад прийшли з executive dashboard) —
  // застосовуємо їх замість дефолтного presetа.
  const hs = _readHashState();
  if (hs.from && hs.to) {
    state.from = hs.from; state.to = hs.to;
    if (hs.org && (!hasAnyOrg || userOrgs[hs.org])) {
      state.org = hs.org;
      document.querySelectorAll('.chip[data-org]').forEach(c => c.classList.toggle('active', c.dataset.org === state.org));
    }
    detectPreset();
    load();
  } else {
    setPreset('month');
  }
});

function _readHashState() {
  try { return Object.fromEntries(new URLSearchParams(location.hash.slice(1))); }
  catch (_) { return {}; }
}

// ─── State ───
function _todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function _firstOfMonthISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
const state = {
  data: null,
  org: 'Реакт',
  from: _firstOfMonthISO(),
  to: _todayISO(),
  search: '',
  openKeys: new Set(),
  loading: false,
  fx: null,
  excludeList: [],
};

(function _restoreExclude(){
  try {
    const ex = sessionStorage.getItem('sales_exclude');
    if (ex !== null) {
      const a = JSON.parse(ex);
      if (Array.isArray(a)) state.excludeList = a;
    }
  } catch (_) {}
})();

function allClients() {
  if (!state.data || !state.data.byOrg) return [];
  const set = new Set();
  Object.values(state.data.byOrg).forEach(od => {
    (od.managers || []).forEach(m => {
      (m.currencies || []).forEach(C => {
        (C.clients || []).forEach(c => { if (c.name) set.add(c.name); });
      });
    });
  });
  return [...set].sort((a, b) => a.localeCompare(b, 'uk'));
}

const salesTagInput = {
  save() { try { sessionStorage.setItem('sales_exclude', JSON.stringify(state.excludeList)); } catch(_){} },
  renderTags() {
    const host = document.getElementById('sExcludeTags');
    if (!host) return;
    host.querySelectorAll('.s-tag').forEach(t => t.remove());
    const inp = document.getElementById('sExcludeIn');
    state.excludeList.forEach(name => {
      const tag = document.createElement('span');
      tag.className = 's-tag';
      tag.innerHTML = `<span class="name" title="${esc(name)}">${esc(name)}</span><span class="x" data-name="${esc(name)}">&times;</span>`;
      host.insertBefore(tag, inp);
    });
  },
  add(name) {
    if (!name || state.excludeList.some(n => n.toLowerCase() === name.toLowerCase())) return;
    state.excludeList.push(name);
    this.save(); this.renderTags();
    document.getElementById('sExcludeIn').value = '';
    this.hide();
    render();
  },
  remove(name) {
    state.excludeList = state.excludeList.filter(n => n.toLowerCase() !== name.toLowerCase());
    this.save(); this.renderTags(); render();
  },
  hide() {
    const s = document.getElementById('sExcludeSuggest');
    if (s) { s.style.display = 'none'; s.innerHTML = ''; }
  },
  onInput() {
    const inp = document.getElementById('sExcludeIn');
    const q = (inp.value || '').toLowerCase().trim();
    const sug = document.getElementById('sExcludeSuggest');
    const exSet = new Set(state.excludeList.map(n => n.toLowerCase()));
    const opts = allClients().filter(n => !exSet.has(n.toLowerCase()) && (!q || n.toLowerCase().includes(q)));
    if (!opts.length) {
      sug.innerHTML = '<div class="empty">Нічого не знайдено</div>';
      sug.style.display = 'block';
      return;
    }
    sug.innerHTML = opts.slice(0, 30).map(n => `<div class="opt" data-name="${esc(n)}">${esc(n)}</div>`).join('');
    sug.style.display = 'block';
    sug.scrollTop = 0;
  },
  onKey(ev) {
    const sug = document.getElementById('sExcludeSuggest');
    const opts = sug.querySelectorAll('.opt');
    const hl = sug.querySelector('.opt.hl');
    if (ev.key === 'ArrowDown') {
      ev.preventDefault();
      if (!hl) { if (opts[0]) opts[0].classList.add('hl'); }
      else { const i = [...opts].indexOf(hl); hl.classList.remove('hl'); if (opts[i+1]) opts[i+1].classList.add('hl'); else if (opts[0]) opts[0].classList.add('hl'); }
    } else if (ev.key === 'ArrowUp') {
      ev.preventDefault();
      if (hl) { const i = [...opts].indexOf(hl); hl.classList.remove('hl'); if (i > 0) opts[i-1].classList.add('hl'); else opts[opts.length-1].classList.add('hl'); }
    } else if (ev.key === 'Enter') {
      ev.preventDefault();
      if (hl) this.add(hl.dataset.name);
    } else if (ev.key === 'Escape') {
      this.hide();
    } else if (ev.key === 'Backspace' && !document.getElementById('sExcludeIn').value && state.excludeList.length) {
      this.remove(state.excludeList[state.excludeList.length - 1]);
    }
  },
};

function toUsd(amount, cur) {
  if (!isFinite(amount)) return null;
  if (cur === 'USD') return amount;
  const fx = state.fx && state.fx.rates;
  if (!fx) return null;
  if (cur === 'UAH') return fx.USD_UAH > 0 ? amount / fx.USD_UAH : null;
  if (cur === 'EUR') return (fx.EUR_UAH > 0 && fx.USD_UAH > 0) ? amount * fx.EUR_UAH / fx.USD_UAH : null;
  return null;
}

function fmt(n, dec = 2) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

let _picker = null;
function _syncInputs() {
  if (_picker) _picker.setDates(state.from, state.to);
}

async function load() {
  state.loading = true;
  _syncInputs();
  document.getElementById('curSummary').innerHTML = '';
  document.getElementById('body').innerHTML = '<div class="loading">Завантаження…</div>';
  try {
    const q = `?action=sales_report_d1&from=${state.from}&to=${state.to}&org=${encodeURIComponent(state.org)}`;
    const [salesRes, fxRes] = await Promise.all([
      fetch(API_URL + q).then(r => r.json()),
      fetch(API_URL + '?action=fx_rates').then(r => r.json()).catch(() => null),
    ]);
    if (salesRes.error) throw new Error(salesRes.error);
    state.data = salesRes;
    state.fx = (fxRes && fxRes.rates && fxRes.rates.USD_UAH) ? fxRes : null;
    state.loading = false;
    render();
  } catch (e) {
    state.loading = false;
    document.getElementById('body').innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
  if (window._mc) window._mc.reload({ org: state.org });
}

// Месячний графік виторгу: paidUsd за період (з урахуванням excludeList)
function _salesPaidUsdFromPayload(payload, orgFilter) {
  if (!payload) return 0;
  const exSet = new Set((state.excludeList || []).map(s => (s || '').toLowerCase()));
  function sumManager(m) {
    if (!exSet.size) return Number(m.paidUsd || 0);
    let s = 0;
    (m.currencies || []).forEach(C => {
      (C.clients || []).forEach(c => {
        if (!exSet.has((c.name || '').toLowerCase())) s += Number(c.paidUsd || 0);
      });
    });
    return s;
  }
  if (payload.byOrg && typeof payload.byOrg === 'object') {
    let total = 0;
    Object.entries(payload.byOrg).forEach(([orgName, data]) => {
      if (orgFilter && orgName !== orgFilter) return;
      (data.managers || []).forEach(m => { total += sumManager(m); });
    });
    return total;
  }
  if (Array.isArray(payload.managers)) {
    let total = 0;
    payload.managers.forEach(mgr => {
      if (orgFilter && mgr.org && mgr.org !== orgFilter) return;
      total += sumManager(mgr);
    });
    return total;
  }
  return 0;
}
async function _fetchPaidForBucket(from, to, filters) {
  const orgFilter = (filters && filters.org) || '';
  const q = `?action=sales_report_d1&from=${from}&to=${to}&org=${encodeURIComponent(orgFilter)}`;
  const r = await fetch(API_URL + q).then(x => x.json()).catch(() => null);
  if (!r || r.error) return 0;
  return _salesPaidUsdFromPayload(r, orgFilter);
}
function _initMonthlyChart() {
  if (window._mc || typeof MonthlyChart === 'undefined') return;
  window._mc = MonthlyChart.mount('mcCanvas', {
    label: 'Виторг (опл.)',
    unit: '$',
    color: 'var(--green)',
    type: 'bar',
    subId: 'mcSub',
    fetchValue: _fetchPaidForBucket,
  });
}

// ─── Controls ───
function setOrg(v) {
  state.org = v;
  document.querySelectorAll('.chip[data-org]').forEach(c => c.classList.toggle('active', c.dataset.org === v));
  load();
}
function _localISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function presetRange(p) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  let from, to = now;
  if (p === 'month') { from = new Date(y, m, 1); }
  else if (p === 'prevmonth') { from = new Date(y, m-1, 1); to = new Date(y, m, 0); }
  else if (p === 'quarter') { const q = Math.floor(m/3); from = new Date(y, q*3, 1); }
  else if (p === 'year') { from = new Date(y, 0, 1); }
  else return null;
  return { from: _localISO(from), to: _localISO(to) };
}
function setPreset(p) {
  const r = presetRange(p);
  if (!r) return;
  state.from = r.from;
  state.to = r.to;
  document.querySelectorAll('.chip[data-preset]').forEach(c => c.classList.toggle('active', c.dataset.preset === p));
  load();
}
// Підсвічує preset-chip, якщо state.from/to збігається з одним із пресетів.
function detectPreset() {
  const chips = document.querySelectorAll('.chip[data-preset]');
  let match = null;
  for (const c of chips) {
    const r = presetRange(c.dataset.preset);
    if (r && r.from === state.from && r.to === state.to) { match = c.dataset.preset; break; }
  }
  chips.forEach(c => c.classList.toggle('active', c.dataset.preset === match));
}

document.addEventListener('DOMContentLoaded', () => {
  _picker = initDateRange({
    inputId: 'dateRange',
    from: state.from,
    to: state.to,
    onChange: function(from, to) {
      state.from = from;
      state.to = to;
      detectPreset();
      load();
    }
  });
  document.getElementById('searchIn').addEventListener('input', e => {
    state.search = e.target.value.toLowerCase().trim();
    render();
  });

  const exIn = document.getElementById('sExcludeIn');
  exIn.addEventListener('input', () => salesTagInput.onInput());
  exIn.addEventListener('focus',  () => salesTagInput.onInput());
  exIn.addEventListener('blur',   () => setTimeout(() => salesTagInput.hide(), 200));
  exIn.addEventListener('keydown', e => salesTagInput.onKey(e));
  salesTagInput.renderTags();

  document.addEventListener('click', function(ev) {
    const x = ev.target.closest('.s-tag .x[data-name]');
    if (x) { salesTagInput.remove(x.dataset.name); return; }
    const opt = ev.target.closest('.s-suggest .opt[data-name]');
    if (opt) { salesTagInput.add(opt.dataset.name); return; }
  });
});

function expandAll() {
  state.openKeys.clear();
  collectKeys().forEach(k => state.openKeys.add(k));
  render();
}
function collapseAll() {
  state.openKeys.clear();
  render();
}

function collectKeys() {
  const keys = [];
  const managers = getManagers();
  managers.forEach(m => {
    const mk = `m:${m.name}`;
    keys.push(mk);
    m.currencies.forEach(C => {
      const ck = `${mk}|cur:${C.currency}`;
      keys.push(ck);
      C.clients.forEach(c => keys.push(`${ck}|c:${c.name}`));
    });
  });
  return keys;
}

function managerTotalsUsd(m) {
  // V2: беремо paidUsd з бекенду (розраховано через fx_rates source=1c_doc —
  //     курси самих 1С-документів). Для remain — конвертуємо через поточний
  //     курс (бо remain — це майбутнє, 1С курс = поточному НБУ/Privatbank).
  const paid = Number(m.paidUsd) || 0;
  let remain = 0;
  let ok = true;
  if (state.fx) {
    for (const C of m.currencies) {
      const r = toUsd(C.remain, C.currency);
      if (r == null) { ok = false; break; }
      remain += r;
    }
  } else {
    ok = false;
  }
  return { paid, remain, ok };
}

function clientMatches(c) {
  if (!state.search) return true;
  const q = state.search;
  if (c.name.toLowerCase().includes(q)) return true;
  if (c.orders.some(o => (o.number || '').toLowerCase().includes(q))) return true;
  return false;
}

// Merge managers across orgs when state.org === '' (Всі). For a single org —
// just return its managers. Merging sums paid/total/remain per manager and
// per currency/client so the user sees aggregated numbers.
function getManagers() {
  if (!state.data) return [];
  const byOrg = state.data.byOrg || {};
  if (state.org) return (byOrg[state.org] && byOrg[state.org].managers) || [];

  const merged = {};
  Object.values(byOrg).forEach(od => {
    (od.managers || []).forEach(m => {
      const k = m.name;
      if (!merged[k]) {
        merged[k] = { name: m.name, total: 0, paid: 0, paidUsd: 0, remain: 0, currencies: {} };
      }
      const M = merged[k];
      M.total += m.total; M.paid += m.paid; M.paidUsd += (m.paidUsd || 0); M.remain += m.remain;
      (m.currencies || []).forEach(C => {
        if (!M.currencies[C.currency]) {
          M.currencies[C.currency] = { currency: C.currency, total: 0, paid: 0, paidUsd: 0, remain: 0, clients: {} };
        }
        const CC = M.currencies[C.currency];
        CC.total += C.total; CC.paid += C.paid; CC.paidUsd += (C.paidUsd || 0); CC.remain += C.remain;
        (C.clients || []).forEach(cl => {
          if (!CC.clients[cl.name]) {
            CC.clients[cl.name] = { name: cl.name, total: 0, paid: 0, paidUsd: 0, remain: 0, orders: [] };
          }
          const CL = CC.clients[cl.name];
          CL.total += cl.total; CL.paid += cl.paid; CL.paidUsd += (cl.paidUsd || 0); CL.remain += cl.remain;
          CL.orders.push(...(cl.orders || []));
        });
      });
    });
  });
  const CUR_ORDER = { USD: 1, EUR: 2, UAH: 3 };
  const curSort = (a, b) => (CUR_ORDER[a.currency] || 99) - (CUR_ORDER[b.currency] || 99)
                          || (a.currency || '').localeCompare(b.currency || '');
  return Object.values(merged).map(m => ({
    ...m,
    currencies: Object.values(m.currencies).map(C => ({
      ...C,
      clients: Object.values(C.clients).sort((a, b) => b.paid - a.paid),
    })).sort(curSort),
  })).sort((a, b) => b.paidUsd - a.paidUsd);
}

function applyExclude(managers) {
  const exSet = new Set((state.excludeList || []).map(s => (s || '').toLowerCase()));
  if (!exSet.size) return managers;
  return managers.map(m => {
    const currencies = m.currencies.map(C => {
      const clients = C.clients.filter(c => !exSet.has((c.name || '').toLowerCase()));
      return { ...C, clients, total: clients.reduce((s,c) => s+c.total,0), paid: clients.reduce((s,c) => s+c.paid,0), paidUsd: clients.reduce((s,c) => s+(c.paidUsd||0),0), remain: clients.reduce((s,c) => s+c.remain,0) };
    }).filter(C => C.clients.length > 0);
    return { ...m, currencies, total: currencies.reduce((s,C) => s+C.total,0), paid: currencies.reduce((s,C) => s+C.paid,0), paidUsd: currencies.reduce((s,C) => s+(C.paidUsd||0),0), remain: currencies.reduce((s,C) => s+C.remain,0) };
  }).filter(m => m.currencies.length > 0);
}

// ─── Render ───
function render() {
  if (!state.data) return;
  const managers = applyExclude(getManagers());

  renderSummaryGrid(managers);

  if (!managers.length) {
    document.getElementById('body').innerHTML = '<div class="empty">Нічого не знайдено за цей період</div>';
    return;
  }

  const html = renderByManager(managers);
  document.getElementById('body').innerHTML = html;
  bindRows();
}

const BONUS_RATE = 0.0008;

function renderSummaryGrid(managers) {
  const host = document.getElementById('curSummary');
  if (!managers.length) { host.innerHTML = ''; return; }

  const perMgr = managers.map(m => ({ m, ...managerTotalsUsd(m) }));
  const allOk = perMgr.every(d => d.ok);
  const gPaid = allOk ? perMgr.reduce((s, d) => s + d.paid, 0) : 0;
  const gRem = allOk ? perMgr.reduce((s, d) => s + d.remain, 0) : 0;
  const gTotal = gPaid + gRem;
  const gPct = gTotal > 0 ? Math.round(gPaid / gTotal * 100) : 0;
  const money = (v, ok) => ok ? '$' + fmt(v) : '—';

  // Grand total — два блоки: Оплачено / Потенціал (без % готово)
  const grandBanner = `
    <div class="summary-grand">
      <div class="sg-paid">
        <span class="sg-lbl">Оплачено за період</span>
        <span class="v">${money(gPaid, allOk)}</span>
      </div>
      <div class="sg-sep"></div>
      <div class="sg-pot">
        <span class="sg-lbl">Потенціал (всього)</span>
        <span class="v">${money(gTotal, allOk)}</span>
      </div>
    </div>`;

  // Топ менеджери — leader-row стиль з дашборду: rank / ім'я / бонус / потенціал / сума / прогрес-бар (відносно лідера)
  const sortedMgrs = [...perMgr].sort((a, b) => b.paid - a.paid);
  const maxPaid = Math.max(...sortedMgrs.map(d => d.paid), 1);
  const mgrRows = sortedMgrs.map(({ m, paid, remain, ok }, i) => {
    const isOpen = state.openKeys.has(`m:${m.name}`);
    const total = paid + remain; // потенціал = сума ВСІХ замовлень (оплачених + неоплачених)
    return `
      <div class="leader-row mgr ${isOpen ? 'active' : ''}" data-key="m:${esc(m.name)}">
        <div class="leader-rank">${i + 1}</div>
        <div class="leader-name" title="${esc(m.name)}">${esc(m.name)}</div>
        <div class="leader-sub">бонус ${money(paid * BONUS_RATE, ok)}</div>
        <div class="leader-pot">пот. <b>${money(total, ok)}</b></div>
        <div class="leader-val">${money(paid, ok)}</div>
        <div class="leader-bar"><div class="leader-bar-fill" style="width:${paid / maxPaid * 100}%"></div></div>
      </div>`;
  }).join('');

  host.innerHTML = `${grandBanner}
    <div class="mgr-block">
      <div class="mgr-block-head">
        <div class="mgr-block-title">Топ менеджери</div>
        <div class="mgr-block-meta">${sortedMgrs.length} менеджер${sortedMgrs.length === 1 ? '' : 'ів'}</div>
      </div>
      <div class="leader">${mgrRows}</div>
    </div>`;
}

function renderByManager(managers) {
  const q = state.search;
  const visibleMgrs = managers.filter(m => {
    if (!q) return true;
    if (m.name.toLowerCase().includes(q)) return true;
    return m.currencies.some(C => C.clients.some(clientMatches));
  });
  if (!visibleMgrs.length) return '';

  const openMgrs = visibleMgrs.filter(m => state.openKeys.has(`m:${m.name}`));
  if (!openMgrs.length) return '';

  return openMgrs.map(m => {
    const mk = `m:${m.name}`;
    const curBlocks = m.currencies.map(C => {
      const ck = `${mk}|cur:${C.currency}`;
      const isCOpen = state.openKeys.has(ck);
      const visibleClients = C.clients.filter(clientMatches);
      if (q && !visibleClients.length) return '';
      const rows = [renderCurrencyRow(ck, C, isCOpen, visibleClients.length)];
      if (isCOpen) {
        visibleClients.forEach(c => {
          const clk = `${ck}|c:${c.name}`;
          const isClOpen = state.openKeys.has(clk);
          rows.push(renderClientRow(clk, c, C.currency, isClOpen));
          if (isClOpen) {
            c.orders.forEach(o => rows.push(renderOrderRow(o, C.currency)));
          }
        });
      }
      return rows.join('');
    }).join('');

    return `
    <div class="cur-section">
      <div class="mgr-section-head">👤 ${esc(m.name)}</div>
      <div class="tree-wrap">
        <table class="tree-tbl">
          <thead><tr>
            <th>Валюта / Клієнт / Замовлення</th>
            <th>Сума замовлення</th>
            <th>Оплачено</th>
            <th>Залишилось</th>
          </tr></thead>
          <tbody>${curBlocks}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function triCells(total, paid, remain) {
  const remCls = remain > 0.001 ? 'val-neg' : (remain < -0.001 ? 'val-pos' : 'val-zero');
  return `<td>${fmt(total)}</td><td class="val-pos">${fmt(paid)}</td><td class="${remCls}">${fmt(remain)}</td>`;
}

function renderCurrencyRow(key, C, isOpen, clientCount) {
  return `
    <tr class="cur-row" data-key="${esc(key)}">
      <td><span class="chev ${isOpen?'open':''}">▶</span><span class="cur-badge-inline">${esc(C.currency)}</span> <span style="color:var(--text3);font-weight:500;font-size:11px">· ${clientCount} клієнт.</span></td>
      ${triCells(C.total, C.paid, C.remain)}
    </tr>`;
}

function renderClientRow(key, c, cur, isOpen) {
  const ordersCount = c.orders.length;
  return `
    <tr class="client-row" data-key="${esc(key)}">
      <td><span class="chev ${isOpen?'open':''} ${ordersCount?'':'hidden'}">▶</span>${esc(c.name)} <span style="color:var(--text3);font-weight:400;font-size:11px">· ${ordersCount} зам.</span></td>
      ${triCells(c.total, c.paid, c.remain)}
    </tr>`;
}

function renderOrderRow(o, cur) {
  const payDate = o.payDate ? fmtDate(o.payDate) : (o.date ? fmtDate(o.date) : '—');
  const meta = o.advance
    ? '<span class="meta">аванс</span>'
    : `<span class="meta">Замовлення покупця №${esc(o.number || '?')}${o.date ? ` · від ${fmtDate(o.date)}` : ''}</span>`;
  return `
    <tr class="order-row">
      <td>${payDate} ${meta}</td>
      ${triCells(o.total, o.paid, o.remain)}
    </tr>`;
}

function bindRows() {
  document.querySelectorAll('[data-key]').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.key;
      if (state.openKeys.has(k)) state.openKeys.delete(k);
      else state.openKeys.add(k);
      render();
    });
  });
}
