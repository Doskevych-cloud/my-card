<style>
:root{
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a;
  --surface:#141414; --surface2:#1c1c1c;
  --border:#262626; --border2:#333;
  --text:#f5f5f5; --text2:#a3a3a3; --text3:#737373;
  --accent:#ff8319; --accent-bg:rgba(255,131,25,.12);
  --red:#e74c3c; --red-bg:rgba(231,76,60,.12);
  --green:#22c55e; --green-bg:rgba(34,197,94,.12);
  --blue:#3b82f6; --blue-bg:rgba(59,130,246,.12);
  --purple:#9775fa; --purple-bg:rgba(151,117,250,.14); --purple-text:#b399ff;
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
}
:root[data-theme="light"]{
  --bg:#f5f5f7; --bg2:#ffffff; --bg3:#ececef;
  --surface:#ffffff; --surface2:#ffffff;
  --border:#e5e5ea; --border2:#d1d1d6;
  --text:#1c1c1e; --text2:#48484a; --text3:#8e8e93;
  --accent:#e07017; --accent-bg:rgba(224,112,23,.12);
  --red:#d93025; --red-bg:rgba(217,48,37,.10);
  --green:#15803d; --green-bg:rgba(21,128,61,.10);
  --blue:#1d4ed8; --blue-bg:rgba(29,78,216,.10);
  --purple:#6d28d9; --purple-bg:rgba(109,40,217,.12); --purple-text:#6d28d9;
  --shadow-md:0 4px 20px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{max-width:1400px;margin:0 auto;padding:20px}
.page-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.page-head h1{font-size:20px;font-weight:700;letter-spacing:-.4px}
.page-head .sub{font-size:12px;color:var(--text3)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px}
.toolbar input[type=text]{flex:1;min-width:200px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;transition:border .15s}
.toolbar input:focus{border-color:var(--accent)}
.toolbar input[type=date]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;color-scheme:dark;font-family:inherit}
:root[data-theme="light"] .toolbar input[type=date]{color-scheme:light}
.toolbar input[type=date]:focus{border-color:var(--accent)}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.toolbar .btn{padding:7px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.toolbar .btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.toolbar .group{display:inline-flex;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{border:none;background:transparent;padding:5px 10px;border-radius:6px}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}

/* Summary grid — uniform cubes. Grand "Оплачено" is green, managers are neutral.
   Manager cards include a bonus line (0.08% of paid) under the amount. */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:14px}
.summary-card{padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:background .15s,border-color .15s;display:flex;flex-direction:column;gap:6px;user-select:none;min-height:96px}
.summary-card:hover{background:var(--bg3);border-color:var(--border2)}
.summary-card.active{background:var(--accent-bg);border-color:var(--accent)}
.summary-card.grand{background:linear-gradient(135deg,rgba(34,197,94,.10),rgba(34,197,94,.02));border-color:rgba(34,197,94,.30);cursor:default}
.summary-card.grand:hover{background:linear-gradient(135deg,rgba(34,197,94,.10),rgba(34,197,94,.02));border-color:rgba(34,197,94,.30)}
.summary-card .name{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;display:flex;align-items:center;gap:6px}
.summary-card .val{font-size:22px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.summary-card.grand .val{color:var(--green)}
.summary-card .bonus{font-size:11px;color:var(--text3);font-weight:500;font-variant-numeric:tabular-nums;margin-top:auto}
.summary-card .bonus b{color:var(--text2);font-weight:600}
.mgr-section-head{font-weight:700;font-size:13px;margin:14px 0 8px;padding:0 2px;color:var(--text);letter-spacing:-.2px}

/* Tree table */
.tree-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tree-tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tree-tbl thead th{padding:11px 12px;background:var(--bg2);color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}
.tree-tbl thead th:not(:first-child){text-align:right}
.tree-tbl thead th:nth-child(1){width:auto}
.tree-tbl thead th:nth-child(n+2){width:140px}
.tree-tbl tbody tr{transition:background .1s}
.tree-tbl tbody td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.tree-tbl tbody td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
.tree-tbl tbody td:first-child{overflow:hidden;text-overflow:ellipsis}

/* Manager section */
.cur-section{margin-top:18px}
.cur-section:first-child{margin-top:0}

/* Rows: currency / client / order (manager header is the clickable card above) */
.tree-tbl tr.cur-row{cursor:pointer;color:var(--text)}
.tree-tbl tr.cur-row td{background:var(--blue-bg);font-weight:600}
.tree-tbl tr.cur-row:hover td{filter:brightness(1.1)}
.tree-tbl tr.cur-row td:first-child{padding-left:38px}
.cur-badge-inline{font-size:11px;font-weight:700;letter-spacing:.3px;padding:2px 8px;border-radius:5px;background:var(--bg2);color:var(--blue);border:1px solid var(--blue);margin-right:6px}

.tree-tbl tr.client-row{cursor:pointer;color:var(--text)}
.tree-tbl tr.client-row td{background:rgba(255,255,255,.02);font-weight:600}
:root[data-theme="light"] .tree-tbl tr.client-row td{background:rgba(0,0,0,.015)}
.tree-tbl tr.client-row:hover td{background:var(--bg3)}
.tree-tbl tr.client-row td:first-child{padding-left:66px}

.tree-tbl tr.order-row{cursor:pointer;color:var(--text2)}
.tree-tbl tr.order-row:hover td{background:var(--bg3)}
.tree-tbl tr.order-row td:first-child{padding-left:92px;font-size:11.5px}
.tree-tbl tr.order-row .meta{color:var(--text3);font-size:10.5px;margin-left:8px}

.chev{display:inline-block;width:14px;color:var(--text3);transition:transform .15s;font-size:10px;transform:translateY(-1px)}
.chev.open{transform:rotate(90deg) translateY(-1px)}
.chev.hidden{visibility:hidden}

.val-pos{color:var(--green);font-weight:600}
.val-neg{color:var(--red);font-weight:600}
.val-zero{color:var(--text3)}

/* Loading / empty */
.loading{padding:60px 20px;text-align:center;color:var(--text2);font-size:13px}
.loading::after{content:'';display:block;width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:14px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:20px;text-align:center;color:var(--red);background:var(--red-bg);border-radius:10px;font-size:12px;margin-top:16px}
.empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:12px}

@media (max-width:720px){
  .toolbar{padding:10px;gap:8px}
  .tree-tbl thead th,.tree-tbl tbody td{padding:8px 6px;font-size:11px}
  .tree-tbl thead th:nth-child(n+2){width:90px}
  .summary-grid{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
  .summary-card{min-height:80px}
  .summary-card .val{font-size:18px}
}
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-head">
      <h1>📈 Продажі менеджерів</h1>
    </div>
    <div class="toolbar">
      <span class="lbl">Період</span>
      <input type="date" id="fromIn">
      <span style="color:var(--text3)">—</span>
      <input type="date" id="toIn">
      <span class="group">
        <span class="chip" onclick="setPreset('month')">Цей місяць</span>
        <span class="chip" onclick="setPreset('prevmonth')">Минулий</span>
        <span class="chip" onclick="setPreset('quarter')">Квартал</span>
        <span class="chip" onclick="setPreset('year')">Рік</span>
      </span>

      <span class="sep"></span>

      <span class="chip active" data-org="Реакт" onclick="setOrg('Реакт')">Реакт</span>
      <span class="chip" data-org="Генерація" onclick="setOrg('Генерація')">Генерація</span>

      <span class="sep"></span>

      <button class="btn" onclick="expandAll()">⊞ Розгорнути</button>
      <button class="btn" onclick="collapseAll()">⊟ Згорнути</button>

      <input type="text" id="searchIn" placeholder="🔎 Пошук клієнта, менеджера, № замовлення…">
    </div>

    <div id="curSummary"></div>
    <div id="body"><div class="loading">Завантаження…</div></div>
  </div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev';

Auth.require('sales').then(user => {
  window.__user = user;
  AppHeader.mount({ active: 'sales', user });
  setPreset('month');  // default — triggers load
});

// ─── State ───
function _todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function _firstOfMonthISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
const state = {
  data: null,
  org: 'Реакт',
  from: _firstOfMonthISO(),
  to: _todayISO(),
  search: '',
  openKeys: new Set(),
  loading: false,
  fx: null, // { source, markup, asOf, rates: { USD_UAH, EUR_UAH } }
};

// Convert any amount in `cur` → USD using the loaded FX snapshot.
// Returns null if the rate is missing (e.g. unusual currency or FX fetch failed),
// so callers can skip the USD line instead of showing garbage.
function toUsd(amount, cur) {
  if (!isFinite(amount)) return null;
  if (cur === 'USD') return amount;
  const fx = state.fx && state.fx.rates;
  if (!fx) return null;
  if (cur === 'UAH') return fx.USD_UAH > 0 ? amount / fx.USD_UAH : null;
  if (cur === 'EUR') return (fx.EUR_UAH > 0 && fx.USD_UAH > 0) ? amount * fx.EUR_UAH / fx.USD_UAH : null;
  return null;
}

function fmt(n, dec = 2) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric' });
}
function valCls(n) { return n > 0.001 ? 'val-pos' : (n < -0.001 ? 'val-neg' : 'val-zero'); }

function _syncInputs() {
  const f = document.getElementById('fromIn'); if (f) f.value = state.from;
  const t = document.getElementById('toIn'); if (t) t.value = state.to;
}

async function load() {
  state.loading = true;
  _syncInputs();
  document.getElementById('curSummary').innerHTML = '';
  document.getElementById('body').innerHTML = '<div class="loading">Завантаження…</div>';
  try {
    const q = `?action=sales_report&from=${state.from}&to=${state.to}&org=${encodeURIComponent(state.org)}`;
    // Fetch sales + FX rates in parallel. FX is purely informative, so we
    // don't fail the whole page if rates are unavailable.
    const [salesRes, fxRes] = await Promise.all([
      fetch(API_URL + q).then(r => r.json()),
      fetch(API_URL + '?action=fx_rates').then(r => r.json()).catch(() => null),
    ]);
    if (salesRes.error) throw new Error(salesRes.error);
    state.data = salesRes;
    state.fx = (fxRes && fxRes.rates && fxRes.rates.USD_UAH) ? fxRes : null;
    state.loading = false;
    render();
  } catch (e) {
    state.loading = false;
    document.getElementById('body').innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

// ─── Controls ───
function setOrg(v) {
  state.org = v;
  document.querySelectorAll('.chip[data-org]').forEach(c => c.classList.toggle('active', c.dataset.org === v));
  load();
}
// Format Date → 'YYYY-MM-DD' using LOCAL components (not UTC).
// toISOString() shifts to UTC — midnight on 1-го у Києві стає 21:00 попереднього дня,
// через що пресет "Цей місяць" тягнув 31-е минулого місяця.
function _localISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function setPreset(p) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  let from, to = now;
  if (p === 'month') { from = new Date(y, m, 1); }
  else if (p === 'prevmonth') { from = new Date(y, m-1, 1); to = new Date(y, m, 0); }
  else if (p === 'quarter') { const q = Math.floor(m/3); from = new Date(y, q*3, 1); }
  else if (p === 'year') { from = new Date(y, 0, 1); }
  state.from = _localISO(from);
  state.to = _localISO(to);
  load();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('fromIn').addEventListener('change', e => {
    state.from = e.target.value || _firstOfMonthISO();
    load();
  });
  document.getElementById('toIn').addEventListener('change', e => {
    state.to = e.target.value || _todayISO();
    load();
  });
  document.getElementById('searchIn').addEventListener('input', e => {
    state.search = e.target.value.toLowerCase().trim();
    render();
  });
});

function expandAll() {
  state.openKeys.clear();
  collectKeys().forEach(k => state.openKeys.add(k));
  render();
}
function collapseAll() {
  state.openKeys.clear();
  render();
}

function collectKeys() {
  const keys = [];
  const orgData = (state.data && state.data.byOrg && state.data.byOrg[state.org]) || {};
  const managers = orgData.managers || [];
  managers.forEach(m => {
    const mk = `m:${m.name}`;
    keys.push(mk);
    m.currencies.forEach(C => {
      const ck = `${mk}|cur:${C.currency}`;
      keys.push(ck);
      C.clients.forEach(c => keys.push(`${ck}|c:${c.name}`));
    });
  });
  return keys;
}

// Sum one manager's `paid` across all their currencies → USD.
// Returns { paid, ok } — ok=false if any currency lacks a rate.
function managerPaidUsd(m) {
  if (!state.fx) return { paid: 0, ok: false };
  let paid = 0;
  for (const C of m.currencies) {
    const p = toUsd(C.paid, C.currency);
    if (p == null) return { paid: 0, ok: false };
    paid += p;
  }
  return { paid, ok: true };
}

// ─── Search ───
function clientMatches(c) {
  if (!state.search) return true;
  const q = state.search;
  if (c.name.toLowerCase().includes(q)) return true;
  if (c.orders.some(o => (o.number || '').toLowerCase().includes(q))) return true;
  return false;
}

// ─── Render ───
function render() {
  if (!state.data) return;
  const orgData = (state.data.byOrg || {})[state.org];
  const managers = (orgData && orgData.managers) || [];

  renderSummaryGrid(managers);

  if (!managers.length) {
    document.getElementById('body').innerHTML = '<div class="empty">Нічого не знайдено за цей період</div>';
    return;
  }

  // Drill-down only appears for managers whose card the user clicked open.
  const html = renderByManager(managers);
  document.getElementById('body').innerHTML = html;
  bindRows();
}

// Top: uniform grid of cards. The "Оплачено за період" card is green (grand
// total across currencies → USD). Each manager gets a neutral card with their
// paid total and a bonus line (0.08% of paid). Clicking a manager card toggles
// the drill-down table below.
const BONUS_RATE = 0.0008;  // 0.08% of paid, in USD

function renderSummaryGrid(managers) {
  const host = document.getElementById('curSummary');
  if (!managers.length) { host.innerHTML = ''; return; }

  const perMgr = managers.map(m => ({ m, ...managerPaidUsd(m) }));
  const allOk = perMgr.every(d => d.ok);
  const gPaid = allOk ? perMgr.reduce((s, d) => s + d.paid, 0) : null;

  const grandCard = `
    <div class="summary-card grand">
      <div class="name">💰 Оплачено за період</div>
      <div class="val">${allOk ? '$' + fmt(gPaid) : '—'}</div>
    </div>`;

  const mgrCards = perMgr.map(({ m, paid, ok }) => {
    const isOpen = state.openKeys.has(`m:${m.name}`);
    const val = ok ? '$' + fmt(paid) : '—';
    const bonus = ok ? '$' + fmt(paid * BONUS_RATE) : '—';
    return `
      <div class="summary-card ${isOpen ? 'active' : ''}" data-key="m:${esc(m.name)}">
        <div class="name">👤 ${esc(m.name)}</div>
        <div class="val">${val}</div>
        <div class="bonus">Бонус (0,08%): <b>${bonus}</b></div>
      </div>`;
  }).join('');

  host.innerHTML = `<div class="summary-grid">${grandCard}${mgrCards}</div>`;
}

// Render drill-down sections only for managers whose summary card is open.
// Search filter still applies — hidden managers' cards aren't shown at top either.
function renderByManager(managers) {
  const q = state.search;
  const visibleMgrs = managers.filter(m => {
    if (!q) return true;
    if (m.name.toLowerCase().includes(q)) return true;
    return m.currencies.some(C => C.clients.some(clientMatches));
  });
  if (!visibleMgrs.length) return '';

  const openMgrs = visibleMgrs.filter(m => state.openKeys.has(`m:${m.name}`));
  if (!openMgrs.length) return '';

  return openMgrs.map(m => {
    const mk = `m:${m.name}`;
    const curBlocks = m.currencies.map(C => {
      const ck = `${mk}|cur:${C.currency}`;
      const isCOpen = state.openKeys.has(ck);
      const visibleClients = C.clients.filter(clientMatches);
      if (q && !visibleClients.length) return '';
      const rows = [renderCurrencyRow(ck, C, isCOpen, visibleClients.length)];
      if (isCOpen) {
        visibleClients.forEach(c => {
          const clk = `${ck}|c:${c.name}`;
          const isClOpen = state.openKeys.has(clk);
          rows.push(renderClientRow(clk, c, C.currency, isClOpen));
          if (isClOpen) {
            c.orders.forEach(o => rows.push(renderOrderRow(o, C.currency)));
          }
        });
      }
      return rows.join('');
    }).join('');

    return sectionWrapManager(m, curBlocks);
  }).join('');
}

function sectionWrapManager(m, rowsHtml) {
  return `
    <div class="cur-section">
      <div class="mgr-section-head">👤 ${esc(m.name)}</div>
      <div class="tree-wrap">
        <table class="tree-tbl">
          <thead><tr>
            <th>Валюта / Клієнт / Замовлення</th>
            <th>Сума замовлення</th>
            <th>Оплачено</th>
            <th>Залишилось</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>`;
}

// Render total/paid/remain cells. Uses val-pos/val-neg coloring on remain
// so over- and under-payment are instantly visible.
function triCells(total, paid, remain) {
  const remCls = remain > 0.001 ? 'val-neg' : (remain < -0.001 ? 'val-pos' : 'val-zero');
  return `<td>${fmt(total)}</td><td class="val-pos">${fmt(paid)}</td><td class="${remCls}">${fmt(remain)}</td>`;
}

function renderCurrencyRow(key, C, isOpen, clientCount) {
  return `
    <tr class="cur-row" data-key="${esc(key)}">
      <td><span class="chev ${isOpen?'open':''}">▶</span><span class="cur-badge-inline">${esc(C.currency)}</span> <span style="color:var(--text3);font-weight:500;font-size:11px">· ${clientCount} клієнт.</span></td>
      ${triCells(C.total, C.paid, C.remain)}
    </tr>`;
}

function renderClientRow(key, c, cur, isOpen) {
  const ordersCount = c.orders.length;
  return `
    <tr class="client-row" data-key="${esc(key)}">
      <td><span class="chev ${isOpen?'open':''} ${ordersCount?'':'hidden'}">▶</span>${esc(c.name)} <span style="color:var(--text3);font-weight:400;font-size:11px">· ${ordersCount} зам.</span></td>
      ${triCells(c.total, c.paid, c.remain)}
    </tr>`;
}

function renderOrderRow(o, cur) {
  // Row is keyed by PAYMENT date in period — show that as primary, with order
  // №/date as secondary meta. The three numeric columns do the heavy lifting.
  const payDate = o.payDate ? fmtDate(o.payDate) : (o.date ? fmtDate(o.date) : '—');
  const meta = o.advance
    ? '<span class="meta">аванс</span>'
    : `<span class="meta">№${esc(o.number || '?')}${o.date ? ` · від ${fmtDate(o.date)}` : ''}</span>`;
  return `
    <tr class="order-row">
      <td>${payDate} ${meta}</td>
      ${triCells(o.total, o.paid, o.remain)}
    </tr>`;
}

// Binds click toggling for all interactive elements with data-key —
// both the summary cards (manager level) and drill-down rows (currency/client).
function bindRows() {
  document.querySelectorAll('[data-key]').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.key;
      if (state.openKeys.has(k)) state.openKeys.delete(k);
      else state.openKeys.add(k);
      render();
    });
  });
}
</script>
</body>
</html>
