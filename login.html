<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вхід · RE:ACT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="auth.js"></script>
<style>
:root {
  --bg:#0b0e11; --card:#1e2329; --text:#eaecef; --text2:#9aa4b2; --text3:#6b7280;
  --border:rgba(255,255,255,.1); --accent:#ff8319;
}
:root[data-theme="light"] {
  --bg:#f6f7fb; --card:#ffffff; --text:#1f2937; --text2:#4b5563; --text3:#6b7280;
  --border:rgba(0,0,0,.08); --accent:#ff8319;
}
* { box-sizing: border-box }
html, body { margin:0; padding:0; height:100%; }
body {
  font-family: 'Inter', -apple-system, Segoe UI, sans-serif;
  background: var(--bg); color: var(--text);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background-image: radial-gradient(1200px 600px at 50% -10%, rgba(255,131,25,.12), transparent 60%);
}
.wrap {
  width: min(420px, 92vw);
  padding: 44px 34px 38px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  text-align: center;
}
.logo {
  width:64px; height:64px; border-radius:20px; margin: 0 auto 20px;
  background: linear-gradient(135deg, #ff8319, #ff5530);
  display:flex; align-items:center; justify-content:center; font-size:34px;
  box-shadow: 0 10px 30px rgba(255,131,25,.3);
}
h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; }
.sub { color: var(--text2); font-size: 14px; margin: 0 0 26px; line-height: 1.5; }
#gsiBtn { display:flex; justify-content:center; min-height: 44px; }
.err { color:#f6465d; font-size: 13px; margin-top: 16px; min-height: 18px; }
.foot { margin-top: 26px; font-size: 12px; color: var(--text3); }
.foot a { color: var(--text2); text-decoration: none; border-bottom: 1px dashed var(--text3); }
.theme-toggle {
  position: fixed; top: 16px; right: 16px;
  background: var(--card); border: 1px solid var(--border); color: var(--text);
  width: 36px; height: 36px; border-radius: 10px; cursor: pointer;
  display:flex; align-items:center; justify-content:center;
}
.spinner {
  display:inline-block; width:14px; height:14px; border:2px solid var(--text3); border-top-color:var(--accent);
  border-radius:50%; animation: spin 1s linear infinite; vertical-align:middle; margin-right:6px;
}
@keyframes spin { to { transform: rotate(360deg) } }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" title="Тема">
  <svg id="iconSun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
  <svg id="iconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<div class="wrap">
  <div class="logo">🔌</div>
  <h1>RE:ACT · Система обліку</h1>
  <p class="sub">Увійдіть через робочий Google акаунт, щоб отримати доступ.</p>
  <div id="gsiBtn"></div>
  <div class="err" id="err"></div>
  <div class="foot">Якщо бачите «Немає доступу» після входу — зверніться до адміністратора.</div>
</div>

<script>
const CLIENT_ID = '970560011376-htrf3g3s3at0id7iegomi6q9jshgj7ro.apps.googleusercontent.com';

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('iconSun').style.display = theme === 'dark' ? 'none' : '';
  document.getElementById('iconMoon').style.display = theme === 'dark' ? '' : 'none';
  localStorage.setItem('theme', theme);
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
applyTheme(localStorage.getItem('theme') || 'dark');

function returnTo() {
  const p = new URLSearchParams(location.search).get('return');
  return p || 'index.html';
}

// If already logged in, skip straight to the return URL
(async function () {
  if (!Auth.getToken()) return;
  try {
    const u = await Auth.fetchMe();
    if (u) location.replace(returnTo());
  } catch {}
})();

async function handleCredential(resp) {
  const err = document.getElementById('err');
  err.innerHTML = '<span class="spinner"></span> Перевіряємо…';
  try {
    await Auth.loginWithIdToken(resp.credential);
    location.replace(returnTo());
  } catch (e) {
    err.textContent = '❌ ' + (e.message || 'Не вдалося увійти');
  }
}

function initGsi() {
  if (!window.google || !google.accounts || !google.accounts.id) { setTimeout(initGsi, 100); return; }
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredential,
    ux_mode: 'popup',
    auto_select: false,
  });
  google.accounts.id.renderButton(document.getElementById('gsiBtn'), {
    theme: document.documentElement.getAttribute('data-theme') === 'light' ? 'outline' : 'filled_black',
    size: 'large',
    text: 'continue_with',
    shape: 'pill',
    logo_alignment: 'left',
    width: 340,
  });
  // Optional: one-tap prompt
  try { google.accounts.id.prompt(); } catch {}
}
initGsi();
</script>
</body>
</html>
