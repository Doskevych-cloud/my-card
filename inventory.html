<html lang="uk">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{margin:0 auto;padding:14px 16px}
.page-tabs{display:inline-flex;gap:4px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.ptab{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap;cursor:pointer}
.ptab:hover{background:var(--bg3);color:var(--text)}
.ptab.active{background:var(--accent-bg);color:var(--accent)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar input[type=text]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;font-family:inherit;min-width:200px}
.toolbar input[type=text]:focus{border-color:var(--accent)}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.toolbar .group{display:inline-flex;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{border:none;background:transparent;padding:5px 10px;border-radius:6px}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.toolbar select{padding:7px 30px 7px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-weight:600;outline:none;font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;max-width:230px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23888' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 11px center}
.toolbar select:focus{border-color:var(--accent)}

/* Product typeahead picker */
.ac-wrap{position:relative;display:inline-flex;align-items:center}
.ac-wrap input{padding-right:26px}
.ac-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;color:var(--text3);font-size:11px;line-height:1;user-select:none}
.ac-clear:hover{color:var(--text);background:var(--bg3)}
.ac-list{position:absolute;top:calc(100% + 4px);left:0;min-width:300px;max-height:320px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:9px;box-shadow:0 8px 20px rgba(0,0,0,.35);z-index:50;display:none}
.ac-list.open{display:block}
.ac-item{padding:8px 11px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border);line-height:1.35}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--bg2)}
.ac-item .art{font-size:10.5px;color:var(--text3);margin-top:2px}
.ac-item mark{background:var(--accent-bg);color:var(--accent);padding:0;border-radius:2px}
.ac-item .empty-row{color:var(--text3);font-style:italic}

/* KPI cards — top row */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.kpi{padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;gap:3px}
.kpi .kl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.kpi .kv{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1.2;color:var(--text)}
.kpi .ks{font-size:11px;color:var(--text3);font-weight:500}

/* Status filter cards */
.status-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.st-card{padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:border-color .12s,background .12s,opacity .12s}
.st-card:hover{border-color:var(--border2)}
.st-card.active{border-color:var(--accent);background:var(--accent-bg)}
.st-card.dim{opacity:.5}
.st-card .sl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.st-card .sv{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1.2}
.st-card .ss{font-size:11px;color:var(--text3);font-weight:500}
.st-card.s-fast   .sv{color:var(--green)}
.st-card.s-normal .sv{color:var(--text)}
.st-card.s-slow   .sv{color:var(--text)}
.st-card.s-dead   .sv{color:var(--red)}

/* Table */
.inv-wrap{overflow:auto;margin-bottom:20px;border:1px solid var(--border);border-radius:12px;background:var(--bg)}
.inv-table{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums;min-width:1100px}
.inv-table th,.inv-table td{padding:10px 12px;text-align:right;white-space:nowrap;vertical-align:middle;line-height:1.25}
.inv-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;background:var(--surface2);position:sticky;top:0;z-index:2;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.inv-table th:hover{color:var(--text)}
.inv-table th.sorted{color:var(--accent)}
.inv-table th.sorted::after{content:' ▾';font-size:9px}
.inv-table th.sorted.asc::after{content:' ▴'}
.inv-table th:first-child{text-align:left;position:sticky;left:0;z-index:3;background:var(--surface2);min-width:280px}
.inv-table td:first-child{text-align:left;position:sticky;left:0;z-index:1;background:inherit;min-width:280px}
.inv-table tbody tr{background:var(--bg);transition:background .1s}
.inv-table tbody tr:hover td{background:var(--bg3)}
.inv-table tbody tr+tr td{border-top:1px solid var(--border)}
.inv-table td.zr{color:var(--text3)}
.inv-table td.name-cell{overflow:hidden;text-overflow:ellipsis;max-width:320px}
.inv-table td.name-cell .article{color:var(--text3);font-size:11px;margin-left:6px}
.inv-table td.abc-a{color:var(--green);font-weight:700}
.inv-table td.abc-b{color:var(--text);font-weight:600}
.inv-table td.abc-c{color:var(--text3);font-weight:500}
.inv-table td.s-fast{color:var(--green);font-weight:600}
.inv-table td.s-normal{color:var(--text);font-weight:600}
.inv-table td.s-slow{color:var(--text);font-weight:600}
.inv-table td.s-dead{color:var(--red);font-weight:600}
.inv-table td.excess-hi{color:var(--red)}

/* Loading + empty */
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.loading::after{content:'';display:block;width:28px;height:28px;margin:16px auto 0;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:40px;color:var(--red);background:var(--red-bg);border-radius:12px;margin:20px 0}
.empty-msg{padding:40px;text-align:center;color:var(--text3);font-size:13px;background:var(--surface2);border:1px dashed var(--border);border-radius:12px}

@media(max-width:720px){
  .wrap{padding:12px}
  .page-tabs{display:flex;flex-wrap:wrap;gap:3px;padding:3px;max-width:100%}
  .ptab{padding:6px 10px;font-size:11.5px;flex:0 0 auto}
  .toolbar{padding:8px;gap:6px;border-radius:10px}
  .toolbar .lbl{display:none}
  .toolbar .chip{padding:6px 10px;font-size:11px}
  .toolbar .group{padding:3px;gap:2px}
  .toolbar .group .chip{padding:5px 8px;font-size:11px}
  .toolbar select{max-width:150px;padding:6px 26px 6px 9px;font-size:11px}
  .toolbar input[type=text]{min-width:150px}
  .ac-list{min-width:220px;max-width:78vw}
  .toolbar .sep{display:none}
  .kpi-row{grid-template-columns:1fr 1fr 1fr;gap:8px}
  .kpi{padding:11px 12px;border-radius:10px}
  .kpi .kv{font-size:18px}
  .status-row{grid-template-columns:1fr 1fr;gap:8px}
  .st-card{padding:10px 12px;border-radius:10px}
  .st-card .sv{font-size:16px}
  .inv-wrap{border-radius:10px;-webkit-overflow-scrolling:touch}
  .inv-table{font-size:11px;min-width:900px}
  .inv-table th,.inv-table td{padding:6px 8px}
  .inv-table td:first-child,.inv-table th:first-child{min-width:200px}
}
@media(max-width:480px){
  .kpi-row{grid-template-columns:1fr 1fr}
  .status-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-tabs">
      <a href="/prices.html" class="ptab" data-perm="sales_prices">🏠 Порівняння цін</a>
      <a href="/sales.html" class="ptab" data-perm="sales">📈 Продажі менеджерів</a>
      <a href="/top_products.html" class="ptab" data-perm="sales_top_products">📦 Останні продажі</a>
      <a href="/osp.html" class="ptab" data-perm="sales_osp">📋 Оплата та відвантаження</a>
      <a href="/ar_aging.html" class="ptab" data-perm="sales_ar_aging">⏱ Заборгованість покупців</a>
      <a href="/active_clients.html" class="ptab" data-org-required="Реакт" data-perm="sales_active_clients">👥 Клієнтська база</a>
      <span class="ptab active" data-perm="sales_inventory">📊 Обіговість запасів</span>
      <a href="/sla.html" class="ptab" data-perm="sales_sla">⚡ SLA</a>
      <a href="/broadcast.html" class="ptab" data-org-required="Реакт" data-perm="sales_broadcast">📢 Розсилка</a>
    </div>

    <div class="toolbar">
      <span class="group" id="orgGroup">
        <span class="chip" data-org="" onclick="setOrg(this)">Всі</span>
        <span class="chip active" data-org="Реакт" onclick="setOrg(this)">Реакт</span>
        <span class="chip" data-org="Генерація" onclick="setOrg(this)">Генерація</span>
      </span>
      <div class="sep"></div>
      <span class="lbl">Група</span>
      <select id="groupSel" onchange="setGroup(this.value)"><option value="">Всі групи</option></select>
      <div class="sep"></div>
      <span class="lbl">Товар</span>
      <span class="ac-wrap">
        <input type="text" id="searchIn" placeholder="Назва або артикул…" autocomplete="off" oninput="onSearchInput()">
        <span class="ac-clear" id="acClear" onclick="clearProduct()" style="display:none">✕</span>
        <div class="ac-list" id="acList"></div>
      </span>
      <div class="sep"></div>
      <span class="lbl">ABC</span>
      <span class="group" id="abcGroup">
        <span class="chip active" data-abc="" onclick="setAbc(this)">Всі</span>
        <span class="chip" data-abc="A" onclick="setAbc(this)">A</span>
        <span class="chip" data-abc="B" onclick="setAbc(this)">B</span>
        <span class="chip" data-abc="C" onclick="setAbc(this)">C</span>
      </span>
    </div>

    <div id="kpis"></div>
    <div id="statusCards"></div>
    <div id="body"><div class="loading">Завантаження…</div></div>
  </div>
</div>

<script>
const API = 'https://price-api.doskevich.workers.dev/';
const state = { org: 'Реакт', group: '', productKey: null, statusFilter: null, abcFilter: '', sortCol: 'excess_val', sortAsc: false };
let DATA = null;

const fmt  = (v, d=0) => v == null ? '—' : Number(v).toLocaleString('uk-UA', { minimumFractionDigits: d, maximumFractionDigits: d });
const fmtU = v => v == null ? '—' : '$' + fmt(v, 0);
const STATUS_LABELS = { fast: 'Швидкий', normal: 'Нормальний', slow: 'Повільний', dead: 'Мертвий' };
const STATUS_DESC   = { fast: 'DSI < 60 дн', normal: 'DSI 60–180 дн', slow: 'DSI > 180 дн', dead: 'Без продажів 12 міс' };

function setOrg(el) {
  document.querySelectorAll('#orgGroup .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  state.org = el.dataset.org;
  load();
}
function setAbc(el) {
  document.querySelectorAll('#abcGroup .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  state.abcFilter = el.dataset.abc;
  render();
}
function setStatusFilter(s) {
  state.statusFilter = state.statusFilter === s ? null : s;
  render();
}
function setSort(col) {
  if (state.sortCol === col) state.sortAsc = !state.sortAsc;
  else { state.sortCol = col; state.sortAsc = false; }
  render();
}
function setGroup(v) { state.group = v; render(); }

// ── Product typeahead ──────────────────────────────────────────────
function hl(text, q) {
  const t = String(text || '');
  if (!q) return esc(t);
  const i = t.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return esc(t);
  return esc(t.slice(0, i)) + '<mark>' + esc(t.slice(i, i + q.length)) + '</mark>' + esc(t.slice(i + q.length));
}
function onSearchInput() {
  state.productKey = null; // typing → unpin specific product
  const inp = document.getElementById('searchIn');
  const q = (inp.value || '').trim();
  document.getElementById('acClear').style.display = q ? 'flex' : 'none';
  const list = document.getElementById('acList');
  if (!q) { list.classList.remove('open'); render(); return; }
  let pool = DATA ? DATA.items : [];
  if (state.group) pool = pool.filter(i => (i.category || '') === state.group);
  const ql = q.toLowerCase();
  const matches = pool.filter(i =>
    (i.name || '').toLowerCase().includes(ql) ||
    (i.article || '').toLowerCase().includes(ql) ||
    (i.code || '').toLowerCase().includes(ql)
  ).slice(0, 12);
  list.innerHTML = matches.length
    ? matches.map(m => `<div class="ac-item" onclick="pickProduct('${m.nom_key}')">
        <div>${hl(m.name, q)}</div>
        ${m.article ? `<div class="art">арт. ${hl(m.article, q)}</div>` : ''}
      </div>`).join('')
    : `<div class="ac-item"><span class="empty-row">Нічого не знайдено</span></div>`;
  list.classList.add('open');
  render(); // live substring scope
}
function pickProduct(nomKey) {
  const it = DATA && DATA.items.find(i => i.nom_key === nomKey);
  if (!it) return;
  state.productKey = nomKey;
  document.getElementById('searchIn').value = it.name;
  document.getElementById('acClear').style.display = 'flex';
  document.getElementById('acList').classList.remove('open');
  render();
}
function clearProduct() {
  state.productKey = null;
  const inp = document.getElementById('searchIn');
  inp.value = '';
  document.getElementById('acClear').style.display = 'none';
  document.getElementById('acList').classList.remove('open');
  inp.focus();
  render();
}
document.addEventListener('click', e => {
  if (!e.target.closest('.ac-wrap')) document.getElementById('acList')?.classList.remove('open');
});

// Populate group selector from categories present in stock
function populateGroups() {
  const sel = document.getElementById('groupSel');
  if (!sel || !DATA) return;
  const counts = new Map();
  for (const it of DATA.items) {
    const g = it.category || '';
    if (g) counts.set(g, (counts.get(g) || 0) + 1);
  }
  const groups = [...counts.keys()].sort((a, b) => a.localeCompare(b, 'uk'));
  let html = '<option value="">Всі групи</option>';
  for (const g of groups) html += `<option value="${esc(g)}">${esc(g)} (${counts.get(g)})</option>`;
  sel.innerHTML = html;
  if (state.group && counts.has(state.group)) sel.value = state.group;
  else { state.group = ''; sel.value = ''; }
}

// Items in the current selection scope (group ∧ product/search ∧ ABC).
// Status is the breakdown dimension → applied to the table only, not the scope.
function scopedItems() {
  let items = DATA.items.slice();
  if (state.group) items = items.filter(i => (i.category || '') === state.group);
  if (state.productKey) {
    items = items.filter(i => i.nom_key === state.productKey);
  } else {
    const q = (document.getElementById('searchIn')?.value || '').toLowerCase().trim();
    if (q) items = items.filter(i =>
      (i.name || '').toLowerCase().includes(q) ||
      (i.article || '').toLowerCase().includes(q) ||
      (i.code || '').toLowerCase().includes(q));
  }
  if (state.abcFilter) items = items.filter(i => i.abc === state.abcFilter);
  return items;
}

// Recompute summary KPIs over an arbitrary item subset (mirrors worker §8).
function computeSummary(items) {
  let totSku = 0, totStockVal = 0, totCogs = 0, totGm = 0, totExcess = 0;
  let deadSku = 0, deadVal = 0, slowSku = 0, slowVal = 0;
  for (const it of items) {
    totSku++;
    totStockVal += it.stock_val || 0;
    totCogs += it.cogs_365d || 0;
    totGm += it.gm_365d || 0;
    totExcess += it.excess_val || 0;
    if (it.status === 'dead') { deadSku++; deadVal += it.stock_val || 0; }
    if (it.status === 'slow') { slowSku++; slowVal += it.stock_val || 0; }
  }
  const itr = totStockVal > 0 ? totCogs / totStockVal : null;
  const dsi = (itr != null && itr > 0) ? Math.round(365 / itr) : null;
  const gmroi = totStockVal > 0 ? totGm / totStockVal : null;
  return {
    total_sku: totSku,
    stock_value_usd: totStockVal,
    itr, dsi, gmroi,
    dead: { sku: deadSku, value_usd: deadVal },
    slow: { sku: slowSku, value_usd: slowVal },
    excess_value_usd: totExcess,
  };
}

async function load() {
  document.getElementById('body').innerHTML = '<div class="loading">Завантаження…</div>';
  document.getElementById('kpis').innerHTML = '';
  document.getElementById('statusCards').innerHTML = '';
  try {
    const orgParam = state.org ? `&org=${encodeURIComponent(state.org)}` : '';
    const r = await fetch(`${API}?action=inventory_turnover${orgParam}`, {
      headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('session_token') || '') }
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    DATA = await r.json();
    populateGroups();
    render();
  } catch (e) {
    document.getElementById('body').innerHTML = `<div class="error">${e.message}</div>`;
  }
}

function render() {
  if (!DATA) return;
  const scoped = scopedItems();         // group ∧ product/search ∧ ABC
  const s = computeSummary(scoped);     // KPIs follow the selection

  // KPI cards
  document.getElementById('kpis').innerHTML = `<div class="kpi-row">
    <div class="kpi">
      <div class="kl">Вартість запасу</div>
      <div class="kv">${fmtU(s.stock_value_usd)}</div>
      <div class="ks">${fmt(s.total_sku)} SKU</div>
    </div>
    <div class="kpi">
      <div class="kl">Оборотність (ITR)</div>
      <div class="kv">${s.itr != null ? fmt(s.itr, 2) + 'x' : '—'}</div>
      <div class="ks">разів на рік</div>
    </div>
    <div class="kpi">
      <div class="kl">Дні запасу (DSI)</div>
      <div class="kv">${s.dsi != null ? fmt(s.dsi) : '—'}</div>
      <div class="ks">днів</div>
    </div>
    <div class="kpi">
      <div class="kl">GMROI</div>
      <div class="kv">${s.gmroi != null ? fmt(s.gmroi, 2) : '—'}</div>
      <div class="ks">$/$ інвестиції</div>
    </div>
    <div class="kpi">
      <div class="kl" style="color:var(--red)">Мертвий сток</div>
      <div class="kv" style="color:var(--red)">${fmtU(s.dead?.value_usd)}</div>
      <div class="ks">${s.dead?.sku || 0} SKU</div>
    </div>
    <div class="kpi">
      <div class="kl" style="color:var(--red)">Надлишок (> ${DATA.target_coverage_days}д)</div>
      <div class="kv" style="color:var(--red)">${fmtU(s.excess_value_usd)}</div>
      <div class="ks">понад норму покриття</div>
    </div>
  </div>`;

  // Status filter cards
  const statuses = ['fast', 'normal', 'slow', 'dead'];
  const byStatus = {};
  for (const st of statuses) byStatus[st] = { sku: 0, val: 0 };
  for (const it of scoped) {
    const b = byStatus[it.status];
    if (b) { b.sku++; b.val += it.stock_val || 0; }
  }
  let stHtml = '<div class="status-row">';
  for (const st of statuses) {
    const b = byStatus[st];
    const isActive = state.statusFilter === st;
    const dim = state.statusFilter && !isActive ? 'dim' : '';
    stHtml += `<div class="st-card s-${st} ${isActive ? 'active' : dim}" onclick="setStatusFilter('${st}')">
      <div class="sl">${STATUS_LABELS[st]}</div>
      <div class="sv">${fmtU(b.val)}</div>
      <div class="ss">${b.sku} SKU &middot; ${STATUS_DESC[st]}</div>
    </div>`;
  }
  stHtml += '</div>';
  document.getElementById('statusCards').innerHTML = stHtml;

  // Table rows = scope narrowed by the status card (status is table-only)
  let items = scoped.slice();
  if (state.statusFilter) items = items.filter(i => i.status === state.statusFilter);

  // Sort
  items.sort((a, b) => {
    let va = a[state.sortCol], vb = b[state.sortCol];
    if (va == null) va = state.sortAsc ? Infinity : -Infinity;
    if (vb == null) vb = state.sortAsc ? Infinity : -Infinity;
    if (typeof va === 'string') return state.sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return state.sortAsc ? va - vb : vb - va;
  });

  if (!items.length) {
    document.getElementById('body').innerHTML = '<div class="empty-msg">Немає даних для обраних фільтрів</div>';
    return;
  }

  // Table
  const cols = [
    { key: 'name',      label: 'Товар' },
    { key: 'abc',       label: 'ABC' },
    { key: 'qty',       label: 'Залишок' },
    { key: 'stock_val', label: 'Вартість $' },
    { key: 'sold_90d',  label: 'Продано 90д' },
    { key: 'sold_365d', label: 'Продано рік' },
    { key: 'itr',       label: 'ITR' },
    { key: 'dsi',       label: 'DSI' },
    { key: 'gmroi',     label: 'GMROI' },
    { key: 'dos',       label: 'Покриття дн' },
    { key: 'excess_val',label: 'Надлишок $' },
    { key: 'last_sale', label: 'Остання продаж' },
    { key: 'status',    label: 'Статус' },
  ];

  let th = '<tr>';
  for (const c of cols) {
    const sorted = state.sortCol === c.key;
    const cls = sorted ? `sorted${state.sortAsc ? ' asc' : ''}` : '';
    th += `<th class="${cls}" onclick="setSort('${c.key}')">${c.label}</th>`;
  }
  th += '</tr>';

  let tbody = '';
  for (const it of items) tbody += rowHtml(it);

  document.getElementById('body').innerHTML = `
    <div class="inv-wrap"><table class="inv-table">
      <thead>${th}</thead>
      <tbody>${tbody}</tbody>
    </table></div>
    <div style="font-size:11px;color:var(--text3);padding:4px 2px">
      Залишки на ${DATA.as_of_date} &middot; ${fmt(items.length)} позицій
      &middot; Норма покриття: ${DATA.target_coverage_days} дн
    </div>`;
}

function rowHtml(it) {
  const zr = v => (v === 0 || v == null) ? ' class="zr"' : '';
  const fmtDate = d => {
    if (!d) return '—';
    const dt = new Date(d);
    return String(dt.getDate()).padStart(2,'0') + '.' + String(dt.getMonth()+1).padStart(2,'0') + '.' + String(dt.getFullYear()).slice(-2);
  };
  const abcCls = it.abc === 'A' ? 'abc-a' : it.abc === 'B' ? 'abc-b' : 'abc-c';
  const stCls = 's-' + it.status;
  const exCls = it.excess_val > 0 ? ' excess-hi' : '';
  return `<tr>
    <td class="name-cell">${esc(it.name)}${it.article ? `<span class="article">${esc(it.article)}</span>` : ''}</td>
    <td class="${abcCls}">${it.abc}</td>
    <td${zr(it.qty)}>${fmt(it.qty)}</td>
    <td${zr(it.stock_val)}>${fmtU(it.stock_val)}</td>
    <td${zr(it.sold_90d)}>${fmt(it.sold_90d)}</td>
    <td${zr(it.sold_365d)}>${fmt(it.sold_365d)}</td>
    <td${zr(it.itr)}>${it.itr != null ? fmt(it.itr, 2) + 'x' : '—'}</td>
    <td${zr(it.dsi)}>${it.dsi != null ? fmt(it.dsi) : '—'}</td>
    <td${zr(it.gmroi)}>${it.gmroi != null ? fmt(it.gmroi, 2) : '—'}</td>
    <td${zr(it.dos)}>${it.dos != null ? fmt(it.dos) : '—'}</td>
    <td${exCls ? ' class="excess-hi"' : zr(it.excess_val)}>${fmtU(it.excess_val)}</td>
    <td>${fmtDate(it.last_sale)}</td>
    <td class="${stCls}">${STATUS_LABELS[it.status] || it.status}</td>
  </tr>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

Auth.require('sales_inventory').then(user => {
  Auth.filterSubNav(user);
  const userOrgs = user?.orgs || {};
  const hasAnyOrg = Object.keys(userOrgs).length > 0;
  if (hasAnyOrg) {
    const allowedOrgs = ['Реакт', 'Генерація'].filter(o => userOrgs[o]);
    const orgChips = document.querySelectorAll('#orgGroup .chip');
    orgChips.forEach(chip => {
      const org = chip.dataset.org;
      if (org === '') {
        if (allowedOrgs.length < 2) chip.style.display = 'none';
      } else {
        if (!userOrgs[org]) chip.style.display = 'none';
      }
    });
    const defaultOrg = allowedOrgs.length === 1 ? allowedOrgs[0] : '';
    state.org = defaultOrg;
    orgChips.forEach(c => c.classList.toggle('active', c.dataset.org === defaultOrg));
  }
  load();
});
</script>
</body>
</html>
