<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Бригади · Склади</title>
<script>
  // Apply saved theme BEFORE styles paint — avoids flash-of-wrong-theme
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e){}
</script>
<script src="auth.js?v=mobhdr20260430"></script>
<script src="header.js?v=brig20260622"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="theme.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

/* Layout — повна ширина як на інших сторінках */
.wrap{margin:0 auto;padding:14px 16px}
.page-head{display:flex;align-items:baseline;gap:12px;margin-bottom:8px}
.page-head h1{font-size:20px;font-weight:700;letter-spacing:-.4px}
.page-head .sub{font-size:12px;color:var(--text3)}

/* Toolbar */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px}
.toolbar input[type=text]{flex:1;min-width:200px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;transition:border .15s}
.toolbar input:focus{border-color:var(--accent)}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}

/* Summary strip */
.summary{display:grid;grid-template-columns:repeat(3,minmax(0,260px));gap:10px;margin-bottom:14px}
.sum-card{padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px}
.sum-card .l{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.sum-card .v{font-size:22px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;margin-top:2px}
.sum-card .s{font-size:10.5px;color:var(--text3);font-variant-numeric:tabular-nums}

/* Brigade cards */
.brig{margin-bottom:8px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.brig-head{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none}
.brig-head:hover{background:var(--bg3)}
.brig-head .chev{flex:0 0 auto;width:12px;color:var(--text3);font-size:11px;transition:transform .15s}
.brig.open>.brig-head .chev{transform:rotate(90deg)}
.brig-head .nm{flex:1;min-width:0;font-weight:700;font-size:14px;color:var(--text);overflow-wrap:anywhere}
.brig-head .stats{flex:0 0 auto;display:flex;align-items:baseline;gap:8px;font-size:11.5px;color:var(--text3);font-variant-numeric:tabular-nums;white-space:nowrap}
.brig-head .stats b{color:var(--text);font-size:14px;font-weight:700}
.brig-head .stats .mvc{color:var(--text3)}

.brig-body{display:none;border-top:1px solid var(--border)}
.brig.open>.brig-body{display:block}

/* Section label */
.brig-sec{padding:10px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-weight:700}

/* Залишок — рядки */
.brig-item{display:flex;align-items:baseline;gap:14px;padding:8px 16px;border-bottom:1px solid var(--border)}
.brig-item:last-of-type{border-bottom:none}
.brig-item .nm{flex:1;min-width:0;color:var(--text2);overflow-wrap:anywhere}
.brig-item .q{flex:0 0 auto;min-width:120px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;color:var(--text)}
.brig-empty{padding:10px 16px;color:var(--text3);font-style:italic;font-size:12px}

/* Переміщення — окрема випадайка */
.mv-toggle{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;user-select:none;border-top:1px solid var(--border);background:var(--bg2);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;color:var(--text2)}
.mv-toggle:hover{color:var(--text)}
.mv-toggle .chev{flex:0 0 auto;width:12px;font-size:11px;color:var(--text3);transition:transform .15s}
.mv-toggle.open .chev{transform:rotate(90deg)}
.mv-toggle.mv-empty{cursor:default;color:var(--text3)}
.mv-toggle.mv-empty:hover{color:var(--text3)}
.mv-wrap{background:var(--bg2)}

/* Переміщення — документи */
.mv-hint{padding:10px 16px 12px;color:var(--text3);font-size:12px;font-style:italic}
.mv-doc{border-top:1px solid var(--border)}
.mv-doc-head{display:flex;align-items:center;gap:12px;padding:9px 16px 9px 28px;cursor:pointer}
.mv-doc-head:hover{background:var(--bg3)}
.mv-dir{flex:0 0 auto;width:16px;text-align:center;font-size:14px;color:var(--text3)}
.mv-main{flex:1;min-width:0}
.mv-route{display:block;font-size:13px;font-weight:600;color:var(--text);overflow-wrap:anywhere}
.mv-sub{display:block;font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums}
.mv-cm-head{display:block;font-size:11.5px;color:var(--text2);font-style:italic;margin-top:3px;overflow-wrap:anywhere}
.mv-no{color:var(--red)}
.mv-cnt{flex:0 0 auto;font-size:11px;color:var(--text3);white-space:nowrap}
.mv-items{display:none;padding:2px 16px 10px 28px}
.mv-doc.open .mv-items{display:block}
.mv-it{display:flex;align-items:baseline;gap:14px;padding:5px 0;font-size:12.5px;border-bottom:1px solid var(--border)}
.mv-it:last-child{border-bottom:none}
.mv-it-nm{flex:1;min-width:0;color:var(--text2);overflow-wrap:anywhere}
.mv-it-q{flex:0 0 auto;min-width:110px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;color:var(--text)}
.mv-money{flex:0 0 auto;min-width:120px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text3)}
.mv-cm{padding:6px 0 2px;font-size:11.5px;color:var(--text3);font-style:italic}

/* Loading / empty / error */
.loading{padding:60px 20px;text-align:center;color:var(--text2);font-size:13px}
.loading::after{content:'';display:block;width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:14px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:20px;text-align:center;color:var(--red);background:var(--red-bg);border-radius:10px;font-size:12px;margin-top:16px}
.empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:12px}

@media (max-width:720px){
  .wrap{padding:12px}
  .page-head h1{font-size:17px}
  .toolbar{padding:8px;gap:6px}
  .toolbar input[type=text]{flex:1 1 100%;min-width:0;font-size:12px;padding:6px 8px}
  .toolbar .chip{padding:6px 10px;font-size:11px}
  .summary{grid-template-columns:1fr 1fr;gap:6px}
  .summary .sum-card:nth-child(3){grid-column:1 / -1}
  .sum-card{padding:9px 10px}
  .sum-card .v{font-size:18px}
  .brig-head{padding:11px 12px}
  .brig-item .q,.mv-it-q{min-width:0}
  .mv-money{min-width:0}
}
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-head">
      <h1>👷 Бригади</h1>
      <span class="sub" id="sub">склади бригад</span>
    </div>

    <div class="toolbar">
      <span class="chip" onclick="expandAll()">⊞ Розгорнути</span>
      <span class="chip" onclick="collapseAll()">⊟ Згорнути</span>
      <span class="chip" onclick="downloadXLSX()" title="Вигрузити залишки в Excel">⬇ Excel</span>
      <input type="text" id="searchIn" placeholder="🔎 Пошук по бригаді…" autocomplete="off">
    </div>

    <div id="body"><div class="loading">Завантаження…</div></div>
  </div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev';

// ─── State ───
// Список складів бригад — з D1 brigades_overview (детект за назвою на бекенді:
// бачить УСІ бригадні склади без whitelist; admin = всі, бригадир = прив'язані).
// Залишок (brigade_stock) вантажиться при розгортанні картки.
// Переміщення (brigade_transfers) вантажаться ОКРЕМО — при відкритті своєї випадайки
// (важливо: активні бригади мають сотні документів, тож не блокуємо показ складу).
const state = {
  list: [],
  asOf: null,
  search: '',
  openKeys: new Set(),  // розгорнуті картки складів
  openMv: new Set(),    // розгорнуті блоки «Переміщення»
  openDocs: new Set(),  // розгорнуті документи (їх позиції)
  stock: {},            // ref → items[] | 'loading' | 'error'
  transfers: {},        // ref → docs[]  | 'loading' | 'error'
  loaded: false,
};

function fmt(n, dec = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDatePretty(iso) {
  if (!iso) return '—';
  return String(iso).slice(0, 10).split('-').reverse().join('.');
}

// ─── Дані ───
async function load() {
  document.getElementById('body').innerHTML = '<div class="loading">Завантаження…</div>';
  try {
    const res = await fetch(API_URL + '?action=brigades_overview');
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    state.list = (d.warehouses || []).slice().sort((a, b) => (b.qty || 0) - (a.qty || 0));
    state.asOf = d.as_of_date || null;
    state.loaded = true;
    const sub = document.getElementById('sub');
    if (sub) sub.textContent = 'склади бригад' + (state.asOf ? ' · залишок на ' + fmtDatePretty(state.asOf) : '');
    render();
  } catch (e) {
    document.getElementById('body').innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

function brigadeList() {
  const q = state.search;
  return q ? state.list.filter(b => (b.name || '').toLowerCase().includes(q)) : state.list;
}

// ─── Render ───
function render() {
  if (!state.loaded) return;
  const list = brigadeList();
  const body = document.getElementById('body');
  if (!list.length) {
    body.innerHTML = '<div class="empty">' + (state.search ? '— нічого не знайдено —' : '— немає доступних складів бригад —') + '</div>';
    return;
  }
  const totBrig = list.length;
  const totPos = list.reduce((s, b) => s + (b.items || 0), 0);
  const totQty = list.reduce((s, b) => s + (b.qty || 0), 0);
  const summary =
    '<div class="summary">' +
      `<div class="sum-card"><div class="l">Бригад</div><div class="v">${fmt(totBrig)}</div><div class="s">складів під звіт</div></div>` +
      `<div class="sum-card"><div class="l">Позицій</div><div class="v">${fmt(totPos)}</div><div class="s">номенклатури на складах</div></div>` +
      `<div class="sum-card"><div class="l">Одиниць</div><div class="v">${fmt(totQty)}</div><div class="s">сумарно</div></div>` +
    '</div>';

  const cards = list.map(b => {
    const ref = String(b.ref_key);
    const open = state.openKeys.has(ref);
    const mvOpen = state.openMv.has(ref);
    const tc = b.transfers_count || 0;
    const mvSection = tc > 0
      ? '<div class="mv-toggle' + (mvOpen ? ' open' : '') + '" data-mv="' + esc(ref) + '">' +
          '<span class="chev">▸</span>Переміщення · ' + fmt(tc) +
        '</div>' +
        '<div class="mv-wrap">' + (mvOpen ? movementsHtml(ref) : '') + '</div>'
      : '<div class="mv-toggle mv-empty"><span class="chev" style="visibility:hidden">▸</span>Переміщень нема</div>';
    return (
      '<div class="brig' + (open ? ' open' : '') + '" data-key="' + esc(ref) + '">' +
        '<div class="brig-head">' +
          '<span class="chev">▸</span>' +
          '<span class="nm">' + esc(b.name) + '</span>' +
          '<span class="stats"><b>' + fmt(b.qty) + '</b><span>' + fmt(b.items) + ' поз.</span><span class="mvc">' + fmt(tc) + ' рух.</span></span>' +
        '</div>' +
        '<div class="brig-body">' +
          '<div class="brig-sec">Залишок</div>' +
          stockHtml(ref) +
          mvSection +
        '</div>' +
      '</div>'
    );
  }).join('');
  body.innerHTML = summary + cards;
}

// ─── Залишок: lazy (brigade_stock) ───
function stockHtml(ref) {
  const s = state.stock[ref];
  if (s === undefined || s === 'loading') return '<div class="brig-empty">Завантаження залишку…</div>';
  if (s === 'error') return '<div class="brig-empty">Не вдалося завантажити залишок</div>';
  if (!s.length) return '<div class="brig-empty">— немає позицій із залишком —</div>';
  return s.map(it =>
    '<div class="brig-item"><span class="nm">' + esc(it.name) + '</span>' +
    '<span class="q">' + fmt(it.qty, it.qty < 100 ? 2 : 0) + '</span></div>'
  ).join('');
}
async function ensureStock(ref) {
  if (!ref || state.stock[ref] !== undefined) return;
  state.stock[ref] = 'loading';
  render();
  try {
    const res = await fetch(API_URL + '?action=brigade_stock&wh=' + encodeURIComponent(ref));
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    state.stock[ref] = d.items || [];
  } catch (e) { state.stock[ref] = 'error'; }
  render();
}

// ─── Переміщення: lazy (brigade_transfers) — тільки при відкритті випадайки ───
function movementsHtml(ref) {
  const t = state.transfers[ref];
  if (t === undefined || t === 'loading') return '<div class="mv-hint">Завантаження переміщень…</div>';
  if (t === 'error') return '<div class="mv-hint">Не вдалося завантажити переміщення</div>';
  if (!t.length) return '<div class="mv-hint">Переміщень не знайдено</div>';
  return t.map(d => {
    const inn = d.direction === 'in';
    const open = state.openDocs.has(d.ref_key);
    const route = esc(d.from_name || '?') + ' → ' + esc(d.to_name || '?');
    const itemsHtml = (d.items || []).map(it => {
      const unit = it.unit ? (' ' + esc(it.unit)) : '';
      const money = ('amount' in it) ? '<span class="mv-money">' + fmt(it.amount, it.amount < 100 ? 2 : 0) + ' грн</span>' : '';
      return '<div class="mv-it"><span class="mv-it-nm">' + esc(it.name || '—') + '</span>' +
             '<span class="mv-it-q">' + fmt(it.qty, it.qty < 100 ? 2 : 0) + unit + '</span>' + money + '</div>';
    }).join('');
    return '<div class="mv-doc' + (open ? ' open' : '') + '" data-doc="' + esc(d.ref_key) + '">' +
      '<div class="mv-doc-head">' +
        '<span class="mv-dir">' + (inn ? '↓' : '↑') + '</span>' +
        '<span class="mv-main"><span class="mv-route">' + route + '</span>' +
        '<span class="mv-sub">№' + esc(d.number || '—') + ' · ' + fmtDatePretty(d.date) +
          (d.posted ? '' : ' · <span class="mv-no">не проведено</span>') + '</span>' +
          (d.comment ? '<span class="mv-cm-head">' + esc(d.comment) + '</span>' : '') +
        '</span>' +
        '<span class="mv-cnt">' + (d.items || []).length + ' поз.</span>' +
      '</div>' +
      '<div class="mv-items">' + itemsHtml + '</div>' +
    '</div>';
  }).join('');
}
async function ensureTransfers(ref) {
  if (!ref || state.transfers[ref] !== undefined) return;
  state.transfers[ref] = 'loading';
  render();
  try {
    const res = await fetch(API_URL + '?action=brigade_transfers&wh=' + encodeURIComponent(ref));
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    state.transfers[ref] = d.transfers || [];
  } catch (e) { state.transfers[ref] = 'error'; }
  render();
}

// ─── Розгортання ───
function toggleCard(ref) {
  if (state.openKeys.has(ref)) state.openKeys.delete(ref);
  else { state.openKeys.add(ref); ensureStock(ref); }
  render();
}
function toggleMv(ref) {
  if (state.openMv.has(ref)) state.openMv.delete(ref);
  else { state.openMv.add(ref); ensureTransfers(ref); }
  render();
}
function expandAll() {
  brigadeList().forEach(b => { const ref = String(b.ref_key); state.openKeys.add(ref); ensureStock(ref); });
  render();
}
function collapseAll() { state.openKeys.clear(); state.openMv.clear(); render(); }

// Delegated click — #body persists across renders (тільки innerHTML міняється).
document.getElementById('body').addEventListener('click', function(ev) {
  const docHead = ev.target.closest('.mv-doc-head');
  if (docHead) {
    const doc = docHead.closest('.mv-doc[data-doc]');
    if (doc) {
      const k = doc.dataset.doc;
      if (state.openDocs.has(k)) state.openDocs.delete(k); else state.openDocs.add(k);
      render();
    }
    return;
  }
  const mvT = ev.target.closest('.mv-toggle[data-mv]');
  if (mvT) { toggleMv(mvT.dataset.mv); return; }
  const head = ev.target.closest('.brig-head');
  if (!head) return;
  const card = head.closest('.brig[data-key]');
  if (card) toggleCard(card.dataset.key);
});

document.getElementById('searchIn').addEventListener('input', e => {
  state.search = e.target.value.toLowerCase().trim();
  render();
});

// ─── Excel: тягне залишок усіх складів і вивантажує позиції ───
async function downloadXLSX() {
  if (typeof XLSX === 'undefined') { alert('Excel-бібліотека не завантажилась.'); return; }
  const list = brigadeList();
  if (!list.length) { alert('Немає даних для експорту'); return; }
  await Promise.all(list.map(async b => {
    const ref = String(b.ref_key);
    if (Array.isArray(state.stock[ref])) return;
    try {
      const res = await fetch(API_URL + '?action=brigade_stock&wh=' + encodeURIComponent(ref));
      const d = await res.json();
      state.stock[ref] = d.items || [];
    } catch (e) { state.stock[ref] = []; }
  }));
  const aoa = [['Склад бригади', 'Товар', 'Кількість']];
  list.forEach(b => {
    const s = state.stock[String(b.ref_key)];
    if (Array.isArray(s)) s.forEach(it => aoa.push([b.name, it.name, it.qty || 0]));
  });
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{ wch: 30 }, { wch: 48 }, { wch: 12 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Бригади');
  XLSX.writeFile(wb, 'brigades_' + (state.asOf || '') + '.xlsx');
}

// ─── Session gate (Google login + brigades role) + unified header ───
Auth.require('brigades').then(user => {
  window.__user = user;
  AppHeader.mount({ active: 'brigades', user });
  load();
});
</script>
</body>
</html>
