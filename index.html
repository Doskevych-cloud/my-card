    <title>Dmytro Doskevich</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --orange: #ff8319;
            --orange-light: #f79743;
            --orange-glow: rgba(255, 131, 25, .15);
            --dark: #2c2c2c;
            --gray: #7e7e7e;
            --light: #f3f3f3;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: var(--white); color: var(--dark);
        }
        .card { max-width: 400px; width: 90%; text-align: center; padding: 60px 32px; animation: fadeUp .7s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .avatar { width: 96px; height: 96px; border-radius: 50%; border: 4px solid var(--orange); display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; position: relative; }
        .avatar::after { content: ''; width: 28px; height: 28px; background: var(--orange); border-radius: 50%; position: absolute; }
        h1 { font-size: 1.6rem; font-weight: 700; color: var(--dark); margin-bottom: 8px; letter-spacing: -.02em; }
        .subtitle { font-size: .9rem; color: var(--gray); margin-bottom: 40px; }
        .links { list-style: none; display: flex; flex-direction: column; gap: 12px; }
        .links a { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 24px; border-radius: 12px; background: var(--light); color: var(--dark); text-decoration: none; font-size: .9rem; font-weight: 500; transition: all .2s ease; border: 1px solid transparent; }
        .links a:hover { background: var(--orange-glow); border-color: var(--orange-light); color: var(--orange); }
        .links a svg { width: 18px; height: 18px; flex-shrink: 0; }
        .divider { height: 1px; background: var(--light); margin: 32px 0; }
        .cta { display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px; border-radius: 60px; background: var(--orange); color: var(--white); text-decoration: none; font-size: .9rem; font-weight: 600; transition: all .2s ease; border: none; cursor: pointer; }
        .cta:hover { background: var(--orange-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255, 131, 25, .3); }
        .cta svg { width: 16px; height: 16px; }
        .footer { margin-top: 48px; font-size: .7rem; color: #c7c7c7; letter-spacing: .04em; }
    </style>
</head>
