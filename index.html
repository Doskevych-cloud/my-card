<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Дашборд · RE:ACT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<script>
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e){}
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="auth.js?v=supp20260419"></script>
<script src="header.js?v=supp20260419"></script>
<style>
:root{
  /* Уніфікована палітра (та сама що warehouses / sales / finance / osp) */
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a;
  --surface:#141414; --surface2:#1c1c1c; --surface3:#242424;
  --border:#262626; --border2:#333;
  --text:#f5f5f5; --text2:#a3a3a3; --text3:#737373;
  --accent:#ff8319; --accent-bg:rgba(255,131,25,.12);
  --red:#e74c3c; --red-bg:rgba(231,76,60,.12);
  --green:#22c55e; --green-bg:rgba(34,197,94,.12);
  --blue:#3b82f6; --blue-bg:rgba(59,130,246,.12);
  --yellow:#eab308; --yellow-bg:rgba(234,179,8,.12);
  --purple:#9775fa; --purple-bg:rgba(151,117,250,.14);
  --cyan:#22d3ee; --cyan-bg:rgba(34,211,238,.12);
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
}
:root[data-theme="light"]{
  --bg:#f5f5f7; --bg2:#ffffff; --bg3:#ececef;
  --surface:#ffffff; --surface2:#ffffff; --surface3:#f0f2f5;
  --border:#e5e5ea; --border2:#d1d1d6;
  --text:#1c1c1e; --text2:#48484a; --text3:#8e8e93;
  --accent:#e07017; --accent-bg:rgba(224,112,23,.12);
  --red:#d93025; --red-bg:rgba(217,48,37,.10);
  --green:#15803d; --green-bg:rgba(21,128,61,.10);
  --blue:#1d4ed8; --blue-bg:rgba(29,78,216,.10);
  --yellow:#a16207; --yellow-bg:rgba(161,98,7,.10);
  --purple:#6d28d9; --purple-bg:rgba(109,40,217,.12);
  --cyan:#0891b2; --cyan-bg:rgba(8,145,178,.12);
  --shadow-md:0 4px 20px rgba(0,0,0,.08);
  --shadow-sm:0 2px 6px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

.wrap{max-width:1600px;margin:0 auto;padding:20px}

.hero{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.hero h1{font-size:22px;font-weight:700;letter-spacing:-.4px}
.hero .sub{font-size:12px;color:var(--text3);margin-top:4px}
.hero-pulse{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:var(--green-bg);color:var(--green);font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.hero-pulse::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 1.6s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px}
.toolbar input[type=date]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;color-scheme:dark;font-family:inherit}
:root[data-theme="light"] .toolbar input[type=date]{color-scheme:light}
.toolbar input[type=date]:focus{border-color:var(--accent)}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar .group{display:inline-flex;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;user-select:none;transition:background .15s,color .15s}
.toolbar .group .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
/* buttons unified via header.js (.btn + .btn--secondary/--sm) */

/* ═══ BLOCK — секція дашборду (без рамок, без плашок, без іконок). Тільки назва + вміст. ═══ */
.block{margin-top:22px;position:relative;animation:block-in .45s ease-out backwards}
.block:nth-child(2){animation-delay:.05s}
.block:nth-child(3){animation-delay:.1s}
.block:nth-child(4){animation-delay:.15s}
.block:nth-child(5){animation-delay:.2s}
@keyframes block-in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.block-head{display:flex;align-items:center;gap:14px;padding:4px 0 12px}
.block-title{font-size:15px;font-weight:700;letter-spacing:-.2px;color:var(--text)}
.block-meta{margin-left:auto;font-size:11px;color:var(--text3);font-weight:600}
.block-body{padding:0;display:flex;flex-direction:column;gap:14px}

/* ═══ KPI rows inside blocks ═══ */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.kpi{padding:18px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;gap:7px;position:relative;overflow:hidden;min-height:140px;transition:border-color .15s,background .15s,transform .15s}
.kpi.clickable{cursor:pointer}
.kpi.clickable:hover{background:var(--surface3);border-color:var(--border2);transform:translateY(-1px)}
.kpi.selected{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent),0 0 16px rgba(255,131,25,.12)}
.kpi.selected::after{content:'';position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--accent)}
.kpi .kpi-head{display:flex;align-items:center;gap:7px}
.kpi .kpi-ico{font-size:14px;opacity:.85}
.kpi .kpi-lbl{font-size:11.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.kpi .kpi-val{font-size:30px;font-weight:800;letter-spacing:-.4px;line-height:1.1;color:var(--text);font-variant-numeric:tabular-nums}
.kpi .kpi-val.neg{color:var(--red)}
.kpi .kpi-val.pos{color:var(--green)}
.kpi .kpi-sub{font-size:12.5px;color:var(--text3);font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.kpi .kpi-delta{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:10.5px;font-weight:700}
.kpi .kpi-delta.up{background:var(--green-bg);color:var(--green)}
.kpi .kpi-delta.down{background:var(--red-bg);color:var(--red)}
.kpi.ldg .kpi-val{color:var(--text3);font-size:16px;font-style:italic}
.kpi.err{border-color:rgba(246,70,93,.35)}
.kpi.err .kpi-val{color:var(--red);font-size:13px;font-style:normal}
/* Кольорові ліві плашки на блоках з даними заборонено (див. CLAUDE.md § Дизайн UX/UI). Акцент робимо лише на самих цифрах через .kpi-val.pos / .neg. */

/* Sparkline під KPI (180x30) */
.kpi-spark{margin-top:6px;display:block;width:180px;height:30px;opacity:.9}
.kpi.ldg .kpi-spark{visibility:hidden}
.kpi.err .kpi-spark{visibility:hidden}

.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}

.card{padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;gap:10px}
.card h3{font-size:12.5px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;line-height:1.2;text-transform:uppercase;letter-spacing:.3px}
.card h3 .ico{font-size:14px;opacity:.9}
.card .meta{font-size:11px;color:var(--text3);font-weight:600;margin-left:auto}
.card .chart-wrap{position:relative;width:100%;height:260px}
.card .chart-wrap.sm{height:180px}
.card .loading{text-align:center;padding:30px 10px;color:var(--text3);font-size:12px}
.card .loading::after{content:'';display:block;width:22px;height:22px;margin:12px auto 0;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.card .error{text-align:center;padding:20px 10px;color:var(--red);font-size:12px;background:var(--red-bg);border-radius:10px}
.card .empty{text-align:center;padding:30px 10px;color:var(--text3);font-size:12px;font-style:italic}
@keyframes spin{to{transform:rotate(360deg)}}

/* Leaderboard tables */
.leader{border-top:1px solid var(--border);padding-top:8px}
.leader-row{display:grid;grid-template-columns:24px 1fr auto auto;gap:10px;align-items:center;padding:8px 4px;border-bottom:1px solid var(--border);transition:background .15s}
.leader-row:hover{background:var(--surface3)}
.leader-row:last-child{border-bottom:none}
.leader-rank{font-size:11px;color:var(--text3);font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.leader-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leader-sub{font-size:11px;color:var(--text3);font-weight:500;margin-left:6px}
.leader-val{font-size:13px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;text-align:right}
.leader-bar{grid-column:2 / -1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-top:4px}
.leader-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),rgba(255,131,25,.3));border-radius:2px;transition:width .6s ease}
.leader-row.mgr .leader-bar-fill{background:linear-gradient(90deg,var(--green),rgba(14,203,129,.3))}
.leader-row.stock .leader-bar-fill{background:linear-gradient(90deg,var(--blue),rgba(51,117,187,.3))}
.leader-row.ar .leader-bar-fill{background:linear-gradient(90deg,var(--red),rgba(246,70,93,.3))}

/* Mini FX / forecast info rows */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
.info-cell{padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;transition:background .15s}
.info-cell:hover{background:var(--surface3)}
.info-cell .info-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:700;margin-bottom:3px}
.info-cell .info-val{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text);letter-spacing:-.3px;line-height:1.2}
.info-cell .info-val.pos{color:var(--green)}
.info-cell .info-val.neg{color:var(--red)}
.info-cell .info-sub{font-size:10.5px;color:var(--text3);margin-top:3px}
.info-cell .info-trend{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:4px;font-size:9.5px;font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
.info-cell .info-trend.up{background:var(--red-bg);color:var(--red)}
.info-cell .info-trend.down{background:var(--green-bg);color:var(--green)}
.info-cell .info-trend.flat{background:var(--bg3);color:var(--text3)}

/* Module gate banner */
.hint{padding:30px;background:var(--surface2);border:1px dashed var(--border2);border-radius:14px;text-align:center;color:var(--text3);font-size:13px}
.hint .ic{font-size:32px;display:block;margin-bottom:10px;opacity:.7}

.denied{grid-column:1/-1;padding:30px;text-align:center;color:var(--text3);background:var(--surface2);border:1px dashed var(--border2);border-radius:14px;font-size:13px}
.denied .ic{font-size:22px;display:block;margin-bottom:6px;opacity:.7}

/* Warehouse widget */
.wh-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.wh-stat{padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;gap:3px;transition:background .15s}
.wh-stat:hover{background:var(--surface3)}
.wh-stat .wh-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.wh-stat .wh-val{font-size:20px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1.2}
/* wh-stat org accents прибрано */
.wh-stat .wh-sub{font-size:10.5px;color:var(--text3);font-weight:500}

/* Cash-flow summary */
.cf-line{display:flex;align-items:center;justify-content:space-between;padding:9px 2px;border-bottom:1px solid var(--border);font-size:13px}
.cf-line:last-child{border-bottom:none}
.cf-line .cf-lbl{color:var(--text2);display:flex;align-items:center;gap:8px}
.cf-line .cf-val{font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.cf-line.cf-total{padding-top:12px;margin-top:4px;border-top:1.5px solid var(--border2);font-weight:700}
.cf-line.cf-total .cf-lbl{color:var(--text)}

/* "More" button below leaderboards */
.more-btn{margin-top:10px;width:100%;padding:10px 14px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s,color .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.more-btn:hover{background:var(--surface3);border-color:var(--accent);color:var(--accent)}
.more-btn:active{transform:scale(.99)}

/* ═══ MODAL ═══ */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;transition:opacity .18s ease-out}
.modal-backdrop.open{opacity:1}
.modal-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:min(720px,100%);max-height:min(calc(100vh - 48px),860px);display:flex;flex-direction:column;box-shadow:var(--shadow-md);transform:translateY(10px) scale(.98);transition:transform .22s cubic-bezier(.2,.8,.25,1)}
.modal-backdrop.open .modal-card{transform:translateY(0) scale(1)}
.modal-head{display:flex;align-items:flex-start;gap:12px;padding:18px 22px 14px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:800;letter-spacing:.2px;color:var(--text)}
.modal-sub{font-size:12px;color:var(--text3);margin-top:3px;font-weight:500}
.modal-close{margin-left:auto;width:30px;height:30px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--text2);cursor:pointer;font:inherit;font-size:14px;display:inline-flex;align-items:center;justify-content:center;transition:background .15s,color .15s,border-color .15s}
.modal-close:hover{background:var(--red-bg);color:var(--red);border-color:rgba(246,70,93,.3)}
.modal-body{padding:16px 22px 22px;overflow-y:auto;flex:1}
.modal-body .leader{border-top:none;padding-top:0}

/* Ticker row — Binance-style */
.ticker{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.ticker::-webkit-scrollbar{display:none}
.ticker-pill{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:11.5px;font-weight:600;color:var(--text2);white-space:nowrap}
.ticker-pill b{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums}
.ticker-pill .up{color:var(--green);font-weight:700}
.ticker-pill .down{color:var(--red);font-weight:700}

@media(max-width:900px){
  .block-body{padding:14px}
  .block-head{padding:14px 16px}
}
@media(max-width:720px){
  .wrap{padding:12px}
  .kpi .kpi-val{font-size:18px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .card .chart-wrap{height:220px}
  .hero h1{font-size:18px}
  .block-title{font-size:13px}
}
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="hero">
      <div>
        <h1 id="heroTitle">🧭 Дашборд</h1>
        <div class="sub" id="heroSub">Ключові показники компанії</div>
      </div>
    </div>

    <div class="toolbar">
      <span class="lbl">Період</span>
      <input type="date" id="fromIn">
      <span style="color:var(--text3)">—</span>
      <input type="date" id="toIn">
      <span class="group" id="periodGroup">
        <span class="chip" data-preset="month">Цей місяць</span>
        <span class="chip" data-preset="prevmonth">Минулий</span>
        <span class="chip" data-preset="quarter">Квартал</span>
        <span class="chip" data-preset="year">Рік</span>
      </span>
      <span class="sep"></span>
      <span class="group" id="orgGroup">
        <span class="chip active" data-org="">Всі</span>
        <span class="chip" data-org="Реакт">Реакт</span>
        <span class="chip" data-org="Генерація">Генерація</span>
      </span>
      <span class="sep"></span>
      <button class="btn btn--secondary btn--sm" onclick="reloadAll()">🔄 Оновити</button>
    </div>

    <!-- Hidden host for cards without a home (keeps legacy IDs) -->
    <div id="kpiGrid" style="display:none"></div>

    <!-- ═══ БЛОК: КЛЮЧОВІ ПОКАЗНИКИ ═══ -->
    <section class="block b-finance" id="sectionKey" style="display:none">
      <div class="block-head">
        <div class="block-title">Ключові показники</div>
        <div class="block-meta" id="keyMeta"></div>
      </div>
      <div class="block-body">
        <div class="kpi-row" id="keyKpis"></div>
      </div>
    </section>

    <!-- ═══ БЛОК: РЕЙТИНГ МЕНЕДЖЕРІВ ═══ -->
    <section class="block b-sales" id="sectionSales" style="display:none">
      <div class="block-head">
        <div class="block-title">Рейтинг менеджерів</div>
        <div class="block-meta" id="salesBlockMeta"></div>
      </div>
      <div class="block-body">
        <div class="card" id="cardManagers">
          <div id="managersBody"><div class="loading">Завантаження…</div></div>
        </div>
      </div>
    </section>

    <!-- No-access placeholder -->
    <div id="noAccess" style="display:none"></div>

  </div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev';

// ─── Session gate (dashboard role) + unified header ───
Auth.require('dashboard').then(user => {
  window.__user = user;
  AppHeader.mount({ active: 'dashboard', user });
  document.getElementById('heroTitle').textContent = `🧭 Привіт, ${user.name ? user.name.split(' ')[0] : 'друже'}!`;
  document.getElementById('heroSub').textContent = roleSummary(user);

  // Filter org chips based on user.orgs access
  const userOrgs = user.orgs || {};
  const hasAnyOrg = Object.values(userOrgs).some(v => v);
  if (hasAnyOrg) {
    const orgChips = document.querySelectorAll('#orgGroup .chip[data-org]');
    let hiddenCount = 0;
    orgChips.forEach(chip => {
      const org = chip.dataset.org;
      if (org && !userOrgs[org]) { chip.style.display = 'none'; hiddenCount++; }
    });
    // If one of the specific orgs is hidden, auto-select "all" but remember user's org set
    const visibleOrgs = Array.from(orgChips).filter(c => c.style.display !== 'none').map(c => c.dataset.org);
    // If only one org is available, auto-select that one (hide "all")
    if (visibleOrgs.length === 2 && visibleOrgs[0] === '') {
      // User only has one specific org access
      const allChip = document.querySelector('#orgGroup .chip[data-org=""]');
      const specificChip = document.querySelector(`#orgGroup .chip[data-org="${visibleOrgs[1]}"]`);
      if (specificChip) {
        allChip.classList.remove('active');
        specificChip.classList.add('active');
        state.org = visibleOrgs[1];
      }
    }
  }

  bindToolbar();
  setPreset('month');
});

function roleSummary(user) {
  const r = user.roles || {};
  const mods = [];
  if (r.finance)    mods.push('Фінанси');
  if (r.sales)      mods.push('Продажі');
  if (r.warehouses) mods.push('Склад');
  if (r.forecast)   mods.push('Закупівлі');
  if (r.home)       mods.push('Порівняння цін');
  if (mods.length === 0) return 'Вам доступна лише загальна інформація — попросіть адміна відкрити модулі.';
  return 'Доступно: ' + mods.join(' · ');
}

// ─── State ───
function _todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function _localISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
const state = {
  preset: 'month',
  from: '', to: '',
  org: '',
  fx: null,                // cached USD/UAH for sales USD conversion
  managersAll: null,       // full manager list for modal
  revTrend: null,          // { buckets, values, granularity } — "Оплачено"
  netTrend: null,          // same shape — "Чистий прибуток" з P&L
  modalChart: null,        // live Chart.js instance inside modal (destroy on close)
};

const MN_FULL = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const MN_SHORT = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];

function fmt(n, dec = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function fmtMoney(n, cur = '$', dec = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const sign = n < 0 ? '−' : '';
  return sign + fmt(Math.abs(n), dec) + ' ' + cur;
}
function fmtPct(n, dec = 1) {
  if (n === null || n === undefined || !isFinite(n)) return '—';
  return (n * 100).toFixed(dec) + '%';
}
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function bindToolbar() {

function setPreset(p) {
  state.preset = p;
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  let from, to = now;
  if (p === 'month')          from = new Date(y, m, 1);
  else if (p === 'prevmonth') { from = new Date(y, m-1, 1); to = new Date(y, m, 0); }
  else if (p === 'quarter')   { const q = Math.floor(m/3); from = new Date(y, q*3, 1); }
  else if (p === 'year')      from = new Date(y, 0, 1);
  state.from = _localISO(from);
  state.to = _localISO(to);
  const fi = document.getElementById('fromIn'); if (fi) fi.value = state.from;
  const ti = document.getElementById('toIn');   if (ti) ti.value = state.to;
  document.querySelectorAll('#periodGroup .chip').forEach(c => c.classList.toggle('active', c.dataset.preset === p));
  reloadAll();
}

// Same as finance — detect preset from from/to pair
function detectPreset(from, to) {
  if (!from || !to) return '';
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  const iso = d => _localISO(d);
  const monthStart = iso(new Date(y, m, 1));
  const monthEnd   = iso(new Date(y, m + 1, 0));
  if (from === monthStart && to >= monthStart && to <= monthEnd) return 'month';
  const prevStart = iso(new Date(y, m - 1, 1));
  const prevEnd   = iso(new Date(y, m, 0));
  if (from === prevStart && to === prevEnd) return 'prevmonth';
  const q = Math.floor(m / 3);
  const qStart = iso(new Date(y, q * 3, 1));
  const qEnd   = iso(new Date(y, (q + 1) * 3, 0));
  if (from === qStart && to >= qStart && to <= qEnd) return 'quarter';
  const yStart = iso(new Date(y, 0, 1));
  const yEnd   = iso(new Date(y, 11, 31));
  if (from === yStart && to >= yStart && to <= yEnd) return 'year';
  return '';
}

function dashDateChanged() {
  state.preset = detectPreset(state.from, state.to) || '';
  document.querySelectorAll('#periodGroup .chip').forEach(c => c.classList.toggle('active', c.dataset.preset === state.preset));
  reloadAll();
}

function updateKpi(id, { val, sub = '', cls = '', error = false, numeric = null }) {
  const el = document.getElementById(id);

  if (error) el.classList.add('err');
  const valEl = el.querySelector('.kpi-val');
  const subEl = el.querySelector('.kpi-sub');
  valEl.classList.remove('pos', 'neg');
  if (cls) valEl.classList.add(cls);
  if (numeric && numeric.target != null && !error) {
    animateNumber(valEl, numeric.target, numeric.format);
  } else {
    valEl.textContent = val;
  }
  subEl.innerHTML = sub;
}

// Simple count-up animation for KPI numbers. Uses rAF; falls back to immediate
// render if rAF is paused (e.g. background tab / headless preview).
function animateNumber(el, target, formatFn) {
  const DUR = 650;
  const prev = Number(el.dataset.counting || 0);
  if (!isFinite(target)) { el.textContent = formatFn(0); return; }
  // Always paint the final value immediately so values render even if rAF
  // никогда не вистріляє (headless / background tab).
  el.textContent = formatFn(target);
  el.dataset.counting = String(target);
  const start = performance.now();
  cancelAnimationFrame(el._raf || 0);
  const ease = t => 1 - Math.pow(1 - t, 3);
  const tick = now => {
    const t = Math.min(1, (now - start) / DUR);
    const cur = prev + (target - prev) * ease(t);
    el.textContent = formatFn(cur);
    if (t < 1) el._raf = requestAnimationFrame(tick);
    else { el.textContent = formatFn(target); el.dataset.counting = String(target); }
  };
  el._raf = requestAnimationFrame(tick);
}

// Shorthand formatters for KPI animation
const kpiMoneyFmt = (cur = '$') => v => fmtMoney(v, cur);
const kpiNumFmt = (dec = 0) => v => fmt(v, dec);

// ─── KEY INDICATORS: обсяг реалізації · дебіторка · кредиторка ───
async function loadKey() {
  const u = window.__user;
  if (!u.roles || !u.roles.finance) return;
  const orgQ = state.org ? '&org=' + encodeURIComponent(state.org) : '';

  // Previous-period comparison
  const prev = prevPeriodOf(state.from, state.to);

  // Гранулярність trend-ряду зав'язана на preset:
  //  • quarter → 6 кварталів
  //  • year    → 12 місяців
  //  • решта   → 6 місяців
  // Sparkline: завжди поточний рік (місячні точки) — НЕЗАЛЕЖНО від обраного фільтра
  const todayDate = new Date();
  const todayIso = _localISO(todayDate);
  const trendBuckets = buildYtdBuckets(todayDate, todayIso);
  const sparkReqs = trendBuckets.map(b =>
    fetch(API_URL + `?action=sales_report&from=${b.from}&to=${b.to}${orgQ}`).then(r => r.json()).catch(() => null)
  );

  const qSales   = `?action=sales_report&from=${state.from}&to=${state.to}${orgQ}`;
  const qSalesP  = prev ? `?action=sales_report&from=${prev.from}&to=${prev.to}${orgQ}` : null;
  // mutual_settlements — AR/AP завжди станом на сьогодні (не залежить від фільтра).
  // Порівняння робимо з балансом місяць тому — щоб delta показувала "vs минулий місяць".
  const msOnToday = todayIso;
  const msOnMonthAgo = (() => { const d = new Date(todayDate); d.setMonth(d.getMonth() - 1); return _localISO(d); })();
  const qMS      = `?action=mutual_settlements&on=${msOnToday}${orgQ}`;
  const qMSp     = `?action=mutual_settlements&on=${msOnMonthAgo}${orgQ}`;
  const qFx      = state.fx ? Promise.resolve({ rates: state.fx }) : fetch(API_URL + '?action=fx_rates').then(r => r.json()).catch(() => null);
  // P&L (accrual) — один запит на весь trend-діапазон дає byMonth для всіх
  // потрібних місяців (дешевше ніж 6-12 окремих викликів).
  const trendFrom = trendBuckets[0].from;
  const trendEnd  = trendBuckets[trendBuckets.length - 1].to;
  const qPnl      = `?action=pnl_accrual_report&from=${state.from}&to=${state.to}${orgQ}`;
  const qPnlP     = prev ? `?action=pnl_accrual_report&from=${prev.from}&to=${prev.to}${orgQ}` : null;
  const qPnlT     = `?action=pnl_accrual_report&from=${trendFrom}&to=${trendEnd}${orgQ}`;

  const [salesR, salesPrevR, ms, msPrev, fx, pnl, pnlPrev, pnlTrend, ...sparkR] = await Promise.allSettled([
    fetch(API_URL + qSales).then(r => r.json()),
    qSalesP ? fetch(API_URL + qSalesP).then(r => r.json()) : Promise.resolve(null),
    fetch(API_URL + qMS).then(r => r.json()),
    qMSp ? fetch(API_URL + qMSp).then(r => r.json()) : Promise.resolve(null),
    qFx,
    fetch(API_URL + qPnl).then(r => r.json()),
    qPnlP ? fetch(API_URL + qPnlP).then(r => r.json()) : Promise.resolve(null),
    fetch(API_URL + qPnlT).then(r => r.json()),
    ...sparkReqs,
  ]);

  // Ensure FX is ready for USD conversion (reuse if loadSales already set it)
  if (fx && fx.status === 'fulfilled' && fx.value && fx.value.rates) {
    state.fx = fx.value.rates;
  }

  // Local shortcut — delegates to top-level helper (same instance for modal)
  const sumPaidUsd = (payload) => salesPaidUsd(payload, state.org);

  // 1) ОПЛАЧЕНО ЗА ПЕРІОД = sum of manager payments (USD) — matches Sales page
  if (salesR.status === 'fulfilled' && !salesR.value.error) {
    const cur = sumPaidUsd(salesR.value);
    let prevVal = null;
    if (salesPrevR && salesPrevR.status === 'fulfilled' && salesPrevR.value && !salesPrevR.value.error) {
      const p = sumPaidUsd(salesPrevR.value);
      if (p && p.ok) prevVal = p.total;
    }
    updateKpi('kpiRevenue', {
      numeric: { target: cur ? cur.total : 0, format: kpiMoneyFmt('$') },
      sub: `оплати менеджерам${cur && !cur.ok ? ' <span style="color:var(--yellow)">· не всі курси</span>' : ''} ${deltaHtml(cur ? cur.total : 0, prevVal)}`,
    });
    // Sparkline over 6 months — sum paid USD from each monthly sales_report
    const series = sparkR.map(r => {
      if (r.status !== 'fulfilled' || !r.value || r.value.error) return 0;
      const v = sumPaidUsd(r.value);
      return v ? v.total : 0;
    });
    drawSparkline('kpiRevenueSpark', series, { color: 'var(--green)' });
    state.revTrend = { buckets: trendBuckets, values: series, granularity: 'month' };
    // Make KPI card clickable — opens modal with full chart
    const kpiEl = document.getElementById('kpiRevenue');
    if (kpiEl && !kpiEl._clickWired) {
      kpiEl.classList.add('clickable');
      kpiEl.addEventListener('click', () => openRevenueModal());
      kpiEl._clickWired = true;
    }
  } else {
    const msg = salesR.status === 'fulfilled' ? (salesR.value.error || 'помилка') : salesR.reason.message;
    updateKpi('kpiRevenue', { val: 'Помилка', sub: esc(msg.slice(0, 80)), error: true });
  }

  // 2+3) ДЕБІТОРКА + КРЕДИТОРКА — обидві з одного mutual_settlements payload
  if (ms.status === 'fulfilled' && !ms.value.error) {
    const d = ms.value;
    const arCur = msArTotal(d);
    const apCur = msApTotal(d);
    let arPrev = null, apPrev = null;
    if (msPrev && msPrev.status === 'fulfilled' && msPrev.value && !msPrev.value.error) {
      arPrev = msArTotal(msPrev.value);
      apPrev = msApTotal(msPrev.value);
    }
    updateKpi('kpiAR', {
      numeric: { target: arCur, format: kpiMoneyFmt('$') },
      sub: `станом на сьогодні ${deltaHtml(arCur, arPrev, 'down')}`,
    });
    updateKpi('kpiAP', {
      numeric: { target: apCur, format: kpiMoneyFmt('$') },
      sub: `станом на сьогодні ${deltaHtml(apCur, apPrev, 'down')}`,
    });
    // Один спільний набір mutual_settlements викликів для обох sparkline-ів
    fetchMsSparklines(trendBuckets, orgQ);
    wireKpiClick('kpiAR', openArModal);
    wireKpiClick('kpiAP', openApModal);
  } else {
    const msg = ms.status === 'fulfilled' ? (ms.value.error || 'помилка') : ms.reason.message;
    updateKpi('kpiAR', { val: 'Помилка', sub: esc(msg.slice(0, 80)), error: true });
    updateKpi('kpiAP', { val: 'Помилка', sub: esc(msg.slice(0, 80)), error: true });
  }

  // 4) ЧИСТИЙ ПРИБУТОК = P&L accrual → (revenue + otherIncome) − cogs − totalExpenses
  function netFromPnl(p) {
    if (!p) return null;
    const rev = (p.revenue && p.revenue.total) || 0;
    const inc = (p.otherIncome && p.otherIncome.total) || 0;
    const cogs = (p.cogs && p.cogs.total) || 0;
    const exp = (p.totalExpenses && p.totalExpenses.total) || 0;
    return rev + inc - cogs - exp;
  }
  // Aggregate P&L monthly net profit into trend buckets (quarter-aware)
  function netByMonth(p) {
    if (!p || !Array.isArray(p.months)) return null;
    const byM = {};
    p.months.forEach(m => {
      const rev = ((p.revenue && p.revenue.byMonth && p.revenue.byMonth[m]) || 0)
                + ((p.otherIncome && p.otherIncome.byMonth && p.otherIncome.byMonth[m]) || 0);
      const cogs = (p.cogs && p.cogs.byMonth && p.cogs.byMonth[m]) || 0;
      const exp = (p.totalExpenses && p.totalExpenses.byMonth && p.totalExpenses.byMonth[m]) || 0;
      byM[m] = rev - cogs - exp;
    });
    return byM;
  }
  // Sum net from pnlTrend's byMonth map across bucket.from..bucket.to (month-level)
  function aggregateBuckets(byM) {
    if (!byM) return trendBuckets.map(() => 0);
    return trendBuckets.map(b => {
      // Iterate months between b.from and b.to inclusive
      const f = new Date(b.from + 'T00:00:00');
      const t = new Date(b.to + 'T00:00:00');
      let sum = 0;
      const d = new Date(f.getFullYear(), f.getMonth(), 1);
      while (d <= t) {
        const mk = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        sum += (byM[mk] || 0);
        d.setMonth(d.getMonth() + 1);
      }
      return sum;
    });
  }

  if (pnl.status === 'fulfilled' && !pnl.value.error) {
    const curNet = netFromPnl(pnl.value);
    let prevNet = null;
    if (pnlPrev && pnlPrev.status === 'fulfilled' && pnlPrev.value && !pnlPrev.value.error) {
      prevNet = netFromPnl(pnlPrev.value);
    }
    const revenue = ((pnl.value.revenue && pnl.value.revenue.total) || 0)
                  + ((pnl.value.otherIncome && pnl.value.otherIncome.total) || 0);
    const margin = revenue > 0 ? (curNet / revenue) : 0;
    updateKpi('kpiNet', {
      numeric: { target: curNet, format: kpiMoneyFmt('$') },
      cls: curNet < 0 ? 'neg' : (curNet > 0 ? 'pos' : ''),
      sub: `маржа ${revenue ? fmtPct(margin) : '—'} ${deltaHtml(curNet, prevNet)}`,
    });
    // Sparkline: aggregate pnlTrend's byMonth into buckets
    if (pnlTrend.status === 'fulfilled' && !pnlTrend.value.error) {
      const byM = netByMonth(pnlTrend.value);
      const series = aggregateBuckets(byM);
      drawSparkline('kpiNetSpark', series, { color: 'var(--green)' });
      state.netTrend = { buckets: trendBuckets, values: series, granularity: 'month' };
      const netEl = document.getElementById('kpiNet');
      if (netEl && !netEl._clickWired) {
        netEl.classList.add('clickable');
        netEl.addEventListener('click', () => openNetModal());
        netEl._clickWired = true;
      }
    }
  } else {
    const msg = pnl.status === 'fulfilled' ? (pnl.value.error || 'помилка') : pnl.reason.message;
    updateKpi('kpiNet', { val: 'Помилка', sub: esc(msg.slice(0, 80)), error: true });
  }
}

// Helpers preserved from legacy — trimmed to what key KPIs need
// Build trend buckets for the sparkline / modal chart based on selected preset.
// Returns [{ from:'YYYY-MM-DD', to:'YYYY-MM-DD', label:'Q1 26' | 'Квітень 2026', isCurrent }]
// Універсальний генератор buckets: mode + кількість.
//   mode='month'   → N останніх місяців
//   mode='quarter' → N останніх кварталів
//   mode='year'    → N останніх років
// baseTo — дата-прив'язка (зазвичай state.to), stateToIso — обрізаємо
// останній bucket до цієї дати (щоб "поточний" не містив майбутніх днів).
function buildTrendBuckets(mode, n, baseToDate, stateToIso) {
  const y = baseToDate.getFullYear(), m = baseToDate.getMonth();
  const buckets = [];
  if (mode === 'quarter') {
    const curQ = Math.floor(m / 3);
    for (let i = n - 1; i >= 0; i--) {
      const totalQ = y * 4 + curQ - i;
      const qy = Math.floor(totalQ / 4);
      const qq = ((totalQ % 4) + 4) % 4;
      const startMonth = qq * 3;
      const qStart = new Date(qy, startMonth, 1);
      const qEnd   = new Date(qy, startMonth + 3, 0);
      const isCur = i === 0;
      buckets.push({
        from: _localISO(qStart),
        to: isCur ? stateToIso : _localISO(qEnd),
        label: `Q${qq + 1} '${String(qy).slice(2)}`,
        isCurrent: isCur,
      });
    }
  } else if (mode === 'year') {
    for (let i = n - 1; i >= 0; i--) {
      const yy = y - i;
      const yStart = new Date(yy, 0, 1);
      const yEnd   = new Date(yy, 11, 31);
      const isCur = i === 0;
      buckets.push({
        from: _localISO(yStart),
        to: isCur ? stateToIso : _localISO(yEnd),
        label: String(yy),
        isCurrent: isCur,
      });
    }
  } else {
    // months
    for (let i = n - 1; i >= 0; i--) {
      const mStart = new Date(y, m - i, 1);
      const mEnd   = new Date(y, m - i + 1, 0);
      const isCur = i === 0;
      buckets.push({
        from: _localISO(mStart),
        to: isCur ? stateToIso : _localISO(mEnd),
        label: MN_SHORT[mStart.getMonth()] + " '" + String(mStart.getFullYear()).slice(2),
        isCurrent: isCur,
      });
    }
  }
  return buckets;
}

// Sparkline під KPI — поточний рік: Січень..поточний місяць
function buildYtdBuckets(baseToDate, stateToIso) {
  const baseTo = baseToDate || new Date();
  const n = baseTo.getMonth() + 1; // 1..12
  return buildTrendBuckets('month', n, baseTo, stateToIso || _localISO(baseTo));
}

function prevPeriodOf(from, to) {
  try {
    const f = new Date(from + 'T00:00:00');
    const t = new Date(to + 'T00:00:00');
    const dayMs = 86400000;
    const lenDays = Math.round((t - f) / dayMs) + 1;
    const prevTo = new Date(f.getTime() - dayMs);
    const prevFrom = new Date(prevTo.getTime() - (lenDays - 1) * dayMs);
    return { from: _localISO(prevFrom), to: _localISO(prevTo) };
  } catch { return null; }
}

function arTotalUsd(d) {
  if (!d) return 0;
  let totalUsd = 0;
  if (Array.isArray(d.currencies)) {
    d.currencies.forEach(c => {
      if (c.totalUsd != null) totalUsd += c.totalUsd;
      else if (c.clients) c.clients.forEach(cl => { if (cl.totalUsd != null) totalUsd += cl.totalUsd; });
    });
  } else if (d.clients) {
    d.clients.forEach(cl => { if (cl.totalUsd != null) totalUsd += cl.totalUsd; });
  } else if (d.totalUsd != null) totalUsd = d.totalUsd;
  return totalUsd;
}

function deltaHtml(cur, prev, good = 'up') {
  if (prev == null || !isFinite(prev) || Math.abs(prev) < 0.5) return '';
  const dp = (cur - prev) / Math.abs(prev);
  const sign = dp > 0 ? '▲' : (dp < 0 ? '▼' : '–');
  const cls = dp > 0.0001 ? (good === 'up' ? 'up' : 'down') : (dp < -0.0001 ? (good === 'up' ? 'down' : 'up') : '');
  return `<span class="kpi-delta ${cls}">${sign} ${Math.abs(dp*100).toFixed(1)}%</span>`;
}

// Sparkline — тонка лінія з ліво-до-права заливкою, 180x30
// Спільна обгортка: позначити KPI як клікабельний + прив'язати модалку один раз
function wireKpiClick(kpiId, openFn) {

// Підсумки з mutual_settlements payload:
//   ar (клієнти нам винні)   = sum(arRows.borgUsd)
//   ap (ми винні постачальникам) = sum(apRows.nashUsd)
function msArTotal(d) {
  if (!d || !Array.isArray(d.ar)) return 0;
  return d.ar.reduce((s, r) => s + (r.borgUsd || 0), 0);
}
function msApTotal(d) {
  if (!d || !Array.isArray(d.ap)) return 0;
  return d.ap.reduce((s, r) => s + (r.nashUsd || 0), 0);
}

async function fetchMsSparklines(buckets, orgQ) {

function drawSparkline(canvasId, series, opts = {}) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !series || series.length < 2) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width = 180 * dpr;
  const H = canvas.height = 30 * dpr;
  canvas.style.width = '180px'; canvas.style.height = '30px';
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  const min = Math.min(...series, 0);
  const max = Math.max(...series, 1);
  const range = max - min || 1;
  const step = (W - 4 * dpr) / (series.length - 1);
  const y = v => H - 2 * dpr - ((v - min) / range) * (H - 4 * dpr);
  const color = getComputedStyle(canvas).getPropertyValue('color') || '#ff8319';
  const cssColor = opts.color && opts.color.startsWith('var(')
    ? getComputedStyle(document.documentElement).getPropertyValue(opts.color.slice(4, -1)).trim() || '#22c55e'
    : (opts.color || '#ff8319');
  // Fill gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, cssColor + '55');
  grad.addColorStop(1, cssColor + '00');
  ctx.beginPath();
  ctx.moveTo(2 * dpr, H);
  series.forEach((v, i) => ctx.lineTo(2 * dpr + i * step, y(v)));
  ctx.lineTo(2 * dpr + (series.length - 1) * step, H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  // Line
  ctx.beginPath();
  series.forEach((v, i) => {
    const xi = 2 * dpr + i * step;
    const yi = y(v);
    if (i === 0) ctx.moveTo(xi, yi); else ctx.lineTo(xi, yi);
  });
  ctx.strokeStyle = cssColor;
  ctx.lineWidth = 1.5 * dpr;
  ctx.lineJoin = 'round';
  ctx.stroke();
  // Last point dot
  const lx = 2 * dpr + (series.length - 1) * step;
  const ly = y(series[series.length - 1]);
  ctx.beginPath();
  ctx.arc(lx, ly, 2.5 * dpr, 0, Math.PI * 2);
  ctx.fillStyle = cssColor;
  ctx.fill();
}

// ─── CONVERSION (ліди / успіх / кінцева конверсія) ───
async function loadConversion() {
  const u = window.__user;
  if (!u.roles || !u.roles.reports) return;

  // Поточний період (з фільтра) + місяць тому для delta
  const todayDate = new Date();
  const todayIso = _localISO(todayDate);
  const monthAgo = (() => { const d = new Date(todayDate); d.setMonth(d.getMonth() - 1); return _localISO(d); })();

  const qCur  = `?action=sheet_funnel&from=${state.from}&to=${state.to}`;
  const qPrev = (() => {
    const prev = prevPeriodOf(state.from, state.to);
    return prev ? `?action=sheet_funnel&from=${prev.from}&to=${prev.to}` : null;
  })();

  // Sparkline: 12 місяців поточного року (як у інших ключових KPI)
  const trendBuckets = buildYtdBuckets(todayDate, todayIso);
  const sparkReqs = trendBuckets.map(b =>
    fetch(API_URL + `?action=sheet_funnel&from=${b.from}&to=${b.to}`).then(r => r.json()).catch(() => null)
  );

  const [curR, prevR, ...sparkR] = await Promise.allSettled([
    fetch(API_URL + qCur).then(r => r.json()),
    qPrev ? fetch(API_URL + qPrev).then(r => r.json()) : Promise.resolve(null),
    ...sparkReqs,
  ]);

  const getCur = r => (r && r.status === 'fulfilled' && r.value && !r.value.error) ? r.value : null;
  const cur = getCur(curR);
  const prev = getCur(prevR);

  const curLeads = cur ? (cur.leads || 0) : 0;
  const curWon   = cur ? (cur.won   || 0) : 0;
  const curConv  = curLeads ? (curWon / curLeads * 100) : 0;
  const prevLeads = prev ? (prev.leads || 0) : null;
  const prevWon   = prev ? (prev.won   || 0) : null;
  const prevConv  = (prev && prev.leads) ? (prev.won / prev.leads * 100) : null;

  if (!cur) {
    const msg = curR.status === 'fulfilled' ? (curR.value.error || 'помилка') : curR.reason?.message;
    ['kpiLeads','kpiWon','kpiConv'].forEach(id =>
      updateKpi(id, { val: 'Помилка', sub: esc(String(msg).slice(0, 80)), error: true })
    );
    return;
  }

  updateKpi('kpiLeads', {
    numeric: { target: curLeads, format: kpiNumFmt(0) },
    sub: `нові звернення ${deltaHtml(curLeads, prevLeads)}`,
  });
  updateKpi('kpiWon', {
    numeric: { target: curWon, format: kpiNumFmt(0) },
    sub: `закрито успішно ${deltaHtml(curWon, prevWon)}`,
  });
  updateKpi('kpiConv', {
    numeric: { target: curConv, format: v => v.toFixed(1) + '%' },
    sub: `успіх / ліди ${deltaHtml(curConv, prevConv)}`,
  });

  // Sparklines + клік на модалки
  const leadsSeries = sparkR.map(r => (r.status === 'fulfilled' && r.value) ? (r.value.leads || 0) : 0);
  const wonSeries   = sparkR.map(r => (r.status === 'fulfilled' && r.value) ? (r.value.won   || 0) : 0);
  const convSeries  = sparkR.map((r, i) => leadsSeries[i] ? (wonSeries[i] / leadsSeries[i] * 100) : 0);
  drawSparkline('kpiLeadsSpark', leadsSeries, { color: 'var(--accent)' });
  drawSparkline('kpiWonSpark',   wonSeries,   { color: 'var(--green)' });
  drawSparkline('kpiConvSpark',  convSeries,  { color: 'var(--accent)' });
  wireKpiClick('kpiLeads', openLeadsModal);
  wireKpiClick('kpiWon',   openWonModal);
  wireKpiClick('kpiConv',  openConvModal);
}

async function loadSales() {
  const u = window.__user;
  if (!u.roles || !u.roles.sales) return;

  // When org is empty ("Всі") — не передаємо параметр, і worker поверне всі 3 орг.
  const orgQ = state.org ? '&org=' + encodeURIComponent(state.org) : '';
  const q = `?action=sales_report&from=${state.from}&to=${state.to}${orgQ}`;

  // Also fetch fx_rates for potential conversion
  const [salesR, fxR] = await Promise.allSettled([
    fetch(API_URL + q).then(r => r.json()),
    state.fx ? Promise.resolve({ rates: state.fx }) : fetch(API_URL + '?action=fx_rates').then(r => r.json()),
  ]);

  if (fxR.status === 'fulfilled' && fxR.value && fxR.value.rates) state.fx = fxR.value.rates;

  if (salesR.status !== 'fulfilled' || salesR.value.error) {
    const msg = salesR.status === 'fulfilled' ? (salesR.value.error || 'помилка') : salesR.reason.message;
    updateKpi('kpiSales', { val: 'Помилка', sub: esc(msg.slice(0,80)), error: true });
    document.getElementById('managersBody').innerHTML = `<div class="error">${esc(msg)}</div>`;
    return;
  }

  const d = salesR.value;
  // If "Всі" — aggregate both orgs; else use selected
  const orgsToSum = state.org ? [state.org] : ['Реакт', 'Генерація'];
  const managerTotals = {}; // name → { paid, remain, currencies: Set }
  let grandPaidUsd = 0, grandRemainUsd = 0, convOk = true;

  orgsToSum.forEach(orgKey => {
    const orgData = (d.byOrg || {})[orgKey];
    if (!orgData || !orgData.managers) return;
    orgData.managers.forEach(m => {
      if (!managerTotals[m.name]) managerTotals[m.name] = { name: m.name, paidUsd: 0, remainUsd: 0, ok: true, currencies: new Set() };
      const mt = managerTotals[m.name];
      m.currencies.forEach(C => {
        const pUsd = toUsd(C.paid, C.currency);
        const rUsd = toUsd(C.remain, C.currency);
        if (pUsd == null || rUsd == null) { mt.ok = false; convOk = false; }
        else {
          mt.paidUsd += pUsd;
          mt.remainUsd += rUsd;
          grandPaidUsd += pUsd;
          grandRemainUsd += rUsd;
        }
        mt.currencies.add(C.currency);
      });
    });
  });

  updateKpi('kpiSales', {
    numeric: { target: grandPaidUsd, format: kpiMoneyFmt('$') },
    sub: `потенціал ${fmtMoney(grandRemainUsd, '$')}${convOk ? '' : ' <span style="color:var(--yellow)">· не всі курси</span>'}`,
  });

  const managers = Object.values(managerTotals).sort((a, b) => b.paidUsd - a.paidUsd);
  state.managersAll = managers; // cache full list for modal
  if (!managers.length) {
    document.getElementById('managersBody').innerHTML = '<div class="empty">Немає оплат за цей період</div>';
    return;
  }
  const top = managers.slice(0, 6);
  const BONUS = 0.0008;
  const MGR_PLAN_USD = 300000; // план на період (узгоджено з sales.html)
  const rowHtml = (m, i) => {
    const planPct = Math.min(100, Math.round(m.paidUsd / MGR_PLAN_USD * 100));
    return `
    <div class="leader-row mgr">
      <div class="leader-rank">${i+1}</div>
      <div class="leader-name" title="${esc(m.name)}">${esc(m.name)}${m.ok ? '' : ' <span class="leader-sub" style="color:var(--yellow)">~</span>'}</div>
      <div class="leader-sub">${planPct}% плану · бонус ${fmtMoney(m.paidUsd * BONUS, '$')}</div>
      <div class="leader-val">${fmtMoney(m.paidUsd, '$')}</div>
      <div class="leader-bar" title="${planPct}% плану ($300k)"><div class="leader-bar-fill" style="width:${planPct}%"></div></div>
    </div>`;
  };
  const topHtml = top.map(rowHtml).join('');
  const extraBtn = managers.length > top.length
    ? `<button class="more-btn" onclick="openManagersModal()">Переглянути всіх (${managers.length}) →</button>`
    : '';
  document.getElementById('managersBody').innerHTML = `<div class="leader">${topHtml}</div>${extraBtn}`;
  const meta = document.getElementById('salesBlockMeta');
  if (meta) meta.textContent = `${managers.length} менеджерів · ${orgsToSum.join(', ')}`;
}

function openModal({ title, sub = '', body }) {

function closeModal() {

  if (!m) return;
  m.classList.remove('open');

function modalKeyHandler(e) { if (e.key === 'Escape') closeModal(); }

// Top-level helpers (used by loadKey + modal reload)
function salesPaidUsd(payload, orgFilter) {
  if (!payload) return null;
  const orgsToSum = orgFilter ? [orgFilter] : ['Реакт', 'Генерація'];
  let total = 0, ok = true;
  orgsToSum.forEach(o => {
    const od = (payload.byOrg || {})[o];
    if (!od || !od.managers) return;
    od.managers.forEach(m => {
      (m.currencies || []).forEach(C => {
        const v = toUsd(C.paid, C.currency);
        if (v == null) ok = false; else total += v;
      });
    });
  });
  return { total, ok };
}
function pnlNetByMonth(p) {
  if (!p || !Array.isArray(p.months)) return {};
  const byM = {};
  p.months.forEach(m => {
    const rev = ((p.revenue && p.revenue.byMonth && p.revenue.byMonth[m]) || 0)
              + ((p.otherIncome && p.otherIncome.byMonth && p.otherIncome.byMonth[m]) || 0);
    const cogs = (p.cogs && p.cogs.byMonth && p.cogs.byMonth[m]) || 0;
    const exp  = (p.totalExpenses && p.totalExpenses.byMonth && p.totalExpenses.byMonth[m]) || 0;
    byM[m] = rev - cogs - exp;
  });
  return byM;
}
function sumBucketMonths(bucket, byM) {
  const f = new Date(bucket.from + 'T00:00:00');
  const t = new Date(bucket.to + 'T00:00:00');
  let s = 0;
  const d = new Date(f.getFullYear(), f.getMonth(), 1);
  while (d <= t) {
    const mk = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    s += (byM[mk] || 0);
    d.setMonth(d.getMonth() + 1);
  }
  return s;
}

  reloadModalChart();
}

async function reloadModalChart() {
  const metric = state.modalMetric;
  const gran = state.modalGran || 'month';
  const n = GRAN_COUNT[gran] || 12;
  const baseTo = new Date(state.to + 'T00:00:00');
  const buckets = buildTrendBuckets(gran, n, baseTo, state.to);
  const orgQ = state.org ? '&org=' + encodeURIComponent(state.org) : '';

  // Loading state
  const sub = document.getElementById('modalSubText');
  if (sub) sub.textContent = 'Завантаження…';
  if (state.modalChart) { try { state.modalChart.destroy(); } catch(_) {} state.modalChart = null; }

  let values = [];
  if (metric === 'revenue') {
    const resps = await Promise.all(buckets.map(b =>
      fetch(API_URL + `?action=sales_report&from=${b.from}&to=${b.to}${orgQ}`).then(r => r.json()).catch(() => null)
    ));
    values = resps.map(p => {
      const v = salesPaidUsd(p, state.org);
      return v ? v.total : 0;
    });
  } else if (metric === 'net') {
    // Один запит pnl_accrual_report на увесь діапазон + агрегація по buckets
    const from = buckets[0].from;
    const to = buckets[buckets.length - 1].to;
    const p = await fetch(API_URL + `?action=pnl_accrual_report&from=${from}&to=${to}${orgQ}`).then(r => r.json()).catch(() => null);
    const byM = pnlNetByMonth(p);
    values = buckets.map(b => sumBucketMonths(b, byM));
  } else if (metric === 'ar' || metric === 'ap') {
    // Обидві беруться з mutual_settlements (point-in-time на bucket.to)
    const resps = await Promise.all(buckets.map(b =>
      fetch(API_URL + `?action=mutual_settlements&on=${b.to}${orgQ}`).then(r => r.json()).catch(() => null)
    ));
    values = resps.map(metric === 'ar' ? msArTotal : msApTotal);
  } else if (metric === 'leads' || metric === 'won' || metric === 'conv') {
    // sheet_funnel — per-bucket (period-based)
    const resps = await Promise.all(buckets.map(b =>
      fetch(API_URL + `?action=sheet_funnel&from=${b.from}&to=${b.to}`).then(r => r.json()).catch(() => null)
    ));
    values = resps.map(d => {
      if (!d || d.error) return 0;
      const leads = d.leads || 0;
      const won = d.won || 0;
      if (metric === 'leads') return leads;
      if (metric === 'won')   return won;
      // conv %: won / leads × 100
      return leads ? (won / leads * 100) : 0;
    });
  } else if (metric === 'suppDebt') {
    // suppliers_overview per bucket — we_owe_usd (борги наші постачальникам)
    const resps = await Promise.all(buckets.map(b =>
      fetch(API_URL + `?action=suppliers_overview&from=${b.from}&to=${b.to}`).then(r => r.json()).catch(() => null)
    ));
    values = resps.map(d => (d && d.kpi && Number(d.kpi.we_owe_usd)) || 0);
  }

  renderModalChart(buckets, values, gran, metric);
}

function renderModalChart(buckets, values, gran, metric) {
  const def = METRIC_DEFS[metric];
  const labels = buckets.map(b => b.label);
  const total = values.reduce((s, v) => s + v, 0);
  const avg = values.length ? total / values.length : 0;
  const max = values.length ? Math.max(...values) : 0;
  const min = values.length ? Math.min(...values) : 0;
  const unit = gran === 'quarter' ? 'кварталів' : gran === 'year' ? 'років' : 'місяців';
  const prevLabel = gran === 'quarter' ? 'попер. квартал' : gran === 'year' ? 'попер. рік' : 'попер. міс';
  const sub = document.getElementById('modalSubText');
  // Форматування значень — $, % або ціле число
  const fmtVal = (v) => {
    if (def.unit === '$') return fmtMoney(v, '$');
    if (def.unit === '%') return (v || 0).toFixed(1) + '%';
    return fmt(v, 0);
  };
  if (sub) sub.textContent = `${values.length} ${unit} · середнє ${fmtVal(avg)} · max ${fmtVal(max)} · min ${fmtVal(min)}`;
  const opts = { label: def.label, fmtVal };

  requestAnimationFrame(() => {
    const canvas = document.getElementById('revTrendCanvas');
    if (!canvas) return;
    const isDark = (document.documentElement.getAttribute('data-theme') || 'dark') !== 'light';
    const tick = isDark ? '#a3a3a3' : '#48484a';
    const grid = isDark ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.05)';
    const greenCss = getComputedStyle(document.documentElement).getPropertyValue('--green').trim() || '#22c55e';
    const accentCss = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#ff8319';

    const ctx = canvas.getContext('2d');
    // Area gradient (green → fade)
    const grad = ctx.createLinearGradient(0, 0, 0, 360);
    grad.addColorStop(0, greenCss + '55');
    grad.addColorStop(1, greenCss + '00');

    // Highlight last point (current month) — orange dot, others green
    const lastIdx = values.length - 1;
    const pointColors = values.map((_, i) => i === lastIdx ? accentCss : greenCss);
    const pointSizes  = values.map((_, i) => i === lastIdx ? 6 : 4);

    // Crosshair + active-dot plugin: vertical line on hover
    const crosshairPlugin = {
      id: 'crosshair',
      afterDraw(chart) {
        const tt = chart.tooltip;
        if (!tt || !tt._active || !tt._active.length) return;
        const active = tt._active[0];
        const x = active.element.x;
        const yTop = chart.chartArea.top;
        const yBot = chart.chartArea.bottom;
        const ctx = chart.ctx;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, yTop);
        ctx.lineTo(x, yBot);
        ctx.lineWidth = 1;
        ctx.strokeStyle = isDark ? 'rgba(255,255,255,.12)' : 'rgba(0,0,0,.12)';
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.restore();
      },
    };

    const hasNegatives = values.some(v => v < 0);
    state.modalChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: opts.label || '',
          data: values,
          borderColor: greenCss,
          borderWidth: 2,
          backgroundColor: grad,
          fill: true,
          tension: 0.35,
          pointBackgroundColor: pointColors,
          pointBorderColor: pointColors,
          pointRadius: pointSizes,
          pointHoverRadius: 8,
          pointHoverBackgroundColor: pointColors,
          pointHoverBorderColor: '#ffffff',
          pointHoverBorderWidth: 2,
          cubicInterpolationMode: 'monotone',
        }],
      },
      plugins: [crosshairPlugin],
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false, axis: 'x' },
        animation: { duration: 520, easing: 'easeOutCubic' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(18,18,18,.97)',
            borderColor: 'rgba(255,255,255,.1)',
            borderWidth: 1,
            titleColor: '#f5f5f5',
            bodyColor: '#f5f5f5',
            padding: 12,
            cornerRadius: 8,
            titleFont: { size: 12, weight: '600' },
            bodyFont: { size: 14, weight: '700' },
            displayColors: false,
            callbacks: {
              title: items => items[0].label,
              label: c => opts.fmtVal(c.parsed.y),
              afterLabel: c => {
                const idx = c.dataIndex;
                if (idx === 0) return '';
                const prev = values[idx - 1];
                if (!prev) return '';
                const dp = (values[idx] - prev) / Math.abs(prev);
                const arrow = dp > 0 ? '▲' : (dp < 0 ? '▼' : '–');
                return `${arrow} ${(dp * 100).toFixed(1)}% vs ${prevLabel}`;
              },
            },
          },
        },
        scales: {
          x: {
            ticks: { color: tick, font: { size: 11 } },
            grid: { display: false, drawBorder: false },
            border: { display: false },
          },
          y: {
            ticks: { color: tick, font: { size: 10 }, callback: v => {
              if (def.unit === '$') return fmt(v/1000, 0) + 'k';
              if (def.unit === '%') return v.toFixed(0) + '%';
              return fmt(v, 0);
            } },
            grid: { color: grid, drawBorder: false },
            border: { display: false },
            beginAtZero: !hasNegatives,
          },
        },
      },
    });
  });
}

function toUsd(amt, cur) {
  if (!isFinite(amt)) return null;
  if (cur === 'USD') return amt;
  if (!state.fx) return null;
  if (cur === 'UAH') return state.fx.USD_UAH > 0 ? amt / state.fx.USD_UAH : null;
  if (cur === 'EUR') return (state.fx.EUR_UAH > 0 && state.fx.USD_UAH > 0) ? amt * state.fx.EUR_UAH / state.fx.USD_UAH : null;
  return null;
}
