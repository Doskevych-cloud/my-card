<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Звірка прайсів — Генерація</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;
  --surface:#161922;
  --surface2:#1c1f2e;
  --border:#262940;
  --border-light:#2d3152;
  --text:#e1e4ed;
  --text-muted:#787ea0;
  --text-dim:#505576;
  --green:#22c55e;
  --green-bg:rgba(34,197,94,.08);
  --red:#ef4444;
  --red-bg:rgba(239,68,68,.08);
  --accent:#6366f1;
  --yellow:#eab308;
  --yellow-bg:rgba(234,179,8,.06);
  --frozen-bg:#161922;
  --frozen-shadow:4px 0 12px rgba(0,0,0,.4);
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

/* ── Auth Screen ── */
#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
#auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;max-width:380px;width:100%;text-align:center}
#auth-box h2{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
#auth-box p{color:var(--text-muted);font-size:13px;margin-bottom:28px}
#auth-box input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);outline:none;text-align:center;letter-spacing:3px;transition:border .2s}
#auth-box input:focus{border-color:var(--accent)}
#auth-box input::placeholder{color:var(--text-dim);letter-spacing:1px}
#auth-box button{margin-top:14px;width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
#auth-box button:hover{opacity:.85}
#auth-error{color:var(--red);font-size:12px;margin-top:10px;display:none}

/* ── App Layout ── */
#app{display:none;padding:24px 28px 48px}
header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px}
header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
header .meta{color:var(--text-dim);font-size:11px}

/* ── Summary Bar ── */
.summary{display:flex;gap:10px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:190px;flex-shrink:0}
.s-card .s-name{font-weight:600;font-size:12px;color:var(--text);margin-bottom:6px}
.s-card .s-row{display:flex;gap:14px;font-size:11px;color:var(--text-muted)}
.s-card .s-row .s-g{color:var(--green)}
.s-card .s-row .s-r{color:var(--red)}

/* ── Table ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:relative}
.table-scroll{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 210px)}
table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%}

/* Cells */
th,td{padding:7px 12px;white-space:nowrap;text-align:left;font-size:12px;border-bottom:1px solid var(--border)}
th{font-weight:500;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}

/* ── Frozen left columns ── */
.frozen{position:sticky;z-index:5;background:var(--frozen-bg)}
.col-num{left:0;width:36px;min-width:36px;text-align:center}
.col-name{left:36px;min-width:280px;max-width:340px;overflow:hidden;text-overflow:ellipsis}
.col-name-shadow{box-shadow:var(--frozen-shadow)}

/* ── Sticky header ── */
thead{position:sticky;top:0;z-index:20}
thead th{background:var(--surface2);border-bottom:1px solid var(--border-light)}
thead th.frozen{background:var(--surface2);z-index:25}

/* ── Group header ── */
tr.hdr-group th{padding:10px 12px;font-weight:700;font-size:11px;letter-spacing:.5px;color:var(--text);background:var(--bg)!important}
tr.hdr-group th.frozen{background:var(--bg)!important}
tr.hdr-group th.grp-best-h{}

/* ── Column header (sortable) ── */
tr.hdr-col th{cursor:pointer;user-select:none;transition:color .15s}
tr.hdr-col th:hover{color:var(--text)}
tr.hdr-col th .arr{font-size:9px;margin-left:2px;opacity:.3;transition:opacity .15s}
tr.hdr-col th.sorted .arr{opacity:1;color:var(--accent)}

/* ── Category separator ── */
tr.cat td{background:var(--bg);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);padding:12px;border-bottom:1px solid var(--border-light)}

/* ── Data rows ── */
tbody tr:not(.cat):hover td{background:var(--surface2)}
tbody tr:not(.cat):hover td.frozen{background:var(--surface2)}

/* ── Price cells ── */
.price{font-variant-numeric:tabular-nums;font-weight:500}
.delta{font-variant-numeric:tabular-nums;font-size:11px}
.d-neg{color:var(--green);background:var(--green-bg);padding:2px 6px;border-radius:4px;display:inline-block}
.d-pos{color:var(--red);background:var(--red-bg);padding:2px 6px;border-radius:4px;display:inline-block}
.d-zero{color:var(--text-dim)}

/* ── Status badges ── */
.st{font-size:10px;padding:3px 8px;border-radius:5px;display:inline-block;font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.st-ok{background:rgba(34,197,94,.1);color:#4ade80}
.st-wait{background:rgba(234,179,8,.1);color:#facc15}
.st-low{background:rgba(239,68,68,.1);color:#f87171}
.st-road{background:rgba(99,102,241,.1);color:#a5b4fc}
.st-other{background:rgba(120,126,160,.1);color:var(--text-muted)}

/* ── Best price column — same style as others ── */
.best{}
.best-val{font-weight:600}

/* ── Group dividers — subtle top border on first col of each group ── */
.gdiv{border-left:1px solid var(--border-light)}

/* ── Legend ── */
.legend{margin-top:14px;display:flex;gap:16px;font-size:11px;color:var(--text-dim);flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:5px}
.legend .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
</style>
</head>

</div>

}

{k:"gs",l:"Статус",g:"gen",t:"st"},
{k:"gp",l:"Ціна",g:"gen",t:"p"},
{k:"gv",l:"з ПДВ",g:"gen",t:"p"},
{k:"hs",l:"Статус",g:"hel",t:"st",gdiv:true},
{k:"hp",l:"Ціна",g:"hel",t:"p"},
{k:"hd",l:"Δ%",g:"hel",t:"d"},
{k:"hv",l:"з ПДВ",g:"hel",t:"p"},
{k:"hdv",l:"Δ%",g:"hel",t:"d"},
{k:"ds",l:"Статус",g:"dol",t:"st",gdiv:true},
{k:"dp",l:"Ціна",g:"dol",t:"p"},
{k:"dd",l:"Δ%",g:"dol",t:"d"},
{k:"dv",l:"з ПДВ",g:"dol",t:"p"},
{k:"ddv",l:"Δ%",g:"dol",t:"d"},
{k:"du",l:"UAH",g:"dol",t:"p"},
{k:"ss",l:"Статус",g:"se",t:"st",gdiv:true},
{k:"sp",l:"Ціна",g:"se",t:"p"},
{k:"sd",l:"Δ%",g:"se",t:"d"},
{k:"sv",l:"з ПДВ",g:"se",t:"p"},
{k:"sdv",l:"Δ%",g:"se",t:"d"},
{k:"as",l:"Статус",g:"atm",t:"st",gdiv:true},
{k:"ap",l:"Ціна",g:"atm",t:"p"},
{k:"ad",l:"Δ%",g:"atm",t:"d"},
{k:"av",l:"з ПДВ",g:"atm",t:"p"},
{k:"adv",l:"Δ%",g:"atm",t:"d"},
{k:"ac",l:"Вал.",g:"atm",t:"s"},
{k:"bs",l:"Постачальник",g:"best",t:"s",gdiv:true},
{k:"bp",l:"Ціна",g:"best",t:"p"}
];

const GR=[
{id:"item",l:"Товар",span:2},
{id:"gen",l:"Генерація",span:3},
{id:"hel",l:"Helius",span:5},
{id:"dol",l:"Dolya Solar",span:6},
{id:"se",l:"SE (se.net.ua)",span:5},
{id:"atm",l:"Атмосфера",span:6},
{id:"best",l:"Найкраща ціна",span:2}
];

let sortI=null,sortD=1;

function stCls(s){if(!s)return'';const l=s.toLowerCase();if(l.includes('наявн'))return'st-ok';if(l.includes('очік')||l.includes('замовл'))return'st-wait';if(l.includes('закінч'))return'st-low';if(l.includes('дорозі')||l.includes('дорог'))return'st-road';return'st-other'}
function fmtD(v){if(v==null)return'';if(v===0)return'<span class="delta d-zero">0%</span>';const s=v>0?'+':'';const c=v<0?'d-neg':'d-pos';return`<span class="delta ${c}">${s}${v.toFixed(1)}%</span>`}
function fmtP(v){if(v==null)return'';return`<span class="price">${typeof v==='number'?v.toLocaleString('uk-UA'):v}</span>`}
function fmtSt(v){if(!v)return'';return`<span class="st ${stCls(v)}" title="${v}">${v}</span>`}

function init(){
  document.getElementById('cnt').textContent=D.length;
  // Summary
  document.getElementById('sum').innerHTML=SUM.map(s=>`<div class="s-card"><div class="s-name">${s.name}</div><div class="s-row"><span>Спільних: ${s.common}</span><span class="s-g">Дешевше: ${s.cheaper}</span><span class="s-r">Дорожче: ${s.expensive}</span></div></div>`).join('');

  // Header group row
  let gh='<tr class="hdr-group">';
  GR.forEach((g,gi)=>{
    const fc=gi<1?'frozen col-num':'';
    const fc2=gi===0?'frozen col-name':'';
    const bc=g.id==='best'?'grp-best-h':'';
    if(gi===0){
      gh+=`<th class="frozen col-num">#</th><th class="frozen col-name col-name-shadow">${g.l}</th>`;
    } else {
      const dv=gi>1?'gdiv':'';
      gh+=`<th colspan="${g.span}" class="${bc} ${dv}">${g.l}</th>`;
    }
  });
  gh+='</tr>';

  // Header column row
  let ch='<tr class="hdr-col">';
  C.forEach((c,i)=>{
    let cls=[];
    if(c.frozen)cls.push('frozen',c.cls);
    if(c.cls==='col-name')cls.push('col-name-shadow');
    if(c.gdiv)cls.push('gdiv');
    ch+=`<th class="${cls.join(' ')}" data-i="${i}">${c.l}<span class="arr"></span></th>`;
  });
  ch+='</tr>';

  document.getElementById('thead').innerHTML=gh+ch;

  // Sort listeners
  document.querySelectorAll('.hdr-col th').forEach(th=>{
    th.addEventListener('click',()=>{
      const i=+th.dataset.i;
      if(sortI===i)sortD*=-1; else{sortI=i;sortD=1}
      document.querySelectorAll('.hdr-col th').forEach(t=>{t.classList.remove('sorted');t.querySelector('.arr').textContent=''});
      th.classList.add('sorted');
      th.querySelector('.arr').textContent=sortD===1?' ↑':' ↓';
      render();
    });
  });
  render();
}

function render(){
  let rows=[...D];
  if(sortI!==null){
    const c=C[sortI];
    rows.sort((a,b)=>{
      let va=a[c.k],vb=b[c.k];
      if(va==null)va=c.t==='n'||c.t==='p'||c.t==='d'?Infinity:'zzz';
      if(vb==null)vb=c.t==='n'||c.t==='p'||c.t==='d'?Infinity:'zzz';
      if(c.t==='n'||c.t==='p'||c.t==='d'){
        va=typeof va==='string'?parseFloat(va)||Infinity:va;
        vb=typeof vb==='string'?parseFloat(vb)||Infinity:vb;
        return(va-vb)*sortD;
      }
      return String(va).localeCompare(String(vb),'uk')*sortD;
    });
  }
  const tb=document.getElementById('tbody');
  let h='',lc='';
  const catMap={'Інвертори':'ІНВЕРТОРИ ГІБРИДНІ','Акумулятори':'АКУМУЛЯТОРИ','Кабелі':'КАБЕЛІ'};
  for(const r of rows){
    if(sortI===null&&r.cat!==lc){
      lc=r.cat;
      h+=`<tr class="cat"><td colspan="${C.length}">${catMap[r.cat]||r.cat}</td></tr>`;
    }
    h+='<tr>';
    C.forEach((c,i)=>{
      let cls=[];
      if(c.frozen){cls.push('frozen',c.cls);if(c.cls==='col-name')cls.push('col-name-shadow')}
      if(c.gdiv)cls.push('gdiv');
      if(c.g==='best')cls.push('best');
      const v=r[c.k];
      let content='';
      if(c.t==='d')content=fmtD(v);
      else if(c.t==='st')content=fmtSt(v);
      else if(c.t==='p')content=fmtP(v);
      else if(c.g==='best'&&c.k==='bp')content=v!=null?`<span class="best-val price">${typeof v==='number'?v.toLocaleString('uk-UA'):v}</span>`:'';
      else content=v!=null?v:'';
      h+=`<td class="${cls.join(' ')}">${content}</td>`;
    });
    h+='</tr>';
  }
  tb.innerHTML=h;
}
</script>
</body>
</html>
