<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P&L — Фінанси</title>
<script>
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e){}
</script>
<script src="auth.js?v=20260418"></script>
<script src="header.js?v=20260418"></script>
<style>
:root{
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a;
  --surface:#141414; --surface2:#1c1c1c;
  --border:#262626; --border2:#333;
  --text:#f5f5f5; --text2:#a3a3a3; --text3:#737373;
  --accent:#ff8319; --accent-bg:rgba(255,131,25,.12);
  --red:#e74c3c; --red-bg:rgba(231,76,60,.12);
  --green:#22c55e; --green-bg:rgba(34,197,94,.12);
  --blue:#3b82f6; --blue-bg:rgba(59,130,246,.12);
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
}
:root[data-theme="light"]{
  --bg:#f5f5f7; --bg2:#ffffff; --bg3:#ececef;
  --surface:#ffffff; --surface2:#ffffff;
  --border:#e5e5ea; --border2:#d1d1d6;
  --text:#1c1c1e; --text2:#48484a; --text3:#8e8e93;
  --accent:#e07017; --accent-bg:rgba(224,112,23,.12);
  --red:#d93025; --red-bg:rgba(217,48,37,.10);
  --green:#15803d; --green-bg:rgba(21,128,61,.10);
  --blue:#1d4ed8; --blue-bg:rgba(29,78,216,.10);
  --shadow-md:0 4px 20px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{max-width:1400px;margin:0 auto;padding:20px}
.page-tabs{display:inline-flex;gap:4px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.ptab{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap}
.ptab:hover{background:var(--bg3);color:var(--text)}
.ptab.active{background:var(--accent-bg);color:var(--accent)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar input[type=date]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;color-scheme:dark;font-family:inherit}
:root[data-theme="light"] .toolbar input[type=date]{color-scheme:light}
.toolbar input[type=date]:focus{border-color:var(--accent)}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.toolbar .group{display:inline-flex;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{border:none;background:transparent;padding:5px 10px;border-radius:6px}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}

/* P&L table */
.pnl-wrap{overflow-x:auto;margin-bottom:20px}
.pnl-table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
.pnl-table th,.pnl-table td{padding:8px 14px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border)}
.pnl-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;background:var(--surface2);position:sticky;top:0;z-index:2}
.pnl-table th:first-child,.pnl-table td:first-child{text-align:left;position:sticky;left:0;background:var(--bg);z-index:1}
.pnl-table th:first-child{z-index:3;background:var(--surface2)}
.pnl-table td:last-child,.pnl-table th:last-child{font-weight:700;background:var(--surface);border-left:2px solid var(--border)}
.pnl-table th:last-child{background:var(--surface2)}
.pnl-table td:first-child{background:var(--bg)}

/* Row types */
.pnl-table .section-hdr td{font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);background:var(--surface2) !important;border-bottom:2px solid var(--border);padding:12px 14px 6px}
.pnl-table .section-hdr td:first-child{background:var(--surface2) !important}
.pnl-table .item-row td{color:var(--text2);padding-left:28px}
.pnl-table .item-row td:first-child{padding-left:28px;font-weight:500}
.pnl-table .subtotal-row td{font-weight:700;border-top:1px solid var(--border2);border-bottom:2px solid var(--border)}
.pnl-table .grand-row td{font-weight:800;font-size:15px;border-top:3px double var(--border2);border-bottom:none;padding:12px 14px}
.pnl-table .grand-row td:first-child{background:var(--bg) !important}
.pnl-table .positive{color:var(--green)}
.pnl-table .negative{color:var(--red)}
.pnl-table .zero{color:var(--text3)}

/* Empty / loading / error */
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.loading::after{content:'';display:block;width:28px;height:28px;margin:16px auto 0;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:40px;color:var(--red);background:var(--red-bg);border-radius:12px;margin:20px 0}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}

/* Summary cards */
.pnl-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.pnl-card{padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;gap:2px}
.pnl-card .card-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.pnl-card .card-val{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1.2}
.pnl-card.revenue{border-left:3px solid var(--green)}
.pnl-card.revenue .card-val{color:var(--green)}
.pnl-card.cogs{border-left:3px solid var(--accent)}
.pnl-card.cogs .card-val{color:var(--accent)}
.pnl-card.gross{border-left:3px solid var(--blue)}
.pnl-card.gross .card-val{color:var(--blue)}
.pnl-card.net{border-left:3px solid var(--green)}
.pnl-card.net .card-val.neg{color:var(--red)}
.pnl-card .card-sub{font-size:11px;color:var(--text3);font-weight:500}

@media(max-width:720px){
  .pnl-summary{grid-template-columns:1fr 1fr}
  .pnl-table{font-size:11px}
  .pnl-table th,.pnl-table td{padding:6px 8px}
}
</style>
</head>
<body>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-tabs">
      <a href="/finance.html" class="ptab active">📊 P&L</a>
    </div>
    <div class="toolbar">
      <span class="lbl">Період</span>
      <input type="date" id="fromIn">
      <span style="color:var(--text3)">—</span>
      <input type="date" id="toIn">
      <span class="group">
        <span class="chip" onclick="setPreset('month')">Цей місяць</span>
        <span class="chip" onclick="setPreset('prevmonth')">Минулий</span>
        <span class="chip" onclick="setPreset('quarter')">Квартал</span>
        <span class="chip" onclick="setPreset('year')">Рік</span>
      </span>
      <div class="sep"></div>
      <span class="group">
        <span class="chip" data-org="" onclick="setOrg(this)">Всі</span>
        <span class="chip" data-org="Реакт" onclick="setOrg(this)">Реакт</span>
        <span class="chip" data-org="Генерація" onclick="setOrg(this)">Генерація</span>
      </span>
    </div>
    <div id="summary"></div>
    <div id="body"><div class="loading">Завантаження...</div></div>
  </div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev';

const state = { from: '', to: '', org: '', preset: '' };

function _localISO(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function setPreset(p) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  let from, to = now;
  if (p === 'month')     { from = new Date(y, m, 1); }
  else if (p === 'prevmonth') { from = new Date(y, m-1, 1); to = new Date(y, m, 0); }
  else if (p === 'quarter')   { const q = Math.floor(m/3); from = new Date(y, q*3, 1); }
  else if (p === 'year')      { from = new Date(y, 0, 1); }
  state.from = _localISO(from);
  state.to   = _localISO(to);
  state.preset = p;
  document.getElementById('fromIn').value = state.from;
  document.getElementById('toIn').value   = state.to;
  document.querySelectorAll('.toolbar .group:first-of-type .chip').forEach(c =>
    c.classList.toggle('active', c.textContent.trim() === { month:'Цей місяць', prevmonth:'Минулий', quarter:'Квартал', year:'Рік' }[p]));
  load();
}

function setOrg(el) {
  state.org = el.dataset.org;
  el.closest('.group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  load();
}

function fmt(n, dec = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function fmtUsd(n) { return fmt(n, 0) + ' $'; }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

const MONTH_NAMES = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
function monthLabel(mk) {
  const [y, m] = mk.split('-');
  return MONTH_NAMES[parseInt(m, 10) - 1] + "'" + y.slice(2);
}

function valClass(n) {
  if (n > 0.5) return 'positive';
  if (n < -0.5) return 'negative';
  return 'zero';
}

function renderPnl(data, fxRate) {
  const { months, revenue, cogs, otherIncome, expenses, totalExpenses } = data;
  const toUsd = v => fxRate ? v / fxRate : v;
  const suffix = fxRate ? ' $' : '';
  const fmtV = v => {
    const usd = toUsd(v);
    return `<span class="${valClass(usd)}">${fmt(usd, 0)}${suffix}</span>`;
  };

  // Compute derived rows
  const grossByMonth = {}, opProfitByMonth = {}, netByMonth = {};
  months.forEach(m => {
    grossByMonth[m] = (revenue.byMonth[m] || 0) - (cogs.byMonth[m] || 0);
    opProfitByMonth[m] = grossByMonth[m] - (totalExpenses.byMonth[m] || 0);
    netByMonth[m] = opProfitByMonth[m] + (otherIncome.byMonth[m] || 0);
  });
  const grossTotal    = revenue.total - cogs.total;
  const opProfitTotal = grossTotal - totalExpenses.total;
  const netTotal      = opProfitTotal + otherIncome.total;

  // Summary cards
  document.getElementById('summary').innerHTML = `
    <div class="pnl-summary">
      <div class="pnl-card revenue">
        <span class="card-lbl">Дохід</span>
        <span class="card-val">${fmt(toUsd(revenue.total), 0)}${suffix}</span>
      </div>
      <div class="pnl-card cogs">
        <span class="card-lbl">Собівартість</span>
        <span class="card-val">${fmt(toUsd(cogs.total), 0)}${suffix}</span>
        <span class="card-sub">${cogs.total && revenue.total ? (cogs.total / revenue.total * 100).toFixed(1) + '% від доходу' : ''}</span>
      </div>
      <div class="pnl-card gross">
        <span class="card-lbl">Валовий прибуток</span>
        <span class="card-val">${fmt(toUsd(grossTotal), 0)}${suffix}</span>
        <span class="card-sub">${revenue.total ? 'маржа ' + (grossTotal / revenue.total * 100).toFixed(1) + '%' : ''}</span>
      </div>
      <div class="pnl-card net">
        <span class="card-lbl">Чистий прибуток</span>
        <span class="card-val ${netTotal < 0 ? 'neg' : ''}">${fmt(toUsd(netTotal), 0)}${suffix}</span>
        <span class="card-sub">${revenue.total ? (netTotal / revenue.total * 100).toFixed(1) + '% від доходу' : ''}</span>
      </div>
    </div>
  `;

  // Table
  const showMonths = months.length > 1;
  const mCols = showMonths ? months.map(m => `<th>${monthLabel(m)}</th>`).join('') : '';

  function dataRow(label, byMonth, total, cls = '') {
    const mCells = showMonths ? months.map(m => `<td>${fmtV(byMonth[m] || 0)}</td>`).join('') : '';
    return `<tr class="${cls}"><td>${esc(label)}</td>${mCells}<td>${fmtV(total)}</td></tr>`;
  }
  function sectionHdr(label) {
    const span = (showMonths ? months.length : 0) + 2;
    return `<tr class="section-hdr"><td colspan="${span}">${esc(label)}</td></tr>`;
  }

  let rows = '';

  // Revenue
  rows += sectionHdr('Доходи');
  rows += dataRow('Дохід від реалізації', revenue.byMonth, revenue.total, 'subtotal-row');

  // COGS
  rows += sectionHdr('Собівартість');
  rows += dataRow('Собівартість реалізації', cogs.byMonth, cogs.total, 'subtotal-row');

  // Gross profit
  rows += dataRow('Валовий прибуток', grossByMonth, grossTotal, 'grand-row');

  // Operating expenses
  rows += sectionHdr('Операційні витрати');
  expenses.forEach(e => {
    rows += dataRow(e.category, e.byMonth, e.total, 'item-row');
  });
  if (!expenses.length) {
    const span = (showMonths ? months.length : 0) + 2;
    rows += `<tr class="item-row"><td colspan="${span}" style="color:var(--text3);font-style:italic">Немає даних</td></tr>`;
  }
  rows += dataRow('Всього витрат', totalExpenses.byMonth, totalExpenses.total, 'subtotal-row');

  // Operating profit
  rows += dataRow('Операційний прибуток (EBIT)', opProfitByMonth, opProfitTotal, 'grand-row');

  // Other income
  if (otherIncome.total) {
    rows += sectionHdr('Інші доходи');
    rows += dataRow('Інші доходи', otherIncome.byMonth, otherIncome.total, 'item-row');
  }

  // Net profit
  rows += dataRow('Чистий прибуток', netByMonth, netTotal, 'grand-row');

  document.getElementById('body').innerHTML = `
    <div class="pnl-wrap">
      <table class="pnl-table">
        <thead><tr><th>Стаття</th>${mCols}<th>Всього</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

async function load() {
  const body = document.getElementById('body');
  body.innerHTML = '<div class="loading">Завантаження...</div>';
  document.getElementById('summary').innerHTML = '';
  try {
    const q = `?action=pnl_report&from=${state.from}&to=${state.to}` + (state.org ? `&org=${encodeURIComponent(state.org)}` : '');
    const [data, fxData] = await Promise.all([
      fetch(API_URL + q).then(r => r.json()),
      fetch(API_URL + '?action=fx_rates').then(r => r.json()).catch(() => null),
    ]);
    if (data.error) throw new Error(data.error);
    const fxRate = (fxData && fxData.rates && fxData.rates.USD_UAH) || null;
    renderPnl(data, fxRate);
  } catch (e) {
    body.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

// Init date inputs
document.getElementById('fromIn').addEventListener('change', e => { state.from = e.target.value; load(); });
document.getElementById('toIn').addEventListener('change', e => { state.to = e.target.value; load(); });

Auth.require('finance').then(user => {
  window.__user = user;
  AppHeader.mount({ active: 'finance', user });
  // default org
  document.querySelector('[data-org=""]').classList.add('active');
  setPreset('year');
});
</script>
</body>
</html>
