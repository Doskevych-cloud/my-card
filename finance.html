<html lang="uk">
<head>

<style>
:root{
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a;
  --surface:#141414; --surface2:#1c1c1c;
  --border:#262626; --border2:#333;
  --text:#f5f5f5; --text2:#a3a3a3; --text3:#737373;
  --accent:#ff8319; --accent-bg:rgba(255,131,25,.12);
  --red:#e74c3c; --red-bg:rgba(231,76,60,.12);
  --green:#22c55e; --green-bg:rgba(34,197,94,.12);
  --blue:#3b82f6; --blue-bg:rgba(59,130,246,.12);
  --yellow:#eab308; --yellow-bg:rgba(234,179,8,.12);
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
}
:root[data-theme="light"]{
  --bg:#f5f5f7; --bg2:#ffffff; --bg3:#ececef;
  --surface:#ffffff; --surface2:#ffffff;
  --border:#e5e5ea; --border2:#d1d1d6;
  --text:#1c1c1e; --text2:#48484a; --text3:#8e8e93;
  --accent:#e07017; --accent-bg:rgba(224,112,23,.12);
  --red:#d93025; --red-bg:rgba(217,48,37,.10);
  --green:#15803d; --green-bg:rgba(21,128,61,.10);
  --blue:#1d4ed8; --blue-bg:rgba(29,78,216,.10);
  --yellow:#a16207; --yellow-bg:rgba(161,98,7,.10);
  --shadow-md:0 4px 20px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}

.wrap{max-width:1600px;margin:0 auto;padding:20px}
.page-tabs{display:inline-flex;gap:4px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.ptab{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap}
.ptab:hover{background:var(--bg3);color:var(--text)}
.ptab.active{background:var(--accent-bg);color:var(--accent)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px}
.toolbar .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.toolbar input[type=date]{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;color-scheme:dark;font-family:inherit}
:root[data-theme="light"] .toolbar input[type=date]{color-scheme:light}
.toolbar input[type=date]:focus{border-color:var(--accent)}
.toolbar .chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.toolbar .chip:hover{background:var(--bg3);color:var(--text)}
.toolbar .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.toolbar .group{display:inline-flex;align-items:center;gap:6px;padding:4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.toolbar .group .chip{border:none;background:transparent;padding:5px 10px;border-radius:6px}
.toolbar .group .chip.active{background:var(--accent-bg);color:var(--accent)}

/* P&L table */
.pnl-wrap{overflow-x:auto;margin-bottom:20px;border:1px solid var(--border);border-radius:12px}
.pnl-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:600px}
.pnl-table th,.pnl-table td{padding:7px 14px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border)}
.pnl-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;background:var(--surface2);position:sticky;top:0;z-index:2}
.pnl-table th:first-child,.pnl-table td:first-child{text-align:left;position:sticky;left:0;z-index:1;min-width:300px}
.pnl-table th:first-child{z-index:3;background:var(--surface2)}
.pnl-table td:first-child{background:var(--bg)}
.pnl-table td.col-total,.pnl-table th.col-total{font-weight:700;background:var(--surface);border-left:2px solid var(--border)}
.pnl-table th.col-total{background:var(--surface2)}

/* ── Row types ── */
/* Section header (green/orange/red bar) */
.pnl-table .sec td{font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px 6px;border-bottom:2px solid var(--border)}
.pnl-table .sec td:first-child{padding-left:14px}
.pnl-table .sec.rev td{color:var(--green);background:var(--green-bg) !important}
.pnl-table .sec.cost td{color:var(--accent);background:var(--accent-bg) !important}
.pnl-table .sec.exp td{color:var(--red);background:var(--red-bg) !important}
.pnl-table .sec.tax td{color:var(--yellow);background:var(--yellow-bg) !important}
.pnl-table .sec.other td{color:var(--blue);background:var(--blue-bg) !important}

/* Sub-group header (bold, indent 1) */
.pnl-table .grp td{font-weight:700;color:var(--text);padding-top:8px}
.pnl-table .grp td:first-child{padding-left:20px}

/* Item row (indent 2) */
.pnl-table .itm td{color:var(--text2);font-weight:400}
.pnl-table .itm td:first-child{padding-left:36px}

/* Subtotal row */
.pnl-table .sub td{font-weight:700;border-top:1px solid var(--border2);border-bottom:2px solid var(--border)}

/* Grand total row (double top border) */
.pnl-table .grd td{font-weight:800;font-size:14px;border-top:3px double var(--border2);padding:10px 14px}
.pnl-table .grd td:first-child{background:var(--bg) !important}

/* Percentage row */
.pnl-table .pct td{color:var(--text3);font-size:11px;font-style:italic;border-bottom:none}

/* Spacer */
.pnl-table .sp td{border-bottom:none;padding:4px 0}

/* Value colors */
.pos{color:var(--green)}
.neg{color:var(--red)}
.zr{color:var(--text3)}
.dash{color:var(--text3);font-style:italic}

/* Summary cards */
.pnl-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.pnl-card{padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;gap:2px}
.pnl-card .cl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.pnl-card .cv{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1.2}
.pnl-card .cs{font-size:11px;color:var(--text3);font-weight:500}
.pnl-card.c-rev{border-left:3px solid var(--green)} .pnl-card.c-rev .cv{color:var(--green)}
.pnl-card.c-cost{border-left:3px solid var(--accent)} .pnl-card.c-cost .cv{color:var(--accent)}
.pnl-card.c-grs{border-left:3px solid var(--blue)} .pnl-card.c-grs .cv{color:var(--blue)}
.pnl-card.c-net{border-left:3px solid var(--green)} .pnl-card.c-net .cv.ng{color:var(--red)}

.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.loading::after{content:'';display:block;width:28px;height:28px;margin:16px auto 0;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:40px;color:var(--red);background:var(--red-bg);border-radius:12px;margin:20px 0}

@media(max-width:720px){
  .pnl-summary{grid-template-columns:1fr 1fr}
  .pnl-table{font-size:11px}
  .pnl-table th,.pnl-table td{padding:5px 8px}
  .pnl-table td:first-child,.pnl-table th:first-child{min-width:180px}
}
</style>
</head>

<div id="appHeader"></div>
<div id="app">
  <div class="wrap">
    <div class="page-tabs">
      <a href="/finance.html" class="ptab active">P&L</a>
    </div>
    <div class="toolbar">
      <span class="lbl">Період</span>
      <input type="date" id="fromIn">
      <span style="color:var(--text3)">—</span>
      <input type="date" id="toIn">
      <span class="group">
        <span class="chip" onclick="setPreset('month')">Цей місяць</span>

        <span class="chip" onclick="setPreset('quarter')">Квартал</span>
        <span class="chip" onclick="setPreset('year')">Рік</span>
      </span>
      <div class="sep"></div>
      <span class="group">
        <span class="chip" data-org="" onclick="setOrg(this)">Всі</span>
        <span class="chip" data-org="Реакт" onclick="setOrg(this)">Реакт</span>
        <span class="chip" data-org="Генерація" onclick="setOrg(this)">Генерація</span>
      </span>
    </div>
    <div id="summary"></div>
    <div id="body"><div class="loading">Завантаження...</div></div>
  </div>
</div>

<script>
const API_URL = 'https://price-api.doskevich.workers.dev';
const state = { from: '', to: '', org: '', preset: '' };

/* ── P&L Template Structure (matches company Excel) ── */
const PNL_TEMPLATE = [
  // type: sec (section header), grp (group), itm (item), sub (subtotal), grd (grand), pct (%), sp (spacer)
  // variant: rev/cost/exp/tax/other — section coloring
  // key: string key for matching worker data (expenses match by category name)

  { type:'sec', variant:'rev', label:'Виторг від продажів, у т.ч.' },
  { type:'itm', label:'Дистрибуція' },
  { type:'itm', label:'Приватні сонячні станції під ключ' },
  { type:'itm', label:'Комерційні сонячні станції під ключ' },
  { type:'itm', label:'Роздріб' },
  { type:'itm', label:'Роздріб під ключ' },
  { type:'itm', label:'Проектування СЕС' },
  { type:'itm', label:'Сервіс' },

  { type:'sp' },
  { type:'grp', label:'Інші непрямі доходи', key:'_otherIncome' },
  { type:'itm', label:'Інші доходи (курсова різниця)' },
  { type:'itm', label:'Інші доходи (комісія та інш.)' },
  { type:'itm', label:'Компенсація транспортних витрат замовником' },
  { type:'itm', label:'Оприбуткування залишків ТМЦ' },
  { type:'itm', label:'Суборенда, взаємозаліки' },

  { type:'sub', label:'Всього доходи', key:'_totalRevenue' },

  { type:'sec', variant:'cost', label:'Собівартість продажів, у т.ч.' },
  { type:'itm', label:'Дистрибуція (собівартість)' },
  { type:'itm', label:'Приватні СЕС під ключ (собівартість)' },
  { type:'itm', label:'Комерційні СЕС під ключ (собівартість)' },
  { type:'itm', label:'Роздріб (собівартість)' },
  { type:'itm', label:'Сервіс (собівартість)' },
  { type:'sub', label:'Всього собівартість', key:'_totalCogs' },

  { type:'grd', label:'Валовий прибуток', key:'_grossProfit' },
  { type:'pct', label:'Маржинальність продажів, %', key:'_grossMargin' },

  { type:'sec', variant:'exp', label:'Непрямі (накладні) витрати' },
  { type:'pct', label:'Частка накладних витрат у виторгу, %', key:'_overheadPct' },

  { type:'grp', label:'Реклама і маркетинг', key:'_grpMarketing' },
  { type:'itm', label:'Маркетинг послуги', match:'маркетинг послуг' },
  { type:'itm', label:'Маркетинг продукція', match:'маркетинг продукц' },
  { type:'itm', label:'Google', match:'google' },
  { type:'itm', label:'Facebook', match:'facebook' },
  { type:'itm', label:'TikTok', match:'tiktok' },
  { type:'itm', label:'Витрати на вебсайти', match:'вебсайт' },
  { type:'itm', label:'SEO просування', match:'seo' },
  { type:'itm', label:'Комерційні витрати', match:'комерційн' },

  { type:'sp' },
  { type:'grp', label:'ЗП та інші витрати на працівників', key:'_grpSalary' },
  { type:'itm', label:'Заробітна плата', match:'заробітн' },
  { type:'itm', label:'Витрати на працівників (HR, корпоратив)', match:'витрати на працівник' },
  { type:'itm', label:'Податки на заробітну плату', match:'податки на заробітн' },
  { type:'itm', label:'Work.ua', match:'work.ua' },

  { type:'sp' },
  { type:'grp', label:'Оренда приміщень', key:'_grpRent' },
  { type:'itm', label:'Орендна плата (офіс)', match:'оренд.*офіс' },
  { type:'itm', label:'Оренда складу', match:'оренд.*склад' },
  { type:'itm', label:'Оренда навантажувача', match:'навантажувач' },
  { type:'itm', label:'Витрати на склад', match:'витрати на склад' },

  { type:'sp' },
  { type:'grp', label:'Адміністративні витрати', key:'_grpAdmin' },
  { type:'itm', label:'Офісні витрати', match:'офісн' },
  { type:'itm', label:'Витрати на облік', match:'облік' },
  { type:'itm', label:'Судовий збір', match:'судов' },
  { type:'itm', label:'Адвокатські послуги', match:'адвокат' },
  { type:'itm', label:'Комісії за переказ коштів', match:'комісі' },
  { type:'itm', label:'Витрати на ПЗ', match:'програмн' },
  { type:'itm', label:"Зв'язок", match:"зв'язок|зв\\'язок|зв.язок" },
  { type:'itm', label:'Інтернет послуги', match:'інтернет' },

  { type:'sp' },
  { type:'grp', label:'Витрати на транспорт', key:'_grpTransport' },
  { type:'itm', label:'Техобслуговування ТЗ', match:'техобслугов' },
  { type:'itm', label:'Транспортні витрати (монтаж)', match:'транспортн.*монтаж' },
  { type:'itm', label:'Транспортні витрати (офіс)', match:'транспортн.*офіс' },
  { type:'itm', label:'Транспортні витрати (склад)', match:'транспортн.*склад' },
  { type:'itm', label:'Транспортні витрати (сервіс)', match:'транспортн.*серві' },
  { type:'itm', label:'Доставка', match:'доставк' },
  { type:'itm', label:'Відрядження', match:'відряджен' },

  { type:'sp' },
  { type:'itm', label:'Штрафи, пені, неустойки', match:'штраф' },
  { type:'itm', label:'Амортизація', match:'амортизац' },

  { type:'sub', label:'Всього накладні витрати', key:'_totalOverhead' },

  { type:'sec', variant:'tax', label:'Податки' },
  { type:'itm', label:'Єдиний податок ФОП', match:'єдиний податок' },
  { type:'itm', label:'ПДВ сплачене', match:'пдв' },
  { type:'itm', label:'Податок на прибуток', match:'податок на прибут' },
  { type:'sub', label:'Всього податки', key:'_totalTax' },

  { type:'sec', variant:'other', label:'Інші неопераційні витрати' },
  { type:'itm', label:'Курсові різниці', match:'курсов' },
  { type:'itm', label:'Нестачі і втрати', match:'нестач' },
  { type:'itm', label:'Відсотки за кредит', match:'відсотки за кредит' },
  { type:'itm', label:'Комісія за кредит', match:'комісія за кредит' },
  { type:'itm', label:'Ремонт та модернізація ОЗ', match:'ремонт' },
  { type:'itm', label:'Списання ТМЦ', match:'списан' },
  { type:'sub', label:'Всього інші витрати', key:'_totalOther' },

  { type:'sp' },
  { type:'sub', label:'Всього витрати', key:'_totalAllExpenses' },
  { type:'grd', label:'Операційний прибуток / збиток', key:'_operatingProfit' },
  { type:'grd', label:'Чистий прибуток / збиток', key:'_netProfit' },
  { type:'pct', label:'Операційна рентабельність, %', key:'_opMargin' },
  { type:'pct', label:'Загальна рентабельність, %', key:'_netMargin' },
];

function _localISO(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return y + '-' + m + '-' + dd;
}
function setPreset(p) {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  let from, to = now;
  if (p === 'month')          from = new Date(y, m, 1);
  else if (p === 'prevmonth') { from = new Date(y, m-1, 1); to = new Date(y, m, 0); }
  else if (p === 'quarter')   { const q = Math.floor(m/3); from = new Date(y, q*3, 1); }
  else if (p === 'year')      from = new Date(y, 0, 1);
  state.from = _localISO(from); state.to = _localISO(to); state.preset = p;
  document.getElementById('fromIn').value = state.from;
  document.getElementById('toIn').value   = state.to;
  document.querySelectorAll('.toolbar .group:first-of-type .chip').forEach(c => {
    const map = { month:'Цей місяць', prevmonth:'Минулий', quarter:'Квартал', year:'Рік' };
    c.classList.toggle('active', c.textContent.trim() === map[p]);
  });
  load();
}
function setOrg(el) {
  state.org = el.dataset.org;
  el.closest('.group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  load();
}
function fmt(n, dec) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('uk-UA', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

const MN = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
function mLabel(mk) { const p = mk.split('-'); return MN[+p[1]-1] + "'" + p[0].slice(2); }

/* ── Render ── */
function renderPnl(data, fxRate) {
  const { months, revenue, cogs, otherIncome, expenses, totalExpenses } = data;
  const conv = v => fxRate ? v / fxRate : v;
  const sfx = fxRate ? ' $' : '';
  const showM = months.length > 1;

  // Map expense categories by fuzzy match
  const expMap = {};       // templateLabel → { byMonth, total }
  const usedExpenses = new Set();
  const unmatchedExp = [];

  PNL_TEMPLATE.forEach(row => {
    if (!row.match) return;
    const re = new RegExp(row.match, 'i');
    expenses.forEach((e, i) => {
      if (usedExpenses.has(i)) return;
      if (re.test(e.category)) {
        if (!expMap[row.label]) expMap[row.label] = { byMonth: {}, total: 0 };
        months.forEach(m => { expMap[row.label].byMonth[m] = (expMap[row.label].byMonth[m] || 0) + (e.byMonth[m] || 0); });
        expMap[row.label].total += e.total;
        usedExpenses.add(i);
      }
    });
  });
  expenses.forEach((e, i) => { if (!usedExpenses.has(i)) unmatchedExp.push(e); });

  // Compute group subtotals from matched items
  const grpTotals = {};
  let currentGrp = null;
  PNL_TEMPLATE.forEach(row => {
    if (row.type === 'grp' && row.key) { currentGrp = row.key; grpTotals[currentGrp] = { byMonth: {}, total: 0 }; }
    if (row.type === 'itm' && row.match && currentGrp && expMap[row.label]) {
      months.forEach(m => { grpTotals[currentGrp].byMonth[m] = (grpTotals[currentGrp].byMonth[m] || 0) + (expMap[row.label].byMonth[m] || 0); });
      grpTotals[currentGrp].total += expMap[row.label].total;
    }
    if (row.type === 'sec' || row.type === 'sub' || row.type === 'grd') currentGrp = null;
  });

  // Compute overhead (all matched + unmatched expenses)
  const overheadByMonth = {}, taxByMonth = {}, otherExpByMonth = {};
  months.forEach(m => { overheadByMonth[m] = 0; taxByMonth[m] = 0; otherExpByMonth[m] = 0; });
  let overheadTotal = 0, taxTotal = 0, otherExpTotal = 0;

  // Classify into overhead / tax / other based on template section
  let curSection = '';
  PNL_TEMPLATE.forEach(row => {
    if (row.type === 'sec') curSection = row.variant;
    if (row.type === 'itm' && row.match && expMap[row.label]) {
      const d = expMap[row.label];
      if (curSection === 'exp') { months.forEach(m => { overheadByMonth[m] += d.byMonth[m] || 0; }); overheadTotal += d.total; }
      else if (curSection === 'tax') { months.forEach(m => { taxByMonth[m] += d.byMonth[m] || 0; }); taxTotal += d.total; }
      else if (curSection === 'other') { months.forEach(m => { otherExpByMonth[m] += d.byMonth[m] || 0; }); otherExpTotal += d.total; }
    }
  });
  // Unmatched go to overhead
  unmatchedExp.forEach(e => { months.forEach(m => { overheadByMonth[m] += e.byMonth[m] || 0; }); overheadTotal += e.total; });

  // Derived totals
  const totalRevByMonth = {}, grossByMonth = {}, totalAllExpByMonth = {}, opProfitByMonth = {}, netByMonth = {};
  let totalRevTotal = revenue.total + otherIncome.total;
  let grossTotal = revenue.total - cogs.total;
  let totalAllExp = cogs.total + overheadTotal + taxTotal + otherExpTotal;
  let opProfitTotal = totalRevTotal - cogs.total - overheadTotal;
  let netTotal = totalRevTotal - totalAllExp;

  months.forEach(m => {
    totalRevByMonth[m] = (revenue.byMonth[m] || 0) + (otherIncome.byMonth[m] || 0);
    grossByMonth[m] = (revenue.byMonth[m] || 0) - (cogs.byMonth[m] || 0);
    totalAllExpByMonth[m] = (cogs.byMonth[m] || 0) + (overheadByMonth[m] || 0) + (taxByMonth[m] || 0) + (otherExpByMonth[m] || 0);
    opProfitByMonth[m] = totalRevByMonth[m] - (cogs.byMonth[m] || 0) - (overheadByMonth[m] || 0);
    netByMonth[m] = totalRevByMonth[m] - totalAllExpByMonth[m];
  });

  // Computed-key map
  const computed = {
    _totalRevenue:    { byMonth: totalRevByMonth, total: totalRevTotal },
    _totalCogs:       { byMonth: cogs.byMonth, total: cogs.total },
    _grossProfit:     { byMonth: grossByMonth, total: grossTotal },
    _totalOverhead:   { byMonth: overheadByMonth, total: overheadTotal },
    _totalTax:        { byMonth: taxByMonth, total: taxTotal },
    _totalOther:      { byMonth: otherExpByMonth, total: otherExpTotal },
    _totalAllExpenses:{ byMonth: totalAllExpByMonth, total: totalAllExp },
    _operatingProfit: { byMonth: opProfitByMonth, total: opProfitTotal },
    _netProfit:       { byMonth: netByMonth, total: netTotal },
    _otherIncome:     { byMonth: otherIncome.byMonth, total: otherIncome.total },
  };
  // Group subtotals
  Object.keys(grpTotals).forEach(k => { computed[k] = grpTotals[k]; });

  // Percentage rows
  const pctRow = (numByMonth, numTotal, denomTotal) => {
    const bm = {};
    months.forEach(m => { bm[m] = denomTotal ? (numByMonth[m] || 0) / (totalRevByMonth[m] || 1) : 0; });
    return { byMonth: bm, total: denomTotal ? numTotal / totalRevTotal : 0, isPct: true };
  };
  computed._grossMargin = pctRow(grossByMonth, grossTotal, totalRevTotal);
  computed._overheadPct = pctRow(overheadByMonth, overheadTotal, totalRevTotal);
  computed._opMargin    = pctRow(opProfitByMonth, opProfitTotal, totalRevTotal);
  computed._netMargin   = pctRow(netByMonth, netTotal, totalRevTotal);

  // Format helpers
  function fmtCell(val, isPct) {
    if (isPct) {
      if (!val && val !== 0) return '<span class="dash">—</span>';
      return '<span class="' + (val > 0.001 ? 'pos' : val < -0.001 ? 'neg' : 'zr') + '">' + (val * 100).toFixed(1) + '%</span>';
    }
    const u = conv(val || 0);
    if (Math.abs(u) < 0.5) return '<span class="zr">—</span>';
    return '<span class="' + (u > 0 ? 'pos' : 'neg') + '">' + fmt(u, 0) + sfx + '</span>';
  }

  // Summary cards
  document.getElementById('summary').innerHTML = '<div class="pnl-summary">' +
    '<div class="pnl-card c-rev"><span class="cl">Доходи</span><span class="cv">' + fmt(conv(totalRevTotal), 0) + sfx + '</span></div>' +
    '<div class="pnl-card c-cost"><span class="cl">Собівартість</span><span class="cv">' + fmt(conv(cogs.total), 0) + sfx + '</span>' +
      '<span class="cs">' + (totalRevTotal ? (cogs.total / totalRevTotal * 100).toFixed(1) + '% від доходу' : '') + '</span></div>' +
    '<div class="pnl-card c-grs"><span class="cl">Валовий прибуток</span><span class="cv">' + fmt(conv(grossTotal), 0) + sfx + '</span>' +
      '<span class="cs">' + (totalRevTotal ? 'маржа ' + (grossTotal / totalRevTotal * 100).toFixed(1) + '%' : '') + '</span></div>' +
    '<div class="pnl-card c-net"><span class="cl">Чистий прибуток</span><span class="cv' + (netTotal < 0 ? ' ng' : '') + '">' + fmt(conv(netTotal), 0) + sfx + '</span>' +
      '<span class="cs">' + (totalRevTotal ? (netTotal / totalRevTotal * 100).toFixed(1) + '%' : '') + '</span></div>' +
  '</div>';

  // Build table
  const mCols = showM ? months.map(m => '<th>' + mLabel(m) + '</th>').join('') : '';
  let rows = '';
  const cs = (showM ? months.length : 0) + 2;

  PNL_TEMPLATE.forEach(row => {
    if (row.type === 'sp') { rows += '<tr class="sp"><td colspan="' + cs + '"></td></tr>'; return; }

    // Resolve data
    let d = null, isPct = false;
    if (row.key && computed[row.key]) { d = computed[row.key]; isPct = !!d.isPct; }
    else if (row.match && expMap[row.label]) d = expMap[row.label];
    // Special: revenue section subtotal = revenue
    if (row.type === 'sec' && row.variant === 'rev') d = { byMonth: revenue.byMonth, total: revenue.total };
    if (row.type === 'sec' && row.variant === 'cost') d = { byMonth: cogs.byMonth, total: cogs.total };

    const mCells = showM ? months.map(m => '<td>' + (d ? fmtCell(d.byMonth[m] || 0, isPct) : '<span class="dash">—</span>') + '</td>').join('') : '';
    const totalCell = d ? fmtCell(d.total, isPct) : '<span class="dash">—</span>';
    const cls = row.type + (row.variant ? ' ' + row.variant : '');

    rows += '<tr class="' + cls + '"><td>' + esc(row.label) + '</td>' + mCells + '<td class="col-total">' + totalCell + '</td></tr>';
  });

  // Unmatched expenses
  if (unmatchedExp.length) {
    rows += '<tr class="sp"><td colspan="' + cs + '"></td></tr>';
    rows += '<tr class="grp"><td colspan="' + cs + '">Не класифіковані витрати (з 1С)</td></tr>';
    unmatchedExp.forEach(e => {
      const mCells = showM ? months.map(m => '<td>' + fmtCell(e.byMonth[m] || 0) + '</td>').join('') : '';
      rows += '<tr class="itm"><td>' + esc(e.category) + '</td>' + mCells + '<td class="col-total">' + fmtCell(e.total) + '</td></tr>';
    });
  }

  document.getElementById('body').innerHTML =
    '<div class="pnl-wrap"><table class="pnl-table"><thead><tr><th>P&L Стаття</th>' +
    mCols + '<th class="col-total">Всього</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
}

async function load() {
  document.getElementById('body').innerHTML = '<div class="loading">Завантаження...</div>';
  document.getElementById('summary').innerHTML = '';
  try {
    const q = '?action=pnl_report&from=' + state.from + '&to=' + state.to + (state.org ? '&org=' + encodeURIComponent(state.org) : '');
    const [data, fxData] = await Promise.all([
      fetch(API_URL + q).then(r => r.json()),
      fetch(API_URL + '?action=fx_rates').then(r => r.json()).catch(function() { return null; }),
    ]);
    if (data.error) throw new Error(data.error);
    const fxRate = (fxData && fxData.rates && fxData.rates.USD_UAH) || null;
    renderPnl(data, fxRate);
  } catch (e) {
    document.getElementById('body').innerHTML = '<div class="error">' + esc(e.message) + '</div>';
  }
}

document.getElementById('fromIn').addEventListener('change', function(e) { state.from = e.target.value; load(); });
document.getElementById('toIn').addEventListener('change', function(e) { state.to = e.target.value; load(); });

Auth.require('finance').then(function(user) {
  window.__user = user;
  AppHeader.mount({ active: 'finance', user });
  document.querySelector('[data-org=""]').classList.add('active');
  setPreset('year');
});
</script>
</body>
